<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Axial Play · mega.mino.mobi/sprite/axial/play</title>
<meta name="description" content="Full-screen mobile phase-space explorer for the axial/vermiform body plan. Critter up top; four XY pads map eight genes — drag to morph between worm, snake and eel. Dice for a fresh draw.">
<style>
  :root{
    --bg:#0f1014; --panel:#16181f; --panel2:#1c1f28; --ink:#e7e3d8; --dim:#a39c8b; --faint:#6f6a5d;
    --gold:#d8b25a; --gold-soft:#caa24a; --line:#2a2d38; --accent:#6aa86a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:var(--bg);color:var(--ink);font-family:var(--sans)}
  #app{height:100dvh;display:flex;flex-direction:column}
  #stagewrap{flex:0 0 32%;position:relative;background:#0a0b0e;border-bottom:1px solid var(--line);overflow:hidden}
  #stage{display:block;width:100%;height:100%;image-rendering:pixelated}
  .crumb{position:absolute;top:calc(env(safe-area-inset-top) + 8px);left:12px;font:11px/1 var(--mono);color:var(--faint)}
  .crumb a{color:var(--dim);text-decoration:none}
  .hud{position:absolute;top:calc(env(safe-area-inset-top) + 8px);right:12px;font:11px/1.5 var(--mono);color:var(--faint);text-align:right}
  .hud b{color:var(--accent)}
  #dice{position:absolute;bottom:10px;right:10px;width:48px;height:48px;border-radius:50%;border:1px solid var(--line);
        background:rgba(22,24,31,.82);color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);user-select:none}
  #dice:active{transform:scale(.92);background:var(--gold);color:#0f1014}
  #pads{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--line)}
  .pad{position:relative;background:var(--panel);touch-action:none;overflow:hidden;
       background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
       background-size:25% 25%;background-position:center}
  .pad .name{position:absolute;top:6px;left:8px;font:10px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);pointer-events:none}
  .pad .read{position:absolute;top:6px;right:8px;font:10px/1.3 var(--mono);color:var(--faint);text-align:right;pointer-events:none}
  .pad .ax{position:absolute;font:9px/1 var(--mono);color:var(--faint);pointer-events:none;opacity:.85}
  .pad .ax.x{bottom:5px;left:50%;transform:translateX(-50%)}
  .pad .ax.y{top:50%;left:5px;transform:translateY(-50%) rotate(-90deg);transform-origin:left center}
  .pad .knob{position:absolute;width:26px;height:26px;border-radius:50%;background:var(--accent);
       border:2px solid #0f1014;box-shadow:0 0 0 1px var(--accent),0 2px 8px #000a;transform:translate(-50%,-50%);pointer-events:none}
  .pad .knob::after{content:"";position:absolute;inset:7px;border-radius:50%;background:#0f1014;opacity:.35}
  .pad.live .knob{box-shadow:0 0 0 1px var(--accent),0 0 14px var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div id="stagewrap">
    <canvas id="stage"></canvas>
    <div class="crumb"><a href="/sprite/axial/">‹ axial lab</a></div>
    <div class="hud" id="hud"></div>
    <div id="dice" title="random draw">⚄</div>
  </div>
  <div id="pads"></div>
</div>

<script type="module">
import { AxialCritter, buildAxialGenome } from '../axial.js';
const $ = s => document.querySelector(s);
const cv = $('#stage'), ctx = cv.getContext('2d', { alpha:false });
let dpr=1, critter, seed='axial:meadow', last=0;

const PADS = [
  { name:'form',   x:{k:'length',lo:0.5,hi:1.6,label:'length →'}, y:{k:'girth',lo:1.6,hi:0.5,label:'↑ girth'} },
  { name:'slither',x:{k:'amp',lo:0.2,hi:1.8,label:'undulation →'}, y:{k:'waves',lo:2.6,hi:0.6,label:'↑ waves'} },
  { name:'kind',   x:{k:'fins',lo:0,hi:1,label:'fins →'},          y:{k:'segments',lo:24,hi:0,round:2,label:'↑ rings'} },
  { name:'nature', x:{k:'chassis',lo:0,hi:1,label:'flesh→steel'},  y:{k:'hue',lo:360,hi:0,round:2,label:'↑ hue'} },
];
const knobs = PADS.map(()=>({nx:0.5,ny:0.5}));
const OPEN = { length:1.25, girth:0.78, amp:1.15, waves:1.6, fins:0, segments:7, chassis:0, hue:92 }; // snake
PADS.forEach((pad,i)=>{ const inv=(ax,v)=>(v-ax.lo)/(ax.hi-ax.lo);
  knobs[i].nx=Math.min(1,Math.max(0,inv(pad.x,OPEN[pad.x.k]))); knobs[i].ny=Math.min(1,Math.max(0,inv(pad.y,OPEN[pad.y.k]))); });

function genes(){ const g={ headSize:1.1 }; PADS.forEach((pad,i)=>{
  const vx=pad.x.lo+knobs[i].nx*(pad.x.hi-pad.x.lo); g[pad.x.k]=pad.x.round?Math.round(vx):vx;
  const vy=pad.y.lo+knobs[i].ny*(pad.y.hi-pad.y.lo); g[pad.y.k]=pad.y.round?Math.round(vy):vy; }); return g; }
function apply(){ const tt=critter?critter.t:0; critter=new AxialCritter({seed,genes:genes()}); critter.t=tt; syncReads(); }
function syncReads(){ const g=genes(); PADS.forEach((pad,i)=>{ const f=v=>Math.abs(v)>=10?Math.round(v):(+v).toFixed(2);
  $('#read'+i).textContent=`${f(g[pad.x.k])} · ${f(g[pad.y.k])}`; }); }

const padsEl=$('#pads');
PADS.forEach((pad,i)=>{
  const el=document.createElement('div'); el.className='pad';
  el.innerHTML=`<span class="name">${pad.name}</span><span class="read" id="read${i}"></span><span class="ax x">${pad.x.label}</span><span class="ax y">${pad.y.label}</span><div class="knob" id="knob${i}"></div>`;
  padsEl.appendChild(el);
  const set=e=>{ const r=el.getBoundingClientRect();
    knobs[i].nx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width)); knobs[i].ny=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
    placeKnob(i); apply(); };
  el.addEventListener('pointerdown',e=>{ el.setPointerCapture(e.pointerId); el.classList.add('live'); set(e); });
  el.addEventListener('pointermove',e=>{ if(el.hasPointerCapture(e.pointerId)) set(e); });
  const up=e=>{ el.classList.remove('live'); try{el.releasePointerCapture(e.pointerId);}catch{} };
  el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
});
function placeKnob(i){ const k=$('#knob'+i); k.style.left=(knobs[i].nx*100)+'%'; k.style.top=(knobs[i].ny*100)+'%'; }
function placeAll(){ PADS.forEach((_,i)=>placeKnob(i)); }

function pickDraw(){ return { knobs:PADS.map(()=>({nx:Math.random(),ny:Math.random()})), seed:'axial:'+Math.random().toString(36).slice(2,7) }; }
function randomize(){ const d=pickDraw(); d.knobs.forEach((k,i)=>{knobs[i].nx=k.nx;knobs[i].ny=k.ny;}); seed=d.seed; placeAll(); apply(); }
$('#dice').addEventListener('pointerdown', e=>{ e.stopPropagation(); randomize(); });

function size(){ const r=$('#stagewrap').getBoundingClientRect(); dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr); }
function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0); const cw=cv.width/dpr, ch=cv.height/dpr;
  ctx.fillStyle='#0a0b0e'; ctx.fillRect(0,0,cw,ch);
  const N=critter.genome.w, M=critter.genome.h, PX=Math.max(1,Math.floor(Math.min(cw/N, ch/M)));
  const ox=(cw-PX*N)/2, oy=(ch-PX*M)/2;
  for(const r of critter.frame()){ ctx.fillStyle=r.c; ctx.fillRect(ox+r.x*PX, oy+r.y*PX, PX, PX); }
  $('#hud').innerHTML=`<b>${critter.genome.mech?'mech-worm':'vermiform'}</b> · undulating`;
}
function loop(ts){ const dt=last?Math.min(0.05,(ts-last)/1000):0; last=ts; critter.step(dt); draw(); requestAnimationFrame(loop); }
addEventListener('resize', size);
size(); apply(); placeAll(); requestAnimationFrame(loop);
</script>
</body>
</html>
