<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Radial Play · mega.mino.mobi/sprite/radial/play</title>
<meta name="description" content="Full-screen mobile phase-space explorer for the radial echinoderm body plan. Critter up top; four XY pads map eight genes — drag a point in each with your thumb and watch the creature morph. Dice for a fresh draw.">
<style>
  :root{
    --bg:#0f1014; --panel:#16181f; --panel2:#1c1f28; --ink:#e7e3d8; --dim:#a39c8b; --faint:#6f6a5d;
    --gold:#d8b25a; --gold-soft:#caa24a; --line:#2a2d38; --accent:#b39bd8;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace; --sans:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:var(--bg);color:var(--ink);font-family:var(--sans)}
  #app{height:100dvh;display:flex;flex-direction:column}
  #stagewrap{flex:0 0 36%;position:relative;background:#0a0b0e;border-bottom:1px solid var(--line);overflow:hidden}
  #stage{display:block;width:100%;height:100%;image-rendering:pixelated}
  .crumb{position:absolute;top:calc(env(safe-area-inset-top) + 8px);left:12px;font:11px/1 var(--mono);color:var(--faint)}
  .crumb a{color:var(--dim);text-decoration:none}
  .hud{position:absolute;top:calc(env(safe-area-inset-top) + 8px);right:12px;font:11px/1.5 var(--mono);color:var(--faint);text-align:right}
  .hud b{color:var(--accent)}
  #dice{position:absolute;bottom:10px;right:10px;width:48px;height:48px;border-radius:50%;border:1px solid var(--line);
        background:rgba(22,24,31,.82);color:var(--gold);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);user-select:none}
  #dice:active{transform:scale(.92);background:var(--gold);color:#0f1014}
  #pads{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--line)}
  .pad{position:relative;background:var(--panel);touch-action:none;overflow:hidden;
       background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
       background-size:25% 25%;background-position:center}
  .pad .name{position:absolute;top:6px;left:8px;font:10px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);pointer-events:none}
  .pad .read{position:absolute;top:6px;right:8px;font:10px/1.3 var(--mono);color:var(--faint);text-align:right;pointer-events:none}
  .pad .ax{position:absolute;font:9px/1 var(--mono);color:var(--faint);pointer-events:none;opacity:.85}
  .pad .ax.x{bottom:5px;left:50%;transform:translateX(-50%)}
  .pad .ax.y{top:50%;left:5px;transform:translateY(-50%) rotate(-90deg);transform-origin:left center}
  .pad .knob{position:absolute;width:26px;height:26px;border-radius:50%;background:var(--accent);
       border:2px solid #0f1014;box-shadow:0 0 0 1px var(--accent),0 2px 8px #000a;transform:translate(-50%,-50%);pointer-events:none}
  .pad .knob::after{content:"";position:absolute;inset:7px;border-radius:50%;background:#0f1014;opacity:.35}
  .pad.live .knob{box-shadow:0 0 0 1px var(--accent),0 0 14px var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div id="stagewrap">
    <canvas id="stage"></canvas>
    <div class="crumb"><a href="/sprite/radial/">‹ radial lab</a></div>
    <div class="hud" id="hud"></div>
    <div id="dice" title="random draw">⚄</div>
  </div>
  <div id="pads"></div>
</div>

<script type="module">
import { RadialCritter, buildRadialGenome } from '../radial.js';

const $ = s => document.querySelector(s);
const cv = $('#stage'), ctx = cv.getContext('2d', { alpha:false });
let dpr=1, critter, seed='echino:meadow';

// the eight genes that matter, paired onto four XY pads. The presets are just points in here —
// this IS the phase space. lo = value at left/top edge, hi = right/bottom. value = lo + n*(hi-lo).
const PADS = [
  { name:'form',
    x:{k:'arms',  lo:3,    hi:9,    round:1, label:'arms →'},
    y:{k:'depth', lo:6,    hi:0,    round:1, label:'↑ branch'} },
  { name:'arms',
    x:{k:'splay', lo:0.15, hi:1.0,  label:'splay →'},
    y:{k:'taper', lo:0.82, hi:0.48, label:'↑ taper'} },
  { name:'psyche',
    x:{k:'coupling', lo:0, hi:3.0,  label:'sync →'},
    y:{k:'writhe',   lo:1.2,hi:0,   label:'↑ writhe'} },
  { name:'aura',
    x:{k:'accentHue', lo:0, hi:360, round:2, label:'hue →'},
    y:{k:'glow',      lo:2, hi:0,   label:'↑ glow'} },
];
const knobs = PADS.map(()=>({nx:0.5,ny:0.5}));

// open on the "basket" point so it looks good immediately
const OPEN = { arms:5, depth:5, splay:0.5, taper:0.66, coupling:1.8, writhe:0.42, accentHue:42, glow:1.4 };
PADS.forEach((pad,i)=>{ const inv=(ax,v)=>(v-ax.lo)/(ax.hi-ax.lo);
  knobs[i].nx=Math.min(1,Math.max(0,inv(pad.x,OPEN[pad.x.k]))); knobs[i].ny=Math.min(1,Math.max(0,inv(pad.y,OPEN[pad.y.k]))); });

function genesFromKnobs(){
  const g={};
  PADS.forEach((pad,i)=>{
    const vx=pad.x.lo + knobs[i].nx*(pad.x.hi-pad.x.lo); g[pad.x.k]=pad.x.round?Math.round(vx):vx;
    const vy=pad.y.lo + knobs[i].ny*(pad.y.hi-pad.y.lo); g[pad.y.k]=pad.y.round?Math.round(vy):vy;
  });
  return g;
}
function applyGenes(){
  const genes=genesFromKnobs();
  if(!critter){ critter=new RadialCritter({seed,genes}); return; }
  const ng=buildRadialGenome(seed,genes);
  if(ng.arms!==critter.n) critter=new RadialCritter({seed,genes});   // arm count changed → fresh oscillators
  else { critter.genome=ng; critter.K=ng.coupling; }                 // else keep the writhe going
  syncReads();
}
function syncReads(){
  const g=genesFromKnobs();
  PADS.forEach((pad,i)=>{ const f=v=>Math.abs(v)>=10?Math.round(v):(+v).toFixed(2);
    $('#read'+i).textContent=`${f(g[pad.x.k])} · ${f(g[pad.y.k])}`; });
}

// build pads
const padsEl=$('#pads');
PADS.forEach((pad,i)=>{
  const el=document.createElement('div'); el.className='pad';
  el.innerHTML=`<span class="name">${pad.name}</span><span class="read" id="read${i}"></span>`+
    `<span class="ax x">${pad.x.label}</span><span class="ax y">${pad.y.label}</span><div class="knob" id="knob${i}"></div>`;
  padsEl.appendChild(el);
  const set=e=>{ const r=el.getBoundingClientRect();
    knobs[i].nx=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
    knobs[i].ny=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
    placeKnob(i); applyGenes(); };
  el.addEventListener('pointerdown', e=>{ el.setPointerCapture(e.pointerId); el.classList.add('live'); set(e); });
  el.addEventListener('pointermove', e=>{ if(el.hasPointerCapture(e.pointerId)) set(e); });
  const up=e=>{ el.classList.remove('live'); try{el.releasePointerCapture(e.pointerId);}catch{} };
  el.addEventListener('pointerup',up); el.addEventListener('pointercancel',up);
});
function placeKnob(i){ const k=$('#knob'+i); k.style.left=(knobs[i].nx*100)+'%'; k.style.top=(knobs[i].ny*100)+'%'; }
function placeAll(){ PADS.forEach((_,i)=>placeKnob(i)); }

// THE SEAM for a future interestingness engine: pickDraw() samples uniform-random knobs + a fresh
// seed (new arm tree + colours). Later it proposes N candidates, scores them, animates to the best.
function pickDraw(){ return { knobs:PADS.map(()=>({nx:Math.random(),ny:Math.random()})), seed:'echino:'+Math.random().toString(36).slice(2,7) }; }
function randomize(){ const d=pickDraw(); d.knobs.forEach((k,i)=>{knobs[i].nx=k.nx;knobs[i].ny=k.ny;}); seed=d.seed; critter=null; placeAll(); applyGenes(); }
$('#dice').addEventListener('pointerdown', e=>{ e.stopPropagation(); randomize(); });

function size(){
  const r=$('#stagewrap').getBoundingClientRect(); dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr);
}
let last=0;
function draw(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const cw=cv.width/dpr, ch=cv.height/dpr; ctx.fillStyle='#0a0b0e'; ctx.fillRect(0,0,cw,ch);
  const N=critter.genome.size, PX=Math.max(1,Math.floor(Math.min(cw,ch)/N));
  const ox=(cw-PX*N)/2, oy=(ch-PX*N)/2;
  for(const r of critter.frame(N)){ ctx.fillStyle=r.c; ctx.fillRect(ox+r.x*PX, oy+r.y*PX, PX, PX); }
  const sync=critter.order();
  $('#hud').innerHTML=`<b>${critter.n}</b> arms · d${critter.genome.depth}<br>sync <b>${sync.toFixed(2)}</b>`;
}
function loop(ts){ const dt=last?Math.min(0.05,(ts-last)/1000):0; last=ts; critter.step(dt); draw(); requestAnimationFrame(loop); }

addEventListener('resize', size);
size(); applyGenes(); placeAll(); requestAnimationFrame(loop);
</script>
</body>
</html>
