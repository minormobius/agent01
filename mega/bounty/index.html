<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bounty Board — Megaproject Dashboard</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --text: #c8c8d0;
  --text-dim: #6a6a7a;
  --accent: #ff8c00;
  --accent2: #00c8ff;
  --danger: #ff4466;
  --success: #44cc88;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
}
html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-sans); }

/* ── Layout ───────────────────────────────────── */
.container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
header h1 {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}
header h1 a { color: var(--accent); text-decoration: none; }
header h1 span { color: var(--text-dim); font-size: 12px; font-family: var(--font-mono); margin-left: 8px; font-weight: 400; }
.auth-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.auth-bar .handle { color: var(--accent2); }
.btn {
  background: var(--border);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  display: inline-block;
}
.btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn-primary:hover { opacity: 0.85; }
.btn-small { padding: 4px 10px; font-size: 11px; }

/* ── Auth Card ────────────────────────────────── */
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  margin: 40px auto;
  max-width: 420px;
  text-align: center;
}
.auth-card h2 {
  font-family: var(--font-serif);
  font-size: 20px;
  color: #fff;
  margin-bottom: 8px;
}
.auth-card p {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 20px;
  line-height: 1.5;
}
.auth-card input {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 13px;
  margin-bottom: 12px;
}
.auth-card input:focus { outline: none; border-color: var(--accent); }
.auth-card .btn { width: 100%; text-align: center; }
.auth-card .error { color: var(--danger); font-size: 12px; margin-top: 10px; }

/* ── Bounty List ──────────────────────────────── */
.page-section {
  margin: 24px 0;
}
.page-section h2 {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.bounty-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.bounty-card:hover { border-color: var(--accent); }
.bounty-card.expanded { border-color: var(--accent); }
.bounty-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 6px;
}
.bounty-card-title {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}
.bounty-card-reward {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--success);
  white-space: nowrap;
}
.bounty-card-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  flex-wrap: wrap;
}
.kind-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.kind-webcam { background: rgba(255, 68, 102, 0.2); color: var(--danger); }
.kind-photo { background: rgba(0, 200, 255, 0.2); color: var(--accent2); }
.kind-video { background: rgba(140, 100, 255, 0.2); color: #8c64ff; }
.kind-document { background: rgba(200, 160, 0, 0.2); color: #c8a000; }
.kind-progress_update { background: rgba(68, 204, 136, 0.2); color: var(--success); }
.kind-satellite { background: rgba(0, 160, 255, 0.2); color: #00a0ff; }
.kind-other { background: rgba(106, 106, 122, 0.2); color: var(--text-dim); }
.status-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
}
.status-open { background: rgba(68, 204, 136, 0.2); color: var(--success); }
.status-claimed { background: rgba(255, 140, 0, 0.2); color: var(--accent); }
.status-fulfilled { background: rgba(0, 200, 255, 0.2); color: var(--accent2); }

/* ── Bounty Detail ────────────────────────────── */
.bounty-detail {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.bounty-card.expanded .bounty-detail { display: block; }
.bounty-detail p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 12px;
}
.bounty-detail .trace {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  margin-top: 10px;
}
.trace-step {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  font-size: 12px;
  border-bottom: 1px solid rgba(30, 30, 46, 0.5);
}
.trace-step:last-child { border-bottom: none; }
.trace-step-icon {
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}
.trace-step-label { color: var(--text-dim); }
.trace-step-value { color: var(--text); font-family: var(--font-mono); }

/* ── Create Bounty Form ──────────────────────── */
.create-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 24px;
  display: none;
}
.create-form.open { display: block; }
.create-form h3 {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 16px;
}
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 11px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
}
.form-group textarea { min-height: 80px; resize: vertical; font-family: var(--font-sans); }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

/* ── Fulfill Form ─────────────────────────────── */
.fulfill-form {
  margin-top: 12px;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
}
.fulfill-form h4 {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--success);
  margin-bottom: 10px;
}

/* ── Footer ───────────────────────────────────── */
.page-footer {
  padding: 20px;
  text-align: center;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
.page-footer a { color: var(--accent); text-decoration: none; }
.page-footer a:hover { text-decoration: underline; }

/* ── Empty state ──────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.6;
}

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .bounty-card-header { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <h1><a href="/bounty/">Bounty Board</a> <span><a href="/" style="color:var(--text-dim)">Megaproject Dashboard</a></span></h1>
  <div class="auth-bar" id="auth-bar"></div>
</header>

<div class="container">
  <!-- Auth Card (shown when logged out) -->
  <div id="auth-card" class="auth-card" style="display:none">
    <h2>Sign in with Bluesky</h2>
    <p>Connect your Bluesky account to create bounties and submit fulfillments. Your data lives on your PDS.</p>
    <input type="text" id="auth-handle" placeholder="handle.bsky.social" />
    <button class="btn btn-primary" id="auth-submit">Sign in with Bluesky</button>
    <div class="error" id="auth-error" style="display:none"></div>
  </div>

  <!-- Action Bar (shown when logged in) -->
  <div id="action-bar" style="display:none; margin: 24px 0; display: flex; gap: 10px;">
    <button class="btn btn-primary" id="toggle-create">+ New Bounty</button>
  </div>

  <!-- Create Bounty Form -->
  <div class="create-form" id="create-form">
    <h3>Create a Bounty</h3>
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="f-project" placeholder="e.g., Fehmarn Belt Fixed Link" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Information Type</label>
        <select id="f-kind">
          <option value="webcam">Webcam</option>
          <option value="photo">Photo</option>
          <option value="video">Video</option>
          <option value="document">Document</option>
          <option value="progress_update">Progress Update</option>
          <option value="satellite">Satellite Imagery</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Reward</label>
        <input type="text" id="f-reward" placeholder="e.g., 25 REPUTATION" value="10 REPUTATION" />
      </div>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="f-title" placeholder="Short description of what you need" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-description" placeholder="Detailed description of the information you need and any requirements..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="f-submit">Post Bounty</button>
      <button class="btn" id="f-cancel">Cancel</button>
    </div>
  </div>

  <!-- Bounty List -->
  <div class="page-section">
    <h2>Open Bounties</h2>
    <div id="bounty-list"></div>
  </div>
</div>

<div class="page-footer">
  <a href="/">Back to Map</a> &middot;
  Data stored on ATProto PDS via <code>com.minomobi.mega.request</code> &middot;
  <a href="https://github.com/minormobius/agent01/tree/main/mega/lexicons">Lexicons</a>
</div>

<script>
// ─── State ───────────────────────────────────────────────
const state = {
  user: null,      // { did, handle }
  bounties: [],    // demo + PDS-sourced bounties
};

// Demo bounties (same as dashboard sidebar, seeded for now)
const DEMO_BOUNTIES = [
  { id: 'b1', projectName: 'Fehmarn Belt Fixed Link', kind: 'webcam', title: 'Live webcam feed from Rødbyhavn casting yard', description: 'Looking for a current webcam URL showing the tunnel element production at the casting yard. The official femern.com site has some photos but no live stream.', reward: '10 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-15', fulfillments: [] },
  { id: 'b2', projectName: 'California High-Speed Rail', kind: 'photo', title: 'Recent photos of viaduct construction near Fresno', description: 'Ground-level photos of the elevated guideway sections under construction in the Central Valley. Looking for anything from the last 30 days showing current state of the viaducts.', reward: '15 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-14', fulfillments: [] },
  { id: 'b3', projectName: 'Sichuan–Tibet Railway', kind: 'progress_update', title: 'Tunneling progress update — Kangding to Nyingchi section', description: 'Any recent reports on TBM progress through the Hengduan Mountains. Official sources or local news. The most challenging section involves tunnels at 3,000+ meters elevation through active fault zones.', reward: '25 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-12', fulfillments: [] },
  { id: 'b4', projectName: 'ITER Fusion Reactor', kind: 'video', title: 'Recent drone footage of tokamak assembly', description: 'Looking for recent (2026) drone video showing the current state of the tokamak pit assembly. ITER.org posts occasional updates but the latest is months old.', reward: '20 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-10', fulfillments: [] },
  { id: 'b5', projectName: 'NEOM / The Line', kind: 'satellite', title: 'Satellite imagery of The Line foundation work', description: 'Recent satellite/aerial imagery showing the extent of earthworks and foundation construction along The Line alignment. Google Earth imagery is over a year old.', reward: '30 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-08', fulfillments: [] },
  { id: 'b6', projectName: 'Brenner Base Tunnel', kind: 'document', title: 'Latest tunneling progress report (2026 Q1)', description: 'Official or news summary of meters bored to date and remaining work on the Brenner Base Tunnel. The official site publishes quarterly but the latest is Q4 2025.', reward: '10 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-06', fulfillments: [] },
  { id: 'b7', projectName: 'Stargate AI Infrastructure', kind: 'photo', title: 'Construction photos from Abilene, TX campus', description: 'On-the-ground photos of the Stargate data center campus under construction in Abilene, Texas. Any angle showing scale and progress.', reward: '20 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-05', fulfillments: [] },
  { id: 'b8', projectName: 'Yarlung Tsangpo Hydropower', kind: 'webcam', title: 'Any visual documentation of dam site preparation', description: 'This project is shrouded in secrecy. Any webcam, photo, or satellite imagery of the construction site on the Yarlung Tsangpo gorge. This is the world\'s largest energy project and virtually no visual documentation exists publicly.', reward: '50 REPUTATION', status: 'open', createdBy: 'minomobi.com', createdAt: '2026-03-01', fulfillments: [] },
];

// ─── Auth ────────────────────────────────────────────────
async function checkAuth() {
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    if (res.ok) {
      state.user = await res.json();
    }
  } catch {}
  renderAuth();
}

async function loginOAuth(handle) {
  try {
    const res = await fetch('/api/auth/oauth/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ handle, returnTo: '/bounty/' }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || 'Login failed');
    }
    const { authUrl } = await res.json();
    window.location.href = authUrl;
  } catch (err) {
    document.getElementById('auth-error').textContent = err.message;
    document.getElementById('auth-error').style.display = 'block';
  }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
  state.user = null;
  renderAuth();
  renderBounties();
}

function renderAuth() {
  const authCard = document.getElementById('auth-card');
  const authBar = document.getElementById('auth-bar');
  const actionBar = document.getElementById('action-bar');

  if (state.user) {
    authCard.style.display = 'none';
    actionBar.style.display = 'flex';
    authBar.innerHTML = `
      <span class="handle">@${state.user.handle}</span>
      <button class="btn btn-small" id="logout-btn">Logout</button>
    `;
    document.getElementById('logout-btn').addEventListener('click', logout);
  } else {
    authCard.style.display = 'block';
    actionBar.style.display = 'none';
    authBar.innerHTML = '';
  }
}

// ─── Bounty Rendering ────────────────────────────────────
function renderBounties() {
  const list = document.getElementById('bounty-list');
  const bounties = DEMO_BOUNTIES; // TODO: merge with PDS-sourced bounties

  if (bounties.length === 0) {
    list.innerHTML = '<div class="empty-state">No bounties yet. Be the first to request information about a megaproject.</div>';
    return;
  }

  list.innerHTML = bounties.map(b => `
    <div class="bounty-card" data-id="${b.id}">
      <div class="bounty-card-header">
        <div class="bounty-card-title">
          <span class="kind-badge kind-${b.kind}">${b.kind.replace('_', ' ')}</span>
          ${b.title}
        </div>
        <div class="bounty-card-reward">${b.reward}</div>
      </div>
      <div class="bounty-card-meta">
        <span class="status-badge status-${b.status}">${b.status}</span>
        <span>${b.projectName}</span>
        <span>by @${b.createdBy}</span>
        <span>${b.createdAt}</span>
      </div>
      <div class="bounty-detail">
        <p>${b.description}</p>
        <div class="trace">
          <div class="trace-step">
            <span class="trace-step-icon">1</span>
            <span class="trace-step-label">Created</span>
            <span class="trace-step-value">${b.createdAt} by @${b.createdBy}</span>
          </div>
          ${b.status === 'open' ? `
          <div class="trace-step">
            <span class="trace-step-icon">2</span>
            <span class="trace-step-label">Awaiting</span>
            <span class="trace-step-value">Fulfillment — someone with access to this project</span>
          </div>` : ''}
          ${b.fulfillments.length > 0 ? b.fulfillments.map((f, i) => `
          <div class="trace-step">
            <span class="trace-step-icon">${i + 2}</span>
            <span class="trace-step-label">Fulfilled</span>
            <span class="trace-step-value">${f.date} by @${f.by} — ${f.summary}</span>
          </div>`).join('') : ''}
        </div>
        ${state.user ? `
        <div class="fulfill-form">
          <h4>Submit Fulfillment</h4>
          <div class="form-group">
            <label>Evidence URL</label>
            <input type="text" placeholder="URL to webcam, photo, document, etc." class="fulfill-url" />
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea placeholder="Describe what you found..." class="fulfill-notes"></textarea>
          </div>
          <button class="btn btn-primary btn-small fulfill-btn" data-bounty="${b.id}">Submit Evidence</button>
        </div>` : `
        <p style="font-size:12px;color:var(--text-dim);margin-top:10px;">Sign in with Bluesky to submit a fulfillment.</p>`}
      </div>
    </div>
  `).join('');

  // Toggle expand on click
  list.querySelectorAll('.bounty-card').forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't toggle if clicking inside form inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
      card.classList.toggle('expanded');
    });
  });

  // Fulfill button handlers
  list.querySelectorAll('.fulfill-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const card = btn.closest('.bounty-card');
      const url = card.querySelector('.fulfill-url').value;
      const notes = card.querySelector('.fulfill-notes').value;
      if (!url && !notes) return alert('Please provide evidence URL or notes.');
      // TODO: Create com.minomobi.mega.fulfillment record on user's PDS
      alert('Fulfillment would be published to your PDS as a com.minomobi.mega.fulfillment record.\n\nPDS XRPC integration coming soon.');
    });
  });
}

// ─── Create Bounty ───────────────────────────────────────
function setupCreateForm() {
  const form = document.getElementById('create-form');
  const toggle = document.getElementById('toggle-create');
  const cancel = document.getElementById('f-cancel');
  const submit = document.getElementById('f-submit');

  toggle.addEventListener('click', () => form.classList.toggle('open'));
  cancel.addEventListener('click', () => form.classList.remove('open'));

  submit.addEventListener('click', () => {
    const project = document.getElementById('f-project').value;
    const kind = document.getElementById('f-kind').value;
    const title = document.getElementById('f-title').value;
    const description = document.getElementById('f-description').value;
    const reward = document.getElementById('f-reward').value;

    if (!project || !title || !description) {
      return alert('Please fill in project name, title, and description.');
    }

    // TODO: Create com.minomobi.mega.request record on user's PDS
    alert(`Bounty would be published to your PDS as a com.minomobi.mega.request record.\n\nProject: ${project}\nType: ${kind}\nTitle: ${title}\n\nPDS XRPC integration coming soon.`);
    form.classList.remove('open');
  });
}

// ─── Init ────────────────────────────────────────────────
async function init() {
  // Check for OAuth error in URL
  const params = new URLSearchParams(window.location.search);
  const error = params.get('error');
  if (error) {
    document.getElementById('auth-error').textContent = error;
    document.getElementById('auth-error').style.display = 'block';
    window.history.replaceState({}, '', '/bounty/');
  }

  // Auth
  document.getElementById('auth-submit').addEventListener('click', () => {
    const handle = document.getElementById('auth-handle').value.trim();
    if (handle) loginOAuth(handle);
  });
  document.getElementById('auth-handle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const handle = document.getElementById('auth-handle').value.trim();
      if (handle) loginOAuth(handle);
    }
  });

  await checkAuth();
  setupCreateForm();
  renderBounties();
}
