<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Megaproject Dashboard — Global Infrastructure Tracker</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --border: #1e1e2e;
  --text: #c8c8d0;
  --text-dim: #6a6a7a;
  --accent: #ff8c00;
  --accent2: #00c8ff;
  --danger: #ff4466;
  --success: #44cc88;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-serif: 'Playfair Display', Georgia, serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); overflow: hidden; }

/* ── Layout ────────────────────────────────────────────── */
#app {
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: 1fr 400px;
  height: 100vh;
}
#header {
  grid-column: 1 / -1;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--surface);
}
#map-container {
  position: relative;
  grid-column: 1;
  grid-row: 2;
}
#map { width: 100%; height: 100%; }
#sidebar {
  grid-column: 2;
  grid-row: 2 / 4;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
#status-bar {
  grid-column: 1;
  grid-row: 3;
  padding: 6px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  justify-content: space-between;
}

/* ── Header Controls ───────────────────────────────────── */
#masthead {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.5px;
  white-space: nowrap;
}
#masthead span {
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 400;
  font-family: var(--font-mono);
  margin-left: 8px;
}
.ctrl-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.ctrl-group label {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.filter-btn {
  background: var(--bg);
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* ── Sidebar ───────────────────────────────────────────── */
#sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
.project-list-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.project-list-item:hover { background: rgba(255, 140, 0, 0.05); }
.project-list-item.active { background: rgba(255, 140, 0, 0.1); border-left: 3px solid var(--accent); }
.project-list-name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
}
.project-list-meta {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  display: flex;
  gap: 10px;
}
.project-list-type {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
#sidebar-stats {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  justify-content: space-between;
}

/* ── Detail Panel ─────────────────────────────────────── */
#detail-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 420px;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 100;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#detail-panel.open { transform: translateX(0); }
#detail-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 28px;
  height: 28px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
#detail-close:hover { color: var(--text); border-color: var(--accent); }
#detail-backdrop {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 99;
}
#detail-backdrop.open { display: block; }
#detail-mobile-close {
  display: none;
  width: 100%;
  padding: 14px 20px;
  background: var(--bg);
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  text-align: center;
  flex-shrink: 0;
}
.detail-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.detail-header h2 {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
  padding-right: 36px;
}
.detail-header .detail-subtitle {
  font-size: 13px;
  color: var(--text-dim);
}
.detail-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.detail-stat {
  background: var(--surface);
  padding: 12px 16px;
}
.detail-stat-label {
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.detail-stat-value {
  font-size: 16px;
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--accent);
}
.detail-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.detail-section h3 {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 10px;
}
.detail-section p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}
.detail-section ul {
  list-style: none;
  padding: 0;
}
.detail-section ul li {
  font-size: 13px;
  line-height: 1.5;
  padding: 4px 0;
  border-bottom: 1px solid rgba(30, 30, 46, 0.5);
  color: var(--text);
}
.detail-section ul li::before {
  content: '›';
  color: var(--accent);
  margin-right: 8px;
  font-weight: 700;
}
.detail-section a {
  color: var(--accent2);
  text-decoration: none;
  font-size: 12px;
  font-family: var(--font-mono);
}
.detail-section a:hover { text-decoration: underline; }
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-construction { background: rgba(255, 140, 0, 0.2); color: var(--accent); }
.status-planned { background: rgba(0, 200, 255, 0.2); color: var(--accent2); }
.status-completed { background: rgba(68, 204, 136, 0.2); color: var(--success); }
.status-partial { background: rgba(140, 100, 255, 0.2); color: #8c64ff; }

/* ── Tooltip ───────────────────────────────────────────── */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(10, 10, 15, 0.95);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 12px;
  max-width: 260px;
  z-index: 200;
  display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#tooltip .tt-name { font-weight: 600; color: #fff; margin-bottom: 3px; }
#tooltip .tt-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
#tooltip .tt-cost { color: var(--accent); font-family: var(--font-mono); font-weight: 600; }

/* ── Responsive ───────────────────────────────────────── */
/* ── Prediction Market Gauge ──────────────────────────── */
.prediction-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.prediction-section h3 {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 10px;
}
.pred-gauge {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.pred-ring {
  width: 56px;
  height: 56px;
  flex-shrink: 0;
}
.pred-ring svg { transform: rotate(-90deg); }
.pred-ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
.pred-ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
.pred-pct {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
}
.pred-label {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.4;
}
.pred-market-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--accent2);
  text-decoration: none;
}
.pred-market-link:hover { text-decoration: underline; }
.pred-loading {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  padding: 8px 0;
}
.pred-none {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}
.pred-markets-list {
  list-style: none;
  padding: 0;
}
.pred-markets-list li {
  padding: 6px 0;
  border-bottom: 1px solid rgba(30, 30, 46, 0.5);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pred-markets-list li a {
  color: var(--text);
  text-decoration: none;
  font-size: 12px;
  flex: 1;
  margin-right: 10px;
}
.pred-markets-list li a:hover { color: #fff; }
.pred-prob-badge {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ── Sidebar Tabs ─────────────────────────────────────── */
#sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-tab {
  flex: 1;
  padding: 10px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.sidebar-tab:hover { color: var(--text); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Bounty Board ─────────────────────────────────────── */
#bounty-panel { display: none; flex: 1; overflow-y: auto; }
#bounty-panel.active { display: block; }
#sidebar-list.active { display: block; }
.bounty-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.bounty-header h4 {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
}
.bounty-add-btn {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 4px;
  padding: 4px 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
}
.bounty-add-btn:hover { opacity: 0.85; }
.bounty-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.bounty-item:hover { background: rgba(255, 140, 0, 0.05); }
.bounty-kind {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 6px;
}
.bounty-kind-webcam { background: rgba(255, 68, 102, 0.2); color: var(--danger); }
.bounty-kind-photo { background: rgba(0, 200, 255, 0.2); color: var(--accent2); }
.bounty-kind-video { background: rgba(140, 100, 255, 0.2); color: #8c64ff; }
.bounty-kind-document { background: rgba(200, 160, 0, 0.2); color: #c8a000; }
.bounty-kind-progress_update { background: rgba(68, 204, 136, 0.2); color: var(--success); }
.bounty-kind-satellite { background: rgba(0, 160, 255, 0.2); color: #00a0ff; }
.bounty-kind-other { background: rgba(106, 106, 122, 0.2); color: var(--text-dim); }
.bounty-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
}
.bounty-meta {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-dim);
  display: flex;
  gap: 10px;
  align-items: center;
}
.bounty-reward {
  color: var(--success);
  font-weight: 600;
}
.bounty-project {
  font-size: 11px;
  color: var(--text-dim);
}
.bounty-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  line-height: 1.6;
}

/* Hide header scrollbar but keep scrollable */
#header::-webkit-scrollbar { display: none; }
#header { scrollbar-width: none; }

@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  #header { gap: 10px; padding: 10px 14px; }
  #masthead { font-size: 14px; flex-shrink: 0; }
  #masthead span { display: none; }
  .filter-btn { flex-shrink: 0; padding: 5px 10px; font-size: 10px; }
  #sidebar { grid-column: 1; grid-row: 3; max-height: 35vh; border-left: none; border-top: 1px solid var(--border); }
  #status-bar { display: none; }
  #detail-panel { width: 100%; }
  #detail-mobile-close { display: block; }
  #detail-close { display: none; }
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="masthead">Megaproject Dashboard <span>Global Infrastructure Tracker</span></div>
    <div class="ctrl-group" id="filters"></div>
  </div>
  <div id="map-container">
    <div id="map"></div>
    <div id="detail-backdrop"></div>
    <div id="detail-panel">
      <button id="detail-mobile-close">&darr; Close</button>
      <button id="detail-close">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>
  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="projects">Projects</button>
      <button class="sidebar-tab" data-tab="bounties">Bounties</button>
    </div>
    <div id="sidebar-stats"></div>
    <div id="sidebar-list" class="active"></div>
    <div id="bounty-panel"></div>
  </div>
  <div id="status-bar">
    <span id="status-left"></span>
    <span id="status-right">Sources: Wikipedia, news reports, government filings</span>
  </div>
</div>
<div id="tooltip"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9.1.7/dist.min.js"></script>
<script>

      'Construction uses 3D printing and layer-by-layer placement',
      'Located on the Yellow River, Tibetan Plateau',
      'World\'s largest structure built without direct human labor',
      'Proof of concept for autonomous mega-construction',
    ],
    links: [
      { label: 'Wikipedia', url: 'https://en.wikipedia.org/wiki/Yangqu_Dam' },
    ],
  },
];

// ── State ────────────────────────────────────────────────
const state = {
  projects: PROJECTS,
  filtered: [...PROJECTS],
  activeType: 'all',
  selectedProject: null,
  hoveredProject: null,
};

// ── Helpers ──────────────────────────────────────────────
function formatCost(value, currency) {
  const c = currency || 'USD';
  if (value >= 1e12) return `${c === 'USD' ? '$' : ''}${(value / 1e12).toFixed(1)}T ${c !== 'USD' ? c : ''}`.trim();
  if (value >= 1e9) return `${c === 'USD' ? '$' : ''}${(value / 1e9).toFixed(1)}B ${c !== 'USD' ? c : ''}`.trim();
  if (value >= 1e6) return `${c === 'USD' ? '$' : ''}${(value / 1e6).toFixed(0)}M ${c !== 'USD' ? c : ''}`.trim();
  return `${c === 'USD' ? '$' : ''}${value.toLocaleString()} ${c !== 'USD' ? c : ''}`.trim();
}

function statusLabel(s) {
  const map = { construction: 'Under Construction', planned: 'Planned', completed: 'Completed', partial: 'Partially Operational' };
  return map[s] || s;
}

function statusClass(s) {
  return 'status-badge status-' + s;
}

function typeColor(t) {
  return TYPES[t] ? TYPES[t].hex : '#888';
}

function typeRgba(t, a) {
  const c = TYPES[t] ? TYPES[t].color : [128, 128, 128];
  return [...c, a];
}

// ── Map & Deck Setup ─────────────────────────────────────
let map, deckOverlay;

function init() {
  map = new maplibregl.Map({
    container: 'map',
    style: { version: 8, sources: { carto: { type: 'raster', tiles: ['https://basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png'], tileSize: 256, attribution: '&copy; <a href="https://carto.com">CARTO</a>' } }, layers: [{ id: 'carto', type: 'raster', source: 'carto' }] },
    center: [30, 25],
    zoom: 1.8,
    minZoom: 1,
    maxZoom: 12,
    attributionControl: false,
  });
  map.addControl(new maplibregl.NavigationControl(), 'bottom-left');
  map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');

  deckOverlay = new deck.MapboxOverlay({ layers: [] });
  map.addControl(deckOverlay);

  buildFilters();
  applyFilters();
  updateSidebar();

  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.getElementById('detail-mobile-close').addEventListener('click', closeDetail);
  document.getElementById('detail-backdrop').addEventListener('click', closeDetail);

  // Sidebar tabs
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });
}

// ── Filters ──────────────────────────────────────────────
function buildFilters() {
  const container = document.getElementById('filters');
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.dataset.type = 'all';
  allBtn.addEventListener('click', () => setFilter('all'));
  container.appendChild(allBtn);

  for (const [key, val] of Object.entries(TYPES)) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = val.name;
    btn.dataset.type = key;
    btn.addEventListener('click', () => setFilter(key));
    container.appendChild(btn);
  }
}

function setFilter(type) {
  state.activeType = type;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
  applyFilters();
  updateSidebar();
}

function applyFilters() {
  if (state.activeType === 'all') {
    state.filtered = [...state.projects];
  } else {
    state.filtered = state.projects.filter(p => p.type === state.activeType);
  }
  updateDeckLayers();
  updateStatus();
}

// ── Deck.gl Layers ───────────────────────────────────────
function updateDeckLayers() {
  const data = state.filtered;
  const maxCost = Math.max(...data.map(p => p.cost));

  const scatterLayer = new deck.ScatterplotLayer({
    id: 'projects',
    data,
    getPosition: d => [d.lon, d.lat],
    getRadius: d => 30000 + Math.sqrt(d.cost / maxCost) * 250000,
    getFillColor: d => {
      if (state.selectedProject && state.selectedProject.id === d.id) return [255, 255, 255, 220];
      if (state.hoveredProject && state.hoveredProject.id === d.id) return [...(TYPES[d.type]?.color || [180, 180, 180]), 240];
      return typeRgba(d.type, 180);
    },
    getLineColor: d => {
      if (state.selectedProject && state.selectedProject.id === d.id) return [255, 140, 0, 255];
      return [0, 0, 0, 0];
    },
    lineWidthMinPixels: 0,
    lineWidthMaxPixels: 3,
    stroked: true,
    getLineWidth: d => (state.selectedProject && state.selectedProject.id === d.id) ? 3 : 0,
    radiusMinPixels: 5,
    radiusMaxPixels: 30,
    pickable: true,
    onHover: info => onHover(info),
    onClick: info => onClick(info),
    updateTriggers: {
      getFillColor: [state.selectedProject?.id, state.hoveredProject?.id],
      getLineColor: [state.selectedProject?.id],
      getLineWidth: [state.selectedProject?.id],
    },
  });

  const textLayer = new deck.TextLayer({
    id: 'labels',
    data: data.filter(d => d.cost / maxCost > 0.03),
    getPosition: d => [d.lon, d.lat],
    getText: d => d.name.length > 20 ? d.name.slice(0, 18) + '…' : d.name,
    getSize: 11,
    getColor: [200, 200, 208, 200],
    getPixelOffset: [0, 18],
    fontFamily: '"SF Mono", "Cascadia Code", monospace',
    fontWeight: 500,
    outlineWidth: 2,
    outlineColor: [10, 10, 15, 200],
    billboard: true,
    sizeMinPixels: 10,
    sizeMaxPixels: 13,
  });

  const routeData = data.filter(d => d.route && d.route.length > 1);
  const pathLayer = new deck.PathLayer({
    id: 'routes',
    data: routeData,
    getPath: d => d.route,
    getColor: d => {
      const c = TYPES[d.type]?.color || [180, 180, 180];
      if (state.selectedProject && state.selectedProject.id === d.id) return [...c, 220];
      return [...c, 90];
    },
    getWidth: d => (state.selectedProject && state.selectedProject.id === d.id) ? 4 : 2,
    widthMinPixels: 1,
    widthMaxPixels: 6,
    capRounded: true,
    jointRounded: true,
    billboard: false,
    pickable: true,
    onHover: info => onHover(info),
    onClick: info => onClick(info),
    updateTriggers: {
      getColor: [state.selectedProject?.id],
      getWidth: [state.selectedProject?.id],
    },
  });

  deckOverlay.setProps({ layers: [pathLayer, scatterLayer, textLayer] });
}

// ── Interactions ─────────────────────────────────────────
function onHover(info) {
  const tooltip = document.getElementById('tooltip');
  if (info.object) {
    state.hoveredProject = info.object;
    const p = info.object;
    tooltip.innerHTML = `
      <div class="tt-name">${p.name}</div>
      <div class="tt-meta">${p.country}</div>
      <div class="tt-cost">${formatCost(p.cost, p.currency)}</div>
      <div class="tt-meta">${statusLabel(p.status)}</div>
    `;
    tooltip.style.display = 'block';
    tooltip.style.left = (info.x + 14) + 'px';
    tooltip.style.top = (info.y + 14) + 'px';
  } else {
    state.hoveredProject = null;
    tooltip.style.display = 'none';
  }
  updateDeckLayers();
}

function onClick(info) {
  if (info.object) {
    selectProject(info.object);
  }
}

function selectProject(project) {
  state.selectedProject = project;
  updateDeckLayers();
  updateSidebar();
  openDetail(project);

  map.flyTo({
    center: [project.lon, project.lat],
    zoom: Math.max(map.getZoom(), 4),
    duration: 800,
  });
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-backdrop').classList.remove('open');
  state.selectedProject = null;
  updateDeckLayers();
  updateSidebar();
}

    </div>
    <div class="detail-stats">
      <div class="detail-stat">

      </div>

      </div>

// ── Sidebar ──────────────────────────────────────────────
function updateSidebar() {
  const stats = document.getElementById('sidebar-stats');
  const totalCost = state.filtered.reduce((s, p) => s + p.cost, 0);
  stats.innerHTML = `
    <span>${state.filtered.length} projects</span>
    <span>~${formatCost(totalCost, 'USD')} total investment</span>
  `;

  const list = document.getElementById('sidebar-list');
  const sorted = [...state.filtered].sort((a, b) => b.cost - a.cost);
  list.innerHTML = sorted.map(p => `
    <div class="project-list-item${state.selectedProject?.id === p.id ? ' active' : ''}" data-id="${p.id}">
      <div class="project-list-name">${p.name}</div>
      <div class="project-list-meta">
        <span class="project-list-type" style="background:${typeColor(p.type)}22;color:${typeColor(p.type)}">${TYPES[p.type]?.name || p.type}</span>
        <span>${formatCost(p.cost, p.currency)}</span>
        <span>${p.country}</span>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.project-list-item').forEach(el => {
    el.addEventListener('click', () => {
      const proj = state.projects.find(p => p.id === el.dataset.id);
      if (proj) selectProject(proj);
    });
  });
}

// ── Status Bar ───────────────────────────────────────────
function updateStatus() {
  const left = document.getElementById('status-left');
  const typeLabel = state.activeType === 'all' ? 'All types' : TYPES[state.activeType]?.name;
  left.textContent = `${state.filtered.length} megaprojects · ${typeLabel}`;
}

// ── Boot ─────────────────────────────────────────────────
// ── Manifold Markets Integration ─────────────────────────
async function searchManifold(projectName) {
  const loading = document.getElementById('pred-loading');
  const results = document.getElementById('pred-results');
  if (!loading || !results) return;

  // Build search terms — use project name, try to find relevant markets
  const terms = projectName.replace(/[()]/g, '').split(/\s+/).slice(0, 4).join(' ');

  try {
    const resp = await fetch(
      `https://api.manifold.markets/v0/search-markets?term=${encodeURIComponent(terms)}&filter=open&contractType=BINARY&limit=5&sort=most-popular`
    );
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const markets = await resp.json();

    loading.style.display = 'none';
    results.style.display = 'block';

    if (!markets || markets.length === 0) {
      results.innerHTML = `
        <div class="pred-none">
          No prediction markets found for this project.<br>
          <a class="pred-market-link" href="https://manifold.markets/create" target="_blank" rel="noopener">Create one on Manifold ↗</a>
        </div>`;
      return;
    }

    // Show top market as a gauge, rest as list
    const top = markets[0];
    const pct = Math.round((top.probability || 0) * 100);
    const color = pct >= 60 ? '#44cc88' : pct >= 35 ? '#ff8c00' : '#ff4466';
    const circumference = 2 * Math.PI * 22;
    const offset = circumference - (pct / 100) * circumference;

    let html = `
      <div class="pred-gauge">
        <div class="pred-ring">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="pred-ring-bg" cx="28" cy="28" r="22"/>
            <circle class="pred-ring-fill" cx="28" cy="28" r="22"
              stroke="${color}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
        </div>
        <div>
          <div class="pred-pct" style="color:${color}">${pct}%</div>
          <div class="pred-label">${top.question.length > 60 ? top.question.slice(0, 58) + '…' : top.question}</div>
          <a class="pred-market-link" href="${top.url}" target="_blank" rel="noopener">Trade on Manifold ↗</a>
        </div>
      </div>`;

    if (markets.length > 1) {
      html += `<ul class="pred-markets-list">`;
      for (let i = 1; i < markets.length; i++) {
        const m = markets[i];
        const mp = Math.round((m.probability || 0) * 100);
        const mc = mp >= 60 ? '#44cc88' : mp >= 35 ? '#ff8c00' : '#ff4466';
        html += `<li>
          <a href="${m.url}" target="_blank" rel="noopener">${m.question.length > 50 ? m.question.slice(0, 48) + '…' : m.question}</a>
          <span class="pred-prob-badge" style="background:${mc}22;color:${mc}">${mp}%</span>
        </li>`;
      }
      html += `</ul>`;
    }

    results.innerHTML = html;
  } catch (err) {
    loading.style.display = 'none';
    results.style.display = 'block';
    results.innerHTML = `<div class="pred-none">Could not reach Manifold Markets.<br><span style="font-size:11px;color:var(--text-dim)">${err.message}</span></div>`;
  }
}

function updateBountyBoard() {
  const panel = document.getElementById('bounty-panel');
  const filtered = state.selectedProject
    ? BOUNTIES.filter(b => b.projectId === state.selectedProject.id)
    : BOUNTIES;
  const displayed = filtered.length > 0 ? filtered : BOUNTIES;

  let html = `
    <div class="bounty-header">
      <h4>${state.selectedProject ? `Bounties: ${state.selectedProject.name}` : 'All Open Bounties'}</h4>
    </div>`;

  if (displayed.length === 0) {
    html += `<div class="bounty-empty">No bounties yet.<br>Be the first to request information about a megaproject.</div>`;
  } else {
    html += displayed.map(b => `
      <div class="bounty-item" data-project="${b.projectId}">
        <div class="bounty-title">
          <span class="bounty-kind bounty-kind-${b.kind}">${b.kind.replace('_', ' ')}</span>
          ${b.title}
        </div>
        <div class="bounty-meta">
          <span class="bounty-reward">${b.reward}</span>
          <span class="bounty-project">${b.projectName}</span>
        </div>
      </div>
    `).join('');
  }

  panel.innerHTML = html;

  // Click bounty → select that project
  panel.querySelectorAll('.bounty-item').forEach(el => {
    el.addEventListener('click', () => {
      const proj = state.projects.find(p => p.id === el.dataset.project);
      if (proj) {
        switchTab('projects');
        selectProject(proj);
      }
    });
  });
}

// ── Sidebar Tabs ─────────────────────────────────────────
function switchTab(tabName) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  const list = document.getElementById('sidebar-list');
  const bounty = document.getElementById('bounty-panel');
  const stats = document.getElementById('sidebar-stats');
  if (tabName === 'projects') {
    list.style.display = 'block';
    stats.style.display = 'flex';
    bounty.style.display = 'none';
  } else {
    list.style.display = 'none';
    stats.style.display = 'none';
    bounty.style.display = 'block';
    updateBountyBoard();
  }
}
