<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>civ — particle playback</title>
<style>
  :root{ --bg:#080b11; --panel:#121924; --edge:#233041; --ink:#e6edf3; --dim:#8b98a9; --gold:#d9a441; --acc:#5aa9e6; --good:#5bd18b; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #app{ display:flex; flex-direction:column; height:100%; }
  header{ display:flex; align-items:center; gap:12px; padding:8px 14px; border-bottom:1px solid var(--edge); flex-wrap:wrap; }
  header .brand{ font-weight:800; } header .brand .g{ color:var(--gold); }
  header .crumb{ color:var(--dim); font-size:12px; }
  header select,header input{ background:#0b0f16; color:var(--ink); border:1px solid var(--edge); border-radius:7px; padding:5px 8px; font:inherit; }
  header input[type=text]{ width:66px; }
  header input[type=number]{ width:74px; }
  button{ background:var(--gold); color:#1a1206; border:0; border-radius:7px; padding:6px 12px; font-weight:700; cursor:pointer; }
  button.ghost{ background:transparent; color:var(--acc); border:1px solid var(--edge); font-weight:600; }
  button:disabled{ opacity:.5; cursor:wait; }
  .grow{ flex:1; }
  main{ position:relative; flex:1; min-height:0; }
  canvas{ display:block; width:100%; height:100%; cursor:crosshair; }
  #legend{ position:absolute; top:10px; left:10px; background:rgba(18,25,36,.86); border:1px solid var(--edge); border-radius:9px; padding:8px 10px; font-size:12px; max-width:210px; }
  #legend .k{ display:flex; align-items:center; gap:6px; margin:2px 0; }
  #legend .sw{ width:11px; height:11px; border-radius:3px; }
  #legend .modes{ display:flex; gap:4px; margin:6px 0 4px; flex-wrap:wrap; }
  #legend .modes b{ cursor:pointer; padding:2px 6px; border:1px solid var(--edge); border-radius:6px; color:var(--dim); font-weight:600; }
  #legend .modes b.on{ color:var(--gold); border-color:var(--gold); }
  #inspect{ position:absolute; top:10px; right:10px; width:264px; background:rgba(18,25,36,.94); border:1px solid var(--edge); border-radius:10px; padding:12px; font-size:13px; display:none; }
  #inspect h3{ margin:0 0 6px; font-size:14px; }
  #inspect .row{ display:flex; justify-content:space-between; gap:8px; margin:3px 0; }
  #inspect .row .t{ color:var(--dim); } #inspect .caps{ margin-top:6px; }
  #inspect .cap{ display:inline-block; background:#16261c; color:var(--good); border-radius:5px; padding:1px 6px; font-size:11px; margin:2px 3px 0 0; }
  #inspect .x{ position:absolute; top:8px; right:10px; color:var(--dim); cursor:pointer; }
  footer{ border-top:1px solid var(--edge); padding:8px 14px; }
  .transport{ display:flex; align-items:center; gap:8px; }
  .transport button{ background:#1b2534; color:var(--ink); border:1px solid var(--edge); font-weight:700; min-width:38px; }
  .transport button.play{ background:var(--gold); color:#1a1206; border:0; }
  #scrub{ flex:1; }
  .tlabel{ font-variant-numeric:tabular-nums; color:var(--dim); min-width:150px; font-size:12px; }
  #track{ position:relative; height:14px; margin-top:6px; }
  #evbar{ position:absolute; inset:0; }
  #evbar i{ position:absolute; top:2px; width:2px; height:10px; border-radius:1px; }
  #status{ color:var(--dim); font-size:12px; }
  .desc{ color:var(--ink); }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="brand"><span class="g">civ</span> particle playback</span>
    <span class="crumb"><a href="/" style="color:var(--acc)">← dashboard</a></span>
    <select id="preset" title="preset">
      <option value="">default</option><option value="neolithic">neolithic</option>
      <option value="kurgan">kurgan</option><option value="bantu">bantu</option>
      <option value="austronesian">austronesian</option><option value="americas">americas</option>
    </select>
    <label class="crumb">world <input id="world" type="text" value="7"></label>
    <label class="crumb">seed <input id="civseed" type="number" value="1"></label>
    <label class="crumb">ticks <input id="ticks" type="number" value="1000" step="100" min="200" max="1500"></label>
    <button id="load">Load run</button>
    <span id="status" class="grow"></span>
  </header>

  <main>
    <canvas id="cv"></canvas>
    <div id="legend">
      <div class="modes" id="modes">
        <b data-m="culture" class="on">culture</b><b data-m="sub">subsistence</b><b data-m="era">era</b><b data-m="density">density</b>
      </div>
      <div id="legkeys"></div>
      <div class="k" style="color:var(--dim);margin-top:6px">scroll = zoom · drag = pan · click = inspect</div>
    </div>
    <div id="inspect"><span class="x" id="closeins">✕</span><div id="insbody"></div></div>
  </main>

  <footer>
    <div class="transport">
      <button id="rev" title="play backward">◀◀</button>
      <button id="stepb" title="step back">◀</button>
      <button id="play" class="play" title="play/pause">▶</button>
      <button id="stepf" title="step forward">▶</button>
      <button id="fwd" title="play forward">▶▶</button>
      <input id="scrub" class="grow" type="range" min="0" max="0" value="0">
      <span class="tlabel" id="tlabel">—</span>
      <select id="speed" title="speed"><option>2</option><option selected>6</option><option>12</option><option>20</option></select>
    </div>
    <div id="track"><div id="evbar"></div></div>
    <div id="status2" class="desc" style="margin-top:6px;color:var(--dim)"></div>
  </footer>
</div>

<script type="module">
const $ = s => document.querySelector(s);
const cv = $('#cv'), ctx = cv.getContext('2d');
// mappa biome palette (index-parallel to engine BIOMES): [h,s,l]
const BIOMES = [[212,48,16],[198,46,30],[202,46,42],[205,10,90],[150,12,60],[150,26,33],[42,16,56],[74,34,52],[112,32,37],[142,38,31],[44,56,62],[64,44,51],[92,44,40],[134,50,29],[28,8,70],[0,0,94],[198,12,84],[200,14,90]];
const BIOME_NAME = ['deep ocean','shelf sea','lake','ice sheet','tundra','boreal forest','cold desert','grassland/steppe','temperate forest','temperate rainforest','desert','savanna','tropical seasonal','tropical rainforest','alpine','snowcap','sea ice','glacier'];
const SUBS = ['forager','pastoral','horticulture','plough','irrigation','maritime'];
const SUB_COL = [[96,15,52],[44,42,60],[108,48,44],[46,62,56],[176,52,46],[205,60,52]];
const ERA_NAME = ['forager','neolithic','bronze','classical','industrial','modern'];
const hsl = (h,s,l,a=1)=>`hsl(${h} ${s}% ${l}% / ${a})`;
const cultureHue = id => (id*137.508)%360;

let DATA=null, view={z:1,x:0,y:0}, mode='culture', frame=0, playing=0, dir=1, sel=null, raf=0;
let BASE=1000, cellSX=null, cellSY=null;

// ---- deterministic per-cell jitter (stable swarm within a frame) ----------------
function hash2(a,b){ let h=(a*374761393+b*668265263)|0; h=Math.imul(h^(h>>>13),1274126177); return ((h^(h>>>16))>>>0)/4294967296; }

// ---- projection (equirectangular + zoom/pan) ------------------------------------
function proj(lon,lat){ const sx=(lon+180)/360, sy=(90-lat)/180; return [ view.x + sx*BASE*view.z, view.y + sy*(BASE/2)*view.z ]; }
function fit(){ const W=cv.width,H=cv.height; view.z=Math.min(W/BASE, H/(BASE/2))*0.98; view.x=(W-BASE*view.z)/2; view.y=(H-(BASE/2)*view.z)/2; }
function resize(){ const r=cv.getBoundingClientRect(),dpr=Math.min(2,devicePixelRatio||1); cv.width=r.width*dpr; cv.height=r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); cv.width=r.width; cv.height=r.height; }

function precomputeCells(){ const w=DATA.world_mesh; cellSX=new Float32Array(w.N); cellSY=new Float32Array(w.N); }
function updateCellScreens(){ const w=DATA.world_mesh; for(let i=0;i<w.N;i++){ const p=proj(w.lon[i],w.lat[i]); cellSX[i]=p[0]; cellSY[i]=p[1]; } }

// ---- colour per cell in the current frame ---------------------------------------
function cellColor(f, k, alpha){
  if(mode==='culture'){ const h=cultureHue(f.cu[k]); return hsl(h,62,58,alpha); }
  if(mode==='sub'){ const c=SUB_COL[f.sub[k]]||[0,0,60]; return hsl(c[0],c[1],c[2],alpha); }
  if(mode==='era'){ const t=f.tier[k]; return hsl(210-t*40, 55, 40+t*8, alpha); }
  // density
  const d=Math.min(1, f.popc[k]/600); return hsl(20+ (1-d)*40, 80, 30+d*45, alpha);
}

// ---- render ---------------------------------------------------------------------
function render(){
  const W=cv.width,H=cv.height; ctx.fillStyle='#070a10'; ctx.fillRect(0,0,W,H);
  if(!DATA){ return; }
  const w=DATA.world_mesh; updateCellScreens();
  // backdrop: land cells as faint biome dots (ocean stays dark)
  const r=Math.max(1.1, 1.6*view.z);
  for(let i=0;i<w.N;i++){ if(w.water[i]!==0) continue; const x=cellSX[i],y=cellSY[i]; if(x<-4||x>W+4||y<-4||y>H+4) continue;
    const b=BIOMES[w.biome[i]]||[0,0,20]; ctx.fillStyle=hsl(b[0],b[1]*0.6,b[2]*0.7,0.5); ctx.fillRect(x-r/2,y-r/2,r,r); }
  // particles: scatter per occupied cell ∝ population (globally scaled)
  const f=DATA.frames[frame]; if(!f) return;
  let totalPop=f.pop||1; const target=13000; const scale=Math.min(1, target/totalPop);
  const jr=Math.max(2, 6*view.z); // jitter radius in px
  for(let k=0;k<f.cell.length;k++){ const c=f.cell[k], x=cellSX[c], y=cellSY[c]; if(x<-6||x>W+6||y<-6||y>H+6) continue;
    let n=Math.round(f.popc[k]*scale); if(n<1)n=1; if(n>140)n=140;
    ctx.fillStyle=cellColor(f,k,0.85);
    for(let j=0;j<n;j++){ const a=hash2(c,j)*6.283, rr=Math.sqrt(hash2(c,j+9973))*jr; const px=x+Math.cos(a)*rr, py=y+Math.sin(a)*rr; ctx.fillRect(px,py,1.4,1.4); }
  }
  // selection ring
  if(sel!=null){ const x=cellSX[sel], y=cellSY[sel]; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(x,y,10,0,6.283); ctx.stroke(); }
}

// ---- timeline / events ----------------------------------------------------------
function drawEventBar(){
  const bar=$('#evbar'); bar.innerHTML=''; if(!DATA) return;
  const T=DATA.ticks||1; const col={agriculture:'#5bd18b',industry:'#d9a441',migrationPulse:'#5aa9e6',cultureSplit:'#a98bd6',collapse:'#e5686b',stateFormation:'#6fd0c0',techUnlock:'#c7b16a'};
  for(const e of DATA.events){ const i=document.createElement('i'); i.style.left=(100*e.t/T)+'%'; i.style.background=col[e.type]||'#556'; i.title=`t${e.t} ${e.type}`+(e.cap?(' '+e.cap):'')+(e.package?(' '+e.package):''); bar.appendChild(i); }
}
function frameLabel(){
  const f=DATA.frames[frame]; const yr=Math.round(f.t*(DATA.tickYears||2.5));
  $('#tlabel').textContent=`t ${f.t} · ~${yr.toLocaleString()} yr · frame ${frame+1}/${DATA.frames.length} · pop ${f.pop.toLocaleString()}`;
  // nearby events feed
  const near=DATA.events.filter(e=>Math.abs(e.t-f.t)<=(DATA.frames[1]?DATA.frames[1].t-DATA.frames[0].t:40));
  $('#status2').textContent = near.length ? ('near: '+near.slice(0,4).map(e=>e.type+(e.cap?(':'+e.cap):e.package?(':'+e.package):'')).join(' · ')) : '';
}

// ---- inspector ------------------------------------------------------------------
function inspectCell(c){
  sel=c; const f=DATA.frames[frame], w=DATA.world_mesh;
  const k=f.cell.indexOf(c);
  const box=$('#inspect'), body=$('#insbody');
  if(k<0){ box.style.display='none'; sel=null; return; }
  const cuId=f.cu[k]; const ci=f.cultures.id.indexOf(cuId);
  const tech=ci>=0?f.cultures.tech[ci]:0; const lang=ci>=0?f.cultures.lang[ci]:'—'; const size=ci>=0?f.cultures.size[ci]:'—';
  const caps=DATA.dict.caps.map((n,bi)=> (tech>>>0)&(1<<bi)?n:null).filter(Boolean);
  const row=(t,v)=>`<div class="row"><span class="t">${t}</span><span>${v}</span></div>`;
  body.innerHTML = `<h3>cell ${c}</h3>`
    + row('biome', BIOME_NAME[w.biome[c]])
    + row('landmass', w.landmass[c])
    + row('cell population', f.popc[k].toLocaleString())
    + `<hr style="border-color:var(--edge)">`
    + row('culture', '#'+cuId)
    + row('subsistence', SUBS[f.sub[k]])
    + row('era', ERA_NAME[f.tier[k]])
    + row('culture size', (size||0).toLocaleString())
    + row('language', 'L'+lang)
    + `<div class="caps">${caps.length?caps.map(c=>`<span class="cap">${c}</span>`).join(''):'<span class="t">—</span>'}</div>`;
  box.style.display='block';
}
$('#closeins').onclick=()=>{ $('#inspect').style.display='none'; sel=null; render(); };

// pick nearest occupied cell to a click point
function pick(px,py){ const f=DATA.frames[frame]; let best=-1,bd=1e9; for(let k=0;k<f.cell.length;k++){ const c=f.cell[k],dx=cellSX[c]-px,dy=cellSY[c]-py,d=dx*dx+dy*dy; if(d<bd){bd=d;best=c;} } return bd<400?best:-1; }

// ---- interaction ----------------------------------------------------------------
let drag=null;
cv.addEventListener('mousedown',e=>{ drag={x:e.offsetX,y:e.offsetY,vx:view.x,vy:view.y,moved:0}; });
addEventListener('mousemove',e=>{ if(!drag)return; const r=cv.getBoundingClientRect(); const ox=e.clientX-r.left,oy=e.clientY-r.top; view.x=drag.vx+(ox-drag.x); view.y=drag.vy+(oy-drag.y); drag.moved+=Math.abs(ox-drag.x)+Math.abs(oy-drag.y); render(); });
addEventListener('mouseup',e=>{ if(drag && drag.moved<4){ const c=pick(drag.x,drag.y); if(c>=0) inspectCell(c); else {sel=null;$('#inspect').style.display='none';} render(); } drag=null; });
cv.addEventListener('wheel',e=>{ e.preventDefault(); const f=e.deltaY<0?1.15:1/1.15; const mx=e.offsetX,my=e.offsetY; view.x=mx-(mx-view.x)*f; view.y=my-(my-view.y)*f; view.z*=f; render(); },{passive:false});

// ---- transport ------------------------------------------------------------------
function setFrame(i){ if(!DATA)return; frame=Math.max(0,Math.min(DATA.frames.length-1,i)); $('#scrub').value=frame; if(sel!=null) inspectCell(sel); frameLabel(); render(); }
$('#scrub').addEventListener('input',e=>{ playing=0; $('#play').textContent='▶'; setFrame(+e.target.value); });
$('#stepf').onclick=()=>setFrame(frame+1); $('#stepb').onclick=()=>setFrame(frame-1);
$('#play').onclick=()=>{ playing=playing?0:1; dir=1; $('#play').textContent=playing?'❚❚':'▶'; };
$('#fwd').onclick=()=>{ playing=1; dir=1; $('#play').textContent='❚❚'; };
$('#rev').onclick=()=>{ playing=1; dir=-1; $('#play').textContent='❚❚'; };
let acc=0,last=0;
function loop(ts){ raf=requestAnimationFrame(loop); if(!playing||!DATA){ last=ts; return; } const fps=+$('#speed').value; acc+=(ts-last)/1000*fps; last=ts; if(acc>=1){ acc=0; let n=frame+dir; if(n>=DATA.frames.length){ n=DATA.frames.length-1; playing=0; $('#play').textContent='▶'; } if(n<0){ n=0; playing=0; $('#play').textContent='▶'; } setFrame(n); } }

// ---- modes ----------------------------------------------------------------------
$('#modes').addEventListener('click',e=>{ const b=e.target.closest('b'); if(!b)return; mode=b.dataset.m; [...$('#modes').children].forEach(x=>x.classList.toggle('on',x===b)); buildLegend(); render(); });
function buildLegend(){
  const el=$('#legkeys'); let h='';
  if(mode==='sub') h=SUBS.map((s,i)=>`<div class="k"><span class="sw" style="background:${hsl(SUB_COL[i][0],SUB_COL[i][1],SUB_COL[i][2])}"></span>${s}</div>`).join('');
  else if(mode==='era') h=ERA_NAME.map((s,i)=>`<div class="k"><span class="sw" style="background:${hsl(210-i*40,55,40+i*8)}"></span>${s}</div>`).join('');
  else if(mode==='culture') h='<div class="k" style="color:var(--dim)">hue = culture identity</div>';
  else h='<div class="k" style="color:var(--dim)">warm = dense population</div>';
  el.innerHTML=h;
}

// ---- load -----------------------------------------------------------------------
async function load(){
  const preset=$('#preset').value, world=$('#world').value.trim()||'1', seed=$('#civseed').value||'1', ticks=$('#ticks').value||'1000';
  const q=new URLSearchParams({world,civSeed:seed,ticks,maxFrames:'48'}); if(preset)q.set('preset',preset);
  $('#load').disabled=true; $('#status').textContent='running '+ticks+' ticks + capturing frames…';
  try{
    const r=await fetch('/api/civ/frames?'+q); if(!r.ok){ throw new Error('HTTP '+r.status+' '+((await r.json().catch(()=>({}))).detail||'')); }
    DATA=await r.json();
    BASE=1000; precomputeCells(); fit(); frame=0; sel=null; $('#inspect').style.display='none';
    $('#scrub').max=DATA.frames.length-1; $('#scrub').value=0;
    $('#status').innerHTML=`★${DATA.score} — ${DATA.descriptor}`;
    drawEventBar(); buildLegend(); setFrame(0);
  }catch(e){ $('#status').textContent='error: '+e.message; }
  finally{ $('#load').disabled=false; }
}
$('#load').onclick=load;
addEventListener('resize',()=>{ resize(); if(DATA){ updateCellScreens(); render(); } });
resize(); buildLegend(); requestAnimationFrame(loop); load();
</script>
</body>
</html>
