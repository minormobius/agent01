<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>proteus — amoeba qualia</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #07090c;
    --fg: #d8d8d8;
    --dim: #6a727b;
    --accent: #f0a050;
    --panel: rgba(14, 17, 22, 0.78);
    --border: #1a1f26;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-wrap: wrap;
  }
  #topbar .title {
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  #topbar .group {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  #topbar label {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  #topbar .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.18);
  }
  #topbar input[type="range"] {
    width: 100px;
  }
  #status {
    margin-left: auto;
    color: var(--dim);
    letter-spacing: 0.04em;
  }
  #stage {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 40%, #0d1218 0%, #07090c 70%);
  }
  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }
  #detached-banner {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 4px 10px;
    background: rgba(120, 30, 40, 0.7);
    color: #ffd8d8;
    border: 1px solid #803040;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #detached-banner.show { opacity: 1; }
  #budget-strip {
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 10px;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
  }
  #budget-label { white-space: nowrap; }
  #budget-bar {
    flex: 1 1 auto;
    height: 5px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  #budget-fill {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, #b8482c, #f0a050 60%, #f8d870);
    transition: width 0.15s linear;
  }
  #engulf-count {
    white-space: nowrap;
    color: var(--accent);
  }
  /* swatch colors */
  .sw-adhesion { background: #f0a050; }
  .sw-light    { background: #f8f0a8; }
  .sw-chem     { background: #70d088; }
  .sw-tension  { background: #d870c8; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title">proteus</span>
    <div class="group">
      <label><input type="checkbox" data-channel="adhesion" checked><span class="swatch sw-adhesion"></span>adhesion</label>
      <label><input type="checkbox" data-channel="light" checked><span class="swatch sw-light"></span>light</label>
      <label><input type="checkbox" data-channel="chem" checked><span class="swatch sw-chem"></span>chemistry</label>
      <label><input type="checkbox" data-channel="tension" checked><span class="swatch sw-tension"></span>tension</label>
    </div>
    <div class="group">
      <label>brush <input type="range" id="brush" min="6" max="80" value="28"></label>
    </div>
    <div class="group">
      <label>pressure <input type="range" id="pressure" min="0" max="3.0" step="0.01" value="1.0"></label>
    </div>
    <div class="group">
      <label><input type="checkbox" id="show-debug"> debug</label>
    </div>
    <div id="status">tap = extend&nbsp;&nbsp;drag up = retract</div>
  </div>
  <div id="stage">
    <canvas id="map"></canvas>
    <div id="detached-banner">detached</div>
    <div id="budget-strip">
      <span id="budget-label">membrane reserve</span>
      <div id="budget-bar"><div id="budget-fill"></div></div>
      <span id="engulf-count">engulfed 0</span>
    </div>
  </div>
</div>

<script type="module">
  import { createWorld } from './world.js';
  import { createSim, tick } from './sim.js';
  import { createRenderer, render } from './render.js';
  import { attachInput, tickInput } from './input.js';

  const canvas = document.getElementById('map');
  const banner = document.getElementById('detached-banner');
  const channelToggles = {
    adhesion: document.querySelector('input[data-channel="adhesion"]'),
    light:    document.querySelector('input[data-channel="light"]'),
    chem:     document.querySelector('input[data-channel="chem"]'),
    tension:  document.querySelector('input[data-channel="tension"]'),
  };
  const showDebug = document.getElementById('show-debug');
  const brushSlider = document.getElementById('brush');
  const pressureSlider = document.getElementById('pressure');
  const getBrushRadius = () => parseFloat(brushSlider.value);

  // Initial pressure from slider, then live-update.
  pressureSlider.addEventListener('input', () => {
    sim.pressure = parseFloat(pressureSlider.value);
  });
  const budgetFill = document.getElementById('budget-fill');
  const engulfCount = document.getElementById('engulf-count');

  // Hidden world. Level 1 = no obstacles, single food point that's the only
  // chem source, broad smooth substrate adhesion. Cell heads up the gradient,
  // wraps the food, engulfment dumps material into sim.budget.
  const world = createWorld({ w: 800, h: 800, seed: 1729, level: 1 });

  // Hidden cell, seeded near the chemistry hotspot.
  const sim = createSim({
    world,
    N: 256,
    radius: 60,
    cx: world.suggestedStart.x,
    cy: world.suggestedStart.y,
  });
  sim.pressure = parseFloat(pressureSlider.value);

  // Renderer owns the offscreen low-res grid, the texture flow layer, and a
  // cached top-down world bitmap used by the debug view.
  const renderer = createRenderer({ canvas, world });

  // Pointer input writes cortex targets onto sim.nodes via tickInput().
  const inputState = attachInput({ canvas, sim, getBrushRadius });

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.max(2, Math.round(rect.width  * dpr));
    canvas.height = Math.max(2, Math.round(rect.height * dpr));
    renderer.resize(canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  // Main loop. Fixed-step sim at ~30Hz, render every animation frame.
  const stepMs = 1000 / 30;
  let last = performance.now();
  let acc = 0;
  function frame(t) {
    const dt = Math.min(100, t - last);
    last = t;
    acc += dt;
    // Drive pointer input at frame rate so held fingers keep pulling cortex
    // toward target even without further pointermove events.
    tickInput(canvas, sim, inputState, getBrushRadius, dt / 1000);
    while (acc >= stepMs) {
      tick(sim, stepMs / 1000);
      acc -= stepMs;
    }
    render(renderer, sim, {
      channels: {
        adhesion: channelToggles.adhesion.checked,
        light:    channelToggles.light.checked,
        chem:     channelToggles.chem.checked,
        tension:  channelToggles.tension.checked,
      },
      debug: showDebug.checked,
    });
    // Brush-anchor indicator. Drawn on top of whatever the renderer just
    // produced so the player can see their input register even when the
    // sensor map happens to look uniform in that region.
    if (inputState.pressed && inputState.anchor) {
      const ctx2 = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      const dpr2 = rect.width > 0 ? canvas.width / rect.width : 1;
      const rad = parseFloat(brushSlider.value) * dpr2;
      const extending = inputState.target < 1.0;
      const stroke = extending
        ? 'rgba(120, 200, 255, 0.85)'
        : 'rgba(255, 140, 100, 0.85)';
      ctx2.save();
      ctx2.strokeStyle = stroke;
      ctx2.lineWidth = 2 * dpr2;
      ctx2.beginPath();
      ctx2.arc(inputState.anchor.px, inputState.anchor.py, rad, 0, Math.PI * 2);
      ctx2.stroke();
      // Drag-offset line from anchor to current pointer, hints at slider state.
      ctx2.beginPath();
      ctx2.moveTo(inputState.anchor.px, inputState.anchor.py);
      ctx2.lineTo(inputState.cur.px, inputState.cur.py);
      ctx2.stroke();
      ctx2.restore();
    }
    banner.classList.toggle('show', sim.detached);
    const pct = Math.max(0, Math.min(1, sim.budget / sim.budgetMax));
    budgetFill.style.width = (pct * 100).toFixed(1) + '%';
    engulfCount.textContent = 'engulfed ' + sim.engulfedCount;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
</script>
</body>
</html>
