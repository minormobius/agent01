<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Critter Red - Monster RPG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: monospace;
  overflow: hidden;
}
#screen {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 4px solid #333;
  cursor: none;
}
#controls {
  position: fixed;
  bottom: 10px;
  color: #666;
  font-size: 12px;
  text-align: center;
}
</style>
</head>
<body>
<canvas id="screen" width="480" height="432"></canvas>
<div id="controls">Arrow Keys: Move | Z: Confirm | X: Cancel/Menu | Enter: Start</div>
<script src="data.js"></script>
<script src="render.js"></script>
<script src="overworld.js"></script>
<script src="battle.js"></script>
<script src="game.js"></script>
</body>
</html>
