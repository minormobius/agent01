<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>track — bluesky interaction metro</title>
<script type="importmap">{"imports":{"apache-arrow":"https://cdn.jsdelivr.net/npm/apache-arrow@17.0.0/+esm"}}</script>
<style>
:root {
  --bg: #1a1a2e;
  --text: #e0e0e0;
  --muted: #666;
  --accent: #e63946;
  --panel: rgba(30,30,50,0.92);
  --mono: 'SF Mono','Cascadia Code',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--mono)}
#controls{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 16px;background:var(--panel);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
#controls input[type=text]{
  flex:1;min-width:200px;max-width:500px;padding:6px 10px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  border-radius:4px;color:var(--text);font-family:var(--mono);font-size:0.8rem;
}
#controls button{
  padding:6px 16px;background:var(--accent);border:none;
  border-radius:4px;color:#fff;font-family:var(--mono);font-size:0.8rem;cursor:pointer;
}
#controls button:hover{opacity:0.85}
#controls button:disabled{opacity:0.4;cursor:default}
#controls label{font-size:0.7rem;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer}
#controls label input{accent-color:var(--accent)}
#status{font-size:0.7rem;color:var(--muted)}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
.legend{
  position:fixed;bottom:12px;left:12px;z-index:10;
  display:none;gap:14px;font-size:0.65rem;color:var(--muted);
}
.legend.show{display:flex}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:14px;height:3px;border-radius:2px;display:inline-block}
</style>
</head>
<body>
<div id="controls">
  <input type="text" id="list-uri" placeholder="paste bsky list url or at:// uri">
  <button id="load-btn">load</button>
  <label><input type="checkbox" id="inc-owner" checked> include list owner</label>
  <label>max lines/station <input type="number" id="max-deg" value="0" min="0" max="20" style="width:40px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:0.75rem;text-align:center"></label>
  <label>crossings <input type="range" id="max-cross" min="0" max="20" value="0" style="width:80px;accent-color:var(--accent);vertical-align:middle"><span id="cross-val">0</span></label>
  <button id="play-btn" disabled style="padding:6px 12px;background:#457b9d;border:none;border-radius:4px;color:#fff;font-family:var(--mono);font-size:0.8rem;cursor:pointer">&#9654; replay</button>
  <select id="play-range" style="padding:4px 6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:0.75rem">
    <option value="1">last 24h</option><option value="7" selected>last 7d</option><option value="30">last 30d</option>
  </select>
  <select id="play-speed" style="padding:4px 6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:0.75rem">
    <option value="50">50x</option><option value="200" selected>200x</option><option value="1000">1000x</option>
  </select>
  <span id="play-time" style="font-size:0.65rem;color:var(--muted);min-width:100px"></span>
  <span id="status"></span>
</div>
<canvas id="metro"></canvas>
<div class="legend" id="legend">
  <span><i style="background:#e63946"></i>like</span>
  <span><i style="background:#457b9d"></i>reply</span>
  <span><i style="background:#2a9d8f"></i>repost</span>
</div>
<script type="module">
var canvas=document.getElementById('metro'),ctx=canvas.getContext('2d');
var W,H,dpr;
var LINE_COLORS=['#e63946','#457b9d','#2a9d8f','#e9c46a','#f4a261','#8338ec','#ff006e','#3a86ff','#fb5607','#06d6a0'];
var members=[],edges=[],memberIdx={},dots=[],ws=null,loaded=false,animating=false;
var playback=null;
var cam={x:0,y:0,zoom:1};
var dragging=false,dragX=0,dragY=0;
var API='https://public.api.bsky.app/xrpc/';
var db=null,conn=null;

// DuckDB-WASM init
var DUCK_CDN='https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.29.0/dist';
async function initDuck(){
  if(conn)return;
  status('loading duckdb...');
  var mod=await import(DUCK_CDN+'/duckdb-browser.mjs');
  var bundle=await mod.selectBundle({
    mvp:{mainModule:DUCK_CDN+'/duckdb-mvp.wasm',mainWorker:DUCK_CDN+'/duckdb-browser-mvp.worker.js'},
    eh:{mainModule:DUCK_CDN+'/duckdb-eh.wasm',mainWorker:DUCK_CDN+'/duckdb-browser-eh.worker.js'}
  });
  var w=await fetch(bundle.mainWorker).then(function(r){return r.blob()});
  var worker=new Worker(URL.createObjectURL(w),{type:'module'});
  db=new mod.AsyncDuckDB(new mod.ConsoleLogger(),worker);
  await db.instantiate(bundle.mainModule);
  conn=await db.connect();
  await conn.query("CREATE TABLE IF NOT EXISTS interactions(from_idx INT,to_idx INT,ts BIGINT,type VARCHAR)");
  status('duckdb ready');
}

// Slider label
document.getElementById('max-cross').addEventListener('input',function(){
  document.getElementById('cross-val').textContent=this.value;
});

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(loaded)draw();
}
window.addEventListener('resize',resize);resize();

// World <-> screen transforms
function toScreen(wx,wy){return{x:(wx-cam.x)*cam.zoom+W/2,y:(wy-cam.y)*cam.zoom+H/2}}
function toWorld(sx,sy){return{x:(sx-W/2)/cam.zoom+cam.x,y:(sy-H/2)/cam.zoom+cam.y}}

// Pan/zoom
canvas.addEventListener('mousedown',function(e){
  if(e.button===0){dragging=true;dragX=e.clientX;dragY=e.clientY}
});
canvas.addEventListener('mousemove',function(e){
  if(!dragging)return;
  cam.x-=(e.clientX-dragX)/cam.zoom;
  cam.y-=(e.clientY-dragY)/cam.zoom;
  dragX=e.clientX;dragY=e.clientY;
  if(loaded)draw();
});
canvas.addEventListener('mouseup',function(){dragging=false});
canvas.addEventListener('mouseleave',function(){dragging=false});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var factor=e.deltaY>0?0.9:1.1;
  cam.zoom*=factor;
  cam.zoom=Math.max(0.1,Math.min(10,cam.zoom));
  if(loaded)draw();
},{passive:false});
// Touch pan/zoom
var lastTouches=null;
canvas.addEventListener('touchstart',function(e){lastTouches=e.touches});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!lastTouches)return;
  if(e.touches.length===1&&lastTouches.length===1){
    cam.x-=(e.touches[0].clientX-lastTouches[0].clientX)/cam.zoom;
    cam.y-=(e.touches[0].clientY-lastTouches[0].clientY)/cam.zoom;
  }else if(e.touches.length===2&&lastTouches.length===2){
    var d1=Math.hypot(lastTouches[0].clientX-lastTouches[1].clientX,lastTouches[0].clientY-lastTouches[1].clientY);
    var d2=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    cam.zoom*=d2/d1;cam.zoom=Math.max(0.1,Math.min(10,cam.zoom));
  }
  lastTouches=e.touches;
  if(loaded)draw();
},{passive:false});
canvas.addEventListener('touchend',function(){lastTouches=null});

function status(msg){document.getElementById('status').textContent=msg}

function parseListUri(input){
  input=input.trim();
  if(input.startsWith('at://'))return input;
  var m=input.match(/bsky\.app\/profile\/([^/]+)\/lists\/([^/?#]+)/);
  if(m)return'at://'+m[1]+'/app.bsky.graph.list/'+m[2];
  return input;
}

async function apiGet(method,params){
  var qs=new URLSearchParams(params).toString();
  var res=await fetch(API+method+'?'+qs);
  if(!res.ok)throw new Error(method+' '+res.status);
  return res.json();
}

async function apiGetMulti(method,key,values,otherParams){
  var qs=values.map(function(v){return key+'='+encodeURIComponent(v)}).join('&');
  if(otherParams){for(var k in otherParams)qs+='&'+k+'='+encodeURIComponent(otherParams[k])}
  var res=await fetch(API+method+'?'+qs);
  if(!res.ok)throw new Error(method+' '+res.status);
  return res.json();
}

async function loadList(uri){
  status('loading list...');
  var dids=[],ownerDid=null;
  var cursor;
  do{
    var params={list:uri,limit:'100'};
    if(cursor)params.cursor=cursor;
    var data=await apiGet('app.bsky.graph.getList',params);
    if(!ownerDid&&data.list)ownerDid=data.list.creator.did;
    for(var item of data.items)dids.push(item.subject.did);
    cursor=data.cursor;
  }while(cursor);

  // Include list owner if checked
  if(document.getElementById('inc-owner').checked&&ownerDid&&dids.indexOf(ownerDid)===-1){
    dids.unshift(ownerDid);
  }

  status(dids.length+' members, loading profiles...');
  members=[];memberIdx={};
  for(var i=0;i<dids.length;i+=25){
    var batch=dids.slice(i,i+25);
    var data=await apiGetMulti('app.bsky.actor.getProfiles','actors',batch);
    for(var p of data.profiles){
      memberIdx[p.did]=members.length;
      members.push({did:p.did,handle:p.handle,displayName:p.displayName||p.handle,
        avatar:p.avatar||null,x:0,y:0,vx:0,vy:0,img:null});
    }
  }

  // Preload avatars
  await Promise.all(members.map(function(m){
    if(!m.avatar)return Promise.resolve();
    return new Promise(function(ok){
      var img=new Image();
      img.onload=function(){m.img=img;ok()};img.onerror=ok;
      img.src=m.avatar;
    });
  }));
  status(members.length+' profiles loaded, scraping interactions...');
}

async function scrapeInteractions(){
  edges=[];
  await conn.query("DELETE FROM interactions");
  var batch=[];

  function flush(){
    if(!batch.length)return;
    var vals=batch.map(function(r){return'('+r.fi+','+r.ti+','+r.ts+",'"+r.type+"')"}).join(',');
    batch=[];
    return conn.query("INSERT INTO interactions VALUES "+vals);
  }

  for(var mi=0;mi<members.length;mi++){
    var m=members[mi];
    status('scanning '+m.handle+' ('+(mi+1)+'/'+members.length+')');
    try{
      var cursor,pages=0;
      do{
        var params={actor:m.did,limit:'100',filter:'posts_with_replies'};
        if(cursor)params.cursor=cursor;
        var data=await apiGet('app.bsky.feed.getAuthorFeed',params);
        for(var item of(data.feed||[])){
          var ts=(item.post||{}).indexedAt||((item.post||{}).record||{}).createdAt||null;
          var tsMs=ts?new Date(ts).getTime():0;
          // Replies
          if(item.reply&&item.reply.parent&&item.reply.parent.author){
            var toDid=item.reply.parent.author.did;
            if(toDid!==m.did){
              var ti=memberIdx[toDid],fi=memberIdx[m.did];
              if(ti!==undefined&&fi!==undefined){
                var lo=Math.min(fi,ti),hi=Math.max(fi,ti);
                batch.push({fi:lo,ti:hi,ts:tsMs,type:'reply'});
              }
            }
          }
          // Quotes
          var rec=(item.post||{}).record||{},emb=rec.embed;
          if(emb){
            var qu=null;
            if(emb.$type==='app.bsky.embed.record'&&emb.record)qu=emb.record.uri;
            else if(emb.$type==='app.bsky.embed.recordWithMedia'&&emb.record&&emb.record.record)qu=emb.record.record.uri;
            if(qu){
              var qd=qu.split('/')[2],qi=memberIdx[qd],fi2=memberIdx[m.did];
              if(qd!==m.did&&qi!==undefined&&fi2!==undefined){
                var lo2=Math.min(fi2,qi),hi2=Math.max(fi2,qi);
                batch.push({fi:lo2,ti:hi2,ts:tsMs,type:'quote'});
              }
            }
          }
        }
        if(batch.length>=500)await flush();
        cursor=data.cursor;pages++;
      }while(cursor&&pages<3);
    }catch(e){}
    await new Promise(function(r){setTimeout(r,150)});
  }
  await flush();

  // Aggregate edges via SQL
  var maxDeg=parseInt(document.getElementById('max-deg').value)||0;
  var result=await conn.query("SELECT from_idx,to_idx,COUNT(*) as w FROM interactions GROUP BY from_idx,to_idx ORDER BY w DESC");
  var rows=result.toArray();
  var deg={};
  for(var r of rows){
    var fi=Number(r.from_idx),ti=Number(r.to_idx),w=Number(r.w);
    if(maxDeg>0){
      if((deg[fi]||0)>=maxDeg||(deg[ti]||0)>=maxDeg)continue;
      deg[fi]=(deg[fi]||0)+1;deg[ti]=(deg[ti]||0)+1;
    }
    edges.push({from:fi,to:ti,weight:w,color:null});
  }
  for(var i=0;i<edges.length;i++)edges[i].color=LINE_COLORS[i%LINE_COLORS.length];

  var total=await conn.query("SELECT COUNT(*) as n FROM interactions");
  var n=Number(total.toArray()[0].n);
  status(edges.length+' connections from '+n+' events');
}

// Segment intersection test (returns true if segments cross, excluding shared endpoints)
function segsX(ax,ay,bx,by,cx,cy,dx,dy){
  var d1x=bx-ax,d1y=by-ay,d2x=dx-cx,d2y=dy-cy;
  var cross=d1x*d2y-d1y*d2x;
  if(Math.abs(cross)<1e-10)return false;
  var ex=cx-ax,ey=cy-ay;
  var t=(ex*d2y-ey*d2x)/cross;
  var u=(ex*d1y-ey*d1x)/cross;
  return t>0.02&&t<0.98&&u>0.02&&u<0.98;
}

function countCrossings(){
  var n=0;
  for(var i=0;i<edges.length;i++){for(var j=i+1;j<edges.length;j++){
    var ei=edges[i],ej=edges[j];
    if(ei.from===ej.from||ei.from===ej.to||ei.to===ej.from||ei.to===ej.to)continue;
    var a=members[ei.from],b=members[ei.to],c=members[ej.from],d=members[ej.to];
    if(segsX(a.x,a.y,b.x,b.y,c.x,c.y,d.x,d.y))n++;
  }}
  return n;
}

// Force-directed layout with Lennard-Jones potential + spatial grid
function forceLayout(){
  var N=members.length;
  if(N===0)return;
  status('computing layout...');
  var targetCross=parseInt(document.getElementById('max-cross').value)||0;
  var sigma=120;

  // Hex lattice init
  var cols=Math.ceil(Math.sqrt(N*1.3)),rows=Math.ceil(N/cols),sp=sigma*1.1;
  members.forEach(function(m,i){
    var col=i%cols,row=Math.floor(i/cols);
    m.x=(col-(cols-1)/2)*sp+(row%2?sp*0.5:0);
    m.y=(row-(rows-1)/2)*sp;m.vx=0;m.vy=0;
  });

  var maxW=edges.length?edges[0].weight:1;
  var eps=sigma*0.5;
  var cutoff=sigma*3; // LJ negligible beyond 3*sigma
  var iters=Math.min(500,150+N*3); // scale iterations with size

  for(var iter=0;iter<iters;iter++){
    var cool=Math.max(0.02,1-iter/iters);
    var temp=cool*2;

    // Spatial grid for LJ — only check neighbors within cutoff
    var cell=cutoff;
    var grid={};
    for(var i=0;i<N;i++){
      var gx=Math.floor(members[i].x/cell),gy=Math.floor(members[i].y/cell);
      var gk=gx+','+gy;
      if(!grid[gk])grid[gk]=[];
      grid[gk].push(i);
    }
    for(var gk in grid){
      var parts=gk.split(','),gx=+parts[0],gy=+parts[1];
      for(var ox=-1;ox<=1;ox++){for(var oy=-1;oy<=1;oy++){
        var nk=(gx+ox)+','+(gy+oy);
        var nb=grid[nk];if(!nb)continue;
        var cur=grid[gk];
        for(var ci=0;ci<cur.length;ci++){
          var jStart=(gk===nk)?ci+1:0;
          for(var cj=jStart;cj<nb.length;cj++){
            var ii=cur[ci],jj=nb[cj];if(ii===jj)continue;
            var dx=members[ii].x-members[jj].x,dy=members[ii].y-members[jj].y;
            var d=Math.sqrt(dx*dx+dy*dy);if(d<1)d=1;
            if(d>cutoff)continue;
            var ratio=sigma/d,r6=ratio*ratio*ratio*ratio*ratio*ratio,r12=r6*r6;
            var f=24*eps/d*(2*r12-r6)*temp;
            f=Math.max(-50,Math.min(50,f));
            var ux=dx/d,uy=dy/d;
            members[ii].vx+=ux*f;members[ii].vy+=uy*f;
            members[jj].vx-=ux*f;members[jj].vy-=uy*f;
          }
        }
      }}
    }

    // Edge springs
    var restLen=sigma*0.7;
    for(var e=0;e<edges.length;e++){
      var edge=edges[e],a=members[edge.from],b=members[edge.to];
      var dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      var strength=0.04*(0.3+0.7*edge.weight/maxW)*temp;
      var f=(d-restLen)*strength;
      var ux=dx/d,uy=dy/d;
      a.vx+=ux*f;a.vy+=uy*f;b.vx-=ux*f;b.vy-=uy*f;
    }

    // Crossing avoidance — sample edges for large graphs
    if(iter>80&&edges.length>0){
      var crossForce=(targetCross===0)?12:Math.max(2,10-targetCross);
      var maxPairs=Math.min(edges.length*(edges.length-1)/2,2000);
      var step=Math.max(1,Math.floor(edges.length*edges.length/2/maxPairs));
      var pair=0;
      for(var i=0;i<edges.length;i++){for(var j=i+1;j<edges.length;j++){
        if((pair++)%step!==0)continue;
        var ei=edges[i],ej=edges[j];
        if(ei.from===ej.from||ei.from===ej.to||ei.to===ej.from||ei.to===ej.to)continue;
        var a=members[ei.from],b=members[ei.to],c=members[ej.from],d=members[ej.to];
        if(!segsX(a.x,a.y,b.x,b.y,c.x,c.y,d.x,d.y))continue;
        var mx1=(a.x+b.x)/2,my1=(a.y+b.y)/2;
        var mx2=(c.x+d.x)/2,my2=(c.y+d.y)/2;
        var ddx=mx1-mx2,ddy=my1-my2;
        var dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;
        var cf=crossForce*temp/dd;
        a.vx+=ddx/dd*cf;a.vy+=ddy/dd*cf;b.vx+=ddx/dd*cf;b.vy+=ddy/dd*cf;
        c.vx-=ddx/dd*cf;c.vy-=ddy/dd*cf;d.vx-=ddx/dd*cf;d.vy-=ddy/dd*cf;
      }}
    }

    // Center gravity
    var cx=0,cy=0;
    for(var i=0;i<N;i++){cx+=members[i].x;cy+=members[i].y}
    cx/=N;cy/=N;
    for(var i=0;i<N;i++){
      members[i].vx+=(cx-members[i].x)*0.001*temp;
      members[i].vy+=(cy-members[i].y)*0.001*temp;
    }

    for(var i=0;i<N;i++){
      members[i].vx*=0.75;members[i].vy*=0.75;
      members[i].x+=members[i].vx;members[i].y+=members[i].vy;
    }
  }

  // Greedy swap — capped for large graphs (only try random sample of swaps)
  var crossings=countCrossings();
  if(crossings>targetCross&&N<=60){
    var maxSwapAttempts=Math.min(N*(N-1)/2,500);
    var improved=true,passes=0;
    while(improved&&passes<5){
      improved=false;passes++;
      var cur=countCrossings();if(cur<=targetCross)break;
      var attempts=0;
      for(var i=0;i<N&&attempts<maxSwapAttempts;i++){
        for(var j=i+1;j<N&&attempts<maxSwapAttempts;j++){
          attempts++;
          var tx=members[i].x,ty=members[i].y;
          members[i].x=members[j].x;members[i].y=members[j].y;
          members[j].x=tx;members[j].y=ty;
          var after=countCrossings();
          if(after<cur){cur=after;improved=true;if(cur<=targetCross)break}
          else{members[j].x=members[i].x;members[j].y=members[i].y;members[i].x=tx;members[i].y=ty}
        }if(cur<=targetCross)break;
      }
    }
    crossings=countCrossings();
  }
  status(edges.length+' connections, '+crossings+' crossings');
  autoFit();
}

function autoFit(){
  if(!members.length)return;
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  members.forEach(function(m){
    if(m.x<minX)minX=m.x;if(m.x>maxX)maxX=m.x;
    if(m.y<minY)minY=m.y;if(m.y>maxY)maxY=m.y;
  });
  cam.x=(minX+maxX)/2;
  cam.y=(minY+maxY)/2;
  var spanX=maxX-minX+200,spanY=maxY-minY+200;
  cam.zoom=Math.min((W-40)/spanX,(H-80)/spanY,2);
  cam.zoom=Math.max(0.1,cam.zoom);
}


function draw(){
  ctx.clearRect(0,0,W,H);
  var z=cam.zoom;

  // Metro lines
  edges.forEach(function(e){
    var a=members[e.from],b=members[e.to];
    var sa=toScreen(a.x,a.y),sb=toScreen(b.x,b.y);
    var thick=Math.max(2,Math.min(10,Math.sqrt(e.weight)*2))*z;
    ctx.strokeStyle=e.color;ctx.lineWidth=thick;
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.globalAlpha=0.6;ctx.beginPath();

    // Metro-style routing (in world coords, then project)
    var dx=b.x-a.x,dy=b.y-a.y;
    var adx=Math.abs(dx),ady=Math.abs(dy);
    ctx.moveTo(sa.x,sa.y);
    if(ady<20||adx<20||Math.abs(adx-ady)<25){
      ctx.lineTo(sb.x,sb.y);
    }else if(adx>ady){
      var diag=ady,sx=dx>0?1:-1;
      var mid=toScreen(a.x+sx*(adx-diag),a.y);
      ctx.lineTo(mid.x,mid.y);ctx.lineTo(sb.x,sb.y);
    }else{
      var diag=adx,sy=dy>0?1:-1;
      var mid=toScreen(a.x,a.y+sy*(ady-diag));
      ctx.lineTo(mid.x,mid.y);ctx.lineTo(sb.x,sb.y);
    }
    ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Animated dots (world coords interpolated in animate(), project here)
  dots.forEach(function(dot){
    var sd=toScreen(dot.x,dot.y);
    ctx.globalAlpha=dot.alpha;
    ctx.beginPath();ctx.arc(sd.x,sd.y,6*z,0,Math.PI*2);
    ctx.fillStyle=dot.color;ctx.fill();
    ctx.beginPath();ctx.arc(sd.x,sd.y,12*z,0,Math.PI*2);
    ctx.fillStyle=dot.color;ctx.globalAlpha=dot.alpha*0.25;ctx.fill();
  });
  ctx.globalAlpha=1;

  // Stations
  var R=20*z;
  members.forEach(function(m){
    var s=toScreen(m.x,m.y);
    // Ring
    ctx.beginPath();ctx.arc(s.x,s.y,R+3*z,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    // Avatar
    if(m.img){
      ctx.save();ctx.beginPath();ctx.arc(s.x,s.y,R,0,Math.PI*2);ctx.clip();
      ctx.drawImage(m.img,s.x-R,s.y-R,R*2,R*2);ctx.restore();
    }else{
      ctx.beginPath();ctx.arc(s.x,s.y,R,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();
      ctx.fillStyle='#999';ctx.font=(10*z)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(m.handle[0].toUpperCase(),s.x,s.y);
    }
    // Label
    ctx.fillStyle='#ccc';ctx.font=Math.max(7,9*z)+'px monospace';ctx.textAlign='center';ctx.textBaseline='top';
    var label=m.handle.replace('.bsky.social','');
    ctx.fillText(label,s.x,s.y+R+6*z);
  });
}

function animate(ts){
  var now=Date.now();
  dots=dots.filter(function(d){
    var t=(now-d.start)/d.duration;if(t>=1)return false;
    var e=t<0.5?2*t*t:-1+(4-2*t)*t;
    d.x=d.x0+(d.x1-d.x0)*e;d.y=d.y0+(d.y1-d.y0)*e;
    d.alpha=t<0.1?t/0.1:t>0.8?(1-t)/0.2:1;
    return true;
  });
  draw();
  requestAnimationFrame(animate);
}

function spawnDot(fi,ti,color){
  var a=members[fi],b=members[ti];if(!a||!b)return;
  dots.push({x0:a.x,y0:a.y,x1:b.x,y1:b.y,x:a.x,y:a.y,alpha:1,
    color:color||'#fff',start:Date.now(),duration:1500});
}

function connectJetstream(){
  if(ws)ws.close();
  var dids=members.map(function(m){return m.did});if(!dids.length)return;
  var params=dids.map(function(d){return'wantedDids='+encodeURIComponent(d)});
  params.push('wantedCollections=app.bsky.feed.like');
  params.push('wantedCollections=app.bsky.feed.post');
  params.push('wantedCollections=app.bsky.feed.repost');
  ws=new WebSocket('wss://jetstream2.us-east.bsky.network/subscribe?'+params.join('&'));

  ws.onmessage=function(ev){
    try{
      var msg=JSON.parse(ev.data);
      if(msg.kind!=='commit'||msg.commit.operation!=='create')return;
      var from=msg.did,to=null,col=msg.commit.collection,rec=msg.commit.record,color='#fff';
      if(col==='app.bsky.feed.like'&&rec&&rec.subject){
        to=rec.subject.uri.split('/')[2];color='#e63946';
      }else if(col==='app.bsky.feed.post'&&rec&&rec.reply){
        to=rec.reply.parent.uri.split('/')[2];color='#457b9d';
      }else if(col==='app.bsky.feed.repost'&&rec&&rec.subject){
        to=rec.subject.uri.split('/')[2];color='#2a9d8f';
      }
      if(to&&memberIdx[from]!==undefined&&memberIdx[to]!==undefined){
        spawnDot(memberIdx[from],memberIdx[to],color);
      }
    }catch(e){}
  };
  ws.onclose=function(){setTimeout(connectJetstream,5000)};
  status('live \u2014 watching '+dids.length+' members');
}

// Playback engine
var EVT_COLORS={reply:'#457b9d',quote:'#2a9d8f',like:'#e63946',repost:'#2a9d8f'};

async function startPlayback(){
  stopPlayback();
  var days=parseInt(document.getElementById('play-range').value)||7;
  var speed=parseInt(document.getElementById('play-speed').value)||200;
  var cutoff=Date.now()-days*86400000;
  // Query DuckDB for events in range
  var result=await conn.query("SELECT from_idx,to_idx,ts,type FROM interactions WHERE ts>="+cutoff+" ORDER BY ts");
  var evts=result.toArray().map(function(r){return{fi:Number(r.from_idx),ti:Number(r.to_idx),t:Number(r.ts),type:r.type}});
  if(!evts.length){status('no events in range');return}
  if(ws){ws.close();ws=null}
  playback={evts:evts,idx:0,startReal:Date.now(),startSim:evts[0].t,speed:speed};
  document.getElementById('play-btn').textContent='\u23F9 stop';
  tickPlayback();
}

function stopPlayback(){
  if(!playback)return;
  playback=null;
  document.getElementById('play-btn').textContent='\u25B6 replay';
  document.getElementById('play-time').textContent='';
  if(loaded)connectJetstream();
}

function tickPlayback(){
  if(!playback)return;
  var pb=playback;
  var elapsed=(Date.now()-pb.startReal)*pb.speed;
  var simNow=pb.startSim+elapsed;
  while(pb.idx<pb.evts.length&&pb.evts[pb.idx].t<=simNow){
    var ev=pb.evts[pb.idx];
    spawnDot(ev.fi,ev.ti,EVT_COLORS[ev.type]||'#fff');
    pb.idx++;
  }
  var d=new Date(simNow);
  document.getElementById('play-time').textContent=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  var pct=Math.round(pb.idx/pb.evts.length*100);
  status('replay '+pct+'% ('+pb.idx+'/'+pb.evts.length+')');
  if(pb.idx>=pb.evts.length){
    setTimeout(stopPlayback,2000);
  }else{
    requestAnimationFrame(tickPlayback);
  }
}

document.getElementById('play-btn').addEventListener('click',function(){
  if(playback)stopPlayback();else startPlayback();
});

document.getElementById('load-btn').addEventListener('click',async function(){
  var btn=this;
  var input=document.getElementById('list-uri').value;if(!input)return;
  btn.disabled=true;
  try{
    await initDuck();
    var uri=parseListUri(input);
    await loadList(uri);
    await scrapeInteractions();
    forceLayout();
    loaded=true;
    document.getElementById('legend').classList.add('show');
    document.getElementById('play-btn').disabled=false;
    if(!animating){animating=true;requestAnimationFrame(animate)}
    connectJetstream();
  }catch(e){status('error: '+e.message);console.error(e)}
  btn.disabled=false;
});
</script>
