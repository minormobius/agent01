<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="40" fill="#0a0a14"/>
  <g transform="translate(96,96)">
    <!-- Concentric arcs representing sound waves -->
    <circle r="60" fill="none" stroke="#6e56cf" stroke-width="4" stroke-dasharray="94.2 94.2" stroke-dashoffset="47.1" opacity=".3"/>
    <circle r="45" fill="none" stroke="#6e56cf" stroke-width="4" stroke-dasharray="70.7 70.7" stroke-dashoffset="35.3" opacity=".5"/>
    <circle r="30" fill="none" stroke="#6e56cf" stroke-width="5" stroke-dasharray="47.1 47.1" stroke-dashoffset="23.6" opacity=".7"/>
    <!-- Center dot -->
    <circle r="10" fill="#6e56cf"/>
  </g>
</svg>
