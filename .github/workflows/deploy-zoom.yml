name: Deploy Zoom Viewer

on:
  push:
    branches: [main, 'claude/landing-projects-takeover-pKkmW']
    paths:
      - 'zoom/**'
      - '.github/workflows/deploy-zoom.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zoom

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Deploy to the existing Worker `zoom` (name set in zoom/wrangler.jsonc),
      # which owns zoom.mino.mobi via the custom_domain route declared there.
      # The config name was previously `mino-zoom`, which spun up a SEPARATE
      # Worker on *.workers.dev and left the subdomain languishing. There is no
      # Pages project named `zoom` — it's a Worker. (Matches canvas/math/g/torus.)
      - name: Deploy to the zoom Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
