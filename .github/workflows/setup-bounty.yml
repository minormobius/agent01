name: Setup Bounty Board

# One-time bootstrap: creates D1 database, generates mint keys, seeds them.
# Run manually ONCE before the first deploy.

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bounty

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create D1 database (idempotent)
        id: create-db
        run: |
          # Check if database already exists
          existing=$(npx wrangler d1 list --json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin','utf8');
            const dbs = JSON.parse(data);
            const found = dbs.find(d => d.name === 'bounty-board');
            if (found) console.log(found.uuid);
          " 2>/dev/null || true)

          if [ -n "$existing" ]; then
            echo "Database already exists: $existing"
            echo "db_id=$existing" >> "$GITHUB_OUTPUT"
          else
            result=$(npx wrangler d1 create bounty-board 2>&1)
            echo "$result"
            db_id=$(echo "$result" | grep -oP 'database_id\s*=\s*"\K[^"]+')
            echo "db_id=$db_id" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run D1 migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            npx wrangler d1 execute bounty-board --file="$f" --remote || echo "Migration $f may already be applied, continuing..."
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate mint keys and seed D1
        run: |
          # Generate keys via a node script that outputs ONLY the JSON to stdout
          keys_json=$(node --input-type=module -e "
            import { webcrypto } from 'node:crypto';
            const DENOMS = [1, 5, 10, 25];
            const keys = {};
            for (const d of DENOMS) {
              const kp = await webcrypto.subtle.generateKey(
                { name: 'RSA-PSS', modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: 'SHA-384' },
                true, ['sign', 'verify']
              );
              keys[d] = {
                privateJWK: await webcrypto.subtle.exportKey('jwk', kp.privateKey),
                publicJWK: await webcrypto.subtle.exportKey('jwk', kp.publicKey),
              };
            }
            console.log(JSON.stringify(keys));
          ")

          if [ -z "$keys_json" ]; then
            echo "Failed to generate keys"
            exit 1
          fi
          echo "Generated key pairs for denominations 1, 5, 10, 25"

          # Seed each denomination into D1
          for denom in 1 5 10 25; do
            pub=$(echo "$keys_json" | node -e "
              const data = require('fs').readFileSync('/dev/stdin','utf8');
              const keys = JSON.parse(data);
              console.log(JSON.stringify(keys['$denom'].publicJWK));
            ")
            priv=$(echo "$keys_json" | node -e "
              const data = require('fs').readFileSync('/dev/stdin','utf8');
              const keys = JSON.parse(data);
              console.log(JSON.stringify(keys['$denom'].privateJWK));
            ")
            echo "Seeding ${denom}-rep key pair..."
            npx wrangler d1 execute bounty-board --remote --command \
              "INSERT OR IGNORE INTO mint_keys (denomination, public_key_jwk, private_key_jwk) VALUES ($denom, '$pub', '$priv')"
          done

          echo ""
          echo "Setting MINT_KEYS_JSON as Worker secret..."
          echo "$keys_json" | npx wrangler secret put MINT_KEYS_JSON
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Report
        run: |
          echo "========================================"
          echo "  Bounty Board setup complete!"
          echo "========================================"
          echo ""
          echo "D1 database ID: ${{ steps.create-db.outputs.db_id }}"
          echo ""
          echo "IMPORTANT: Update bounty/wrangler.jsonc with the real database_id:"
          echo "  \"database_id\": \"${{ steps.create-db.outputs.db_id }}\""
          echo ""
          echo "Then push and the deploy workflow will handle the rest."
