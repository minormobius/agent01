name: Deploy tjs (three.js workbenches)

# tjs.mino.mobi — the three.js workbench surface (landing + /gantry). Self-
# contained static site: stages tjs/'s own files into tjs/dist at build time,
# dropping the wrangler config, then `wrangler deploy` binds the custom domain.

on:
  push:
    branches: [main, 'claude/dragonfly-pursuit-sim-pv3e8p']
    paths:
      - 'tjs/**'
      - '.github/workflows/deploy-tjs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site into dist/
        working-directory: tjs
        run: |
          rm -rf dist && mkdir -p dist
          cp -r index.html docs.html gantry orb infill swarm beelix cube deck geb kite dragon lib AGENTS.md samples dist/
          rm -f dist/wrangler.jsonc dist/wrangler.toml
          # kite: ship only the built wasm (solver/pkg) + kite-vlm.js; drop the Rust
          # sources and the node selftest from the static bundle.
          rm -rf dist/kite/solver/kite-solver dist/kite/solver/kite-solver-wasm dist/kite/solver/.gitignore
          rm -f dist/kite/kite-vlm.selftest.mjs
          # dragon: same — ship only the built wasm (solver/pkg) + dragon-sim.js; drop the
          # Rust sources and the node selftest from the static bundle.
          rm -rf dist/dragon/solver/dragon-solver dist/dragon/solver/dragon-solver-wasm dist/dragon/solver/.gitignore
          rm -f dist/dragon/dragon-sim.selftest.mjs
          ls -laR dist/ | head -60

      - name: Deploy to Cloudflare
        working-directory: tjs
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
