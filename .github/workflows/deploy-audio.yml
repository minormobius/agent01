name: Deploy Audio Rooms

# audio.mino.mobi — Vite monorepo (apps/web -> audio/dist) + a Cloudflare Worker
# with a Durable Object (apps/api, RoomCoordinator). Build order: packages/shared
# -> apps/web (vite outDir ../../dist == audio/dist, which apps/api's wrangler.toml
# serves as assets ../../dist). NOTE: audio.mino.mobi is not yet attached as a
# custom domain — this deploys the worker (audio-rooms-api); attach the domain in
# the Cloudflare dashboard to make it live. See the "audio" registry entry.

on:
  push:
    branches: [main, 'claude/landing-projects-takeover-pKkmW']
    paths:
      - 'audio/**'
      - '.github/workflows/deploy-audio.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audio

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build (shared -> web)
        run: npm run build

      - name: Deploy worker (+ Durable Object)
        run: npx wrangler deploy -c apps/api/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
