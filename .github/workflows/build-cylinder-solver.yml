name: Build cylinder solver (wasm)

# Compiles rind/solver/cylinder-solver-wasm to WASM with wasm-pack and commits the
# result to rind/solver/pkg/. The cylinder tool (rind/cylinder.html) loads it as an
# OPTIONAL accelerator with a JS fallback, so the page works whether or not this has
# run. Committing rind/solver/pkg/** lands under rind/**, which deploy-rind serves;
# a GITHUB_TOKEN push doesn't trigger other workflows, so we dispatch deploy-rind
# explicitly. The trigger is scoped to the Rust SOURCE (not pkg/), so there's no loop.

on:
  push:
    branches:
      - main
      - 'claude/oneill-cylinder-refactor-xjknww'
    paths:
      - 'rind/solver/cylinder-solver/**'
      - 'rind/solver/cylinder-solver-wasm/**'
      - '.github/workflows/build-cylinder-solver.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run native solver tests (the math, offline)
        working-directory: rind/solver/cylinder-solver
        run: cargo test --release

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rind/solver/cylinder-solver-wasm/target
          key: cargo-cylinder-${{ runner.os }}-${{ hashFiles('rind/solver/**/Cargo.toml', 'rind/solver/**/src/**') }}
          restore-keys: cargo-cylinder-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Rust/WASM solver
        working-directory: rind/solver/cylinder-solver-wasm
        run: wasm-pack build --release --target web --out-dir ../pkg --out-name cylinder_solver

      - name: Commit pkg/
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f rind/solver/pkg/.gitignore rind/solver/pkg/package.json rind/solver/pkg/README.md
          git add -f rind/solver/pkg
          git commit -m "build: cylinder solver wasm" || { echo "changed=false" >> "$GITHUB_OUTPUT"; exit 0; }
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes don't trigger other workflows, so kick deploy-rind
      # explicitly to publish the freshly-built pkg/.
      - name: Deploy (dispatch deploy-rind)
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-rind.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}' || echo "dispatch skipped (non-fatal)"
