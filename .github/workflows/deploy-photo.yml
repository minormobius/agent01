name: Deploy ATPhoto

on:
  push:
    branches: [main, 'claude/feature-merge-candidate-l4dkwq']
    paths:
      - 'photo/**'
      - '.github/workflows/deploy-photo.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: photo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Push the morphyx DM app password onto the worker as a runtime secret.
      # GitHub secrets aren't visible to the Worker at runtime — only during
      # this deploy — so we forward it via `wrangler secret put`. Must run after
      # deploy (the Worker has to exist). Skipped if the secret isn't set.
      - name: Set morphyx DM secret
        if: ${{ env.BLUESKY_MORPHYX_APP_PASSWORD != '' }}
        run: printf '%s' "$BLUESKY_MORPHYX_APP_PASSWORD" | npx wrangler secret put MORPHYX_APP_PASSWORD
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BLUESKY_MORPHYX_APP_PASSWORD: ${{ secrets.BLUESKY_MORPHYX_APP_PASSWORD }}
