name: Deploy Auth Worker

on:
  push:
    branches: [main, 'claude/implement-oauth-bsky-JgUdn']
    paths:
      - 'workers/auth/**'
      - '.github/workflows/deploy-auth.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/auth

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run D1 migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            npx wrangler d1 execute mino-auth-db --file="$f" --remote || echo "⚠️ Migration $f returned non-zero (likely already applied), continuing..."
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
