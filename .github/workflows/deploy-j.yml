name: Deploy j (ImageJ in the browser)

on:
  push:
    branches:
      - main
      - 'claude/imagej-browser-rust-*'
    paths:
      - 'j/**'
      - '.github/workflows/deploy-j.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            j/wasm/target
          key: cargo-${{ runner.os }}-${{ hashFiles('j/wasm/Cargo.toml', 'j/wasm/src/**') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Rust/WASM kernel
        working-directory: j/wasm
        run: wasm-pack build --release --target web --out-dir ../pkg --out-name imagej

      - name: Install wrangler
        working-directory: j
        run: npm install wrangler

      - name: Deploy worker + assets
        working-directory: j
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify site is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS https://j.mino.mobi/pkg/imagej.js >/dev/null 2>&1; then
              echo "✓ j.mino.mobi is live (wasm glue reachable)"
              exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"
            sleep 4
          done
          echo "⚠️ j.mino.mobi didn't respond within 20s — edge propagation may be slow, continuing."
