name: Deploy Megaproject Dashboard

on:
  push:
    branches: [main, 'claude/item-sprites-characteristics-xfxyd1']
    paths:
      - 'mega/**'
      - '.github/workflows/deploy-mega.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mega

    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
