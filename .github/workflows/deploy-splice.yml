name: Deploy Splice

on:
  push:
    branches:
      - main
      - 'claude/splicecraft-website-integration-*'
    paths:
      - 'splice/**'
      - '.github/workflows/deploy-splice.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: splice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install wrangler

      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify worker is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            HEALTH=$(curl -fsS https://splice.mino.mobi/api/health || true)
            if echo "$HEALTH" | grep -q '"ok":true'; then
              echo "$HEALTH"
              echo "✓ worker is live"
              exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"
            sleep 4
          done
          echo "⚠️ /api/health didn't respond within 20s — edge propagation may be slow, continuing anyway."
