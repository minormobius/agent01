name: Deploy os (terminal frontend)

# os.mino.mobi — React + Vite + xterm.js terminal UI. Worker `os` serves the
# Vite build (./dist) and owns the custom domain. This is the FRONTEND ONLY. The
# backend container worker (os/api, os-mino-api) deploys separately and manually
# via deploy-os-api.yml — it is intentionally NOT wired here because it
# builds/runs paid Cloudflare Containers. Go-live steps: os/RUNBOOK.md.

on:
  push:
    branches: [main, 'claude/kimi3-container-deploy-24wux0']
    paths:
      - 'os/**'
      - '!os/api/**'
      - '.github/workflows/deploy-os.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: os

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Repo VARIABLE (not secret) — set to wss://os-api.minomobi.com once the
          # os-api container backend is live (see os/RUNBOOK.md). Empty → the
          # container/kimi commands stay cleanly gated off in the frontend.
          VITE_CONTAINER_API_URL: ${{ vars.OS_CONTAINER_API_URL }}

      - name: Deploy frontend worker (os)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
