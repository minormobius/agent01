name: Build dragon solver (wasm)

# Compiles tjs/dragon/solver/dragon-solver-wasm to WASM with wasm-pack and commits the
# result to tjs/dragon/solver/pkg/. The dragon combat sim (tjs/dragon/index.html) loads
# it as an OPTIONAL accelerator with a JS fallback (tjs/dragon/dragon-sim.js implements the
# same visual-bearing pursuit law), so the page works whether or not this has run.
# Committing solver/pkg/** lands under tjs/**, which deploy-tjs serves; a GITHUB_TOKEN push
# doesn't trigger other workflows, so we dispatch deploy-tjs explicitly. The trigger is
# scoped to the Rust SOURCE (not pkg/), so there's no loop.

on:
  push:
    branches:
      - main
      - 'claude/dragonfly-pursuit-sim-pv3e8p'
    paths:
      - 'tjs/dragon/solver/dragon-solver/**'
      - 'tjs/dragon/solver/dragon-solver-wasm/**'
      - '.github/workflows/build-dragon-solver.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run native solver tests (the math, offline)
        working-directory: tjs/dragon/solver/dragon-solver
        run: cargo test --release

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tjs/dragon/solver/dragon-solver-wasm/target
          key: cargo-dragon-${{ runner.os }}-${{ hashFiles('tjs/dragon/solver/**/Cargo.toml', 'tjs/dragon/solver/**/src/**') }}
          restore-keys: cargo-dragon-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Rust/WASM solver
        working-directory: tjs/dragon/solver/dragon-solver-wasm
        run: wasm-pack build --release --target web --out-dir ../pkg --out-name dragon_solver

      - name: Cross-check JS fallback against the fresh wasm
        working-directory: tjs/dragon
        run: node dragon-sim.selftest.mjs

      - name: Commit pkg/
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f tjs/dragon/solver/pkg/.gitignore tjs/dragon/solver/pkg/package.json tjs/dragon/solver/pkg/README.md
          git add -f tjs/dragon/solver/pkg
          git commit -m "build: dragon solver wasm" || { echo "changed=false" >> "$GITHUB_OUTPUT"; exit 0; }
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes don't trigger other workflows, so kick deploy-tjs explicitly to
      # publish the freshly-built pkg/.
      - name: Deploy (dispatch deploy-tjs)
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-tjs.yml/dispatches" \
            -d '{"ref":"${{ github.ref_name }}"}' || echo "dispatch skipped (non-fatal)"
