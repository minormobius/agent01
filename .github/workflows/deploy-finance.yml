name: Deploy Finance (fin)

on:
  push:
    branches: [main, 'claude/speculative-feedback-playground-t0yiaq']
    paths:
      - 'finance/**'
      - 'poll/apps/api/migrations/0031_speclab.sql'
      - '.github/workflows/deploy-finance.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip running D1 migrations'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # speclab tables on the shared atpolls-db. Idempotent (IF NOT EXISTS), so a
      # re-run is a no-op. Mirrors the rite deploy's migration step.
      - name: Run D1 migration (speclab tables on atpolls-db)
        if: ${{ inputs.skip_migrations != true }}
        run: |
          npx wrangler d1 execute atpolls-db \
            --file=../poll/apps/api/migrations/0031_speclab.sql --remote || \
            echo "migration failed (treating as already-applied) — continuing"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
