name: Deploy Phylofiction

# Static reader + committed Rust/WASM engine → Cloudflare Worker (assets binding)
# at phylofiction.mino.mobi. All computation is client-side, so there are no
# secrets beyond the shared Cloudflare credentials. The wasm artifact is built
# and committed by build-phylofiction-wasm.yml; this workflow just ships what's
# in the repo.

on:
  push:
    branches:
      - main
      - 'claude/phylofiction-world-generation-3zd33u'
    paths:
      - 'phylofiction/**'
      - '.github/workflows/deploy-phylofiction.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phylofiction
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wrangler
        run: npm install wrangler
      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify the site is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS https://phylofiction.mino.mobi/ | grep -qi 'Phylofiction'; then
              echo "✓ phylofiction is live"; exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"; sleep 4
          done
          echo "⚠️ phylofiction didn't respond within 20s — edge propagation may be slow, continuing."
