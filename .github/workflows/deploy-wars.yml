name: Deploy War Factor Analysis

on:
  push:
    branches: [main, 'claude/landing-projects-takeover-pKkmW', 'claude/inkblot-personality-quiz-7pg6te']
    paths:
      - 'wars/**'
      - '.github/workflows/deploy-wars.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wars

    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
