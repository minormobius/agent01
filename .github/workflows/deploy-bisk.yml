name: Deploy Bisk

on:
  push:
    branches:
      - main
      - 'claude/landing-projects-takeover-pKkmW'
    paths:
      - 'bisk/**'
      - '.github/workflows/deploy-bisk.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bisk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wrangler
        run: npm install wrangler
      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify worker is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS https://bisk.mino.mobi/api/health | grep -q '"ok":true'; then
              echo "✓ bisk is live"; exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"; sleep 4
          done
          echo "⚠️ bisk didn't respond to /api/health within 20s — edge propagation may be slow, continuing."
