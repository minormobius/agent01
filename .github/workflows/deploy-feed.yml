name: Deploy Feed Worker

on:
  push:
    branches: [main, 'claude/bluesky-anonymous-polls-*']
    paths:
      - 'workers/feed/**'
      - 'poll/apps/api/migrations/0010_feed_communities.sql'
      - '.github/workflows/deploy-feed.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/feed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run D1 migration (feed tables on shared atpolls-db)
        run: |
          npx wrangler d1 execute atpolls-db \
            -c wrangler.toml \
            --file=../../poll/apps/api/migrations/0010_feed_communities.sql \
            --remote || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx wrangler deploy -c wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
