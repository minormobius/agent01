name: Deploy Feed Worker

on:
  push:
    branches: [main, 'claude/document-projects-oPse6']
    paths:
      - 'workers/feed/**'
      - 'poll/apps/api/migrations/0010_feed_communities.sql'
      - 'poll/apps/api/migrations/0013_feed_liked_posts.sql'
      - '.github/workflows/deploy-feed.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/feed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run D1 migrations (feed tables on shared atpolls-db)
        run: |
          for f in \
            ../../poll/apps/api/migrations/0010_feed_communities.sql \
            ../../poll/apps/api/migrations/0013_feed_liked_posts.sql; do
            echo "Running migration: $f"
            npx wrangler d1 execute atpolls-db --file="$f" --remote || echo "⚠️ Migration $f returned non-zero (likely already applied), continuing..."
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
