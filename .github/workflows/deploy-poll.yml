name: Deploy Anonymous Polls

on:
  push:
    branches: [main, 'claude/bluesky-anonymous-polls-*', 'claude/bluesky-thread-analysis-RcJaN']
    paths:
      - 'poll/**'
      - '.github/workflows/deploy-poll.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build shared package + frontend
        run: npm run build

      - name: Run D1 migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            npx wrangler d1 execute anon-polls-db --file="$f" --remote || echo "⚠️ Migration $f returned non-zero (likely already applied), continuing..."
          done
        working-directory: poll/apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker + Assets
        run: npx wrangler deploy
        working-directory: poll/apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
