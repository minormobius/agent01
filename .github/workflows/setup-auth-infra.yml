name: Setup Auth Worker Infrastructure

# One-time workflow: creates the D1 database and commits the database ID
# back to wrangler.jsonc. Run this once before the first deploy.

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/auth

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create D1 database (idempotent)
        id: create_db
        run: |
          # Check if database already exists
          EXISTING=$(npx wrangler d1 list --json 2>/dev/null | node -e "
            const data = require('fs').readFileSync('/dev/stdin','utf8');
            const dbs = JSON.parse(data);
            const db = dbs.find(d => d.name === 'mino-auth-db');
            if (db) console.log(db.uuid);
          " || true)

          if [ -n "$EXISTING" ]; then
            echo "Database already exists: $EXISTING"
            echo "database_id=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "Creating D1 database: mino-auth-db"
            OUTPUT=$(npx wrangler d1 create mino-auth-db 2>&1)
            echo "$OUTPUT"
            DB_ID=$(echo "$OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+' || echo "$OUTPUT" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
            echo "database_id=$DB_ID" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update wrangler.jsonc with database ID
        run: |
          DB_ID="${{ steps.create_db.outputs.database_id }}"
          if [ -z "$DB_ID" ]; then
            echo "ERROR: No database ID found"
            exit 1
          fi
          echo "Updating wrangler.jsonc with database_id: $DB_ID"
          sed -i "s/\"database_id\": \".*\"/\"database_id\": \"$DB_ID\"/" wrangler.jsonc
          cat wrangler.jsonc

      - name: Run D1 migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            npx wrangler d1 execute mino-auth-db --file="$f" --remote || echo "⚠️ Migration $f returned non-zero (likely already applied), continuing..."
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit database ID
        run: |
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workers/auth/wrangler.jsonc
          if git diff --cached --quiet; then
            echo "No changes to commit (database ID already set)"
          else
            git commit -m "Set auth worker D1 database ID [automated]"
            git push
          fi
