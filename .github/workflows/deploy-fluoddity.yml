name: Deploy Fluoddity

on:
  push:
    branches: [main, 'claude/fluoddity-*']
    paths:
      - 'fluoddity/**'
      - '.github/workflows/deploy-fluoddity.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fluoddity

    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site (Worker + assets)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
