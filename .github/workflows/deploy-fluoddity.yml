name: Deploy Fluoddity

on:
  push:
    branches: [main, 'claude/fluoddity-*']
    paths:
      - 'fluoddity/**'
      - '.github/workflows/deploy-fluoddity.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fluoddity

    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site (Worker + assets)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Push the ElevenLabs key (GitHub secret) into the worker as a Cloudflare
      # secret so /api/tts can read env.ELEVENLABS_API_KEY. Runs after deploy (the
      # worker must exist first); skipped with a 503-warning if the secret isn't set.
      - name: Set ElevenLabs key as Worker secret
        run: |
          if [ -n "$ELEVENLABS_API_KEY" ]; then
            printf '%s' "$ELEVENLABS_API_KEY" | npx wrangler secret put ELEVENLABS_API_KEY
          else
            echo "ELEVENLABS_API_KEY not set in GitHub secrets; skipping (/api/tts will 503)"
          fi
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
