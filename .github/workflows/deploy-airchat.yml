name: Deploy Airchat

on:
  push:
    branches:
      - main
      - 'claude/sentence-editing-drill-*'
    paths:
      - 'airchat/**'
      - 'poll/apps/api/migrations/0018_airchat.sql'
      - 'poll/apps/api/migrations/0019_airchat_oauth.sql'
      - '.github/workflows/deploy-airchat.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip running D1 migrations'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airchat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install wrangler

      - name: Run D1 migrations (airchat tables on shared atpolls-db)
        if: ${{ inputs.skip_migrations != true }}
        run: |
          for f in \
            ../poll/apps/api/migrations/0018_airchat.sql \
            ../poll/apps/api/migrations/0019_airchat_oauth.sql; do
            echo "Applying $f to atpolls-db…"
            npx wrangler d1 execute atpolls-db --file="$f" --remote \
              || echo "⚠️ Migration $f returned non-zero (likely already applied), continuing…"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify worker is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            HEALTH=$(curl -fsS https://airchat.mino.mobi/api/airchat/health || true)
            if echo "$HEALTH" | grep -q '"ok":true'; then
              echo "$HEALTH"
              echo "✓ worker is live"
              exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"
            sleep 4
          done
          echo "⚠️ worker didn't respond to /api/airchat/health within 20s — edge propagation may be slow, continuing anyway."

      - name: Seed whitelist from airchat/whitelist.txt (idempotent)
        # Resolves every handle in whitelist.txt to a DID via the public
        # bsky API, then INSERT-OR-IGNOREs into airchat_whitelist via
        # wrangler d1 execute. Idempotent — re-running deploy is safe.
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          if [ ! -f whitelist.txt ]; then
            echo "no whitelist.txt — skipping seed"
            exit 0
          fi
          while IFS= read -r raw || [ -n "$raw" ]; do
            handle=$(echo "$raw" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$handle" ] && continue
            case "$handle" in \#*) continue ;; esac
            echo "Resolving @$handle…"
            RESP=$(curl -fsS "https://api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=$(printf %s "$handle" | sed 's/[^a-zA-Z0-9.-]/_/g')" 2>/dev/null)
            DID=$(echo "$RESP" | python3 -c 'import sys,json
try:
  d=json.load(sys.stdin); print(d.get("did",""))
except: print("")' 2>/dev/null)
            if [ -z "$DID" ]; then
              echo "⚠️  could not resolve @$handle, response: $RESP"
              continue
            fi
            ESCAPED_HANDLE=$(echo "$handle" | sed "s/'/''/g")
            SQL="INSERT OR IGNORE INTO airchat_whitelist (did, handle, note) VALUES ('$DID', '$ESCAPED_HANDLE', 'seeded from whitelist.txt');"
            echo "  → INSERT OR IGNORE $DID ($handle)"
            npx wrangler d1 execute atpolls-db --remote --command "$SQL" >/dev/null \
              || echo "  ⚠️  insert returned non-zero; continuing"
          done < whitelist.txt
          echo "Whitelist seed complete. Current entries:"
          npx wrangler d1 execute atpolls-db --remote \
            --command "SELECT did, handle, added_at FROM airchat_whitelist ORDER BY added_at DESC;" \
            || true
          exit 0
