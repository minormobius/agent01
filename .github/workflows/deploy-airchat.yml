name: Deploy Airchat

on:
  push:
    branches:
      - main
      - 'claude/sentence-editing-drill-*'
    paths:
      - 'airchat/**'
      - 'poll/apps/api/migrations/0018_airchat.sql'
      - 'poll/apps/api/migrations/0019_airchat_oauth.sql'
      - 'poll/apps/api/migrations/0020_airchat_reply_cids.sql'
      - '.github/workflows/deploy-airchat.yml'
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip running D1 migrations'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airchat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install wrangler

      - name: Run D1 migrations (airchat tables on shared atpolls-db)
        if: ${{ inputs.skip_migrations != true }}
        run: |
          for f in \
            ../poll/apps/api/migrations/0018_airchat.sql \
            ../poll/apps/api/migrations/0019_airchat_oauth.sql \
            ../poll/apps/api/migrations/0020_airchat_reply_cids.sql; do
            echo "Applying $f to atpolls-db…"
            npx wrangler d1 execute atpolls-db --file="$f" --remote \
              || echo "⚠️ Migration $f returned non-zero (likely already applied), continuing…"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync worker secrets from GH Actions secrets
        # Pushes OPENAI_API_KEY + ADMIN_KEY to the airchat worker on every
        # deploy. This avoids the "wrangler secret put from the wrong cwd
        # silently targets a different worker" gotcha — set the secrets
        # once in GitHub Settings → Secrets, the workflow keeps the
        # worker in sync.
        #
        # Marked best-effort: deploy already succeeded above; secret
        # rotation is bonus. File-based stdin (vs piped) is more reliable
        # in CI for wrangler secret put.
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_AIRCHAT_ADMIN_KEY: ${{ secrets.AIRCHAT_ADMIN_KEY }}
        run: |
          set +e

          push_secret() {
            local NAME="$1"
            local VALUE="$2"
            if [ -z "$VALUE" ]; then
              echo "  · $NAME not set in GH secrets — skipping"
              return 0
            fi
            local FILE
            FILE=$(mktemp)
            printf '%s' "$VALUE" > "$FILE"
            echo "  · pushing $NAME to airchat worker…"
            # --name airchat ensures we target the right worker regardless
            # of what wrangler.jsonc is discovered at runtime.
            npx wrangler secret put "$NAME" --name airchat < "$FILE" >/dev/null 2>&1
            local RC=$?
            rm -f "$FILE"
            if [ $RC -eq 0 ]; then
              echo "  · ✓ $NAME synced"
            else
              echo "  · ⚠️  wrangler secret put $NAME returned $RC"
            fi
          }

          echo "=== Syncing worker secrets ==="
          push_secret OPENAI_API_KEY "$GH_OPENAI_API_KEY"
          push_secret ADMIN_KEY "$GH_AIRCHAT_ADMIN_KEY"

          echo "=== Confirming bindings ==="
          curl -fsS https://airchat.mino.mobi/api/airchat/health 2>/dev/null || true
          exit 0

      - name: Verify worker is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            HEALTH=$(curl -fsS https://airchat.mino.mobi/api/airchat/health || true)
            if echo "$HEALTH" | grep -q '"ok":true'; then
              echo "$HEALTH"
              echo "✓ worker is live"
              exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"
            sleep 4
          done
          echo "⚠️ worker didn't respond to /api/airchat/health within 20s — edge propagation may be slow, continuing anyway."

      - name: Seed whitelist from airchat/whitelist.txt (idempotent)
        # Reads airchat/whitelist.txt one entry per line. Each entry is
        # either a bluesky handle (resolved via public API) or a DID
        # (inserted as-is). INSERT-OR-IGNOREs into airchat_whitelist via
        # wrangler d1 execute. Idempotent on the DID primary key.
        #
        # Marked best-effort: deploy succeeds even if a handle fails to
        # resolve (the worker is already up; whitelist can be patched
        # later via re-push or the admin API).
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          if [ ! -f whitelist.txt ]; then
            echo "no whitelist.txt — skipping seed"
            exit 0
          fi
          echo "=== Seeding whitelist from airchat/whitelist.txt ==="
          INSERTED=0
          FAILED=0
          while IFS= read -r raw || [ -n "$raw" ]; do
            # Trim leading/trailing whitespace
            entry=$(echo "$raw" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            # Skip blank lines and comments
            [ -z "$entry" ] && continue
            case "$entry" in \#*) continue ;; esac

            if [[ "$entry" == did:* ]]; then
              DID="$entry"
              HANDLE=""
              echo "→ direct DID: $DID"
            else
              echo "→ resolving @$entry…"
              # jq is preinstalled on ubuntu-latest; cleaner than python heredoc
              RESP=$(curl -sS "https://api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=$entry" 2>&1)
              DID=$(echo "$RESP" | jq -r '.did // empty' 2>/dev/null)
              HANDLE="$entry"
              if [ -z "$DID" ]; then
                echo "  ⚠️  could not resolve @$entry — response was: $RESP"
                FAILED=$((FAILED + 1))
                continue
              fi
              echo "  resolved to $DID"
            fi

            # Escape single quotes in handle for SQL safety
            ESCAPED_HANDLE=$(echo "$HANDLE" | sed "s/'/''/g")
            SQL="INSERT OR IGNORE INTO airchat_whitelist (did, handle, note) VALUES ('$DID', '$ESCAPED_HANDLE', 'seeded from whitelist.txt');"
            OUTPUT=$(npx wrangler d1 execute atpolls-db --remote --command "$SQL" 2>&1)
            RC=$?
            if [ $RC -ne 0 ]; then
              echo "  ⚠️  wrangler returned $RC:"
              echo "$OUTPUT" | head -10
              FAILED=$((FAILED + 1))
            else
              echo "  ✓ inserted (or already present)"
              INSERTED=$((INSERTED + 1))
            fi
          done < whitelist.txt

          echo ""
          echo "=== Seed summary: $INSERTED ok, $FAILED failed ==="
          echo "=== Current whitelist contents ==="
          npx wrangler d1 execute atpolls-db --remote \
            --command "SELECT did, handle, note, datetime(added_at, 'unixepoch') AS added FROM airchat_whitelist ORDER BY added_at DESC;" \
            2>&1 | head -40 || true
          exit 0
