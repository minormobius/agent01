name: Traffic ingest (iceberg metrics)

# Refreshes the two ranking metrics behind mino.mobi/iceberg/:
#   • data/commits.json — commits touching each endpoint (no token, always runs)
#   • data/traffic.json — Cloudflare page views (needs an Analytics-scoped token)
# The iceberg prefers page views and falls back to commit impact.
#
# Two gotchas (shared with bisk-digest):
#   1. `schedule:` only fires from the DEFAULT branch (main), so this lives on main.
#   2. A GITHUB_TOKEN commit does NOT trigger deploy-root, so we self-deploy the
#      root Pages project here after committing.
#
# NOTE: page views require CLOUDFLARE_API_TOKEN to include **Zone Analytics: Read**
# (or account Analytics: Read). Without it the traffic step is skipped and only the
# commit-impact ranking refreshes — the iceberg stays meaningful either way.

on:
  schedule:
    - cron: '0 11 * * *'   # daily 11:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Look-back window in days'
        required: false
        default: '30'
        type: string

permissions:
  contents: write

concurrency:
  group: traffic-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → accurate per-endpoint commit counts

      - name: Fetch every branch (so --all sees off-main / feature-branch work)
        run: git fetch --no-tags origin '+refs/heads/*:refs/remotes/origin/*'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rank by commit depth across all refs (no token needed)
        run: node scripts/fetch-commits.mjs

      - name: Fetch page views from Cloudflare (skipped if token lacks Analytics scope)
        continue-on-error: true
        run: node scripts/fetch-traffic.mjs --days "${{ github.event.inputs.days || '30' }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit refreshed metrics if they changed
        id: commit
        run: |
          if git diff --quiet -- data/traffic.json data/commits.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change in iceberg metrics"
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add data/traffic.json data/commits.json
            git commit -m "iceberg: refresh ranking metrics $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wrangler
        if: steps.commit.outputs.changed == 'true'
        run: npm install wrangler

      - name: Self-deploy root (GITHUB_TOKEN push won't trigger deploy-root)
        if: steps.commit.outputs.changed == 'true'
        run: npx wrangler pages deploy . --project-name="${{ vars.ROOT_PAGES_PROJECT || 'agent01' }}" --branch=main --commit-dirty=true --commit-message="traffic ingest $(date -u +%Y-%m-%d)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
