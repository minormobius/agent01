name: Traffic ingest (page views → iceberg)

# Pulls per-surface page views from Cloudflare's GraphQL analytics and commits
# data/traffic.json — the data source for mino.mobi/iceberg/.
#
# Two gotchas (shared with bisk-digest):
#   1. `schedule:` only fires from the DEFAULT branch (main), so this lives on main.
#   2. A GITHUB_TOKEN commit does NOT trigger deploy-root, so we self-deploy the
#      root Pages project here after committing.
#
# REQUIREMENT: CLOUDFLARE_API_TOKEN must include **Zone Analytics: Read** (or
# account Analytics: Read) in addition to its Pages-deploy scope. Without it the
# fetch step fails loudly and the committed data/traffic.json keeps its last
# good value (the iceberg degrades to the "awaiting ingest" seafloor state).

on:
  schedule:
    - cron: '0 11 * * *'   # daily 11:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Look-back window in days'
        required: false
        default: '30'
        type: string

permissions:
  contents: write

concurrency:
  group: traffic-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch page views from Cloudflare
        run: node scripts/fetch-traffic.mjs --days "${{ github.event.inputs.days || '30' }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit data/traffic.json if it changed
        id: commit
        run: |
          if git diff --quiet -- data/traffic.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No change in data/traffic.json"
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add data/traffic.json
            git commit -m "traffic: refresh page-view ranking $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install wrangler
        if: steps.commit.outputs.changed == 'true'
        run: npm install wrangler

      - name: Self-deploy root (GITHUB_TOKEN push won't trigger deploy-root)
        if: steps.commit.outputs.changed == 'true'
        run: npx wrangler pages deploy . --project-name="${{ vars.ROOT_PAGES_PROJECT || 'agent01' }}" --branch=main --commit-dirty=true --commit-message="traffic ingest $(date -u +%Y-%m-%d)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
