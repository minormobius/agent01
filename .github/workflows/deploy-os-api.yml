name: Deploy os-api (container backend)

# os-api — Cloudflare Containers worker (os-mino-api) behind os-api.minomobi.com:
# the per-DID PTY container backend for os.mino.mobi's `kimi` agent platform
# (bash + git + Claude Code as the harness for open models via AGENT_PROFILES,
# R2-synced workspace, fail-closed ALLOWED_DIDS identity gate).
#
# SELF-PROVISIONING (create-mmo-db.yml pattern) — every run is idempotent:
#   1. `wrangler deploy` — builds the Docker image on the runner; the
#      custom_domain route in wrangler.toml binds os-api.minomobi.com
#      (GOLDEN RULE: verify the log binds `os-api.minomobi.com (custom domain)`)
#   2. sync worker runtime secrets from GitHub:
#        CAP_SIGNING_KEY   auto-generated ONCE on the runner, kept thereafter
#        MOONSHOT_API_KEY  <- GH secret  MOONSHOT_API_KEY       (kimi3 profile)
#        GITHUB_TOKEN      <- GH secret  OS_AGENT_GITHUB_TOKEN  (fine-grained
#                             PAT scoped to minormobius/agent01 — its pushes DO
#                             trigger Actions, unlike the Actions-internal token)
#   3. health-check https://os-api.minomobi.com/health (retries while the
#      custom-domain cert provisions)
#
# NO R2 (learned from run #1: R2 needs its own account enablement, CF error
# 10042, unavailable on this plan). Workspace persistence lives in the
# ContainerShell Durable Object's SQLite storage instead — chunked tarballs,
# zero extra entitlements. ALLOWED_DIDS is committed [vars] config in
# wrangler.toml (the morphyx service DID) — no sync needed.
#
# Auto-fires on push touching os/api/** — DELIBERATE now the platform is live
# (was dispatch-only while shelved). It builds a Docker image and runs paid
# containers; the cost levers are max_instances=3 in wrangler.toml + 10-min
# idle sleep, and the fail-closed ALLOWED_DIDS gate bounds who can wake one.
#
# HUMAN PREREQS the workflow cannot do (one-time — full list in os/RUNBOOK.md):
#   - Enable Cloudflare Containers on the account (needs Workers paid plan;
#     the wrangler deploy step is the probe — its error names the gap).
#   - Mint the Moonshot API key + the fine-grained PAT, add as GH secrets above.
# Runs before those exist warn loudly; the identity gate stays fail-closed.

on:
  workflow_dispatch:
  push:
    branches: [main, 'claude/kimi3-container-deploy-24wux0']
    paths:
      - 'os/api/**'
      - '.github/workflows/deploy-os-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: os/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy container worker (os-mino-api)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Secrets go AFTER the first deploy (wrangler can't put secrets on a
      # worker that doesn't exist yet); they apply to the live worker
      # immediately, and the container only starts on first WS connect.
      - name: Sync worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          OS_AGENT_GITHUB_TOKEN: ${{ secrets.OS_AGENT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # CAP_SIGNING_KEY: generate once, never rotate automatically
          # (rotation invalidates live capability tokens mid-session).
          EXISTING=$(npx wrangler secret list 2>/dev/null || echo '[]')
          if echo "$EXISTING" | grep -q '"CAP_SIGNING_KEY"'; then
            echo "✓ CAP_SIGNING_KEY already set"
          else
            openssl rand -hex 32 | npx wrangler secret put CAP_SIGNING_KEY
            echo "✓ CAP_SIGNING_KEY generated + set"
          fi

          # The rest sync from GitHub every run (GitHub is the source of truth,
          # so updating a GH secret/var propagates on the next deploy).
          if [ -n "${MOONSHOT_API_KEY:-}" ]; then
            printf '%s' "$MOONSHOT_API_KEY" | npx wrangler secret put MOONSHOT_API_KEY
            echo "✓ MOONSHOT_API_KEY synced"
          else
            echo "::warning::GH secret MOONSHOT_API_KEY unset — the kimi3 profile has no key (agent kimi3 will refuse)"
          fi

          if [ -n "${OS_AGENT_GITHUB_TOKEN:-}" ]; then
            printf '%s' "$OS_AGENT_GITHUB_TOKEN" | npx wrangler secret put GITHUB_TOKEN
            echo "✓ GITHUB_TOKEN synced (from OS_AGENT_GITHUB_TOKEN)"
          else
            echo "::warning::GH secret OS_AGENT_GITHUB_TOKEN unset — the container agent cannot push to GitHub"
          fi
          # ALLOWED_DIDS is committed [vars] config in wrangler.toml (morphyx
          # service DID) — nothing to sync.

      - name: Health check (domain bound + worker live)
        run: |
          set -uo pipefail
          for i in $(seq 1 18); do
            BODY=$(curl -fsS --max-time 10 https://os-api.minomobi.com/health 2>/dev/null) || BODY=""
            if echo "$BODY" | grep -q '"ok"'; then
              echo "✓ os-api.minomobi.com healthy: $BODY"
              exit 0
            fi
            echo "waiting for os-api.minomobi.com ($i/18)…"
            sleep 10
          done
          echo "::error::os-api.minomobi.com never became healthy — check the deploy log binds 'os-api.minomobi.com (custom domain)' (golden rule) and that Cloudflare Containers is enabled on the account"
          exit 1
