name: Deploy os-api (container) [MANUAL]

# os-api — Cloudflare Containers worker (os-mino-api). Runs a Docker container
# (node + git/python + Claude Code CLI + GitHub MCP, a PTY shell synced to R2)
# behind a Durable Object (ContainerShell). Intended domain: os-api.minomobi.com.
#
# DISPATCH-ONLY ON PURPOSE. This never auto-fires on push — deploying it builds a
# Docker image and provisions up to 10 paid container instances. Run it by hand
# (Actions tab -> this workflow -> Run workflow) ONLY after the prerequisites
# below are satisfied.
#
# PREREQUISITES (one-time, in the Cloudflare dashboard / via wrangler):
#   1. Cloudflare Containers must be ENABLED on the account (beta; has cost).
#   2. R2 bucket `os-workspace` must exist (binding WORKSPACE).
#   3. Runtime secrets set on the worker:
#        npx wrangler secret put SYNC_TOKEN   -c os/api/wrangler.toml
#        npx wrangler secret put GITHUB_TOKEN -c os/api/wrangler.toml
#      (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID for in-container wrangler are
#       also referenced by the container — see os/api/wrangler.toml.)
#   4. Attach the custom domain os-api.minomobi.com after the first deploy.
#
# wrangler builds the image from os/api/container/Dockerfile (the ubuntu-latest
# runner provides Docker) and pushes it to Cloudflare's container registry.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: os/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy container worker (os-mino-api)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
