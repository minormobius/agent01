name: Run D1 Migrations

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Specific migration file (e.g., 0002_eligibility_mode.sql). Leave blank to run all.'
        required: false
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install wrangler

      - name: Run migrations
        run: |
          if [ -n "${{ inputs.migration_file }}" ]; then
            echo "Running single migration: apps/api/migrations/${{ inputs.migration_file }}"
            npx wrangler d1 execute anon-polls-db --file="apps/api/migrations/${{ inputs.migration_file }}" --remote
          else
            echo "Running all migrations..."
            for f in apps/api/migrations/*.sql; do
              echo "Running: $f"
              npx wrangler d1 execute anon-polls-db --file="$f" --remote
            done
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
