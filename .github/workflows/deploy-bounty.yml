name: Deploy Bounty Board

on:
  push:
    branches: [main, 'claude/megaproject-dashboard-*']
    paths:
      - 'bounty/**'
      - '.github/workflows/deploy-bounty.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to deploy from'
        default: 'claude/megaproject-dashboard-uvKRo'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bounty

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run D1 migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            npx wrangler d1 execute bounty-board --file="$f" --remote || echo "Migration $f returned non-zero (likely already applied), continuing..."
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker + Assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
