name: Deploy OCR (ocr.mino.mobi)

on:
  push:
    branches:
      - main
      - 'claude/image-text-extraction-gH8UH'
    paths:
      - 'ocr/**'
      - '.github/workflows/deploy-ocr.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ocr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wrangler
        run: npm install wrangler
      - name: Deploy worker + assets
        # The OCR wasm (wasm/codescan_ocr*) is pre-built and committed — there is
        # no Rust build step here. Rebuild it from os/crates/codescan-ocr only
        # when the crate changes (see that crate's README).
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify it's live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS https://ocr.mino.mobi/ | grep -qi 'read text off an image'; then
              echo "✓ ocr.mino.mobi is live"; exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"; sleep 4
          done
          echo "⚠️ ocr.mino.mobi didn't respond within 20s — edge propagation may be slow, continuing."
