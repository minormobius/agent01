name: Deploy b (Bluesky corner)

on:
  push:
    branches: [main, 'claude/landing-projects-takeover-pKkmW']
    paths:
      - 'b/**'
      - '.github/workflows/deploy-b.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: b

    steps:
      - uses: actions/checkout@v4

      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set feedgen search service secrets (morphyx)
        env:
          MORPHYX_HANDLE: ${{ secrets.BLUESKY_MORPHYX_HANDLE }}
          MORPHYX_APP_PASSWORD: ${{ secrets.BLUESKY_MORPHYX_APP_PASSWORD }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$MORPHYX_APP_PASSWORD" ]; then
            echo "morphyx creds not set — feedgen search stays off"; exit 0;
          fi
          printf '%s' "$MORPHYX_HANDLE"       | npx wrangler secret put BLUESKY_MORPHYX_HANDLE
          printf '%s' "$MORPHYX_APP_PASSWORD" | npx wrangler secret put BLUESKY_MORPHYX_APP_PASSWORD
          echo "morphyx search secrets set on worker b"
