name: Deploy b (Bluesky corner)

on:
  push:
    branches: [main, 'claude/follower-post-discovery-bZumw']
    paths:
      - 'b/**'
      - '.github/workflows/deploy-b.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: b

    steps:
      - uses: actions/checkout@v4

      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set feedgen worker secrets (morphyx search + gemini regex)
        env:
          MORPHYX_HANDLE: ${{ secrets.BLUESKY_MORPHYX_HANDLE }}
          MORPHYX_APP_PASSWORD: ${{ secrets.BLUESKY_MORPHYX_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$MORPHYX_APP_PASSWORD" ]; then
            printf '%s' "$MORPHYX_HANDLE"       | npx wrangler secret put BLUESKY_MORPHYX_HANDLE
            printf '%s' "$MORPHYX_APP_PASSWORD" | npx wrangler secret put BLUESKY_MORPHYX_APP_PASSWORD
            echo "✓ morphyx search secrets set"
          else
            echo "· morphyx creds empty — search stays off"
          fi
          if [ -n "$GEMINI_API_KEY" ]; then
            printf '%s' "$GEMINI_API_KEY" | npx wrangler secret put GEMINI_API_KEY
            echo "✓ GEMINI_API_KEY set (regex assistant on)"
          else
            echo "· GEMINI_API_KEY empty — regex assistant stays off"
          fi
