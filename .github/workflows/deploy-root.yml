name: Deploy Root (landing)

# Explicit deploy for the root Pages project (the landing page + the static
# subsites it bundles + functions/ Pages Functions). Replaces the implicit
# Cloudflare git-integration auto-deploy from main.
#
# Root is a Cloudflare PAGES project (project: agent01), so it deploys with
# `wrangler pages deploy` and the functions/ dir ships as Pages Functions. The
# project name defaults to `agent01` but can be overridden via the
# ROOT_PAGES_PROJECT repo variable or the dispatch `project` input.
#
# Once a run is verified green, disable the project's git auto-build in the CF
# dashboard so this workflow is the single deploy path. As static subsites
# encapsulate into their own surfaces (math, canvas, …), remove their dirs from
# the paths list below so root stops shipping them.

on:
  push:
    branches: [main, 'claude/landing-projects-takeover-pKkmW']
    paths:
      - 'index.html'
      - 'styles.css'
      - 'functions/**'
      - 'scripts/generate-search-catalog.mjs'
      # static subsites still bundled under root (carve out as they encapsulate):
      - 'cluster/**'
      - 'density/**'
      - 'echo/**'
      - 'judge/**'
      - 'novelty/**'
      - 'seek/**'
      - 'ternary/**'
      - 'music/**'
      - 'sweat/**'
      - 'noise/**'
      - 'flows/**'
      - 'phylo/**'
      - 'time/**'
      - 'wiki/**'
      - '.github/workflows/deploy-root.yml'
  workflow_dispatch:
    inputs:
      project:
        description: 'Cloudflare Pages project name (overrides ROOT_PAGES_PROJECT var / agent01 default)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve Pages project name
        id: proj
        run: |
          PROJECT="${{ github.event.inputs.project }}"
          [ -z "$PROJECT" ] && PROJECT="${{ vars.ROOT_PAGES_PROJECT }}"
          [ -z "$PROJECT" ] && PROJECT="agent01"
          echo "name=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "Deploying Pages project: $PROJECT"

      - name: Deploy to Cloudflare Pages (production branch)
        run: npx wrangler pages deploy . --project-name="${{ steps.proj.outputs.name }}" --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
