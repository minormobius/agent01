name: Deploy Borges (Book of Sand)

on:
  push:
    branches:
      - main
      - 'claude/pendragon-endless-book-*'
      - 'claude/pendragon-next-source-*'
    paths:
      - 'borges/**'
      - '.github/workflows/deploy-borges.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: borges
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wrangler
        run: npm install wrangler
      - name: Deploy worker + assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify the book is live
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS https://borges.mino.mobi/t/1729 | grep -qi 'Book of Sand'; then
              echo "✓ borges is live"; exit 0
            fi
            echo "  attempt $attempt: not yet, sleeping…"; sleep 4
          done
          echo "⚠️ borges didn't respond within 20s — edge propagation may be slow, continuing."
