name: Illustrate Gawain

# Auto-runs on push when the storybook content, script, or workflow changes.
# The script defaults to --spreads missing, using PNG existence as a sentinel:
# once every spread has an image on disk, this is a no-op (no generations, no
# commit, no deploy). New spread added → only that one generates. To re-render
# on a prompt tweak, delete the spread's PNG or workflow_dispatch with
# spreads=all or a comma-list. GITHUB_TOKEN pushes don't trigger workflows,
# so no recursion.

on:
  push:
    branches:
      - main
      - 'claude/arthurian-legend-history-*'
    paths:
      - 'read/gawain/storybook.js'
      - 'scripts/illustrate-gawain.mjs'
      - '.github/workflows/illustrate-gawain.yml'
  workflow_dispatch:
    inputs:
      spreads:
        description: 'Which spreads ("missing" | "all" | "0,5,12")'
        required: false
        default: 'missing'
        type: string
      quality:
        description: 'Image quality (gpt-image-1)'
        required: false
        default: 'medium'
        type: choice
        options:
          - low
          - medium
          - high

permissions:
  contents: write

jobs:
  illustrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate images
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          SPREADS="${{ inputs.spreads || 'missing' }}"
          QUALITY="${{ inputs.quality || 'medium' }}"
          node scripts/illustrate-gawain.mjs --spreads "$SPREADS" --quality "$QUALITY"

      - id: commit
        name: Commit any new images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add read/gawain/img/
          if git diff --cached --quiet; then
            echo "No new images. Nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Storybook: generated gawain illustrations"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Self-deploy read
        if: steps.commit.outputs.changed == 'true'
        working-directory: read
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
