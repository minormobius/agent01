name: Enrich biome roster

# Fetches real provenance for the biome ecosystem roster — iNaturalist identity +
# imagery and GloBI diet edges — and commits biome/cycles/sim/roster.enriched.json.
# The engine never reads that file (the curated ROSTER in roster.mjs is the source of
# truth); this is documentation/imagery for the UI and a diet cross-check.
#
#   - Manual via the Actions tab (workflow_dispatch)
#   - Automatically when the curated roster changes
#   - Monthly, to pick up new iNat photos / GloBI records

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/oneill-cylinder-life-support-wqzrqn
    paths:
      - biome/cycles/sim/roster.mjs
      - biome/cycles/sim/enrich-roster.mjs
      - .github/workflows/enrich-roster.yml
  schedule:
    - cron: '0 7 1 * *'   # 07:00 UTC on the first of each month

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch iNaturalist + GloBI provenance
        run: node biome/cycles/sim/enrich-roster.mjs

      - name: Sanity-check the roster still compiles and conserves
        run: node biome/cycles/test/roster.selftest.mjs

      - name: Show diff (informational)
        run: git status --short biome/cycles/sim/roster.enriched.json

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add biome/cycles/sim/roster.enriched.json
          if git diff --cached --quiet; then
            echo "No roster provenance changes to commit."
            exit 0
          fi
          git commit -m "biome roster: refresh iNat + GloBI provenance

          Auto-generated by .github/workflows/enrich-roster.yml.
          Fetch logic lives in biome/cycles/sim/enrich-roster.mjs."
          git push
