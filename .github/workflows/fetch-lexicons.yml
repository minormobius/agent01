name: Fetch Lexicons

# Downloads the published versions of the open lexicons used by /lexicon/
# (NRC Emotion, Brysbaert Concreteness, AFINN, SUBTLEX-US) from upstream
# repos, converts to JSON, and commits to rite/lexicon/data/. The page
# already prefers data/*.json over the inline mini-lexicons, so this is a
# transparent upgrade — no code changes needed after.
#
# Triggers:
#   - Manual via Actions tab (workflow_dispatch)
#   - Push that touches the workflow file or scripts/fetch-lexicons.mjs
#     (so editing either re-fires the fetch)
#   - Monthly cron (lexicons rarely change but a quarterly refresh is fine)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/sentence-editing-drill-*'
    paths:
      - '.github/workflows/fetch-lexicons.yml'
      - 'scripts/fetch-lexicons.mjs'
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the first of each month

permissions:
  contents: write           # we commit the JSON files back

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and convert lexicons
        run: node scripts/fetch-lexicons.mjs

      - name: Show diff (informational)
        run: git status --short rite/lexicon/data/

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rite/lexicon/data/
          if git diff --cached --quiet; then
            echo "No lexicon changes to commit."
            exit 0
          fi
          git commit -m "lexicon: refresh data/ from upstream

          Auto-generated by .github/workflows/fetch-lexicons.yml.
          Source URLs and parsers live in scripts/fetch-lexicons.mjs."
          git push
