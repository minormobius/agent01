<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>goss — the civic web</title>
<meta name="description" content="The civic web viewer: every NPC and their relationships to the places — emergent tribes, romance, and the two big tensions (tribalism, the narcissism of small differences) read off the web as social-drama seeds." />
<style>
  :root{
    --bg:#0a1016; --panel:#0d161d; --line:#1c2b36; --txt:#cfdde6; --dim:#5f7684;
    --gold:#d9b24a; --hot:#e0567a; --cold:#3bb0c9; --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 var(--mono);overflow:hidden}
  a{color:var(--cold);text-decoration:none}
  #top{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--line);background:var(--panel)}
  #top .brand{font-weight:700;color:var(--gold);white-space:nowrap}
  #top .brand small{color:var(--dim);font-weight:400;margin-left:8px}
  #top input{width:84px;background:#09121a;border:1px solid var(--line);color:var(--txt);font:13px var(--mono);padding:3px 7px;border-radius:5px}
  button,.chip{background:#101d27;border:1px solid var(--line);color:var(--txt);font:12.5px var(--mono);
    padding:4px 10px;border-radius:6px;cursor:pointer;white-space:nowrap}
  button:hover,.chip:hover{border-color:#3a6a86}
  .chip.on{border-color:var(--gold);color:var(--gold);background:#17202a}
  #lenses{display:flex;gap:6px;margin-left:8px}
  #top .home{margin-left:auto;color:var(--dim);font-size:12px}
  #main{display:flex;height:calc(100% - 45px)}
  #stage{flex:1;position:relative;min-width:0}
  canvas{display:block;width:100%;height:100%;cursor:grab}
  canvas.dragging{cursor:grabbing}
  #tip{position:absolute;pointer-events:none;background:#0d161df2;border:1px solid var(--line);border-radius:6px;
    padding:5px 9px;font-size:12px;display:none;max-width:280px;z-index:5}
  #tip b{color:var(--gold)}
  #rail{width:360px;border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:12px;flex-shrink:0}
  #rail h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin:14px 0 6px}
  #rail h2:first-child{margin-top:0}
  .vital{display:flex;align-items:baseline;gap:8px}
  .vital .n{font-size:26px;font-weight:700;color:var(--gold)}
  .vital .t{color:var(--dim)}
  .tribe{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:5px;cursor:pointer;font-size:12.5px}
  .tribe:hover,.tribe.on{background:#12202b}
  .tribe .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
  .tribe .sz{margin-left:auto;color:var(--dim)}
  .drama{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;cursor:pointer}
  .drama:hover,.drama.on{border-color:var(--gold)}
  .drama .hd{display:flex;gap:8px;align-items:baseline}
  .drama .ty{font-size:10.5px;letter-spacing:.1em;color:var(--hot);font-weight:700}
  .drama .heat{margin-left:auto;color:var(--dim);font-size:11px}
  .drama .ti{font-weight:700;font-size:13px;margin:2px 0}
  .drama .ln{color:var(--dim);font-size:12px;line-height:1.45}
  #dossier{border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:10px;display:none}
  #dossier .nm{color:var(--gold);font-weight:700;font-size:15px}
  #dossier .meta{color:var(--dim);font-size:12px;margin:2px 0 6px}
  #dossier ul{list-style:none;font-size:12.5px}
  #dossier li{padding:1.5px 0}
  #dossier li .k{color:var(--dim)}
  #dossier .close{float:right;color:var(--dim);cursor:pointer}
  .bar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:4px 0}
  .bar div{height:100%}
  .note{color:var(--dim);font-size:11.5px;line-height:1.5;margin-top:4px}
  @media(max-width:760px){#rail{width:270px}}
</style>
</head>
<body>
  <div id="top">
    <span class="brand">⁂ goss<small>the civic web — who knows whom, and what it's turning into</small></span>
    <input id="seed" type="number" value="7" title="seed" />
    <button id="roll" title="new seed">🎲 roll</button>
    <div id="lenses">
      <span class="chip on" data-lens="tribes">⛺ tribes</span>
      <span class="chip" data-lens="romance">♥ romance</span>
      <span class="chip" data-lens="tension">⚔ tension</span>
      <span class="chip" data-lens="web">☷ raw web</span>
    </div>
    <a class="home" href="/">☁ tide</a>
  </div>
  <div id="main">
    <div id="stage"><canvas id="cv"></canvas><div id="tip"></div></div>
    <div id="rail">
      <div id="dossier"></div>
      <h2>civic vitality</h2>
      <div class="vital"><span class="n" id="vnum">—</span><span class="t" id="vtier"></span></div>
      <div class="note" id="vnote"></div>
      <h2>the tribes <span style="color:var(--dim);font-weight:400;text-transform:none">(emergent — nothing is assigned)</span></h2>
      <div id="tribes"></div>
      <div class="note">Tribes are label-propagation communities of the tie web. Nobody was told which one they belong to.</div>
      <h2>the goss</h2>
      <div id="dramas"></div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
