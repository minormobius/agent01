<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ask a question — Answers</title>
<link rel="stylesheet" href="/assets/answers.css" />
</head>
<body>

<header class="site">
  <h1><a href="/">Answers</a></h1>
  <div class="spacer"></div>
  <nav><a href="/">Home</a></nav>
</header>

<main>

<section id="gate" class="card" hidden>
  <h2 style="margin-top:0">Sign in to ask</h2>
  <p class="muted">Questions are published as ATProto records on your own PDS. We need your Bluesky app password to post on your behalf.</p>
  <form id="login-form" class="auth-box">
    <label for="handle">Handle</label>
    <input type="text" id="handle" placeholder="alice.bsky.social" autocomplete="username" required />
    <label for="password">App password</label>
    <input type="password" id="password" placeholder="xxxx-xxxx-xxxx-xxxx" autocomplete="current-password" required />
    <div id="login-error" class="error" hidden></div>
    <div style="margin-top:12px"><button type="submit">Sign in</button></div>
  </form>
</section>

<section id="form-wrap" class="card" hidden>
  <h2 style="margin-top:0">Ask a question</h2>
  <form id="ask-form">
    <label for="title">Title <span class="muted">(max 300 chars)</span></label>
    <input type="text" id="title" maxlength="300" required />

    <label for="body">Detail <span class="muted">(optional)</span></label>
    <textarea id="body" maxlength="10000" placeholder="Anything else we should know?"></textarea>

    <label for="category">Category</label>
    <select id="category" required>
      <option value="">— loading —</option>
    </select>

    <div id="ask-error" class="error" hidden></div>
    <div id="ask-success" class="notice" hidden></div>
    <div style="margin-top:16px">
      <button type="submit" id="submit-btn">Publish question</button>
      <a class="btn secondary" href="/" style="margin-left:8px">Cancel</a>
    </div>
  </form>
</section>

</main>

<script type="module">
import {
  loadSession, loginAndStore, restoreClient,
  fetchCategories, generateTid, nowIso, C, escapeHtml,
} from '/assets/answers.js';

const $ = (s) => document.querySelector(s);

function showGate() { $('#gate').hidden = false; $('#form-wrap').hidden = true; }
function showForm() { $('#gate').hidden = true; $('#form-wrap').hidden = false; }

$('#login-form').onsubmit = async (e) => {
  e.preventDefault();
  $('#login-error').hidden = true;
  try {
    await loginAndStore($('#handle').value.trim(), $('#password').value);
    await boot();
  } catch (err) {
    $('#login-error').textContent = err.message || 'Login failed';
    $('#login-error').hidden = false;
  }
};

async function populateCategories() {
  const { roots, byRkey } = await fetchCategories();
  const sel = $('#category');
  sel.innerHTML = '<option value="">— choose —</option>';
  const walk = (nodes, depth) => {
    for (const n of nodes) {
      const opt = document.createElement('option');
      opt.value = n.uri;
      opt.dataset.cid = n.cid;
      opt.dataset.rkey = n.rkey;
      opt.textContent = `${'\u00a0\u00a0'.repeat(depth)}${n.name}`;
      sel.appendChild(opt);
      walk(n.children, depth + 1);
    }
  };
  walk(roots, 0);
  // Preselect from ?category=slug
  const preset = new URLSearchParams(location.search).get('category');
  if (preset && byRkey[preset]) sel.value = byRkey[preset].uri;
}

$('#ask-form').onsubmit = async (e) => {
  e.preventDefault();
  $('#ask-error').hidden = true;
  $('#ask-success').hidden = true;
  const btn = $('#submit-btn');
  btn.disabled = true;

  const title = $('#title').value.trim();
  const body = $('#body').value.trim();
  const sel = $('#category');
  const catOpt = sel.selectedOptions[0];

  if (!title || !catOpt || !catOpt.value) {
    $('#ask-error').textContent = 'Title and category required.';
    $('#ask-error').hidden = false;
    btn.disabled = false;
    return;
  }

  try {
    const client = await restoreClient();
    if (!client) throw new Error('Not signed in');
    const record = {
      title,
      category: { uri: catOpt.value, cid: catOpt.dataset.cid },
      createdAt: nowIso(),
    };
    if (body) record.body = body;

    const rkey = generateTid();
    const res = await client.putRecord(C.question, rkey, record);
    const uri = encodeURIComponent(res.uri);
    $('#ask-success').innerHTML = `Published! <a href="/question.html?uri=${uri}">View your question →</a>`;
    $('#ask-success').hidden = false;
    $('#ask-form').reset();
    await populateCategories(); // reset select
  } catch (err) {
    $('#ask-error').textContent = err.message || 'Could not publish';
    $('#ask-error').hidden = false;
  } finally {
    btn.disabled = false;
  }
};

async function boot() {
  if (!loadSession()) {
    showGate();
    return;
  }
  showForm();
  try {
    await populateCategories();
  } catch (err) {
    $('#category').innerHTML = `<option>Error loading categories</option>`;
  }
}

boot();
</script>

</body>
</html>
