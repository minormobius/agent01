<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Scope — Ray Traced Microscope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080e}
#diag{display:block;width:100%;height:30vh;background:#08080e}
#c{display:block;width:100%;height:70vh;touch-action:none}
#mag{position:fixed;right:14px;bottom:14px;width:52px;height:52px;border-radius:50%;
  border:2px solid;font:bold 13px monospace;cursor:pointer;z-index:5;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);-webkit-tap-highlight-color:transparent}
#focLbl{position:fixed;left:14px;bottom:14px;color:rgba(255,255,255,0.3);
  font:11px monospace;pointer-events:none;z-index:2}
#err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  color:#f88;font:16px monospace;text-align:center;padding:20px;z-index:10}
</style>
</head>
<body>
<canvas id="diag"></canvas>
<canvas id="c"></canvas>
<div id="mag" onclick="cycleObj()">10x</div>
<div id="focLbl"></div>
<div id="err">WebGPU not available.</div>
<script>
'use strict';
/* ── Infinity-corrected microscope optics ──
   Scale: 1 unit = 10 mm
   f_tube = 200mm → 20.0   gap (infinity space) = 160mm → 16.0
   FN = 22mm → half = 1.1  M = f_tube / f_obj
   Layout (light path): Sample(z=0) → Obj(z=f_obj) → ∞ space → Tube(z=f_obj+gap) → Image(z=f_obj+gap+f_tube)
   Camera ray-traces in reverse: Image → Tube → Obj → Sample */

const F_TUBE=20.0, GAP=16.0, FN_H=1.1, AP_TUBE=1.2;
const canvas=document.getElementById('c'),diag=document.getElementById('diag');
const magEl=document.getElementById('mag'),focEl=document.getElementById('focLbl');
const dc=diag.getContext('2d');

/* ── Objectives (physics-derived) ── */
const OBJ=[
  {label:'4x',   M:4,   na:0.10, color:'#e44'},
  {label:'10x',  M:10,  na:0.25, color:'#fa0'},
  {label:'20x',  M:20,  na:0.40, color:'#2b5'},
  {label:'40x',  M:40,  na:0.65, color:'#38f'},
  {label:'100x', M:100, na:1.25, color:'#ddd'},
].map(o=>{const f=F_TUBE/o.M; return{...o, f_obj:f, ap_obj:f*o.na,
  z_obj:f, z_tube:f+GAP, z_image:f+GAP+F_TUBE,
  fov:2.2/o.M, dof:2*0.000055/(o.na*o.na)};});

let objIdx=1, focTgt=0, px=0, py=0;
let cur={f_obj:OBJ[1].f_obj, z_obj:OBJ[1].z_obj, z_tube:OBJ[1].z_tube,
  z_image:OBJ[1].z_image, ap_obj:OBJ[1].ap_obj, na:OBJ[1].na, foc:0};

window.cycleObj=function(){
  objIdx=(objIdx+1)%OBJ.length; focTgt=0;
  const o=OBJ[objIdx];
  magEl.textContent=o.label; magEl.style.color=o.color; magEl.style.borderColor=o.color;
};
magEl.style.color=OBJ[1].color; magEl.style.borderColor=OBJ[1].color;

/* ── WGSL: two-lens thin-lens ray trace ── */
const shader=`
struct P{res:vec2f,tm:f32,foc:f32,pan:vec2f,f_obj:f32,f_tube:f32,
  z_tube:f32,z_obj:f32,ap_obj:f32,ap_tube:f32,na:f32,zi:f32,fn_h:f32,_p:f32}
@group(0)@binding(0) var<uniform> u:P;

fn cell(p:vec2f,ct:vec2f,r:f32,col:vec3f,bl:f32)->vec3f{
  let d=length(p-ct);let e=max(0.001,bl);
  if(d>r+e*2.0){return vec3f(0.0);}
  let fill=col*0.15*smoothstep(r+e,r-e*0.5,d);
  let ring=smoothstep(r+e,r,d)*(1.0-smoothstep(r,r-e,d));
  return fill+col*ring*0.7;
}
fn nuc(p:vec2f,ct:vec2f,r:f32,col:vec3f,bl:f32)->vec3f{
  let d=length(p-ct);let e=max(0.001,bl);
  if(d>r+e){return vec3f(0.0);}
  return col*0.25*smoothstep(r+e,r-e,d);
}
fn specimen(p:vec2f,bl:f32)->vec3f{
  var c=vec3f(0.005,0.008,0.005);
  let gf=abs(fract(p*100.0)-vec2f(0.5));
  c+=vec3f(0.015)*step(min(gf.x,gf.y),0.015)*max(0.0,1.0-bl*100.0);
  let gc=abs(fract(p*10.0)-vec2f(0.5));
  c+=vec3f(0.025)*step(min(gc.x,gc.y),0.02)*max(0.0,1.0-bl*10.0);
  c=max(c,cell(p,vec2f(0.0),0.06,vec3f(0.1,0.9,0.2),bl));
  c=max(c,nuc(p,vec2f(0.008,0.005),0.018,vec3f(0.2,1.0,0.4),bl));
  c=max(c,cell(p,vec2f(0.15,0.08),0.04,vec3f(0.9,0.15,0.1),bl));
  c=max(c,nuc(p,vec2f(0.155,0.084),0.012,vec3f(1.0,0.3,0.2),bl));
  c=max(c,cell(p,vec2f(-0.1,0.12),0.05,vec3f(0.15,0.3,1.0),bl));
  c=max(c,nuc(p,vec2f(-0.095,0.115),0.015,vec3f(0.3,0.5,1.0),bl));
  c=max(c,cell(p,vec2f(-0.05,-0.1),0.035,vec3f(0.9,0.7,0.1),bl));
  c=max(c,cell(p,vec2f(0.12,-0.06),0.045,vec3f(0.1,0.8,0.9),bl));
  c=max(c,nuc(p,vec2f(0.125,-0.055),0.013,vec3f(0.2,0.9,1.0),bl));
  c=max(c,cell(p,vec2f(-0.14,-0.05),0.03,vec3f(0.8,0.2,0.8),bl));
  c=max(c,cell(p,vec2f(0.08,0.14),0.025,vec3f(1.0,0.6,0.1),bl));
  return c;
}

@vertex fn vs(@builtin(vertex_index) v:u32)->@builtin(position) vec4f{
  let p=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
  return vec4f(p[v],0,1);
}

@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let uv=(fc.xy-u.res*0.5)/u.res.y;

  // Telecentric camera at intermediate image plane (negate uv for upright image)
  var ro=vec3f(-uv*u.fn_h*2.0, u.zi);
  var rd=vec3f(0.0, 0.0, -1.0);
  var tr=1.0;

  // ── Tube lens (thin lens at z_tube) ──
  let t1=(u.z_tube-ro.z)/rd.z;
  ro=ro+rd*t1;
  let h1=ro.xy; let r1=length(h1);
  tr*=smoothstep(u.ap_tube, u.ap_tube*0.82, r1);
  if(r1<u.ap_tube){
    let sl=vec2f(rd.x,rd.y)/(-rd.z);
    let sn=sl - h1/u.f_tube;
    rd=normalize(vec3f(sn, -1.0));
  }

  // ── Objective (thin lens at z_obj) ──
  if(tr>0.01){
    let t2=(u.z_obj-ro.z)/rd.z;
    if(t2>0.0){
      ro=ro+rd*t2;
      let h2=ro.xy; let r2=length(h2);
      tr*=smoothstep(u.ap_obj, u.ap_obj*0.8, r2);
      if(r2<u.ap_obj){
        let sl=vec2f(rd.x,rd.y)/(-rd.z);
        let sn=sl - h2/u.f_obj;
        rd=normalize(vec3f(sn, -1.0));
      }else{ tr=0.0; }
    }
  }

  // ── Sample plane (z=0 is perfect focus, foc offsets it) ──
  var col=vec3f(0.0);
  if(tr>0.01){
    let zs=u.foc;
    let t3=(zs-ro.z)/rd.z;
    if(t3>0.0){
      let sp=ro+rd*t3;
      let blur=abs(u.foc)*u.na*3.0;
      col=specimen(sp.xy - u.pan, blur)*tr;
    }
  }

  // Circular eyepiece field stop
  let mask=smoothstep(0.50, 0.47, length(uv));
  col*=mask;
  col=pow(max(col,vec3f(0.0)),vec3f(0.4545));
  return vec4f(col,1.0);
}
`;

/* ── Optical chain diagram (2D canvas) ── */
function dLens(x,y,hw,hh,col){
  dc.fillStyle=col+'20'; dc.strokeStyle=col+'90'; dc.lineWidth=1.5;
  dc.beginPath(); dc.moveTo(x,y-hh);
  dc.quadraticCurveTo(x+hw,y,x,y+hh);
  dc.quadraticCurveTo(x-hw,y,x,y-hh);
  dc.fill(); dc.stroke();
}
function drawDiag(){
  const W=diag.width, H=diag.height; dc.clearRect(0,0,W,H);
  const cy=H*0.48, pad=W*0.06, ax=W-pad*2;
  const o=OBJ[objIdx];
  const tot=F_TUBE+GAP+o.f_obj+2;
  const xI=pad, xT=pad+(F_TUBE/tot)*ax, xO=pad+((F_TUBE+GAP)/tot)*ax;
  const xS=pad+((F_TUBE+GAP+o.f_obj)/tot)*ax;
  const focNorm=cur.foc/(o.dof*15+0.0001);
  const xSf=Math.min(pad+ax, Math.max(xO+10, xS+focNorm*ax*0.02));
  const fs=Math.max(8,H*0.075), oh=H*0.15, rh=oh*0.6;

  // optical axis
  dc.strokeStyle='rgba(255,255,255,0.08)'; dc.lineWidth=1;
  dc.setLineDash([3,3]);
  dc.beginPath(); dc.moveTo(xI,cy); dc.lineTo(xSf,cy); dc.stroke();
  dc.setLineDash([]);

  // rays: diverge from sample → collimate after objective → converge after tube → image
  [0.35,-0.35,0.15,-0.15].forEach((r,i)=>{
    dc.strokeStyle=o.color+(i<2?'28':'15'); dc.lineWidth=1;
    dc.beginPath();
    dc.moveTo(xSf,cy);                    // sample point
    dc.lineTo(xO, cy+r*rh);              // objective (diverging)
    dc.lineTo(xT, cy+r*rh);              // infinity space (PARALLEL — key feature)
    dc.lineTo(xI, cy);                    // converge to image
    dc.stroke();
  });

  // infinity label
  dc.fillStyle='rgba(255,255,255,0.12)'; dc.textAlign='center';
  dc.font=(fs*1.2)+'px serif';
  dc.fillText('\u221E',(xT+xO)/2, cy-rh-4);

  // tube lens
  dLens(xT,cy,5,oh*0.65,'#667');
  // objective
  const omag=Math.sqrt(o.na)*1.4;
  dLens(xO,cy,3+omag*4, oh*(0.3+omag*0.5), o.color);
  // image plane marker
  dc.strokeStyle='#666'; dc.lineWidth=1;
  dc.beginPath(); dc.moveTo(xI,cy-oh*0.5); dc.lineTo(xI,cy+oh*0.5); dc.stroke();
  // sample line + ticks
  dc.strokeStyle='#6a6'; dc.lineWidth=2;
  dc.beginPath(); dc.moveTo(xSf,cy-oh*0.8); dc.lineTo(xSf,cy+oh*0.8); dc.stroke();
  dc.lineWidth=1;
  for(let i=-2;i<=2;i++){const ty=cy+i*oh*0.3;
    dc.beginPath(); dc.moveTo(xSf-3,ty); dc.lineTo(xSf+3,ty); dc.stroke();}

  // labels
  dc.textAlign='center'; dc.font=fs+'px monospace';
  const ly=cy+oh+fs+4;
  dc.fillStyle='rgba(255,255,255,0.3)'; dc.fillText('Image',xI,ly);
  dc.fillText('Tube',xT,ly);
  dc.fillStyle=o.color; dc.fillText(o.label,xO,ly);
  dc.fillStyle='#6a6'; dc.fillText('Sample',xSf,ly);
  // focal lengths
  dc.font=(fs*0.65)+'px monospace'; dc.fillStyle='rgba(255,255,255,0.18)';
  dc.fillText('f='+(o.f_obj*10).toFixed(0)+'mm',xO,cy-oh-2);
  dc.fillText('f=200mm',xT,cy-oh*0.6-2);
  // NA
  dc.fillStyle='rgba(255,255,255,0.22)';
  dc.fillText('NA '+o.na.toFixed(2),xO,ly+fs*0.8);
  // focus offset
  dc.fillStyle='rgba(255,255,255,0.15)'; dc.font=(fs*0.7)+'px monospace';
  const fu=cur.foc*10000;
  dc.fillText('\u0394f '+(fu>=0?'+':'')+fu.toFixed(1)+'\u03BCm', xSf, cy+oh*0.8+fs+2);
}

/* ── WebGPU ── */
async function init(){
  if(!navigator.gpu){document.getElementById('err').style.display='flex';return;}
  const adapter=await navigator.gpu.requestAdapter();
  if(!adapter){document.getElementById('err').style.display='flex';return;}
  const device=await adapter.requestDevice();
  const ctx=canvas.getContext('webgpu');
  const fmt=navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({device,format:fmt,alphaMode:'opaque'});
  let w,h;
  function resize(){
    const d=Math.min(devicePixelRatio,1.5);
    w=canvas.clientWidth*d|0; h=canvas.clientHeight*d|0;
    canvas.width=w; canvas.height=h;
    const dd=Math.min(devicePixelRatio,2);
    diag.width=diag.clientWidth*dd|0; diag.height=diag.clientHeight*dd|0;
  }
  resize(); addEventListener('resize',resize);
  const ub=device.createBuffer({size:256,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const mod=device.createShaderModule({code:shader});
  const ci=await mod.getCompilationInfo();
  const errs=ci.messages.filter(m=>m.type==='error');
  if(errs.length){const el=document.getElementById('err');
    el.textContent='Shader: '+errs.map(m=>'L'+m.lineNum+': '+m.message).join(' | ');
    el.style.display='flex';return;}
  let pipe;
  try{pipe=await device.createRenderPipelineAsync({layout:'auto',
    vertex:{module:mod,entryPoint:'vs'},
    fragment:{module:mod,entryPoint:'fs',targets:[{format:fmt}]},
    primitive:{topology:'triangle-list'}});}
  catch(e){document.getElementById('err').textContent='Pipeline: '+e.message;
    document.getElementById('err').style.display='flex';return;}
  const bg=device.createBindGroup({layout:pipe.getBindGroupLayout(0),
    entries:[{binding:0,resource:{buffer:ub}}]});

  /* ── Input ── */
  const ptrs=new Map(); let ds=null, pinchD0=0, focAtPinch=0;
  canvas.addEventListener('pointerdown',e=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    canvas.setPointerCapture(e.pointerId);
    if(ptrs.size===1){ds={x:e.clientX,y:e.clientY,px,py};}
    if(ptrs.size===2){ds=null;
      const[a,b]=[...ptrs.values()];
      pinchD0=Math.hypot(a.x-b.x,a.y-b.y); focAtPinch=focTgt;}
  });
  canvas.addEventListener('pointermove',e=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1&&ds){
      const o=OBJ[objIdx], s=0.0003*o.fov;
      px=ds.px+(e.clientX-ds.x)*s; py=ds.py+(e.clientY-ds.y)*s;}
    if(ptrs.size>=2){const vs=[...ptrs.values()];
      const d=Math.hypot(vs[0].x-vs[1].x,vs[0].y-vs[1].y);
      const o=OBJ[objIdx], sens=o.dof*0.02;
      focTgt=Math.max(-o.dof*15,Math.min(o.dof*15, focAtPinch+(pinchD0-d)*sens));}
  });
  canvas.addEventListener('pointerup',e=>{ptrs.delete(e.pointerId);ds=null;});
  canvas.addEventListener('pointercancel',e=>{ptrs.delete(e.pointerId);ds=null;});
  canvas.addEventListener('wheel',e=>{e.preventDefault();
    const o=OBJ[objIdx];
    focTgt=Math.max(-o.dof*15,Math.min(o.dof*15,focTgt+e.deltaY*o.dof*0.005));
  },{passive:false});

  /* ── Render loop ── */
  function frame(ts){
    requestAnimationFrame(frame);
    const o=OBJ[objIdx], lr=0.07;
    cur.f_obj+=(o.f_obj-cur.f_obj)*lr; cur.z_obj+=(o.z_obj-cur.z_obj)*lr;
    cur.z_tube+=(o.z_tube-cur.z_tube)*lr; cur.z_image+=(o.z_image-cur.z_image)*lr;
    cur.ap_obj+=(o.ap_obj-cur.ap_obj)*lr; cur.na+=(o.na-cur.na)*lr;
    cur.foc+=(focTgt-cur.foc)*0.1;
    focEl.textContent=o.label+' \u00B7 NA '+o.na.toFixed(2)+' \u00B7 FOV '+(o.fov*10).toFixed(1)+'mm';
    drawDiag();
    const pb=new Float32Array(16);
    pb[0]=w; pb[1]=h; pb[2]=ts*0.001; pb[3]=cur.foc;
    pb[4]=px; pb[5]=py; pb[6]=cur.f_obj; pb[7]=F_TUBE;
    pb[8]=cur.z_tube; pb[9]=cur.z_obj; pb[10]=cur.ap_obj; pb[11]=AP_TUBE;
    pb[12]=cur.na; pb[13]=cur.z_image; pb[14]=FN_H; pb[15]=0;
    device.queue.writeBuffer(ub,0,pb);
    const enc=device.createCommandEncoder();
    const pass=enc.beginRenderPass({colorAttachments:[{
      view:ctx.getCurrentTexture().createView(),loadOp:'clear',storeOp:'store',
      clearValue:{r:0,g:0,b:0,a:1}}]});
    pass.setPipeline(pipe); pass.setBindGroup(0,bg); pass.draw(3); pass.end();
    device.queue.submit([enc.finish()]);
  }
  requestAnimationFrame(frame);
}
init();
</script>
</body>
</html>
