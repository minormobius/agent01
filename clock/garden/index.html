<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fluoddity garden — a collaborative menagerie</title>
<meta name="description" content="A branching, ATProto-backed gallery of Fluoddity organisms. Every creature is a record on its author's PDS; fork one in the playground and your version grows a new branch of the tree.">
<style>
:root {
  --bg: #050608; --panel: rgba(14,16,20,0.82); --panel-solid: #0e1014;
  --fg: #e7e9ee; --muted: #8b909c; --rule: #23272f;
  --accent: #38e1c0; --accent-dim: rgba(56,225,192,0.16);
  --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--mono); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

#topbar {
  position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 14px;
  padding: 12px 16px; background: rgba(5,6,8,0.85); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule);
}
.crumb { color: var(--muted); font-size: 13px; }
.crumb:hover { color: var(--accent); }
.title { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; }
.title b { color: var(--accent); }
.spacer { flex: 1; }
.pill { background: var(--panel-solid); border: 1px solid var(--rule); border-radius: 7px; padding: 6px 10px; font-size: 12px; color: var(--fg); }
.pill:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

#status { padding: 14px 16px; color: var(--muted); font-size: 12px; }

#grid {
  display: grid; gap: 14px; padding: 16px;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
}
.card {
  position: relative; background: #000; border: 1px solid var(--rule); border-radius: 12px;
  overflow: hidden; cursor: pointer; aspect-ratio: 1; transition: border-color 0.15s, transform 0.1s;
}
.card:hover { border-color: var(--accent); transform: translateY(-2px); }
.card canvas { display: block; width: 100%; height: 100%; background: #000; }
.card .cap {
  position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 10px 8px;
  background: linear-gradient(0deg, rgba(0,0,0,0.85), rgba(0,0,0,0));
  pointer-events: none;
}
.card .nm { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .au { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .branch { position: absolute; top: 8px; right: 8px; font-size: 10px; color: var(--accent); background: rgba(0,0,0,0.5); border-radius: 6px; padding: 2px 6px; }

#loadmore { display: block; margin: 8px auto 40px; }
.btn { background: var(--panel-solid); color: var(--fg); border: 1px solid var(--rule); border-radius: 8px; padding: 9px 16px; font-family: var(--mono); font-size: 12px; cursor: pointer; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

#modal { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.78); backdrop-filter: blur(5px); padding: 20px; }
#modal.show { display: flex; }
#modal .card2 { background: var(--panel-solid); border: 1px solid var(--rule); border-radius: 14px; width: 560px; max-width: 100%; max-height: calc(100vh - 40px); overflow-y: auto; padding: 0; }
#modal .pv { width: 100%; aspect-ratio: 1; background: #000; display: block; border-radius: 14px 14px 0 0; }
#modal .body { padding: 16px 20px 20px; }
#modal h2 { margin: 0 0 2px; font-size: 18px; }
#modal .sub { color: var(--muted); font-size: 12px; margin: 0 0 14px; }
#modal .row { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
#modal h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin: 16px 0 6px; }
.chip { display: inline-flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--rule); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--fg); cursor: pointer; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.root { color: var(--muted); cursor: default; }
#modal .close { position: absolute; top: 26px; right: 26px; background: rgba(0,0,0,0.5); border: 1px solid var(--rule); color: var(--fg); border-radius: 8px; padding: 4px 9px; cursor: pointer; font-family: var(--mono); }
.muted { color: var(--muted); }
.fatal { padding: 40px 16px; text-align: center; color: var(--muted); line-height: 1.6; }

#profile { display: flex; gap: 16px; align-items: center; padding: 20px 16px; border-bottom: 1px solid var(--rule); }
#profile .pfp { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; background: #1a1d22; flex: none; }
#profile .pinfo h1 { margin: 4px 0 0; font-size: 20px; }
#profile .pinfo .h { color: var(--muted); font-size: 13px; margin: 2px 0; }
#profile .pinfo .d { font-size: 12px; color: var(--fg); margin-top: 6px; max-width: 60ch; line-height: 1.5; opacity: 0.9; }
.card .arow { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.card .av { width: 14px; height: 14px; border-radius: 50%; object-fit: cover; background: #2a2e36; flex: none; }
.card .au { pointer-events: auto; }
.card .au:hover { color: var(--accent); }
</style>
</head>
<body>
<div id="topbar">
  <a class="crumb" href="https://mino.mobi/">← mino.mobi</a>
  <span class="title"><b>fluoddity</b> garden</span>
  <span class="spacer"></span>
  <a class="pill" href="./breed.html">breeder ↗</a>
  <a class="pill" href="./metrics.html">phylogeny ↗</a>
  <a class="pill" href="../fluoddity/">+ new organism</a>
</div>

<div id="profile" style="display:none;"></div>
<div id="status">loading the menagerie…</div>
<div id="grid"></div>
<button class="btn" id="loadmore" style="display:none;">load more</button>

<div id="modal">
  <div class="card2" style="position:relative;">
    <button class="close" id="modal-close">✕</button>
    <canvas class="pv" id="modal-pv" width="480" height="480"></canvas>
    <div class="body">
      <h2 id="modal-name"></h2>
      <p class="sub" id="modal-author"></p>
      <div class="row">
        <a class="btn primary" id="modal-open" href="#" target="_blank" rel="noopener">branch in playground →</a>
      </div>
      <div id="modal-parent-wrap" style="display:none;"><h3>branched from</h3><div class="row" id="modal-parent"></div></div>
      <div id="modal-children-wrap" style="display:none;"><h3>branches</h3><div class="row" id="modal-children"></div></div>
    </div>
  </div>
</div>

<script type="module">
"use strict";
import { FluoddityEngine } from './engine.js';

const COLLECTION = 'com.minomobi.fluoddity.organism';
const ANCHOR = 'did:web:g.mino.mobi';
const CONSTELLATION = 'https://constellation.microcosm.blue';
const BSKY = 'https://public.api.bsky.app';
const PLAYGROUND = '../fluoddity/';

const $ = (id) => document.getElementById(id);
const gridEl = $('grid'), statusEl = $('status'), moreBtn = $('loadmore');

// ── engine (shared, offscreen) ───────────────────────────────────────────────
let engine = null;
try { engine = new FluoddityEngine(360, 40000); }
catch (e) {
  statusEl.outerHTML = `<div class="fatal"><b>Previews need WebGL2 with float render targets.</b><br>${e.message}<br><br>The gallery list still loads below, just without live previews.</div>`;
}

// ── identity + record helpers ────────────────────────────────────────────────
const pdsCache = {}, profCache = {};
async function resolvePds(did) {
  if (pdsCache[did] !== undefined) return pdsCache[did];
  let doc = null;
  try {
    if (did.startsWith('did:web:')) {
      const host = decodeURIComponent(did.slice(8)).split(':')[0];
      doc = await (await fetch(`https://${host}/.well-known/did.json`)).json();
    } else {
      doc = await (await fetch(`https://plc.directory/${encodeURIComponent(did)}`)).json();
    }
  } catch { /* unresolvable */ }
  const svc = doc && (doc.service || []).find(s => s.id.endsWith('atproto_pds') || s.type === 'AtprotoPersonalDataServer');
  pdsCache[did] = (svc && svc.serviceEndpoint) || null;
  return pdsCache[did];
}
async function getRecord(did, rkey) {
  const pds = await resolvePds(did);
  if (!pds) throw new Error('no PDS');
  const r = await fetch(`${pds}/xrpc/com.atproto.repo.getRecord?repo=${encodeURIComponent(did)}&collection=${COLLECTION}&rkey=${encodeURIComponent(rkey)}`);
  if (!r.ok) throw new Error('getRecord ' + r.status);
  return r.json();
}
async function getProfile(did) {
  if (profCache[did] !== undefined) return profCache[did];
  try { const r = await fetch(`${BSKY}/xrpc/app.bsky.actor.getProfile?actor=${encodeURIComponent(did)}`); profCache[did] = r.ok ? await r.json() : null; }
  catch { profCache[did] = null; }
  return profCache[did];
}
function parseConfig(value) {
  let c = value && value.config;
  if (typeof c === 'string') { try { c = JSON.parse(c); } catch { c = null; } }
  return c;
}
function parseAtUri(uri) { const p = String(uri).replace(/^at:\/\//, '').split('/'); return { did: p[0], collection: p[1], rkey: p[2] }; }

// ── Constellation enumeration ────────────────────────────────────────────────
async function links(target, path, limit = 100, cursor = null) {
  const params = new URLSearchParams({ target, collection: COLLECTION, path, limit: String(limit) });
  if (cursor) params.set('cursor', cursor);
  const r = await fetch(`${CONSTELLATION}/links?${params}`);
  if (!r.ok) return { linking_records: [], cursor: null, total: 0 };
  const j = await r.json();
  return { linking_records: j.linking_records || [], cursor: j.cursor || null, total: j.total || 0 };
}

// ── preview scheduler ────────────────────────────────────────────────────────
const cards = [];
let hovered = null, modalCard = null;
const SETTLE_STEPS = 520;
const io = ('IntersectionObserver' in window) ? new IntersectionObserver((ents) => {
  for (const en of ents) { const c = en.target.__card; if (c && en.isIntersecting && !c.settled && !queue.includes(c)) queue.push(c); }
}, { rootMargin: '300px' }) : null;
let queue = [];

function blit(srcCanvas, card) {
  if (!card || !card.ctx) return;
  try { card.ctx.drawImage(srcCanvas, 0, 0, card.canvas.width, card.canvas.height); } catch {}
}
function loop() {
  if (engine) {
    try {
      const focus = modalCard || hovered;
      if (focus) {
        const key = 'live:' + focus.uri;
        if (engine.currentKey !== key) engine.load(focus.config, key);
        engine.step(8); engine.render(); blit(engine.cv, focus);
      } else if (queue.length) {
        const c = queue[0];
        if (engine.currentKey !== c.uri) { engine.load(c.config, c.uri); c.steps = 0; }
        engine.step(40); c.steps = (c.steps || 0) + 40; engine.render(); blit(engine.cv, c);
        if (c.steps >= SETTLE_STEPS) { c.settled = true; queue.shift(); }
      }
    } catch (e) { console.warn('preview loop', e); }
  }
  requestAnimationFrame(loop);
}
if (engine) requestAnimationFrame(loop);

// ── card rendering ───────────────────────────────────────────────────────────
function makeCard(rec) {
  const { did, rkey } = parseAtUri(rec.uri);
  const config = parseConfig(rec.value);
  const el = document.createElement('div');
  el.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 300;
  const ctx = canvas.getContext('2d');
  const cap = document.createElement('div'); cap.className = 'cap';
  const nm = document.createElement('div'); nm.className = 'nm'; nm.textContent = (rec.value && rec.value.name) || 'untitled';
  const arow = document.createElement('div'); arow.className = 'arow';
  const av = document.createElement('img'); av.className = 'av'; av.alt = '';
  const au = document.createElement('span'); au.className = 'au'; au.textContent = did.slice(0, 16) + '…'; au.title = "see this author's garden";
  au.addEventListener('click', (e) => { e.stopPropagation(); location.href = '?author=' + encodeURIComponent(did); });
  arow.append(av, au); cap.append(nm, arow); el.append(canvas, cap);
  const card = { uri: rec.uri, did, rkey, config, value: rec.value, el, canvas, ctx, settled: false, steps: 0, nmEl: nm, auEl: au };
  el.__card = card;

  if (rec.value && rec.value.parent) {
    const b = document.createElement('div'); b.className = 'branch'; b.textContent = '⑂'; b.title = 'a branch'; el.append(b);
  }
  el.addEventListener('pointerenter', () => { if (config) hovered = card; });
  el.addEventListener('pointerleave', () => { if (hovered === card) { hovered = null; card.settled = true; } });
  el.addEventListener('click', () => openModal(card));

  cards.push(card);
  gridEl.append(el);
  if (io && config) io.observe(el);
  if (config) { canvas.__placeholder = true; }
  else { ctx.fillStyle = '#1a1d22'; ctx.fillRect(0, 0, 300, 300); nm.textContent += ' (unreadable)'; }

  // fill author handle + avatar lazily
  getProfile(did).then(p => { if (p) { au.textContent = '@' + p.handle; if (p.avatar) av.src = p.avatar; } });
  return card;
}

// ── lineage modal ────────────────────────────────────────────────────────────
const modal = $('modal'), modalPv = $('modal-pv'), modalPvCtx = modalPv.getContext('2d');
function openModal(card) {
  modalCard = card ? { uri: card.uri, config: card.config, canvas: modalPv, ctx: modalPvCtx } : null;
  $('modal-name').textContent = (card.value && card.value.name) || 'untitled';
  getProfile(card.did).then(p => { $('modal-author').textContent = p ? 'by @' + p.handle : 'by ' + card.did.slice(0, 24) + '…'; });
  const ma = $('modal-author'); ma.style.cursor = 'pointer'; ma.title = "see this author's garden";
  ma.onclick = () => { location.href = '?author=' + encodeURIComponent(card.did); };
  $('modal-open').href = `${PLAYGROUND}?o=${card.did}/${card.rkey}`;
  modalPvCtx.clearRect(0, 0, modalPv.width, modalPv.height);
  modal.classList.add('show');
  // parent
  const pWrap = $('modal-parent-wrap'), pRow = $('modal-parent');
  pRow.innerHTML = '';
  if (card.value && card.value.parent) {
    pWrap.style.display = '';
    const { did, rkey } = parseAtUri(card.value.parent);
    const chip = document.createElement('span'); chip.className = 'chip'; chip.textContent = 'loading…';
    pRow.append(chip);
    getRecord(did, rkey).then(r => {
      chip.textContent = '⑂ ' + ((r.value && r.value.name) || 'parent');
      chip.onclick = () => openModal(recToCard(r));
    }).catch(() => { chip.textContent = 'parent (unavailable)'; chip.classList.add('root'); });
  } else { pWrap.style.display = 'none'; }
  // children
  const cWrap = $('modal-children-wrap'), cRow = $('modal-children');
  cWrap.style.display = 'none'; cRow.innerHTML = '';
  links(card.uri, '.parent', 50).then(async (res) => {
    if (!res.linking_records.length) return;
    cWrap.style.display = '';
    for (const lr of res.linking_records.slice(0, 24)) {
      const chip = document.createElement('span'); chip.className = 'chip'; chip.textContent = 'loading…'; cRow.append(chip);
      try { const r = await getRecord(lr.did, lr.rkey); chip.textContent = '⑂ ' + ((r.value && r.value.name) || 'branch'); chip.onclick = () => openModal(recToCard(r)); }
      catch { chip.textContent = 'branch'; chip.classList.add('root'); }
    }
  });
}
function recToCard(r) { const { did, rkey } = parseAtUri(r.uri); return { uri: r.uri, did, rkey, value: r.value, config: parseConfig(r.value) }; }
function closeModal() { modal.classList.remove('show'); modalCard = null; }
$('modal-close').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

// ── load ─────────────────────────────────────────────────────────────────────
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

async function listRecords(did, cur) {
  const pds = await resolvePds(did);
  if (!pds) throw new Error('no PDS');
  const u = new URL(pds + '/xrpc/com.atproto.repo.listRecords');
  u.searchParams.set('repo', did); u.searchParams.set('collection', COLLECTION); u.searchParams.set('limit', '100');
  if (cur) u.searchParams.set('cursor', cur);
  const r = await fetch(u);
  if (!r.ok) throw new Error('listRecords ' + r.status);
  return r.json();
}

let cursor = null, loading = false, total = 0;
async function loadGallery() {
  if (loading) return;
  loading = true; moreBtn.disabled = true;
  try {
    const res = await links(ANCHOR, '.gallery', 60, cursor);
    cursor = res.cursor; total = res.total;
    if (!res.linking_records.length && cards.length === 0) {
      statusEl.textContent = 'No organisms yet. Make one in the playground, sign in, and save it — it shows up here.';
      moreBtn.style.display = 'none'; return;
    }
    // hydrate (bounded concurrency), newest first by rkey
    const recs = [];
    const list = res.linking_records.slice();
    const CONC = 6;
    await Promise.all(Array.from({ length: CONC }, async () => {
      while (list.length) {
        const lr = list.shift();
        try { recs.push(await getRecord(lr.did, lr.rkey)); } catch { /* skip unreadable */ }
      }
    }));
    recs.sort((a, b) => (parseAtUri(b.uri).rkey).localeCompare(parseAtUri(a.uri).rkey));
    for (const r of recs) makeCard(r);
    statusEl.textContent = `${cards.length} organism${cards.length === 1 ? '' : 's'}${total ? ` of ${total}` : ''} · hover to bring one to life, click for its lineage`;
    moreBtn.style.display = cursor ? 'block' : 'none';
  } catch (e) {
    statusEl.textContent = 'Could not reach the index: ' + (e.message || e);
  } finally {
    loading = false; moreBtn.disabled = false;
  }
}

// Profile mode: one author's organisms, read straight from their PDS
// (immediate — no Constellation index lag, and catches pre-anchor records).
async function initProfile(actor) {
  document.getElementById('topbar').querySelector('.pill').setAttribute('href', '../fluoddity/');
  const prof = await getProfile(actor);
  if (!prof || !prof.did) { statusEl.textContent = `Couldn't find "${actor}".`; return; }
  const did = prof.did;
  const pf = $('profile'); pf.style.display = '';
  pf.innerHTML =
    (prof.avatar ? `<img class="pfp" src="${escapeHtml(prof.avatar)}" alt="">` : '<div class="pfp"></div>') +
    `<div class="pinfo"><a class="crumb" href="./">← all organisms</a>` +
    `<h1>${escapeHtml(prof.displayName || prof.handle)}</h1>` +
    `<div class="h">@${escapeHtml(prof.handle)}</div>` +
    (prof.description ? `<div class="d">${escapeHtml(prof.description)}</div>` : '') + `</div>`;
  document.title = `@${prof.handle} — fluoddity garden`;
  let cur = null; const recs = [];
  try {
    do { const page = await listRecords(did, cur); recs.push(...(page.records || [])); cur = page.cursor; } while (cur && recs.length < 300);
  } catch (e) { statusEl.textContent = 'Could not read that PDS: ' + (e.message || e); return; }
  recs.sort((a, b) => (parseAtUri(b.uri).rkey).localeCompare(parseAtUri(a.uri).rkey));
  for (const r of recs) makeCard(r);
  statusEl.textContent = recs.length
    ? `${recs.length} organism${recs.length === 1 ? '' : 's'} by @${prof.handle} · hover to animate, click for lineage`
    : `@${prof.handle} hasn't grown any organisms yet.`;
}

const _author = new URLSearchParams(location.search).get('author');
if (_author) {
  initProfile(_author);
} else {
  moreBtn.addEventListener('click', loadGallery);
  loadGallery();
}
</script>
</body>
</html>
