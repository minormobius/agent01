<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>G — WebGPU Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
canvas{display:block;width:100%;height:100%;cursor:crosshair}
#label{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;
  color:#fff;font:bold 24px monospace;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2;
  text-shadow:0 0 20px currentColor}
#sublabel{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);text-align:center;
  color:rgba(255,255,255,0.45);font:12px monospace;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:2}
#crosshair{position:fixed;top:50%;left:50%;width:6px;height:6px;margin:-3px 0 0 -3px;
  border:1px solid rgba(255,255,255,0.25);border-radius:50%;pointer-events:none;z-index:2;
  transition:border-color 0.2s,box-shadow 0.2s}
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);
  font:11px monospace;pointer-events:none;z-index:2;transition:opacity 2s}
#noGPU{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  color:#f88;font:18px monospace;text-align:center;padding:20px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="label"></div>
<div id="sublabel"></div>
<div id="hint">drag to look around · tap to enter</div>
<div id="noGPU">WebGPU not available.<br>Try Chrome 121+ or Safari 18+.</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const P = [
  ['CLOCK','./helix/','Helix Calendar','#fc3'],
  ['MOL','./mol/','Molecular Dynamics','#3ce'],
  ['CORN','./corn/','Pop the Torus','#fb1'],
  ['STRETCH','./stretch/','Grab & Stretch','#b5e'],
  ['GLOBE','./globe/','Megaprojects','#38f'],
  ['PAC','./pac/','Torus Pac-Man','#fd0'],
  ['TORPAC','./torpac/','Multi-Torus Pac-Man','#3e6'],
  ['KNOTPAC','./knotpac/','Torus Knots','#e26'],
  ['EMSIM','./emsim/','EM Field Sim','#56f'],
  ['INPAC','./inpac/','Inside the Torus','#f82'],
  ['SCAPE','./scape/','Landscape','#2b5'],
  ['TORUSCHESS','./toruschess/','Torus Chess','#ccd'],
  ['SHIP','./ship/','Sail of the Line','#e9d6a8'],
];
const N=P.length, RAD=5.0, CAM_Y=1.2, SC_Y=1.35;
let yaw=0, pitch=0.12, autoRot=true;

const shader = `
struct Params { res:vec2f, yaw:f32, pitch:f32, time:f32, tgt:f32, _a:f32, _b:f32 }
@group(0) @binding(0) var<uniform> p: Params;

fn sdSphere(q:vec3f,r:f32)->f32{return length(q)-r;}
fn sdBox(q:vec3f,b:vec3f)->f32{let d=abs(q)-b;return length(max(d,vec3f(0.)))+min(max(d.x,max(d.y,d.z)),0.);}
fn sdTorus(q:vec3f,R:f32,r:f32)->f32{return length(vec2f(length(q.xz)-R,q.y))-r;}
fn sdOcta(q:vec3f,s:f32)->f32{let a=abs(q);return(a.x+a.y+a.z-s)*0.577;}
fn sdTetra(q:vec3f,s:f32)->f32{return(max(abs(q.x+q.y)-q.z,abs(q.x-q.y)+q.z)-s)*0.577;}

fn sdIcosa(q:vec3f,r:f32)->f32{
  let phi=1.618034;let a=abs(q);let k=0.57735;
  return max(max((a.x+a.y+a.z)*k,(a.y/phi+a.z*phi)*k),max((a.x/phi+a.y*phi)*k,(a.x*phi+a.z/phi)*k))-r;
}
fn sdDodeca(q:vec3f,r:f32)->f32{
  let phi=1.618034;let a=abs(q);let n=1.0/sqrt(1.0+phi*phi);
  return max(max((a.y+a.z*phi)*n,(a.x+a.y*phi)*n),(a.x*phi+a.z)*n)-r;
}
fn sdCyl(q:vec3f,r:f32,h:f32)->f32{let d=vec2f(length(q.xz)-r,abs(q.y)-h);return min(max(d.x,d.y),0.)+length(max(d,vec2f(0.)));}
fn sdCapsule(q:vec3f,h:f32,r:f32)->f32{return length(vec3f(q.x,q.y-clamp(q.y,-h,h),q.z))-r;}
fn sdHex(q:vec3f,r:f32,h:f32)->f32{let a=abs(q);return max(max(a.x*0.866+a.z*0.5,a.z)-r,a.y-h);}
fn sdStar(q:vec3f,s:f32)->f32{
  let k=0.577;
  return min((max(abs(q.x+q.y)-q.z,abs(q.x-q.y)+q.z)-s)*k,
             (max(abs(q.x+q.y)+q.z,abs(q.x-q.y)-q.z)-s)*k);
}
fn sdRBox(q:vec3f,b:f32,r:f32)->f32{let d=abs(q)-vec3f(b);return length(max(d,vec3f(0.)))+min(max(d.x,max(d.y,d.z)),0.)-r;}

fn rotY(a:f32)->mat3x3f{let c=cos(a);let s=sin(a);return mat3x3f(vec3f(c,0,s),vec3f(0,1,0),vec3f(-s,0,c));}
fn rotX(a:f32)->mat3x3f{let c=cos(a);let s=sin(a);return mat3x3f(vec3f(1,0,0),vec3f(0,c,-s),vec3f(0,s,c));}

fn sculptSDF(q:vec3f,id:i32)->f32{
  switch(id){
    case 0:{return sdDodeca(q,0.42);}case 1:{return sdIcosa(q,0.42);}
    case 2:{return sdTorus(q,0.28,0.11);}case 3:{return sdOcta(q,0.42);}
    case 4:{return sdSphere(q,0.38);}case 5:{return sdBox(q,vec3f(0.3));}
    case 6:{return sdTetra(q,0.48);}case 7:{return sdStar(q,0.32);}
    case 8:{return sdCapsule(q,0.18,0.18);}case 9:{return sdCyl(q,0.22,0.28);}
    case 10:{return sdHex(q,0.32,0.28);}case 11:{return sdRBox(q,0.28,0.05);}
    default:{return 1e3;}
  }
}
fn sculptCol(id:i32)->vec3f{
  switch(id){
    case 0:{return vec3f(1.0,0.8,0.2);}case 1:{return vec3f(0.2,0.8,0.9);}
    case 2:{return vec3f(1.0,0.7,0.1);}case 3:{return vec3f(0.7,0.33,0.9);}
    case 4:{return vec3f(0.2,0.53,1.0);}case 5:{return vec3f(1.0,0.87,0.0);}
    case 6:{return vec3f(0.2,0.9,0.4);}case 7:{return vec3f(0.9,0.13,0.4);}
    case 8:{return vec3f(0.33,0.4,1.0);}case 9:{return vec3f(1.0,0.5,0.13);}
    case 10:{return vec3f(0.13,0.73,0.33);}case 11:{return vec3f(0.8,0.8,0.87);}
    default:{return vec3f(1.0);}
  }
}

fn scene(pos:vec3f)->vec2f{
  var d=pos.y; var id=-1.0;
  for(var i=0;i<12;i++){
    let ang=f32(i)*0.5236+1.5708;
    let cx=cos(ang)*5.0; let cz=sin(ang)*5.0;
    let toC=pos-vec3f(cx,0.7,cz);
    if(dot(toC,toC)>5.0){continue;}
    let pp=pos-vec3f(cx,0.45,cz);
    let pedD=sdBox(pp,vec3f(0.3,0.45,0.3));
    if(pedD<d){d=pedD;id=-2.0;}
    let bob=sin(p.time*1.2+f32(i)*0.7)*0.05;
    let sp=pos-vec3f(cx,1.35+bob,cz);
    let spin=p.time*(0.3+f32(i%3)*0.15)+f32(i)*0.5;
    let a1=ang+1.5708;
    let rsp=rotY(a1-spin)*rotX(-0.7)*rotY(-a1)*sp;
    let sD=sculptSDF(rsp,i);
    if(sD<d){d=sD;id=f32(i);}
  }
  return vec2f(d,id);
}

fn sceneD(pos:vec3f)->f32{return scene(pos).x;}
fn calcN(pos:vec3f)->vec3f{
  let e=vec2f(0.001,0.0);
  return normalize(vec3f(sceneD(pos+e.xyy)-sceneD(pos-e.xyy),sceneD(pos+e.yxy)-sceneD(pos-e.yxy),sceneD(pos+e.yyx)-sceneD(pos-e.yyx)));
}

fn march(ro:vec3f,rd:vec3f)->vec3f{
  var t=0.0;var id=-1.0;
  for(var i=0;i<72;i++){
    let res=scene(ro+rd*t);
    if(res.x<0.002){id=res.y;break;}
    if(t>25.0){break;}
    t+=res.x;
  }
  return vec3f(t,id,select(0.0,1.0,t<25.0));
}

@vertex fn vs(@builtin(vertex_index) vid:u32)->@builtin(position) vec4f{
  let pos=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
  return vec4f(pos[vid],0,1);
}

@fragment fn fs(@builtin(position) fc:vec4f)->@location(0) vec4f{
  let uv=(fc.xy-p.res*0.5)/p.res.y;
  let cy=cos(p.yaw);let sy=sin(p.yaw);let cp=cos(p.pitch);let sp=sin(p.pitch);
  let fwd=vec3f(sy*cp,sp,cy*cp);
  let right=vec3f(cy,0.0,-sy);
  let up=cross(fwd,right);
  let ro=vec3f(0.0,1.2,0.0);
  let rd=normalize(fwd+right*uv.x*1.2+up*uv.y*1.2);

  let hit=march(ro,rd);
  if(hit.z<0.5){
    let sky=max(rd.y,0.0)*0.12;
    var sc=vec3f(0.008+sky*0.15,0.008+sky*0.1,0.02+sky);
    sc=pow(max(sc,vec3f(0.0)),vec3f(0.4545));
    return vec4f(sc,1.0);
  }

  let pos=ro+rd*hit.x;
  let nor=calcN(pos);
  let id=i32(round(hit.y));
  let sun=normalize(vec3f(0.3,1.0,0.5));
  let diff=max(dot(nor,sun),0.0);
  let viewDir=normalize(ro-pos);
  let spec=pow(max(dot(reflect(-sun,nor),viewDir),0.0),30.0);

  var col:vec3f;
  if(id==-1){
    col=vec3f(0.02,0.02,0.025)*(0.7+diff*0.3);
    let gx=smoothstep(0.92,1.0,abs(sin(pos.x*3.14159)));
    let gz=smoothstep(0.92,1.0,abs(sin(pos.z*3.14159)));
    col+=vec3f(0.008)*max(gx,gz);
    for(var li=0;li<12;li++){
      let la=f32(li)*0.5236+1.5708;
      let lp=vec3f(cos(la)*5.0,1.35,sin(la)*5.0);
      let toL=lp-pos;let d2=dot(toL,toL);
      col+=sculptCol(li)/(1.0+d2*0.12)*0.06;
    }
  }else if(id==-2){
    col=vec3f(0.04,0.04,0.045)*(0.6+diff*0.4)+vec3f(spec*0.02);
  }else{
    let sc=sculptCol(id);
    let fres=pow(1.0-abs(dot(nor,viewDir)),2.5);
    col=sc*0.12+sc*diff*0.35+vec3f(1.0)*spec*0.15+sc*fres*1.2;
    if(p.tgt>=0.0 && id==i32(round(p.tgt))){col+=sc*0.5;}
  }

  let fog=1.0-exp(-hit.x*hit.x*0.004);
  col=mix(col,vec3f(0.003,0.003,0.008),fog);
  col=pow(max(col,vec3f(0.0)),vec3f(0.4545));
  return vec4f(col,1.0);
}
`;

function raySph(ro,rd,cx,cy,cz,r){
  const ox=ro[0]-cx,oy=ro[1]-cy,oz=ro[2]-cz;
  const b=ox*rd[0]+oy*rd[1]+oz*rd[2],c=ox*ox+oy*oy+oz*oz-r*r,d=b*b-c;
  if(d<0)return-1;const t=-b-Math.sqrt(d);return t>0?t:-1;
}
function getTarget(){
  const cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch);
  const rd=[sy*cp,sp,cy*cp];
  let best=-1,bestT=1e9;
  for(let i=0;i<N;i++){
    const a=i*Math.PI*2/N+Math.PI/2;
    const t=raySph([0,CAM_Y,0],rd,Math.cos(a)*RAD,SC_Y,Math.sin(a)*RAD,0.65);
    if(t>0&&t<bestT){bestT=t;best=i;}
  }
  return best;
}

async function init(){
  if(!navigator.gpu){document.getElementById('noGPU').style.display='flex';return;}
  const adapter=await navigator.gpu.requestAdapter();
  if(!adapter){document.getElementById('noGPU').style.display='flex';return;}
  const device=await adapter.requestDevice();
  const ctx=canvas.getContext('webgpu');
  const format=navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({device,format,alphaMode:'opaque'});

  let w,h;
  function resize(){const dpr=Math.min(devicePixelRatio,1);w=canvas.clientWidth*dpr|0;h=canvas.clientHeight*dpr|0;canvas.width=w;canvas.height=h;}
  resize();window.addEventListener('resize',resize);

  const paramBuf=device.createBuffer({size:256,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const module=device.createShaderModule({code:shader});
  const info=await module.getCompilationInfo();
  const errs=info.messages.filter(m=>m.type==='error');
  if(errs.length){
    const el=document.getElementById('noGPU');
    el.textContent='Shader: '+errs.map(m=>'L'+m.lineNum+': '+m.message).join(' | ');
    el.style.display='flex';return;
  }
  let pipeline;
  try{
    pipeline=await device.createRenderPipelineAsync({
      layout:'auto',
      vertex:{module,entryPoint:'vs'},
      fragment:{module,entryPoint:'fs',targets:[{format}]},
      primitive:{topology:'triangle-list'},
    });
  }catch(e){
    console.error('Pipeline:',e);
    document.getElementById('noGPU').textContent='Pipeline failed \u2014 check console';
    document.getElementById('noGPU').style.display='flex';return;
  }
  const bg=device.createBindGroup({layout:pipeline.getBindGroupLayout(0),
    entries:[{binding:0,resource:{buffer:paramBuf}}]});

  let dragging=false,ds=null;
  canvas.addEventListener('pointerdown',e=>{
    dragging=true;ds={x:e.clientX,y:e.clientY,yaw,pitch,moved:false};
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove',e=>{
    if(!dragging||!ds)return;
    const dx=e.clientX-ds.x,dy=e.clientY-ds.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3)ds.moved=true;
    yaw=ds.yaw+dx*0.004;pitch=Math.max(-0.7,Math.min(0.7,ds.pitch-dy*0.004));
    autoRot=false;
  });
  canvas.addEventListener('pointerup',e=>{
    if(ds&&!ds.moved){const idx=getTarget();if(idx>=0)window.location.href=P[idx][1];}
    dragging=false;ds=null;
  });
  canvas.addEventListener('pointercancel',()=>{dragging=false;ds=null;});
  setTimeout(()=>{document.getElementById('hint').style.opacity='0';},4000);

  const labelEl=document.getElementById('label'),subEl=document.getElementById('sublabel'),crossEl=document.getElementById('crosshair');

  function frame(ts){
    requestAnimationFrame(frame);
    if(autoRot)yaw+=0.0008;
    const idx=getTarget();
    if(idx>=0){
      labelEl.textContent=P[idx][0];labelEl.style.color=P[idx][3];labelEl.style.opacity='1';
      subEl.textContent=P[idx][2];subEl.style.opacity='1';
      crossEl.style.borderColor='#fff';crossEl.style.boxShadow='0 0 8px rgba(255,255,255,0.4)';
    }else{
      labelEl.style.opacity='0';subEl.style.opacity='0';
      crossEl.style.borderColor='rgba(255,255,255,0.25)';crossEl.style.boxShadow='none';
    }
    const pb=new Float32Array(8);
    pb[0]=w;pb[1]=h;pb[2]=yaw;pb[3]=pitch;pb[4]=ts*0.001;pb[5]=idx;
    device.queue.writeBuffer(paramBuf,0,pb);
    const enc=device.createCommandEncoder();
    const pass=enc.beginRenderPass({colorAttachments:[{
      view:ctx.getCurrentTexture().createView(),loadOp:'clear',storeOp:'store',
      clearValue:{r:0.008,g:0.008,b:0.02,a:1}}]});
    pass.setPipeline(pipeline);pass.setBindGroup(0,bg);pass.draw(3);pass.end();
    device.queue.submit([enc.finish()]);
  }
  requestAnimationFrame(frame);
}
init();
</script>
</body>
</html>
