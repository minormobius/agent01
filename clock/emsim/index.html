<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EMSIM — Torus Gravity</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000}
canvas{display:block}
#lbl{position:fixed;top:8px;left:8px;color:#aaa;font:13px monospace;pointer-events:none;z-index:1}
#ctl{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,30,0.95);
  border-top:1px solid #333;padding:10px 14px;z-index:2;font:13px monospace;color:#ccc}
#ctl label{display:inline-block;margin-right:14px}
#ctl input[type=range]{width:90px;vertical-align:middle;accent-color:#88f}
.v{color:#fff;min-width:30px;display:inline-block;text-align:right}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbl">Torus gravity</div>
<div id="ctl">
  <label>R <span class="v" id="vR">4.0</span>
    <input type="range" id="slR" min="1" max="12" step="0.5" value="4"></label>
  <label>r <span class="v" id="vr">2.0</span>
    <input type="range" id="slr" min="0.5" max="6" step="0.25" value="2"></label>
  <label>Grid <span class="v" id="vG">14</span>
    <input type="range" id="slG" min="8" max="22" step="2" value="14"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Torus params (mutable via sliders)
let R0 = 4, r0 = 2, GN = 14;
// View state
let vcx = 4, vcy = 0, vsc = 40; // center and pixels-per-unit

function w2s(r, z) {
  return [(r - vcx) * vsc + W/2, H/2 - (z - vcy) * vsc];
}
function s2w(sx, sy) {
  return [(sx - W/2) / vsc + vcx, (H/2 - sy) / vsc + vcy];
}

function shellField(Rp, Zp) {
  const Nu = 20, Nv = 16;
  const du = 2 * Math.PI / Nu, dv = 2 * Math.PI / Nv;
  let fr = 0, fz = 0;
  for (let iu = 0; iu < Nu; iu++) {
    const u = (iu + 0.5) * du;
    const cu = Math.cos(u), su = Math.sin(u);
    for (let iv = 0; iv < Nv; iv++) {
      const v = (iv + 0.5) * dv;
      const Rc = R0 + r0 * Math.cos(v);
      const ex = Rc * cu, ey = Rc * su, ez = r0 * Math.sin(v);
      const dx = Rp - ex, dy = -ey, dz = Zp - ez;
      const d2 = dx*dx + dy*dy + dz*dz;
      if (d2 < 0.01) continue;
      const dist = Math.sqrt(d2);
      const dA = r0 * Math.abs(Rc) * du * dv;
      const f3 = -dA / (dist * d2);
      fr += dx * f3;
      fz += dz * f3;
    }
  }
  return { fr, fz };
}

function draw() {
  // Grid fills the visible screen
  const [rMin, zMax] = s2w(0, 0);
  const [rMax, zMin] = s2w(W, H);
  const cellW = W / GN, cellH = H / GN;
  const grid = [];
  for (let gi = 0; gi < GN; gi++) {
    for (let gj = 0; gj < GN; gj++) {
      const r = rMin + (gi + 0.5) / GN * (rMax - rMin);
      const z = zMin + (gj + 0.5) / GN * (zMax - zMin);
      const f = shellField(r, z);
      const mag = Math.sqrt(f.fr * f.fr + f.fz * f.fz);
      grid.push({ r, z, fr: f.fr, fz: f.fz, mag });
    }
  }
  let maxMag = 0;
  for (const g of grid) if (g.mag > maxMag) maxMag = g.mag;

  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);
  for (let gi = 0; gi < GN; gi++) {
    for (let gj = 0; gj < GN; gj++) {
      const g = grid[gi * GN + gj];
      const [sx, sy] = w2s(g.r, g.z);
      const t = maxMag > 0 ? Math.max(0, Math.min(1, (Math.log10(g.mag + 1e-6) - Math.log10(maxMag * 0.001)) / (Math.log10(maxMag) - Math.log10(maxMag * 0.001)))) : 0;
      const cr = t < 0.5 ? 0 : Math.min(255, (t - 0.5) * 2 * 255);
      const cg = t < 0.25 ? t * 4 * 255 : t < 0.75 ? 255 : (1 - t) * 4 * 255;
      const cb = t < 0.5 ? (1 - t * 2) * 255 : 0;
      ctx.fillStyle = `rgb(${cr|0},${cg|0},${cb|0})`;
      ctx.globalAlpha = 0.3;
      ctx.fillRect(sx - cellW/2, sy - cellH/2, cellW, cellH);
      if (g.mag > 1e-8) {
        const maxLen = Math.min(cellW, cellH) * 0.45;
        const len = maxLen * Math.min(1, g.mag / maxMag * 3);
        const nr = g.fr / g.mag, nz = g.fz / g.mag;
        const dx = nr * len, dy = -nz * len;
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = `rgb(${cr|0},${cg|0},${cb|0})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx, sy); ctx.lineTo(sx + dx, sy + dy);
        const ax = -dx*0.3 + dy*0.2, ay = -dy*0.3 - dx*0.2;
        const bx = -dx*0.3 - dy*0.2, by = -dy*0.3 + dx*0.2;
        ctx.moveTo(sx+dx, sy+dy); ctx.lineTo(sx+dx+ax, sy+dy+ay);
        ctx.moveTo(sx+dx, sy+dy); ctx.lineTo(sx+dx+bx, sy+dy+by);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }

  // Torus cross-section outline
  ctx.strokeStyle = '#88f'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= 64; i++) {
    const v = i / 64 * Math.PI * 2;
    const [sx, sy] = w2s(R0 + r0 * Math.cos(v), r0 * Math.sin(v));
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.closePath(); ctx.stroke();

  // Tube center dot
  const [tcx, tcy] = w2s(R0, 0);
  ctx.fillStyle = '#ff0';
  ctx.beginPath(); ctx.arc(tcx, tcy, 4, 0, Math.PI * 2); ctx.fill();

  // Symmetry axis
  const [ax0] = w2s(0, 0);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ax0, 0); ctx.lineTo(ax0, H); ctx.stroke();

  // Perimeter arrows
  ctx.font = '9px monospace';
  for (let i = 0; i < 30; i++) {
    const v = i / 30 * Math.PI * 2;
    const cosV = Math.cos(v), sinV = Math.sin(v);
    const pr = R0 + (r0 + 0.05) * cosV;
    const pz = (r0 + 0.05) * sinV;
    const f = shellField(pr, pz);
    const mag = Math.sqrt(f.fr*f.fr + f.fz*f.fz);
    if (mag < 1e-8) continue;
    const [sx, sy] = w2s(pr, pz);
    const len = Math.min(35, mag / maxMag * 50 + 8);
    const nr = f.fr / mag, nz = f.fz / mag;
    const dx = nr * len, dy = -nz * len;
    const dot = nr * cosV + nz * sinV;
    const sticks = dot > 0;
    ctx.strokeStyle = sticks ? '#f44' : '#4f4';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx+dx, sy+dy);
    const aax=-dx*.25+dy*.15, aay=-dy*.25-dx*.15;
    const bbx=-dx*.25-dy*.15, bby=-dy*.25+dx*.15;
    ctx.moveTo(sx+dx,sy+dy); ctx.lineTo(sx+dx+aax,sy+dy+aay);
    ctx.moveTo(sx+dx,sy+dy); ctx.lineTo(sx+dx+bbx,sy+dy+bby);
    ctx.stroke();
    ctx.fillStyle = sticks ? '#f44' : '#4f4';
    ctx.globalAlpha = 0.7;
    ctx.fillText(mag.toFixed(1), sx+dx+3, sy+dy-2);
    ctx.globalAlpha = 1;
  }

  // Title
  ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
  ctx.fillText('Shell gravity  R=' + R0 + '  r=' + r0, 10, H - 50);
  document.getElementById('lbl').textContent = 'Torus gravity \u00b7 R=' + R0 + ' r=' + r0;
}

// Slider wiring
document.getElementById('slR').oninput = function() {
  R0 = parseFloat(this.value);
  document.getElementById('vR').textContent = R0.toFixed(1);
  vcx = R0; draw();
};
document.getElementById('slr').oninput = function() {
  r0 = parseFloat(this.value);
  document.getElementById('vr').textContent = r0.toFixed(1);
  draw();
};
document.getElementById('slG').oninput = function() {
  GN = parseInt(this.value);
  document.getElementById('vG').textContent = GN;
  draw();
};
window.addEventListener('resize', function() { resize(); draw(); });

// --- Pan & Zoom ---
// Track active touches for pinch
let touches = {};
let panStart = null;
let pinchStart = null;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = {x: t.clientX, y: t.clientY};
  const ids = Object.keys(touches);
  if (ids.length === 1) {
    panStart = {x: touches[ids[0]].x, y: touches[ids[0]].y, vcx: vcx, vcy: vcy};
    pinchStart = null;
  } else if (ids.length >= 2) {
    panStart = null;
    const a = touches[ids[0]], b = touches[ids[1]];
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    pinchStart = {dist: Math.hypot(a.x-b.x, a.y-b.y), vsc: vsc, vcx: vcx, vcy: vcy, mx: mx, my: my};
  }
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (const t of e.changedTouches) touches[t.identifier] = {x: t.clientX, y: t.clientY};
  const ids = Object.keys(touches);
  if (panStart && ids.length === 1) {
    const t = touches[ids[0]];
    vcx = panStart.vcx - (t.x - panStart.x) / vsc;
    vcy = panStart.vcy + (t.y - panStart.y) / vsc;
    draw();
  } else if (pinchStart && ids.length >= 2) {
    const a = touches[ids[0]], b = touches[ids[1]];
    const dist = Math.hypot(a.x - b.x, a.y - b.y);
    const ratio = dist / pinchStart.dist;
    const newSc = Math.max(5, Math.min(400, pinchStart.vsc * ratio));
    // Zoom toward pinch center
    const [wr, wz] = s2w(pinchStart.mx, pinchStart.my);
    vsc = newSc;
    vcx = wr - (pinchStart.mx - W/2) / vsc;
    vcy = wz + (pinchStart.my - H/2) / vsc;
    draw();
  }
}, {passive: false});

canvas.addEventListener('touchend', function(e) {
  for (const t of e.changedTouches) delete touches[t.identifier];
  if (Object.keys(touches).length === 0) { panStart = null; pinchStart = null; }
}, {passive: false});

// Mouse: drag to pan, wheel to zoom
let mouseDown = false, msx = 0, msy = 0, mvcx = 0, mvcy = 0;
canvas.addEventListener('mousedown', function(e) {
  mouseDown = true; msx = e.clientX; msy = e.clientY; mvcx = vcx; mvcy = vcy;
});
canvas.addEventListener('mousemove', function(e) {
  if (!mouseDown) return;
  vcx = mvcx - (e.clientX - msx) / vsc;
  vcy = mvcy + (e.clientY - msy) / vsc;
  draw();
});
window.addEventListener('mouseup', function() { mouseDown = false; });
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  const [wr, wz] = s2w(e.clientX, e.clientY);
  vsc *= e.deltaY > 0 ? 0.9 : 1.1;
  vsc = Math.max(5, Math.min(400, vsc));
  vcx = wr - (e.clientX - W/2) / vsc;
  vcy = wz + (e.clientY - H/2) / vsc;
  draw();
}, {passive: false});

draw();
</script>
</body>
</html>
