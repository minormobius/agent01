<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>EMSIM — Field Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;color:#ddd;
  font-family:'Courier New',monospace}
#wrap{display:flex;flex-direction:column;height:100%}
#canvasWrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#panel{background:#1a1a2e;border-top:1px solid #333;padding:8px 12px;
  max-height:40vh;overflow-y:auto;font-size:12px}
#panel label{display:inline-block;margin-right:12px;color:#aaa}
#panel input[type=range]{width:80px;vertical-align:middle;accent-color:#6a6aaa}
#panel select{background:#222;color:#ddd;border:1px solid #444;padding:2px 6px;
  font-family:inherit;font-size:12px}
#panel button{background:#333;color:#ddd;border:1px solid #555;padding:4px 10px;
  cursor:pointer;font-family:inherit;font-size:11px;margin:2px}
#panel button:hover{background:#444}
#panel button.active{background:#446;border-color:#88a}
.row{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin:4px 0}
.section{border-bottom:1px solid #2a2a3a;padding:4px 0}
.val{color:#ddd;min-width:32px;display:inline-block;text-align:right}
#info{position:absolute;top:8px;left:8px;font-size:11px;color:#888;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="canvasWrap"><canvas id="c"></canvas>
    <div id="info">Drag to move test charge. Scroll to zoom.</div>
  </div>
  <div id="panel">
    <div class="section row">
      <label>Geometry:
        <select id="selGeom">
          <option value="axi">Axisymmetric (r,z)</option>
          <option value="2d">2D Cartesian (x,y)</option>
        </select>
      </label>
      <label>Surface:
        <select id="selSurf">
          <option value="outside">Outside</option>
          <option value="inside">Inside</option>
        </select>
      </label>
      <button id="btnReset">Reset View</button>
    </div>
    <div class="section row">
      <b style="color:#f0e0c0">Sources:</b>
      <button id="btnAddCharge">+ Charge Ring</button>
      <button id="btnAddMass">+ Mass Ring</button>
      <button id="btnAddCurrent">+ Current Ring</button>
      <button id="btnAddShell">+ Charged Shell</button>
    </div>
    <div id="sourceList"></div>
    <div class="section row">
      <b style="color:#f0e0c0">Display:</b>
      <button id="btnArrows" class="active">Arrows</button>
      <button id="btnStream">Streamlines</button>
      <button id="btnPerim" class="active">Perimeter</button>
      <label>Arrow density: <input type="range" id="slDensity" min="8" max="32" value="16">
        <span class="val" id="valDensity">16</span></label>
      <label>Perimeter arrows: <input type="range" id="slPerim" min="12" max="48" value="30">
        <span class="val" id="valPerim">30</span></label>
    </div>
    <div class="section row">
      <b style="color:#f0e0c0">Test Particle:</b>
      <label>q=<span class="val" id="valTQ">1.0</span>
        <input type="range" id="slTQ" min="-3" max="3" step="0.1" value="1.0"></label>
      <button id="btnRelease">Release</button>
      <button id="btnFreeze">Freeze</button>
      <label>Trail <input type="checkbox" id="chkTrail" checked></label>
    </div>
  </div>
</div>
<script>
'use strict';

// =====================================================================
// State
// =====================================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = 800, H = 600;
let viewCx = 0, viewCy = 0, viewScale = 60; // pixels per unit
let geom = 'axi'; // 'axi' or '2d'
let surfSide = 'outside';

// Sources: {type, r, z, strength, radius?, label}
let sources = [];
let nextId = 1;

// Test particle
let tp = { r: 2.5, z: 0, vr: 0, vz: 0, q: 1.0, free: false };
let tpTrail = [];
let draggingTP = false;

// Display
let showArrows = true, showStream = false, showPerimeter = true;
let arrowDensity = 16, perimArrows = 30;

// Pointer
let pointer = { x: 0, y: 0, down: false };
let panStart = null;

// =====================================================================
// Default sources
// =====================================================================
function addSource(type, r, z, strength, radius) {
  const id = nextId++;
  const labels = {charge:'Q',mass:'M',current:'I',shell:'Shell'};
  sources.push({ id, type, r, z, strength, radius: radius||0, label: labels[type]+id });
  rebuildSourceUI();
  scheduleRedraw();
  return id;
}

function removeSource(id) {
  sources = sources.filter(s => s.id !== id);
  rebuildSourceUI();
  scheduleRedraw();
}

// Start with a charged shell + centerline charge (the torus model!)
addSource('shell', 0, 0, -1.0, 2.0);
addSource('charge', 0, 0, 1.0, 0);

// =====================================================================
// Field computation
// =====================================================================
function fieldAt(pr, pz) {
  let fr = 0, fz = 0;
  for (const src of sources) {
    const f = sourceField(src, pr, pz);
    fr += f.fr;
    fz += f.fz;
  }
  return { fr, fz };
}

function sourceField(src, pr, pz) {
  if (src.type === 'charge') return chargeRingField(src, pr, pz);
  if (src.type === 'mass') return massRingField(src, pr, pz);
  if (src.type === 'current') return currentRingField(src, pr, pz);
  if (src.type === 'shell') return shellField(src, pr, pz);
  return { fr: 0, fz: 0 };
}

// Coulomb field from a ring of charge (axisymmetric) or line charge (2D)
function chargeRingField(src, pr, pz) {
  const Q = src.strength;
  if (geom === '2d') {
    // Point charge at (src.r, src.z)
    const dr = pr - src.r, dz = pz - src.z;
    const d2 = dr*dr + dz*dz;
    if (d2 < 0.001) return { fr: 0, fz: 0 };
    const f = Q / (d2 * Math.sqrt(d2));
    return { fr: dr * f, fz: dz * f };
  }
  // Axisymmetric: ring at (src.r, src.z) — integrate around azimuth
  const N = 32;
  const du = 2 * Math.PI / N;
  let fr = 0, fz = 0;
  const Rs = src.r, Zs = src.z;
  for (let i = 0; i < N; i++) {
    const u = (i + 0.5) * du;
    const cosU = Math.cos(u);
    // Source point in 3D: (Rs*cosU, Rs*sinU, Zs)
    // Field point at (pr, 0, pz) by symmetry
    const dx = pr - Rs * cosU;
    const dy = -Rs * Math.sin(u);
    const dz = pz - Zs;
    const d2 = dx*dx + dy*dy + dz*dz;
    if (d2 < 0.001) continue;
    const d = Math.sqrt(d2);
    const dl = Rs * du;
    const f3 = Q * dl / (d * d2);
    fr += dx * f3;  // R-component = x-component at u=0
    fz += dz * f3;
  }
  return { fr, fz };
}

// Gravity: same as charge but attractive (opposite sign)
function massRingField(src, pr, pz) {
  const f = chargeRingField({ ...src, strength: -src.strength }, pr, pz);
  return f;
}

// Biot-Savart: current ring produces B-field
// For a ring of current in the (r, phi) plane at height z:
// B has components B_r and B_z (axial)
function currentRingField(src, pr, pz) {
  const I = src.strength;
  if (geom === '2d') {
    // Infinite wire at (src.r, src.z), current in +z (out of page)
    // B = mu0*I/(2pi*d) in tangential direction
    const dr = pr - src.r, dz = pz - src.z;
    const d2 = dr*dr + dz*dz;
    if (d2 < 0.001) return { fr: 0, fz: 0 };
    const f = I / d2;
    // B tangential: perpendicular to displacement, CCW
    return { fr: -dz * f, fz: dr * f };
  }
  // Axisymmetric: Biot-Savart for current ring
  const N = 32;
  const du = 2 * Math.PI / N;
  let fr = 0, fz = 0;
  const Rs = src.r, Zs = src.z;
  for (let i = 0; i < N; i++) {
    const u = (i + 0.5) * du;
    const cosU = Math.cos(u), sinU = Math.sin(u);
    // dl direction: tangent to ring = (-sinU, cosU, 0) * Rs * du
    const dlx = -sinU * Rs * du;
    const dly = cosU * Rs * du;
    // displacement from source to field point
    const dx = pr - Rs * cosU;
    const dy = -Rs * sinU;
    const dz = pz - Zs;
    const d2 = dx*dx + dy*dy + dz*dz;
    if (d2 < 0.001) continue;
    const d3 = Math.pow(d2, 1.5);
    // dB = I * (dl x r) / |r|^3
    // dl x r = (dly*dz - 0*dy, 0*dx - dlx*dz, dlx*dy - dly*dx)
    const bx = (dly * dz) / d3;
    const bz = (dlx * dy - dly * dx) / d3;
    fr += I * bx;
    fz += I * bz;
  }
  return { fr, fz };
}

// Charged shell: uniform charge on circle of given radius centered at (src.r, src.z)
function shellField(src, pr, pz) {
  const Q = src.strength;
  const R0 = src.radius || 1;
  if (geom === '2d') {
    // 2D: charged circle
    const N = 64;
    const dth = 2 * Math.PI / N;
    let fr = 0, fz = 0;
    for (let i = 0; i < N; i++) {
      const th = (i + 0.5) * dth;
      const sx = src.r + R0 * Math.cos(th);
      const sz = src.z + R0 * Math.sin(th);
      const dx = pr - sx, dz = pz - sz;
      const d2 = dx*dx + dz*dz;
      if (d2 < 0.001) continue;
      const dl = R0 * dth;
      const f3 = Q * dl / (Math.sqrt(d2) * d2);
      fr += dx * f3;
      fz += dz * f3;
    }
    return { fr, fz };
  }
  // Axisymmetric: torus shell at tube center (src.r, src.z) with tube radius R0
  // Integrate over poloidal angle v, then over toroidal angle u
  const Nu = 24, Nv = 16;
  const du = 2 * Math.PI / Nu, dv = 2 * Math.PI / Nv;
  let fr = 0, fz = 0;
  for (let iu = 0; iu < Nu; iu++) {
    const u = (iu + 0.5) * du;
    const cosU = Math.cos(u), sinU = Math.sin(u);
    for (let iv = 0; iv < Nv; iv++) {
      const v = (iv + 0.5) * dv;
      const Rc = src.r + R0 * Math.cos(v);
      const ex = Rc * cosU, ey = Rc * sinU, ez = src.z + R0 * Math.sin(v);
      const dx = pr - ex, dy = -ey, dz = pz - ez;  // field point at (pr, 0, pz)
      const d2 = dx*dx + dy*dy + dz*dz;
      if (d2 < 0.005) continue;
      const dist = Math.sqrt(d2);
      const dA = R0 * Math.abs(Rc) * du * dv;
      const f3 = Q * dA / (dist * d2);
      fr += dx * f3;
      fz += dz * f3;
    }
  }
  return { fr, fz };
}

// =====================================================================
// Rendering
// =====================================================================
let needsRedraw = true;
function scheduleRedraw() { needsRedraw = true; }

function worldToScreen(r, z) {
  return [(r - viewCx) * viewScale + W/2, H/2 - (z - viewCy) * viewScale];
}
function screenToWorld(sx, sy) {
  return [(sx - W/2) / viewScale + viewCx, (H/2 - sy) / viewScale + viewCy];
}

function magnitudeColor(mag) {
  // Log scale heatmap: blue → cyan → green → yellow → red
  const lm = Math.log10(Math.max(mag, 1e-6));
  const t = Math.max(0, Math.min(1, (lm + 3) / 5)); // -3 to +2
  const r = t < 0.5 ? 0 : Math.min(255, (t-0.5)*2*255);
  const g = t < 0.25 ? t*4*255 : t < 0.75 ? 255 : (1-t)*4*255;
  const b = t < 0.5 ? (1-t*2)*255 : 0;
  return `rgb(${r|0},${g|0},${b|0})`;
}

function drawFieldGrid() {
  // Single pass: heatmap cells + arrows on same grid (one fieldAt call per cell)
  const step = W / arrowDensity;
  const maxLen = step * 0.4;
  const half = step / 2;
  for (let sx = 0; sx < W; sx += step) {
    for (let sy = 0; sy < H; sy += step) {
      const cx = sx + half, cy = sy + half;
      const [r, z] = screenToWorld(cx, cy);
      const f = fieldAt(r, z);
      const mag = Math.sqrt(f.fr*f.fr + f.fz*f.fz);
      // Heatmap cell
      ctx.fillStyle = magnitudeColor(mag);
      ctx.globalAlpha = 0.15;
      ctx.fillRect(sx, sy, step, step);
      // Arrow
      if (showArrows && mag > 1e-8) {
        const logMag = Math.log10(mag + 1e-6);
        const len = Math.min(maxLen, Math.max(4, (logMag + 3) * maxLen / 4));
        const nr = f.fr / mag, nz = f.fz / mag;
        const dx = nr * len, dy = -nz * len;
        ctx.strokeStyle = magnitudeColor(mag);
        ctx.globalAlpha = 0.7;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(cx - dx*0.5, cy - dy*0.5);
        ctx.lineTo(cx + dx*0.5, cy + dy*0.5);
        const ax = -dx*0.3 + dy*0.2, ay = -dy*0.3 - dx*0.2;
        const bx = -dx*0.3 - dy*0.2, by = -dy*0.3 + dx*0.2;
        ctx.moveTo(cx + dx*0.5, cy + dy*0.5);
        ctx.lineTo(cx + dx*0.5 + ax, cy + dy*0.5 + ay);
        ctx.moveTo(cx + dx*0.5, cy + dy*0.5);
        ctx.lineTo(cx + dx*0.5 + bx, cy + dy*0.5 + by);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }
}

function drawPerimeterArrows() {
  // Find the first shell source, draw force arrows around its perimeter
  const shell = sources.find(s => s.type === 'shell');
  if (!shell) return;
  const cx = shell.r, cz = shell.z, rad = shell.radius || 1;
  const N = perimArrows;
  const maxArrowLen = 40; // screen pixels

  for (let i = 0; i < N; i++) {
    const th = (i / N) * 2 * Math.PI;
    const cosT = Math.cos(th), sinT = Math.sin(th);
    // Point on surface (just outside or inside)
    const offset = surfSide === 'inside' ? -0.02 : 0.02;
    let pr, pz;
    if (geom === '2d') {
      pr = cx + (rad + offset) * cosT;
      pz = cz + (rad + offset) * sinT;
    } else {
      // Axisymmetric: shell is a torus. Perimeter is the tube cross-section
      pr = cx + (rad + offset) * cosT;
      pz = cz + (rad + offset) * sinT;
    }
    const f = fieldAt(pr, pz);
    const mag = Math.sqrt(f.fr*f.fr + f.fz*f.fz);
    if (mag < 1e-8) continue;

    const [sx, sy] = worldToScreen(pr, pz);
    const logMag = Math.log10(mag + 1e-6);
    const len = Math.min(maxArrowLen, Math.max(8, (logMag + 3) * maxArrowLen / 4));
    const nr = f.fr / mag, nz = f.fz / mag;
    const dx = nr * len, dy = -nz * len;

    // Color by whether force is inward (wall-sticking) or outward
    const radialDot = nr * cosT + nz * sinT; // positive = outward
    const inward = surfSide === 'inside' ? radialDot > 0 : radialDot < 0;
    ctx.strokeStyle = inward ? '#4f4' : '#f44'; // green=sticking, red=repelling
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + dx, sy + dy);
    // Arrowhead
    const ax = -dx*0.25 + dy*0.15, ay = -dy*0.25 - dx*0.15;
    const bx = -dx*0.25 - dy*0.15, by = -dy*0.25 + dx*0.15;
    ctx.moveTo(sx + dx, sy + dy);
    ctx.lineTo(sx + dx + ax, sy + dy + ay);
    ctx.moveTo(sx + dx, sy + dy);
    ctx.lineTo(sx + dx + bx, sy + dy + by);
    ctx.stroke();

    // Magnitude label
    ctx.fillStyle = inward ? '#4f4' : '#f44';
    ctx.font = '9px monospace';
    ctx.globalAlpha = 0.7;
    ctx.fillText(mag.toFixed(2), sx + dx + 4, sy + dy);
    ctx.globalAlpha = 1;
  }
}

function drawSources() {
  for (const src of sources) {
    const [sx, sy] = worldToScreen(src.r, src.z);
    if (src.type === 'shell') {
      const rpx = src.radius * viewScale;
      ctx.strokeStyle = src.strength > 0 ? '#f88' : '#88f';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(sx, sy, rpx, 0, 2*Math.PI);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // Draw center dot
    ctx.fillStyle = src.type === 'current' ? '#ff0' :
      src.type === 'mass' ? '#888' :
      src.strength > 0 ? '#f44' : '#44f';
    ctx.beginPath();
    ctx.arc(sx, sy, 5, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText(src.label, sx + 8, sy - 8);
  }
}

function drawTestParticle() {
  const [sx, sy] = worldToScreen(tp.r, tp.z);
  // Trail
  if (tpTrail.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,100,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < tpTrail.length; i++) {
      const [tx, ty] = worldToScreen(tpTrail[i][0], tpTrail[i][1]);
      if (i === 0) ctx.moveTo(tx, ty); else ctx.lineTo(tx, ty);
    }
    ctx.stroke();
  }
  // Particle
  ctx.fillStyle = tp.q > 0 ? '#ff4' : '#4ff';
  ctx.beginPath();
  ctx.arc(sx, sy, 7, 0, 2*Math.PI);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Force arrow on particle
  const f = fieldAt(tp.r, tp.z);
  const mag = Math.sqrt(f.fr*f.fr + f.fz*f.fz);
  if (mag > 1e-8) {
    const len = Math.min(50, Math.max(12, Math.log10(mag*tp.q + 1e-6) * 15 + 40));
    const dx = (f.fr/mag) * len * Math.sign(tp.q);
    const dy = -(f.fz/mag) * len * Math.sign(tp.q);
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + dx, sy + dy);
    const ax = -dx*0.25 + dy*0.15, ay = -dy*0.25 - dx*0.15;
    const bx = -dx*0.25 - dy*0.15, by = -dy*0.25 + dx*0.15;
    ctx.moveTo(sx + dx, sy + dy);
    ctx.lineTo(sx + dx + ax, sy + dy + ay);
    ctx.moveTo(sx + dx, sy + dy);
    ctx.lineTo(sx + dx + bx, sy + dy + by);
    ctx.stroke();
  }
}

function drawAxes() {
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  // Axis lines
  const [ox, oy] = worldToScreen(0, 0);
  ctx.beginPath();
  ctx.moveTo(0, oy); ctx.lineTo(W, oy);
  ctx.moveTo(ox, 0); ctx.lineTo(ox, H);
  ctx.stroke();
  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px monospace';
  ctx.fillText(geom === 'axi' ? 'R' : 'x', W - 16, oy - 4);
  ctx.fillText(geom === 'axi' ? 'Z' : 'y', ox + 4, 14);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);
  drawAxes();
  drawFieldGrid();
  drawSources();
  if (showPerimeter) drawPerimeterArrows();
  drawTestParticle();
}

// =====================================================================
// Test particle simulation
// =====================================================================
function stepParticle(dt) {
  if (!tp.free) return;
  const substeps = 4;
  const sub = dt / substeps;
  for (let i = 0; i < substeps; i++) {
    const f = fieldAt(tp.r, tp.z);
    tp.vr += f.fr * tp.q * sub;
    tp.vz += f.fz * tp.q * sub;
    // Damping to keep things stable
    tp.vr *= 0.999;
    tp.vz *= 0.999;
    tp.r += tp.vr * sub;
    tp.z += tp.vz * sub;
  }
  if (document.getElementById('chkTrail').checked) {
    tpTrail.push([tp.r, tp.z]);
    if (tpTrail.length > 2000) tpTrail.shift();
  }
}

// =====================================================================
// Source UI
// =====================================================================
function rebuildSourceUI() {
  const list = document.getElementById('sourceList');
  list.innerHTML = '';
  for (const src of sources) {
    const div = document.createElement('div');
    div.className = 'row section';
    const typeLabel = {charge:'Charge',mass:'Mass',current:'Current',shell:'Shell'}[src.type];
    const color = src.type === 'current' ? '#ff0' : src.type === 'mass' ? '#888' : src.strength > 0 ? '#f88' : '#88f';
    let html = `<span style="color:${color}">${typeLabel}</span> `;
    html += `<label>pos: <input type="number" step="0.1" value="${src.r}" style="width:48px;background:#222;color:#ddd;border:1px solid #444" data-id="${src.id}" data-field="r"></label>`;
    html += `<label>, <input type="number" step="0.1" value="${src.z}" style="width:48px;background:#222;color:#ddd;border:1px solid #444" data-id="${src.id}" data-field="z"></label>`;
    html += `<label> str:<input type="number" step="0.1" value="${src.strength}" style="width:48px;background:#222;color:#ddd;border:1px solid #444" data-id="${src.id}" data-field="strength"></label>`;
    if (src.type === 'shell') {
      html += `<label> R:<input type="number" step="0.1" value="${src.radius}" style="width:48px;background:#222;color:#ddd;border:1px solid #444" data-id="${src.id}" data-field="radius"></label>`;
    }
    html += `<button data-remove="${src.id}" style="color:#f66">x</button>`;
    div.innerHTML = html;
    list.appendChild(div);
  }
  // Wire up inputs
  list.querySelectorAll('input[data-id]').forEach(inp => {
    inp.addEventListener('change', () => {
      const src = sources.find(s => s.id === +inp.dataset.id);
      if (src) { src[inp.dataset.field] = parseFloat(inp.value); scheduleRedraw(); }
    });
  });
  list.querySelectorAll('button[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => removeSource(+btn.dataset.remove));
  });
}

// =====================================================================
// Events
// =====================================================================
function resize() {
  const wrap = document.getElementById('canvasWrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  scheduleRedraw();
}
window.addEventListener('resize', resize);

// Pointer: drag test particle or pan
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * devicePixelRatio;
  const sy = (e.clientY - rect.top) * devicePixelRatio;
  const [tpsx, tpsy] = worldToScreen(tp.r, tp.z);
  if (Math.hypot(sx - tpsx, sy - tpsy) < 20) {
    draggingTP = true;
    tp.free = false;
    tp.vr = 0; tp.vz = 0;
  } else {
    panStart = { sx, sy, cx: viewCx, cy: viewCy };
  }
  pointer.down = true;
});

canvas.addEventListener('pointermove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * devicePixelRatio;
  const sy = (e.clientY - rect.top) * devicePixelRatio;
  if (draggingTP) {
    const [r, z] = screenToWorld(sx, sy);
    tp.r = r; tp.z = z;
    scheduleRedraw();
  } else if (panStart) {
    viewCx = panStart.cx - (sx - panStart.sx) / viewScale;
    viewCy = panStart.cy + (sy - panStart.sy) / viewScale;
    scheduleRedraw();
  }
});

window.addEventListener('pointerup', () => {
  draggingTP = false;
  panStart = null;
  pointer.down = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  viewScale *= factor;
  viewScale = Math.max(5, Math.min(500, viewScale));
  scheduleRedraw();
}, { passive: false });

// Buttons
document.getElementById('selGeom').addEventListener('change', e => {
  geom = e.target.value; scheduleRedraw();
});
document.getElementById('selSurf').addEventListener('change', e => {
  surfSide = e.target.value; scheduleRedraw();
});
document.getElementById('btnReset').addEventListener('click', () => {
  viewCx = 0; viewCy = 0; viewScale = 60; scheduleRedraw();
});
document.getElementById('btnAddCharge').addEventListener('click', () => addSource('charge', 1, 1, 1.0));
document.getElementById('btnAddMass').addEventListener('click', () => addSource('mass', 1, -1, 1.0));
document.getElementById('btnAddCurrent').addEventListener('click', () => addSource('current', 0, 0, 1.0));
document.getElementById('btnAddShell').addEventListener('click', () => addSource('shell', 0, 0, -1.0, 1.5));
document.getElementById('btnArrows').addEventListener('click', e => {
  showArrows = !showArrows; e.target.classList.toggle('active'); scheduleRedraw();
});
document.getElementById('btnStream').addEventListener('click', e => {
  showStream = !showStream; e.target.classList.toggle('active'); scheduleRedraw();
});
document.getElementById('btnPerim').addEventListener('click', e => {
  showPerimeter = !showPerimeter; e.target.classList.toggle('active'); scheduleRedraw();
});
document.getElementById('slDensity').addEventListener('input', e => {
  arrowDensity = +e.target.value;
  document.getElementById('valDensity').textContent = arrowDensity;
  scheduleRedraw();
});
document.getElementById('slPerim').addEventListener('input', e => {
  perimArrows = +e.target.value;
  document.getElementById('valPerim').textContent = perimArrows;
  scheduleRedraw();
});
document.getElementById('slTQ').addEventListener('input', e => {
  tp.q = parseFloat(e.target.value);
  document.getElementById('valTQ').textContent = tp.q.toFixed(1);
  scheduleRedraw();
});
document.getElementById('btnRelease').addEventListener('click', () => {
  tp.free = true; tpTrail = [];
});
document.getElementById('btnFreeze').addEventListener('click', () => {
  tp.free = false; tp.vr = 0; tp.vz = 0;
});

// =====================================================================
// Main loop
// =====================================================================
let lastTime = 0;
function loop(t) {
  const dt = Math.min(0.05, (t - lastTime) / 1000);
  lastTime = t;
  if (tp.free) {
    stepParticle(dt);
    needsRedraw = true;
  }
  if (needsRedraw) {
    draw();
    needsRedraw = false;
  }
  requestAnimationFrame(loop);
}

resize();
rebuildSourceUI();
requestAnimationFrame(loop);

</script>
