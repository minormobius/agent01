<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EMSIM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Just draw a red circle and some text to prove canvas works
ctx.fillStyle = '#111';
ctx.fillRect(0, 0, W, H);

ctx.strokeStyle = '#ff0';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.arc(W/2, H/3, 80, 0, Math.PI * 2);
ctx.stroke();

ctx.fillStyle = '#fff';
ctx.font = '24px monospace';
ctx.fillText('EMSIM canvas test', 20, 40);

// Draw 12 arrows in a circle
for (let i = 0; i < 12; i++) {
  const th = i / 12 * Math.PI * 2;
  const cx0 = W/2, cy0 = H/3;
  const r1 = 90, r2 = 130;
  const x1 = cx0 + r1 * Math.cos(th);
  const y1 = cy0 + r1 * Math.sin(th);
  const x2 = cx0 + r2 * Math.cos(th);
  const y2 = cy0 + r2 * Math.sin(th);
  ctx.strokeStyle = i % 2 === 0 ? '#4f4' : '#f44';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

ctx.fillStyle = '#888';
ctx.font = '14px monospace';
ctx.fillText('If you see this, canvas works.', 20, H/2);
ctx.fillText('W=' + W + ' H=' + H + ' dpr=' + dpr, 20, H/2 + 20);
</script>
</body>
</html>
