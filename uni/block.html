<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>uni — block</title>
<meta name="description" content="A Unicode block: every character in the range, pastable, with code points.">
<meta name="theme-color" content="#5b57e0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='84'%3E%E2%80%B9%E2%80%BA%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">uni<span class="dot">.</span><small>unicode browser</small></a>
    <div class="search-wrap">
      <svg class="search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" class="search" type="search" autocomplete="off" spellcheck="false" placeholder="Search all of Unicode…">
    </div>
    <a class="crumb" href="/">↖ all blocks</a>
  </div>
</header>

<main class="wrap" id="main">
  <p style="color:var(--faint);padding:50px 0;text-align:center">Loading…</p>
</main>

<div class="toast" id="toast"><span class="g" id="toastGlyph">✓</span><span id="toastMsg">Copied</span></div>

<script type="module">
import UNI from '/lib/uni.js';

const MAIN = document.getElementById('main');
const TOAST = document.getElementById('toast');
const CHUNK = 256;

function currentSlug() {
  const p = new URLSearchParams(location.search).get('slug');
  if (p) return p;
  const m = location.pathname.match(/\/b\/([^/?#]+)/);
  return m ? decodeURIComponent(m[1]) : null;
}

let chars = [];   // [cp, name, gc]
let cursor = 0;

fetch('/data/blocks.json').then(r => r.json()).then(async blocks => {
  const slug = currentSlug();
  const b = blocks.find(x => x.slug === slug);
  if (!b) { notFound(slug); return; }
  document.title = `${b.name} — uni`;

  if (b.kind === 'pua' || b.kind === 'surrogate') {
    for (let cp = b.start; cp <= b.end; cp++) chars.push([cp, UNI.algorithmicName(cp, b.kind), b.kind === 'pua' ? 'Co' : 'Cs']);
  } else if (b.kind) {
    for (let cp = b.start; cp <= b.end; cp++) chars.push([cp, UNI.algorithmicName(cp, b.kind), 'Lo']);
  } else {
    chars = await fetch('/data/blocks/' + slug + '.json').then(r => r.json()).catch(() => []);
  }
  renderHeader(b);
  setupGrid();
});

function renderHeader(b) {
  const planeName = UNI.PLANES[b.plane] || `Plane ${b.plane}`;
  MAIN.innerHTML = `
    <a class="back" href="/">← all blocks</a>
    <section class="hero" style="padding-top:6px">
      <h1>${b.name}</h1>
      <p><span class="stat">${b.assigned.toLocaleString()} characters</span> · ${UNI.uPlus(b.start)} – ${UNI.uPlus(b.end)} ·
      <a href="/#p-${UNI.slugify(planeName)}" style="color:var(--muted)">${planeName}</a>${b.kind && b.kind !== 'surrogate' ? ` · <span style="color:var(--accent)">${b.kind === 'pua' ? 'private use' : b.kind + ' (algorithmic names)'}</span>` : ''}</p>
    </section>
    <div class="grid" id="grid" style="margin-top:16px"></div>
    <div id="sentinel"></div>
    <div class="loadmore" id="loadmore"></div>
    <footer><p><a href="/">← browse all ${UNI.PLANES[b.plane] ? '' : ''}blocks</a> · <a href="https://mino.mobi">mino.mobi</a></p></footer>`;
}

function cellHTML([cp, name, gc]) {
  const printable = UNI.isPrintable(gc);
  const inner = printable
    ? `<span class="cg glyph">${UNI.glyph(cp) || '▯'}</span>`
    : `<span class="cg">${gc}</span>`;
  return `<a class="cell${printable ? '' : ' np'}" href="/c/${UNI.hex(cp)}" data-cp="${cp}" data-p="${printable ? 1 : 0}" title="${name.replace(/"/g, '')}">
    ${inner}<span class="cc">${UNI.hex(cp)}</span></a>`;
}

function setupGrid() {
  const grid = document.getElementById('grid');
  const loadmore = document.getElementById('loadmore');
  appendChunk(grid);

  const io = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && cursor < chars.length) appendChunk(grid);
  }, { rootMargin: '600px' });
  io.observe(document.getElementById('sentinel'));

  function tick() { loadmore.textContent = cursor < chars.length ? `${cursor.toLocaleString()} / ${chars.length.toLocaleString()} shown — scroll for more` : ''; }
  window._tick = tick; tick();
}

function appendChunk(grid) {
  const end = Math.min(cursor + CHUNK, chars.length);
  let html = '';
  for (let i = cursor; i < end; i++) html += cellHTML(chars[i]);
  grid.insertAdjacentHTML('beforeend', html);
  // wire the just-added cells
  const cells = grid.querySelectorAll('.cell:not([data-wired])');
  cells.forEach(el => {
    el.setAttribute('data-wired', '1');
    if (el.dataset.p === '1') el.addEventListener('click', ev => {
      if (ev.metaKey || ev.ctrlKey || ev.shiftKey || ev.button === 1) return;
      ev.preventDefault(); copyCp(+el.dataset.cp, el);
    });
  });
  cursor = end;
  if (window._tick) window._tick();
}

async function copyCp(cp, el) {
  const g = UNI.glyph(cp);
  try { await navigator.clipboard.writeText(g); }
  catch { const t = document.createElement('textarea'); t.value = g; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); }
  el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 700);
  document.getElementById('toastGlyph').textContent = g || '✓';
  document.getElementById('toastMsg').textContent = 'Copied ' + UNI.uPlus(cp);
  TOAST.classList.add('show'); clearTimeout(copyCp._t); copyCp._t = setTimeout(() => TOAST.classList.remove('show'), 1300);
}

function notFound(slug) {
  document.title = 'uni — block not found';
  MAIN.innerHTML = `<a class="back" href="/">← all blocks</a>
    <div class="card" style="text-align:center;max-width:560px;margin:20px auto">
      <div class="hero-glyph np" style="margin:0 auto 16px">?</div>
      <h1 class="section-title">No such block</h1>
      <p style="color:var(--muted)">Nothing is registered at <code>${(slug || '').replace(/</g, '&lt;')}</code>.</p>
      <a class="btn primary" href="/">Browse all blocks</a>
    </div>`;
}

// search box → jump to character or home
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const s = e.target.value.trim().replace(/^(u\+|0x)/i, '').replace(/\s/g, '');
  if (/^[0-9a-f]{1,6}$/i.test(s)) location.href = '/c/' + s.toUpperCase();
  else location.href = '/?q=' + encodeURIComponent(e.target.value.trim());
});
document.addEventListener('keydown', e => { if (e.key === '/' && document.activeElement.id !== 'q') { e.preventDefault(); document.getElementById('q').focus(); } });
</script>
</body>
</html>
