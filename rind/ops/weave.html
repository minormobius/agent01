<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>rind · ops — weave proof (loom + tube)</title>
<style>
  :root { --ink:#e8ecf4; --dim:#7e8aa0; --gold:#d9b24a; --bg:#06070c; --panel:#0c0f17; --line:#1b2030; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
  a { color: var(--gold); }
  .wrap { display: grid; grid-template-rows: auto 1fr; height: 100%; }
  header { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 650; letter-spacing: .2px; }
  header .crumb { color: var(--dim); font-size: 12px; }
  header .crumb a { text-decoration: none; }
  .main { display: grid; grid-template-columns: 1fr 280px; min-height: 0; }
  @media (max-width: 820px) { .main { grid-template-columns: 1fr; } .rail { display: none; } }
  .stage { position: relative; min-height: 0; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  canvas.drag { cursor: grabbing; }
  .rail { border-left: 1px solid var(--line); padding: 14px; overflow: auto; background: var(--panel); }
  .controls { position: absolute; left: 12px; top: 12px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 2; }
  .controls button, .chip { background: #11151f; color: var(--ink); border: 1px solid var(--line); border-radius: 7px; padding: 5px 9px; font-size: 12px; cursor: pointer; }
  .controls button.on { border-color: var(--gold); color: var(--gold); }
  .read { position: absolute; left: 12px; bottom: 12px; right: 12px; font-size: 11.5px; color: var(--dim); background: rgba(8,9,14,.7); padding: 6px 9px; border-radius: 7px; border: 1px solid var(--line); pointer-events: none; }
  .read b { color: var(--ink); }
  .read .ok { color: #6fcf8a; }
  .rail h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--dim); margin: 4px 0 8px; }
  .wsel { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .wsel .w { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; background: #0a0d14; }
  .wsel .w.sel { border-color: var(--gold); background: #14130c; }
  .wsel .w .k { width: 16px; height: 16px; border-radius: 50%; background: #2a3346; color: #cdd6e8; font-size: 10px; display: grid; place-items: center; flex: 0 0 auto; }
  .wsel .w.sel .k { background: var(--gold); color: #1a1406; }
  .wsel .w .lab { font-size: 12.5px; }
  .wsel .w .bl { font-size: 10.5px; color: var(--dim); }
  .itin { font-size: 12px; }
  .itin .stop { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .itin .stop .n { width: 16px; color: var(--dim); font-variant-numeric: tabular-nums; }
  .itin .stop .g { width: 18px; text-align: center; }
  .itin .stop .ou { margin-left: auto; font-size: 10px; color: var(--dim); }
  .note { font-size: 11px; color: var(--dim); margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>rind · ops — weave proof (loom + tube)</h1>
    <span class="crumb"><a href="/">rind</a> / ops &nbsp;·&nbsp; six surfaces over eight engines, woven so every one touches every one</span>
  </header>
  <div class="main">
    <div class="stage">
      <div class="controls">
        <button id="m-loom" class="on">loom chart</button>
        <button id="m-tube">woven tube</button>
        <button id="reset">reset view</button>
      </div>
      <canvas id="cv"></canvas>
      <div class="read" id="read"></div>
    </div>
    <aside class="rail">
      <h2>enter one surface</h2>
      <div class="wsel" id="wsel"></div>
      <h2>its tour of the 8 engines</h2>
      <div class="itin" id="itin"></div>
      <div class="note" id="note"></div>
    </aside>
  </div>
</div>
<script type="module" src="./weave-app.js"></script>
</body>
</html>
