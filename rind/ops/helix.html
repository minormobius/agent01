<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>rind · ops — the helix emerges from the hex tiling</title>
<style>
  :root { --ink:#e8ecf4; --dim:#7e8aa0; --gold:#d9b24a; --bg:#06070c; --panel:#0c0f17; --line:#1b2030; --ok:#6fcf8a; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
  a { color: var(--gold); text-decoration: none; }
  .wrap { display: grid; grid-template-rows: auto 1fr auto; height: 100%; }
  header { padding: 9px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 650; }
  header .crumb { color: var(--dim); font-size: 12px; }
  .stage { position: relative; min-height: 0; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  canvas.drag { cursor: grabbing; }
  .controls { position: absolute; left: 12px; top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; z-index: 2; }
  .controls button, .controls .grp { background: #11151f; color: var(--ink); border: 1px solid var(--line); border-radius: 7px; padding: 5px 9px; font-size: 12px; cursor: pointer; display: inline-flex; gap: 7px; align-items: center; }
  .controls button.on { border-color: var(--gold); color: var(--gold); }
  .controls input[type=range] { width: 96px; }
  .controls b { color: var(--gold); font-variant-numeric: tabular-nums; }
  .read { padding: 8px 16px; border-top: 1px solid var(--line); font-size: 12px; color: var(--dim); background: var(--panel); }
  .read b { color: var(--ink); } .read .ok { color: var(--ok); }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin: 0 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>rind · ops — the helix emerges</h1>
    <span class="crumb"><a href="./">← ops</a> &nbsp;·&nbsp; <a href="./tessweave.html">⬡ the solve</a> &nbsp;·&nbsp; <a href="./tess.html">tessellation</a> &nbsp;·&nbsp; <a href="./nexus.html">@ walk</a> &nbsp;·&nbsp; local hexes hand off at their edges; chained across the wrapped honeycomb the handoffs become <b style="color:var(--gold)">cylinder helices</b></span>
  </header>
  <div class="stage">
    <div class="controls">
      <span class="grp" title="hexes around the cylinder (the azimuthal period)">around <input id="cols" type="range" min="5" max="14" value="8"> <b id="colsV">8</b></span>
      <span class="grp" title="hexes along the cylinder axis">along <input id="rows" type="range" min="6" max="22" value="12"> <b id="rowsV">12</b></span>
      <button id="wrap" title="unrolled strip vs wrapped onto the cylinder">◱ unrolled</button>
      <button id="rings" class="on" title="the azimuthal E–W handoff chains → rings">rings</button>
      <button id="helixA" class="on" title="the NE–SW handoff chains → helices one way">helix ↗</button>
      <button id="helixB" class="on" title="the NW–SE handoff chains → helices the other way">helix ↖</button>
      <button id="prod" class="on" title="each hex keeps its own local production (8 engines)">local prod</button>
      <button id="trace" title="highlight a single strand — one global thread across many hexes">◎ trace one</button>
      <button id="spin" class="on">⟳ auto</button>
    </div>
    <canvas id="cv"></canvas>
  </div>
  <div class="read" id="read"></div>
</div>
<script type="module" src="./helix-app.js"></script>
</body>
</html>
