<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>rind · ops — lay the weave on the prism</title>
<style>
  :root { --ink:#e8ecf4; --dim:#7e8aa0; --gold:#d9b24a; --bg:#06070c; --panel:#0c0f17; --line:#1b2030; --bad:#ff5b5b; --ok:#6fcf8a; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font: 14px/1.5 ui-sans-serif, system-ui, sans-serif; }
  a { color: var(--gold); }
  .wrap { display: grid; grid-template-rows: auto 1fr; height: 100%; }
  header { padding: 9px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; font-weight: 650; }
  header .crumb { color: var(--dim); font-size: 12px; }
  header .crumb a { text-decoration: none; }
  .main { display: grid; grid-template-columns: 1fr 320px; min-height: 0; }
  @media (max-width: 880px) { .main { grid-template-columns: 1fr; } .rail { display: none; } }
  .stage { position: relative; min-height: 0; }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; }
  canvas.drag { cursor: grabbing; }
  .controls { position: absolute; left: 12px; top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; z-index: 2; }
  .controls .grp { background: #11151f; border: 1px solid var(--line); border-radius: 7px; padding: 5px 9px; font-size: 12px; display: inline-flex; gap: 7px; align-items: center; }
  .controls button { background: #11151f; color: var(--ink); border: 1px solid var(--line); border-radius: 7px; padding: 5px 9px; font-size: 12px; cursor: pointer; }
  .controls button.on { border-color: var(--gold); color: var(--gold); }
  .controls input[type=range] { width: 116px; }
  .controls b { color: var(--gold); font-variant-numeric: tabular-nums; }
  .rail { border-left: 1px solid var(--line); padding: 14px; overflow: auto; background: var(--panel); font-size: 12.5px; }
  .rail h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--dim); margin: 12px 0 6px; } .rail h2:first-child { margin-top: 0; }
  .met { display: grid; grid-template-columns: 1fr auto; gap: 2px 10px; font-variant-numeric: tabular-nums; }
  .met .k { color: var(--dim); } .met .v { text-align: right; } .met .v.bad { color: var(--bad); } .met .v.ok { color: var(--ok); }
  .breaks { margin-top: 10px; border-top: 1px solid var(--line); padding-top: 9px; }
  .breaks .verdict { font-weight: 700; } .breaks .verdict.ok { color: var(--ok); } .breaks .verdict.bad { color: var(--bad); }
  .breaks ul { margin: 6px 0 0; padding-left: 16px; } .breaks li { color: var(--bad); margin: 3px 0; }
  .note { font-size: 11px; color: var(--dim); margin-top: 12px; border-top: 1px solid var(--line); padding-top: 9px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>rind · ops — lay the weave (3D, on the prism)</h1>
    <span class="crumb"><a href="./index.html">← the weave</a> &nbsp;·&nbsp; <a href="./tess.html">tessellation</a> &nbsp;·&nbsp; 6 white + 8 production tubes claim the prism's homogeneous nodes · move the levers and watch it break</span>
  </header>
  <div class="main">
    <div class="stage">
      <div class="controls">
        <span class="grp">width <input id="width" type="range" min="1" max="20" value="3"> <b id="widthV">3</b> wide</span>
        <span class="grp">areal density <input id="dens" type="range" min="14" max="90" value="74"> <b id="densV">·</b></span>
        <span class="grp">flat core <input id="flat" type="range" min="0" max="60" value="16"> <b id="flatV">0.16</b>R</span>
        <button id="chunks" title="1 / 7 / 19 chunks (centered-hexagonal)">⬡ 7 chunks</button>
        <button id="spin" class="on">⟳ auto</button>
        <button id="threads" class="on">centrelines</button>
        <button id="reseed">reseed</button>
        <button id="reset">reset view</button>
      </div>
      <canvas id="cv"></canvas>
    </div>
    <aside class="rail">
      <h2>the levers</h2>
      <div class="met" id="levers"></div>
      <h2>what the weave does to the nodes</h2>
      <div class="met" id="metrics"></div>
      <div class="breaks" id="breaks"></div>
      <div class="note" id="note"></div>
    </aside>
  </div>
</div>
<script type="module" src="./prism-app.js"></script>
</body>
</html>
