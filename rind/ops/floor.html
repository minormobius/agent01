<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04050a">
<title>rind · ops — the demo floor (v100)</title>
<style>
  :root { --ink:#dfe7e2; --dim:#6b7872; --teal:#7fd8d0; --gold:#f4bf62; --bg:#04050a; --panel:#0b1016; --line:#141c24; --rose:#cf5b5b; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font: 13px/1.5 "JetBrains Mono", ui-monospace, monospace; overflow: hidden; }
  a { color: var(--teal); text-decoration: none; }
  a:hover { color: var(--gold); }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair; }
  .hud { position: fixed; pointer-events: none; user-select: none; z-index: 3; }
  #top { top: 8px; left: 10px; font-size: 12px; color: var(--dim); }
  #top a { pointer-events: auto; } #top b { color: var(--gold); }
  #here { top: 8px; right: 12px; text-align: right; color: #9aa8a0; }
  #here .role { color: var(--gold); font-weight: 600; font-size: 14px; }
  #here .sub { color: var(--dim); font-size: 11px; }
  #hint { bottom: 8px; left: 10px; color: var(--dim); font-size: 11px; }
  #hint b { color: var(--teal); }
  .controls { position: fixed; left: 10px; top: 30px; display: flex; gap: 6px; flex-wrap: wrap; z-index: 4; }
  .controls button { pointer-events: auto; background: #0d1117; color: var(--ink); border: 1px solid var(--line); border-radius: 0; clip-path: polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%); padding: 5px 11px; font: inherit; font-size: 11px; cursor: pointer; }
  .controls button.on { border-color: var(--gold); color: var(--gold); }
  #cert { position: fixed; right: 12px; bottom: 10px; width: min(320px, 44vw); font-size: 11px; color: var(--dim); background: rgba(8,11,16,.72); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; z-index: 3; }
  #cert h4 { margin: 0 0 5px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--teal); }
  #cert .row { display: flex; justify-content: space-between; gap: 8px; padding: 1px 0; }
  #cert .row .v { color: var(--ink); }
  #cert p { margin: 6px 0 0; color: #8aa39a; line-height: 1.45; }
  #load { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 20; color: var(--teal); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv"></canvas>
</div>
<div class="controls">
  <button id="rings">7 chunks</button>
  <button id="nexus" class="on">nexus corners</button>
  <button id="droids" class="on">droids</button>
  <button id="glyphs" class="on">glyphs</button>
  <button id="seedDn">seed −</button><button id="seedUp">seed +</button>
</div>
<div class="hud" id="top"><a href="./">← ops</a> · <a href="./tessweave.html">⬡ the map</a> · <a href="./office.html">▤ thread-view</a> · <b>the demo floor</b> — all threads at once (god-view)</div>
<div class="hud" id="here"></div>
<div class="hud" id="hint">move: <b>WASD</b> / <b>click</b> to walk · scroll to zoom · gold ◆ = seam door · gold ○ = nexus corner (mixing point)</div>
<div id="cert"></div>
<div id="load">generating floor…</div>
<script type="module" src="./floor-app.js"></script>
</body>
</html>
