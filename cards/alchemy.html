<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transmute — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>Transmute</h1>
  </header>

  <main>
    <div class="tx-wrap">
      <p class="tx-subtitle">Find two cards whose difference equals the target.</p>
      <div id="tx-status" class="tx-status"></div>

      <!-- Target reagent -->
      <div class="tx-target-section">
        <div class="tx-section-label">Target</div>
        <div id="tx-target-card" class="tx-target-card"></div>
        <button class="tx-btn" id="tx-new-target">New Target</button>
      </div>

      <!-- Hand -->
      <div class="tx-hand-section">
        <div class="tx-section-label">
          Hand <span class="tx-hint">click to select A then B — right-click to preview</span>
        </div>
        <div id="tx-hand" class="tx-hand"></div>
        <div class="tx-hand-actions">
          <button class="tx-btn tx-btn-sm" id="tx-redraw">Redraw Hand</button>
          <button class="tx-btn tx-btn-sm" id="tx-swap">Swap A/B</button>
        </div>
      </div>

      <!-- Transmute -->
      <button class="tx-go-btn hidden" id="tx-go">Transmute</button>

      <!-- Result -->
      <div id="tx-result" class="tx-result"></div>

      <!-- Preview -->
      <div id="tx-preview" class="card-preview hidden"></div>

      <!-- History -->
      <div id="tx-history" class="tx-history"></div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/alchemy-page.js"></script>
</body>
</html>
