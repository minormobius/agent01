<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchemy — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>Alchemy</h1>
  </header>

  <main>
    <div class="alchemy-wrap">
      <div class="alchemy-header">
        <p class="alchemy-subtitle">Combine two articles in embedding space. What emerges?</p>
      </div>
      <div id="alchemy-status" class="alchemy-status"></div>
      <div class="alchemy-slots">
        <div class="alchemy-slot" id="slot-a">
          <div class="alchemy-slot-label">Article A</div>
          <div class="alchemy-slot-content" id="slot-a-content">
            <div class="alchemy-empty">?</div>
          </div>
          <button class="alchemy-draw-btn" id="draw-a">Draw</button>
        </div>
        <div class="alchemy-plus">+</div>
        <div class="alchemy-slot" id="slot-b">
          <div class="alchemy-slot-label">Article B</div>
          <div class="alchemy-slot-content" id="slot-b-content">
            <div class="alchemy-empty">?</div>
          </div>
          <button class="alchemy-draw-btn" id="draw-b">Draw</button>
        </div>
      </div>
      <div class="alchemy-arrow">&darr;</div>
      <button class="alchemy-combine-btn hidden" id="combine-btn">Combine</button>
      <div id="alchemy-result" class="alchemy-result"></div>
      <div id="alchemy-preview" class="card-preview hidden"></div>
      <div id="alchemy-history" class="alchemy-history"></div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/alchemy-page.js"></script>
</body>
</html>
