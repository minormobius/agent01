<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heatmap — Wiki Cards</title>
  <link rel="stylesheet" href="../css/cards.css">
  <style>
    /* ── Heatmap-specific layout ─────────────────────────────── */
    body { overflow: hidden; }
    main { width: 100%; max-width: none; padding: 0; flex: 1; display: flex; flex-direction: column; }

    .heatmap-wrap {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .heatmap-sidebar {
      width: 240px;
      padding: 1rem;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .heatmap-sidebar h2 {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .hm-stat {
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.25rem;
    }

    /* Legend */
    .hm-legend { margin: 0.75rem 0; }
    .hm-legend-bar {
      height: 14px;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .hm-legend-labels {
      display: flex;
      justify-content: space-between;
      font-family: system-ui, sans-serif;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    /* Cluster key */
    .hm-cluster-key { margin-top: 0.75rem; }
    .hm-cluster-row {
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      color: var(--text);
      margin: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hm-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Canvas area */
    .heatmap-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #heatmap-canvas {
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* Tooltip */
    .hm-tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      pointer-events: none;
      display: none;
      z-index: 100;
      max-width: 320px;
      border-radius: 4px;
    }
    .hm-tooltip .t-title { color: var(--text); font-weight: bold; margin-bottom: 2px; }
    .hm-tooltip .t-sim { color: var(--gold); }
    .hm-tooltip .t-cluster { color: var(--text-dim); }
  </style>
</head>
<body>
  <header>
    <a href=".." class="back-link">&larr; Wiki Cards</a>
    <h1>Heatmap</h1>
  </header>

  <main>
    <div class="heatmap-wrap">
      <div class="heatmap-sidebar">
        <h2>Cosine Similarity</h2>
        <div class="hm-stat" id="hm-info">Loading...</div>
        <div class="hm-legend">
          <div class="hm-legend-bar" id="hm-legend-bar"></div>
          <div class="hm-legend-labels"><span>0.0</span><span>0.5</span><span>1.0</span></div>
        </div>
        <div class="hm-cluster-key" id="hm-cluster-key"></div>
        <div style="margin-top:1rem">
          <div class="hm-stat" id="hm-hover">Hover for details</div>
        </div>
      </div>
      <div class="heatmap-canvas-wrap">
        <canvas id="heatmap-canvas"></canvas>
      </div>
    </div>
  </main>

  <div class="hm-tooltip" id="hm-tooltip"></div>

  <script type="module" src="../js/pages/heatmap-page.js"></script>
</body>
</html>
