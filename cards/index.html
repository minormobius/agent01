<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki Cards — Daily Pack</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header>
    <h1>Wiki Cards</h1>
    <p class="subtitle">Open your daily pack of knowledge</p>
  </header>

  <main>
    <!-- Pack state -->
    <div id="pack-screen" class="screen active">
      <div id="pack" class="pack">
        <div class="pack-face pack-front">
          <div class="pack-emblem">W</div>
          <div class="pack-label">Daily Pack</div>
          <div class="pack-date" id="pack-date"></div>
        </div>
        <div class="pack-face pack-back"></div>
      </div>
      <button id="open-btn" class="open-btn">Open Pack</button>
    </div>

    <!-- Cards reveal state -->
    <div id="cards-screen" class="screen">
      <div id="card-grid" class="card-grid"></div>
      <div id="card-detail" class="card-detail hidden">
        <button id="close-detail" class="close-detail-btn">&times;</button>
        <div id="detail-content"></div>
      </div>
      <div class="controls">
        <button id="flip-all-btn" class="ctrl-btn hidden">Reveal All</button>
        <a id="new-pack-btn" class="ctrl-btn hidden" href="#">Tomorrow's pack drops at midnight</a>
      </div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
