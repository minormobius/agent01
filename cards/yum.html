<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yum — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>Yum</h1>
  </header>

  <main>
    <div class="yum-wrap">
      <!-- Pack -->
      <div id="yum-pack" class="yum-pack">
        <div class="yum-pack-face">
          <div class="yum-pack-emblem">Y</div>
          <div class="yum-pack-label">Food Pack</div>
          <div class="yum-pack-count" id="yum-pack-count">455 foods</div>
        </div>
      </div>
      <button id="yum-draw" class="yum-btn">Draw 5</button>

      <!-- Drawn cards -->
      <div id="yum-cards" class="yum-cards"></div>

      <!-- Detail view -->
      <div id="yum-detail" class="yum-detail hidden"></div>

      <!-- Filter -->
      <div class="yum-filters">
        <button class="filter-toggle" id="yum-filter-toggle">
          <span>Filter</span>
          <span class="filter-pool-count" id="yum-pool-count"></span>
          <span class="filter-chevron" id="yum-chevron">&#9662;</span>
        </button>
        <div class="filter-panel hidden" id="yum-filter-panel">
          <div class="filter-section">
            <div class="filter-section-head">
              <span class="filter-label">Categories</span>
              <button class="filter-select-btn" id="yum-cat-all">all</button>
              <button class="filter-select-btn" id="yum-cat-none">none</button>
            </div>
            <div class="filter-chips" id="yum-cat-chips"></div>
          </div>
          <div class="filter-section">
            <div class="filter-section-head">
              <span class="filter-label">Rarity</span>
              <button class="filter-select-btn" id="yum-rarity-all">all</button>
              <button class="filter-select-btn" id="yum-rarity-none">none</button>
            </div>
            <div class="filter-chips" id="yum-rarity-chips"></div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div id="yum-history" class="yum-history"></div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/yum-page.js"></script>
</body>
</html>
