<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arch — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/arch.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>Arch</h1>
  </header>

  <main>
    <div class="arch-wrap">
      <!-- Pack -->
      <div id="arch-pack" class="arch-pack">
        <div class="arch-pack-face">
          <div class="arch-pack-emblem">A</div>
          <div class="arch-pack-label">Structure Pack</div>
          <div class="arch-pack-count" id="arch-pack-count"></div>
        </div>
      </div>
      <button id="arch-draw" class="arch-btn">Draw 6</button>

      <!-- Drawn cards -->
      <div id="arch-cards" class="arch-cards"></div>

      <!-- Detail view -->
      <div id="arch-detail" class="arch-detail hidden"></div>

      <!-- History -->
      <div id="arch-history" class="arch-history"></div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/arch-page.js"></script>
</body>
</html>
