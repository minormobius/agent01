<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>I'm Feeling Lucky</h1>
  </header>

  <main>
    <div class="lucky-wrap">
      <button id="lucky-btn" class="lucky-btn">
        <span class="lucky-btn-text">I'm Feeling Lucky</span>
      </button>
      <div id="lucky-result" class="lucky-result"></div>
      <div id="lucky-history" class="lucky-history"></div>

      <!-- Filter controls -->
      <div class="lucky-filters">
        <button class="filter-toggle" id="filter-toggle">
          <span>Filter</span>
          <span class="filter-pool-count" id="filter-pool-count"></span>
          <span class="filter-chevron" id="filter-chevron">&#9662;</span>
        </button>
        <div class="filter-panel hidden" id="filter-panel">
          <div class="filter-section">
            <div class="filter-section-head">
              <span class="filter-label">Categories</span>
              <button class="filter-select-btn" id="cat-select-all">all</button>
              <button class="filter-select-btn" id="cat-select-none">none</button>
            </div>
            <div class="filter-chips" id="cat-chips"></div>
          </div>
          <div class="filter-section">
            <div class="filter-section-head">
              <span class="filter-label">Rarity</span>
              <button class="filter-select-btn" id="rarity-select-all">all</button>
              <button class="filter-select-btn" id="rarity-select-none">none</button>
            </div>
            <div class="filter-chips" id="rarity-chips"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/lucky-page.js"></script>
</body>
</html>
