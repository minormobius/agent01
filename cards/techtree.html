<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Tree — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/techtree.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>Tech Tree</h1>
    <p class="tt-subtitle" id="tt-count"></p>
  </header>

  <main class="tt-main">
    <!-- Controls bar -->
    <div class="tt-controls">
      <div class="tt-filters" id="tt-filters"></div>
      <div class="tt-zoom-controls">
        <button class="tt-zoom-btn" id="tt-zoom-out">&minus;</button>
        <span class="tt-zoom-label" id="tt-zoom-label">100%</span>
        <button class="tt-zoom-btn" id="tt-zoom-in">+</button>
        <button class="tt-zoom-btn" id="tt-zoom-fit">Fit</button>
      </div>
    </div>

    <!-- Tree viewport -->
    <div class="tt-viewport" id="tt-viewport">
      <div class="tt-canvas" id="tt-canvas">
        <svg class="tt-svg" id="tt-svg"></svg>
        <div class="tt-nodes" id="tt-nodes"></div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="tt-detail hidden" id="tt-detail"></div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/tech-tree-page.js"></script>
</body>
</html>
