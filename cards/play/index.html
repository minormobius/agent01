<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — Wiki Cards</title>
<link rel="stylesheet" href="../css/cards.css">
<style>
  body { overflow: hidden; }
  main { width: 100%; max-width: none; padding: 0; flex: 1; display: flex; flex-direction: column; align-items: center; }
  .game-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem;
  }
  #screen {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid var(--border);
    cursor: none;
  }
  .game-controls {
    font-family: system-ui, sans-serif;
    font-size: 0.7rem;
    color: var(--text-dim);
    text-align: center;
  }
</style>
</head>
<body>
  <header>
    <a href=".." class="back-link">&larr; Wiki Cards</a>
    <h1>Critter Red</h1>
  </header>
  <main>
    <div class="game-wrap">
      <canvas id="screen" width="480" height="432"></canvas>
      <div class="game-controls">Arrow Keys: Move &middot; Z: Confirm &middot; X: Cancel/Menu &middot; Enter: Start</div>
    </div>
  </main>
  <script src="data.js"></script>
  <script src="render.js"></script>
  <script src="overworld.js"></script>
  <script src="battle.js"></script>
  <script src="game.js"></script>
</body>
</html>
