<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Builder — Yum</title>
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header>
    <a href="yum.html" class="back-link">&larr; Yum</a>
    <h1>Recipe Builder</h1>
  </header>

  <main>
    <div class="rb-wrap">
      <div id="rb-status" class="rb-status">Loading flavor data...</div>

      <!-- Selected ingredients (dish in progress) -->
      <div id="rb-selected" class="rb-selected">
        <div class="rb-sel-empty">Click ingredients below to build a dish</div>
      </div>

      <!-- Score display -->
      <div id="rb-score" class="rb-score hidden">
        <div class="rb-score-grade" id="rb-grade">-</div>
        <div class="rb-score-label">Flavor Coherence</div>
        <div class="rb-score-value" id="rb-score-value">-</div>
        <div class="rb-score-dish" id="rb-dish-name"></div>
      </div>

      <!-- Pairing matrix -->
      <div id="rb-matrix" class="rb-matrix hidden">
        <div class="rb-matrix-label">Flavor Pairings</div>
        <div id="rb-matrix-grid" class="rb-matrix-grid"></div>
      </div>

      <!-- Hints -->
      <div id="rb-hints" class="rb-hints hidden"></div>

      <!-- Controls -->
      <div class="rb-controls">
        <button id="rb-save" class="rb-btn" disabled>Save Dish</button>
        <button id="rb-clear" class="rb-btn rb-btn-dim">Deselect</button>
      </div>

      <!-- Search + Filter -->
      <div class="rb-search-wrap">
        <input type="text" id="rb-search" class="rb-search" placeholder="Search ingredients...">
      </div>
      <div class="rb-filters">
        <div class="filter-section-head">
          <span class="filter-label">Categories</span>
          <button class="filter-select-btn" id="rb-cat-all">all</button>
          <button class="filter-select-btn" id="rb-cat-none">none</button>
        </div>
        <div class="filter-chips" id="rb-cat-chips"></div>
      </div>

      <!-- Full ingredient deck -->
      <div id="rb-deck" class="rb-deck"></div>

      <!-- History -->
      <div id="rb-history" class="rb-history"></div>
    </div>
  </main>

  <footer>
    <p>Flavor data from <a href="https://foodb.ca" target="_blank">FooDB</a> (CC BY-NC 4.0) — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/recipe-page.js"></script>
</body>
</html>
