<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem — Wiki Cards</title>
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/gem.css">
</head>
<body>
  <header>
    <a href="." class="back-link">&larr; Wiki Cards</a>
    <h1>Gem</h1>
  </header>

  <main>
    <div class="gem-wrap">
      <!-- Pack -->
      <div id="gem-pack" class="gem-pack">
        <div class="gem-pack-face">
          <div class="gem-pack-emblem">G</div>
          <div class="gem-pack-label">Crystal Pack</div>
          <div class="gem-pack-count" id="gem-pack-count"></div>
        </div>
      </div>
      <button id="gem-draw" class="gem-btn">Draw 6</button>

      <!-- Drawn cards -->
      <div id="gem-cards" class="gem-cards"></div>

      <!-- Crystal viewer -->
      <div id="gem-viewer" class="gem-viewer hidden">
        <div class="gem-viewer-header">
          <button id="gem-viewer-close" class="gem-viewer-close">&times;</button>
          <div class="gem-viewer-title" id="gem-viewer-title"></div>
          <div class="gem-viewer-meta" id="gem-viewer-meta"></div>
        </div>
        <canvas id="gem-canvas" width="600" height="600"></canvas>
        <div class="gem-viewer-info" id="gem-viewer-info"></div>
      </div>

      <!-- History -->
      <div id="gem-history" class="gem-history"></div>
    </div>
  </main>

  <footer>
    <p>Powered by <a href="https://en.wikipedia.org" target="_blank">Wikipedia</a> — a <a href="https://minomobi.com" target="_blank">minomobi</a> thing</p>
  </footer>

  <script type="module" src="js/gem-page.js"></script>
</body>
</html>
