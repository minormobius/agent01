<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #050608; --panel: #0e1014; --fg: #e7e9ee; --muted: #8b909c;
  --rule: #23272f; --accent: #38e1c0; --hot: #ff6b3d; --cold: #4a7cff;
  --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, monospace;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: var(--mono); overflow: hidden; overscroll-behavior: none; }
body { display: flex; flex-direction: column; touch-action: manipulation; }
a { color: var(--accent); text-decoration: none; }

/* ── top chrome (minimal — appears piece by piece) ───────────────────────── */
#bar { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-bottom: 1px solid var(--rule); min-height: 44px; }
#bar .home { color: var(--muted); font-size: 13px; } #bar .home:hover { color: var(--accent); }
#bar .lvl { font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 0.04em; opacity: 0; transition: opacity 0.4s; }
#bar .lvl.show { opacity: 1; }
#bar .spacer { flex: 1; }
#bar .lab { font-size: 11px; color: var(--muted); border: 1px solid var(--rule); border-radius: 6px; padding: 4px 8px; opacity: 0; transition: opacity 0.4s; }
#bar .lab.show { opacity: 0.7; } #bar .lab:hover { opacity: 1; color: var(--accent); }

/* ── heat gauge (unfolds after first tap) ────────────────────────────────── */
#gauge { flex: 0 0 auto; height: 0; overflow: hidden; transition: height 0.5s; }
#gauge.show { height: 26px; }
#gauge .track { margin: 7px 14px; height: 6px; border-radius: 4px; background: linear-gradient(90deg, var(--cold), #2a6b4f 38%, var(--accent) 55%, #d6b54a 78%, var(--hot)); position: relative; opacity: 0.85; }
#gauge .knob { position: absolute; top: -4px; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.7); transform: translateX(-50%); transition: left 0.6s cubic-bezier(.2,.8,.2,1); }
#gauge .tag { position: absolute; top: -22px; font-size: 10px; color: var(--muted); transform: translateX(-50%); white-space: nowrap; }

/* ── play area ───────────────────────────────────────────────────────────── */
#stage { flex: 1 1 auto; min-height: 0; position: relative; display: flex; align-items: center; justify-content: center; padding: 10px; }

/* grid of 16 (levels 1–2) */
#grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: min(100%, calc(100dvh - 210px)); aspect-ratio: 1; }
.cell { position: relative; border-radius: 9px; overflow: hidden; background: #000; border: 2px solid var(--rule); cursor: pointer; transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s, opacity 0.4s; opacity: 0; }
.cell.in { opacity: 1; }
.cell canvas { width: 100%; height: 100%; display: block; }
.cell:hover { transform: scale(1.03); border-color: #4b5560; }
.cell.sel { border-color: #fff; transform: scale(1.05); box-shadow: 0 0 0 2px var(--accent), 0 0 18px rgba(56,225,192,0.5); z-index: 2; }
.cell.selB { border-color: #fff; box-shadow: 0 0 0 2px var(--hot), 0 0 18px rgba(255,107,61,0.5); }
.cell .boil { position: absolute; inset: 0; border-radius: 7px; box-shadow: inset 0 0 0 2px var(--hot); animation: boilpulse 1.1s ease-in-out infinite; pointer-events: none; }
@keyframes boilpulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.9; } }
.cell .pick { position: absolute; top: 4px; left: 5px; font-size: 10px; font-weight: 700; color: #04110e; background: var(--accent); border-radius: 4px; padding: 1px 5px; }
.cell .pickB { background: var(--hot); color: #fff; }

/* big live organism (level 3) */
#big { display: none; width: min(100%, calc(100dvh - 210px)); aspect-ratio: 1; border-radius: 14px; overflow: hidden; background: #000; border: 1px solid var(--rule); position: relative; touch-action: none; }
#big canvas { width: 100%; height: 100%; display: block; }
#big .swipehint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 6%; pointer-events: none; font-size: 30px; font-weight: 800; }
#big .swipehint .nay { color: var(--muted); } #big .swipehint .yay { color: var(--hot); }
#big .flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
#big .flash.hot { background: radial-gradient(circle, rgba(255,107,61,0.35), transparent 70%); }
#big .flash.not { background: radial-gradient(circle, rgba(74,124,255,0.28), transparent 70%); }
#big .flash.go { animation: flash 0.45s ease-out; }
@keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

/* ── prompt / dock ───────────────────────────────────────────────────────── */
#prompt { flex: 0 0 auto; text-align: center; font-size: 14px; color: var(--fg); padding: 4px 16px 2px; min-height: 22px; }
#prompt b { color: var(--accent); }
#dock { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 14px 16px; flex-wrap: wrap; }
.btn { font-family: var(--mono); font-size: 13px; color: var(--fg); background: var(--panel); border: 1px solid var(--rule); border-radius: 9px; padding: 11px 18px; cursor: pointer; min-width: 96px; }
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn.primary { color: #04110e; background: var(--accent); border-color: var(--accent); font-weight: 700; }
.btn.primary:disabled { background: #1c3a34; color: #6b8f88; border-color: #1c3a34; }
.btn.nay { color: var(--muted); } .btn.yay { color: #fff; background: var(--hot); border-color: var(--hot); font-weight: 700; }
.ghost { background: transparent; border: 0; color: var(--muted); font-size: 12px; cursor: pointer; } .ghost:hover { color: var(--accent); }

/* ── overlays ────────────────────────────────────────────────────────────── */
.ov { position: fixed; inset: 0; background: rgba(5,6,8,0.86); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 30px; z-index: 50; }
.ov.show { display: flex; }
.ov h1 { font-size: clamp(40px, 11vw, 88px); margin: 0; letter-spacing: -0.02em; }
.ov h1.boil { color: var(--hot); text-shadow: 0 0 40px rgba(255,107,61,0.6); }
.ov h1.tame { color: var(--accent); text-shadow: 0 0 40px rgba(56,225,192,0.5); }
.ov p { color: var(--muted); font-size: 15px; max-width: 40ch; line-height: 1.6; margin: 16px 0 26px; }
.ov .big { font-size: 16px; }

#toast { position: fixed; left: 50%; bottom: 78px; transform: translateX(-50%) translateY(20px); background: rgba(14,16,20,0.95); border: 1px solid var(--rule); border-radius: 10px; padding: 9px 15px; font-size: 12px; color: var(--accent); opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 60; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#fatal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; text-align: center; padding: 40px; color: #e0556b; font-size: 14px; line-height: 1.6; z-index: 100; }

@keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div id="bar">
  <a class="home" href="../">← fluoddity</a>
  <span class="lvl" id="lvl"></span>
  <span class="spacer"></span>
  <span id="auth"></span>
  <a class="lab" id="lablink" href="../arena.html">⚙ lab</a>
</div>

<div id="gauge"><div class="track"><div class="knob" id="knob" style="left:8%"></div><div class="tag" id="gtag" style="left:8%">cold</div></div></div>

<div id="stage">
  <div id="grid"></div>
  <div id="big">
    <canvas id="bigcv"></canvas>
    <div class="swipehint"><span class="nay">✕</span><span class="yay">♥</span></div>
    <div class="flash" id="flash"></div>
  </div>
</div>

<div id="prompt">warming up…</div>
<div id="dock"></div>

<!-- overlays -->
<div class="ov" id="ov-level">
  <h1 id="ov-title"></h1>
  <p id="ov-body"></p>
  <button class="btn primary" id="ov-go">continue →</button>
</div>
<div class="ov" id="ov-gate">
  <h1 style="font-size:clamp(30px,8vw,56px);color:var(--accent)">one more thing</h1>
  <p class="big">You found a hot organism. Now <b>breed</b> it — an endless stream shaped by your taste.<br><br>Sign in with Bluesky so the ones you love get saved to <b>your</b> account (and feed the shared menagerie). Nothing else is stored.</p>
  <div id="gate-auth"></div>
  <button class="ghost" id="gate-skip" style="margin-top:18px">maybe later — back to taming</button>
</div>

<div id="toast"></div>
<div id="fatal"></div>

<script type="module">
"use strict";
import { FluoddityEngine, randomConfig, mutate, defaultConfig, PARAMS } from '../engine.js';
import { readDescriptors, verdict, fitness, fitness2, merge, FEATURES8 } from '../descriptors.js';
import { auth, mountAuthChip } from '../authchip.js';

const $ = (s) => document.querySelector(s);
const ANCHOR = 'did:web:g.mino.mobi';
const ORG = 'com.minomobi.fluoddity.organism';
const RUB = 'com.minomobi.fluoddity.rubric';
const EXP = 'com.minomobi.fluoddity.expedition';

// ── tuning constants (see fluoddity/GAME.md §4–§8) ──────────────────────────
const DIM = 320, COUNT = 30000;          // compact engine for the 16-cell grid
const SETTLE = 210, MOTION = 8, T2 = 150; // settle → motion read → second snapshot
const T_START = 0.12, T_STEP = 0.13;      // level-1 heat ladder
const SPREAD_L1 = 0.03, SPREAD_L2 = 0.06; // how far the 16 seeds fan out
const REFIT_EVERY = 3, MIN_EACH = 4;      // rubric fit cadence / minimum votes
const ORG_MIN_MS = 1500, ORG_CAP = 60;    // PDS write hygiene (level 3)

mountAuthChip($('#auth'));

let engine = null;
try { engine = new FluoddityEngine(DIM, COUNT); }
catch (e) { $('#fatal').style.display = 'flex'; $('#fatal').textContent = 'This game needs WebGL2 with float render targets — ' + (e.message || e); }

// ── tiny helpers ─────────────────────────────────────────────────────────────
const lerp = (a, b, t) => a + (b - a) * t;
const clamp01 = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
const sleep = () => new Promise(r => requestAnimationFrame(r));
function toast(msg) { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 1600); }
async function sha12(s) { const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(b)].slice(0, 6).map(x => x.toString(16).padStart(2, '0')).join(''); }
const encodeCfg = (c) => btoa(unescape(encodeURIComponent(JSON.stringify(c)))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
// "too hot" folds boiling + blown-out together so the win/lose test is robust to
// exactly where the chaotic edge lands for a given seed.
const tooHot = (vd) => vd === 'boiling' || vd === 'blown out';

// A base genome's shape knobs are fixed; the energy knobs ride temperature T.
function hero() {
  const g = defaultConfig();
  g.cohorts = 16; g.mutation_scale = 0.02; g.trail_diffusion = 0.6; g.ink = 2.6;
  return g;
}
function genomeAt(base, T, seed) {
  const g = { ...base };
  g.global_force_mult = lerp(0.12, 1.3, T);
  g.sensor_gain = lerp(1.5, 7.0, T);
  g.trail_persistence = lerp(0.985, 0.90, T);
  g.rule_seed = seed;
  return g;
}

// Settle a config on the shared engine and read its phenotype + verdict. Returns
// { vd, fit, v } where v carries the 8 merged descriptor fields a rubric reads.
function evaluate(cfg) {
  engine.load(cfg, 'ev' + Math.random());
  engine.step(SETTLE); engine.render();
  const a1 = readDescriptors(engine.cv, null);
  engine.step(MOTION); engine.render();
  const v1 = readDescriptors(engine.cv, a1.lum);
  engine.step(T2); engine.render();
  const a2 = readDescriptors(engine.cv, null);
  engine.step(MOTION); engine.render();
  const v2 = readDescriptors(engine.cv, a2.lum);
  const v = merge(v1, v2);
  return { vd: verdict(v1, false), fit: fitness2(v1, v2), v };
}

// Reject-sample a base genome that is genuinely alive at mid temperature, so the
// level-1 heat ladder has somewhere good to climb to. Falls back to best-of-N.
function findHero() {
  const base = hero();
  let best = null, bestFit = -1;
  for (let i = 0; i < 14; i++) {
    const seed = Math.random();
    const r = evaluate(genomeAt(base, 0.5, seed));
    if (r.fit > bestFit) { bestFit = r.fit; best = seed; }
    if (bestFit > 0.18) break;
  }
  return { base, seed: best };
}

// ═══════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════
const SKEY = 'fluoddity_game_state';
let S = { level: 1, T: T_START, center: null, seedBase: null, picks: [], gen: 0 };
let cells = [];           // [{cfg, vd, fit, v, el, cv}]
let busy = false;
let HERO = null;

function save() { try { localStorage.setItem(SKEY, JSON.stringify({ level: S.level, T: S.T, center: S.center, seedBase: S.seedBase, champion: S.champion || null })); } catch {} }
function restore() { try { const r = JSON.parse(localStorage.getItem(SKEY) || 'null'); if (r && r.center != null) return r; } catch {} return null; }

// ── grid plumbing ────────────────────────────────────────────────────────────
function buildGridDom() {
  const g = $('#grid'); g.innerHTML = ''; cells = [];
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div'); el.className = 'cell';
    const cv = document.createElement('canvas'); cv.width = cv.height = DIM; el.appendChild(cv);
    el.addEventListener('click', () => pick(i));
    g.appendChild(el);
    cells.push({ el, cv, cfg: null, vd: 'settling…', fit: 0, v: null });
  }
}
function blit(cell) {
  const ctx = cell.cv.getContext('2d');
  ctx.drawImage(engine.cv, 0, 0, DIM, DIM);
}

// Render the 16 candidate genomes one at a time (proven select.html pattern):
// settle → snapshot → blit, yielding to the UI so cells pop in like cards.
async function renderGrid(genomes) {
  busy = true;
  cells.forEach(c => { c.el.classList.remove('in', 'sel', 'selB'); c.el.querySelector('.boil')?.remove(); c.el.querySelector('.pick')?.remove(); });
  S.picks = [];
  let boiling = 0, alive = 0;
  for (let i = 0; i < 16; i++) {
    const cfg = genomes[i];
    const r = evaluate(cfg);
    blit(cells[i]);
    cells[i].cfg = cfg; cells[i].vd = r.vd; cells[i].fit = r.fit; cells[i].v = r.v;
    if (tooHot(r.vd)) { boiling++; const b = document.createElement('div'); b.className = 'boil'; cells[i].el.appendChild(b); }
    if (r.vd === 'alive') alive++;
    cells[i].el.classList.add('in');
    await sleep();
  }
  busy = false;
  onGridReady(boiling, alive);
}

// ── level 1: HEAT ───────────────────────────────────────────────────────────
function startLevel1(resumed) {
  S.level = 1; setLevelLabel('level 1 · heat');
  $('#gauge').classList.toggle('show', false);
  setDock([{ id: 'reroll', label: '↻ new', cls: '', fn: freshHero }]);
  prompt('warming up…');
  if (!resumed) { const h = findHero(); HERO = h.base; S.seedBase = h.seed; S.center = h.seed; S.T = T_START; }
  S.gen = 0;
  renderGrid(gridL1());
}
function gridL1() {
  const out = [];
  for (let k = 0; k < 16; k++) out.push(genomeAt(HERO, S.T, S.center + (k - 7.5) * SPREAD_L1));
  return out;
}
function freshHero() { if (busy) return; const h = findHero(); HERO = h.base; S.seedBase = h.seed; S.center = h.seed; S.T = T_START; S.gen = 0; setGauge(); renderGrid(gridL1()); }

// ── level 2: TAME ────────────────────────────────────────────────────────────
function startLevel2() {
  S.level = 2; setLevelLabel('level 2 · tame'); save();
  setDock([
    { id: 'apply', label: 'regrow', cls: 'primary', fn: applyL2 },
    { id: 'reroll', label: '↻ reset', cls: '', fn: () => renderGrid(gridFromHero()) },
  ]);
  renderGrid(gridFromHero());
}
function gridFromHero() {
  // hand level-1's hot family over as 16 full, independent genomes to tame.
  const out = [];
  for (let k = 0; k < 16; k++) out.push(genomeAt(HERO, S.T, S.center + (k - 7.5) * SPREAD_L2));
  return out;
}
function applyL2() {
  if (busy) return;
  const ps = S.picks.slice();
  let genomes;
  if (ps.length >= 2) {                       // 2 taps → interpolate A↔B across 16
    const A = cells[ps[0]].cfg, B = cells[ps[1]].cfg;
    genomes = interpolate(A, B);
    prompt('blending the two…');
  } else if (ps.length === 1) {               // 1 tap → mutate around it
    const P = cells[ps[0]].cfg;
    genomes = Array.from({ length: 16 }, (_, k) => k === 0 ? { ...P } : mutate(P, 0.45));
    prompt('mutating around your pick…');
  } else {                                    // 0 taps → fresh hero seed
    const h = findHero(); HERO = h.base; S.center = h.seed;
    genomes = gridFromHero();
    prompt('seeded fresh…');
  }
  renderGrid(genomes);
}
// Interpolate two genomes across the 16 cells. Continuous physics knobs lerp
// linearly (so the morph reads as a gradient even where the brain jumps); the
// rule_seed walks the line from A to B — exactly arena's seedOf() line, reused.
function interpolate(A, B) {
  const out = [];
  for (let k = 0; k < 16; k++) {
    const t = k / 15, g = { ...A };
    for (const key in PARAMS) g[key] = lerp(A[key] ?? defaultConfig()[key], B[key] ?? defaultConfig()[key], t);
    g.rule_seed = lerp(A.rule_seed, B.rule_seed, t);
    g.cohorts = 16;
    out.push(g);
  }
  return out;
}

// ── selection (levels 1–2) ───────────────────────────────────────────────────
function pick(i) {
  if (busy || !cells[i].cfg) return;
  if (S.level === 1) {
    // a pick re-centers on that brain and turns up the heat one notch.
    S.center = cells[i].cfg.rule_seed; S.T = clamp01(S.T + T_STEP); S.gen++;
    $('#gauge').classList.add('show'); setGauge(); save();
    flashSel(i);
    setTimeout(() => renderGrid(gridL1()), 220);
  } else {
    // level 2: collect up to two picks; A is accent, B is hot.
    const idx = S.picks.indexOf(i);
    if (idx >= 0) { S.picks.splice(idx, 1); }
    else if (S.picks.length < 2) { S.picks.push(i); }
    else { S.picks = [i]; }
    cells.forEach((c, j) => {
      c.el.classList.toggle('sel', S.picks[0] === j);
      c.el.classList.toggle('selB', S.picks[1] === j);
      c.el.querySelector('.pick')?.remove();
      const r = S.picks.indexOf(j);
      if (r >= 0) { const t = document.createElement('div'); t.className = 'pick' + (r === 1 ? ' pickB' : ''); t.textContent = r === 1 ? 'B' : 'A'; c.el.appendChild(t); }
    });
    prompt(S.picks.length === 0 ? 'tap up to <b>two</b> calm ones, then regrow' : S.picks.length === 1 ? 'tap a <b>second</b> to blend — or regrow to mutate this one' : 'regrow to blend <b>A × B</b>');
  }
}
function flashSel(i) { cells[i].el.classList.add('sel'); }

// ── what to do when a grid finishes rendering ────────────────────────────────
function onGridReady(boiling, alive) {
  if (S.level === 1) {
    setGauge();
    if (boiling >= 1) { winLevel1(); return; }
    prompt(S.gen === 0 ? 'tap the one you like — <b>make it interesting</b>' : 'warmer… keep tapping the liveliest one');
  } else if (S.level === 2) {
    setBoilLabel(boiling);
    if (boiling === 0 && alive >= 3) { winLevel2(); return; }
    if (S.picks.length === 0) prompt(`<b>${boiling}/16 boiling</b> — tap up to two calm ones, then regrow`);
  }
}

function winLevel1() {
  setLevelLabel('');
  overlay('boil', 'IT BOILED', 'You rode it all the way to the chaotic edge.<br><br>Now the harder game: <b>tame the boil.</b> A second tap lets you blend two organisms — pull the whole field back from chaos without letting it die.', () => startLevel2());
}
function winLevel2() {
  setLevelLabel('');
  // remember the calmest pick (or champion) as the seed for breeding.
  const champ = S.picks.length ? cells[S.picks[0]] : cells.slice().sort((a, b) => b.fit - a.fit)[0];
  S.champion = champ ? { ...champ.cfg } : gridFromHero()[8];
  save();
  overlay('tame', 'TAMED', 'You found the living edge — structured, moving, not boiling.<br><br>Last unlock: <b>breed it.</b> An endless stream, one at a time. Keep the ones you love. Your taste steers the rest — and your finds are saved to your own Bluesky.', () => gateLevel3());
}

// ═══════════════════════════════════════════════════════════════════════════
//  LEVEL 3: BREED  (background evolution + HOT/NOT swipe + auto-publish)
// ═══════════════════════════════════════════════════════════════════════════
let L3 = null;
function gateLevel3() {
  if (auth.isLoggedIn()) { startLevel3(); return; }
  const ga = $('#gate-auth'); ga.innerHTML = '<button class="btn primary" id="gate-in">sign in with Bluesky</button>';
  $('#gate-in').addEventListener('click', async () => {
    const h = window.prompt('Your Bluesky handle (e.g. alice.bsky.social):'); if (!h) return;
    ga.innerHTML = '<span style="color:var(--muted)">redirecting…</span>';
    try { await auth.login(h.trim(), { returnTo: location.href.split('#')[0] + '#l3' }); }
    catch (e) { ga.innerHTML = '<span style="color:#e0556b">' + (e.message || e) + '</span>'; }
  });
  $('#gate-skip').onclick = () => { $('#ov-gate').classList.remove('show'); startLevel2(); };
  $('#ov-gate').classList.add('show');
}

function startLevel3() {
  $('#ov-gate').classList.remove('show'); $('#ov-level').classList.remove('show');
  S.level = 3; setLevelLabel('level 3 · breed'); $('#gauge').classList.remove('show');
  $('#grid').style.display = 'none'; $('#big').style.display = 'block';
  $('#lablink').setAttribute('href', '../breed.html');
  // bigger, livelier engine for the one-at-a-time stream.
  try { engine = new FluoddityEngine(480, 55000); } catch {}
  const seed = S.champion || gridFromHero()[8];
  L3 = {
    pool: [{ config: seed, score: 1 }],
    votes: { hotF: [], notF: [] }, traj: [], scoreFn: null,
    rubricRkey: 'game' + Date.now().toString(36),
    sessionStartedAt: new Date().toISOString(),
    saved: new Set(), lastOrgAt: 0, orgCount: 0, served: 0,
    cur: null, prevLum: null, v1: null, v2: null,
  };
  // pick up any taste the player trained earlier on hot.html.
  try { const r = JSON.parse(localStorage.getItem('fluoddity_active_rubric') || 'null'); if (r?.code) installRubric(r.code); } catch {}
  setDock([
    { id: 'not', label: '✕  not', cls: 'nay', fn: () => swipe(0) },
    { id: 'yay', label: '♥  hot', cls: 'yay', fn: () => swipe(1) },
  ]);
  prompt('keep the ones you like — <b>swipe or tap</b>');
  bindSwipe();
  serveNext();
  requestAnimationFrame(l3Loop);
  window.addEventListener('pagehide', flushExpedition, { once: true });
}

function installRubric(code) { try { L3.scoreFn = new Function('v', 'fit', 'nov', 'align', 'verdict', 'gen', 'config', code); } catch { L3.scoreFn = null; } }
function scoreOf(v, fit) { if (!L3.scoreFn) return fit; try { const x = L3.scoreFn(v, fit, 0, 0, '', 0, null); return Number.isFinite(x) ? x : fit; } catch { return fit; } }

// softmax parent pick (tau≈0.3) → mutate → that's the next card. Breeding really
// is happening "in the background": the pool evolves with every vote.
function serveNext() {
  const pool = L3.pool, tau = 0.3;
  let mx = -Infinity; for (const p of pool) mx = Math.max(mx, p.score);
  let sum = 0; const w = pool.map(p => { const e = Math.exp((p.score - mx) / tau); sum += e; return e; });
  let r = Math.random() * sum, pi = 0; for (; pi < w.length; pi++) { r -= w[pi]; if (r <= 0) break; }
  const parent = pool[Math.min(pi, pool.length - 1)];
  const child = mutate(parent.config, 0.8);
  engine.load(child, 'l3_' + (L3.served++));
  L3.cur = { config: child }; L3.prevLum = null; L3.v1 = null; L3.v2 = null; L3.curFrames = 0;
}

function l3Loop() {
  if (S.level !== 3) return;
  engine.step(5); engine.render();
  const ctx = $('#bigcv').getContext('2d');
  if ($('#bigcv').width !== 480) { $('#bigcv').width = $('#bigcv').height = 480; }
  ctx.drawImage(engine.cv, 0, 0, 480, 480);
  if ((++L3.curFrames % 20) === 0) {            // roll two snapshots for the feature vector
    const a = readDescriptors(engine.cv, L3.prevLum);
    L3.v1 = L3.v2 || a; L3.v2 = a; L3.prevLum = a.lum;
  }
  requestAnimationFrame(l3Loop);
}

async function swipe(label) {
  if (!L3 || !L3.cur || !L3.v2) return;
  const v = merge(L3.v1 || L3.v2, L3.v2);
  const feats = FEATURES8.map(k => +v[k] || 0);
  const fit = fitness(L3.v2);
  flashBig(label);
  if (label === 1) {
    L3.votes.hotF.push(feats);
    L3.pool.push({ config: L3.cur.config, score: 1.2 + scoreOf(v, fit) });
    if (L3.pool.length > 40) L3.pool.shift();
    publishOrganism(L3.cur.config);            // auto-save the keeper (deduped, rate-limited)
  } else {
    L3.votes.notF.push(feats);
    L3.pool.push({ config: L3.cur.config, score: -0.5 });  // remembered as a low-score anchor
    if (L3.pool.length > 40) L3.pool.shift();
  }
  L3.traj.push([L3.served, null, 0, +fit.toFixed(4), ...feats.map(x => +x.toFixed(4))]);
  maybeRefit();
  serveNext();
}

async function maybeRefit() {
  const H = L3.votes.hotF, N = L3.votes.notF, total = H.length + N.length;
  if (H.length < MIN_EACH || N.length < MIN_EACH || total % REFIT_EVERY !== 0) return;
  const F = [...H, ...N], y = [...H.map(() => 1), ...N.map(() => 0)];
  const { w, b, acc } = trainLogistic(F, y);
  const terms = w.map((wi, j) => `${wi.toFixed(4)} * v.${FEATURES8[j]}`);
  const code = `// ${total} judgments · ${(acc * 100).toFixed(1)}% accuracy\nreturn ${terms.join(' + ')} + (${b.toFixed(4)});`;
  installRubric(code);
  const scorerHash = await sha12(code);
  try { localStorage.setItem('fluoddity_active_rubric', JSON.stringify({ code, scorerHash, savedAt: new Date().toISOString(), source: 'game' })); localStorage.setItem('fluoddity_breed_custom_score', code); } catch {}
  toast(`taste updated · ${(acc * 100).toFixed(0)}% sharp`);
  // keep one rubric record, updated in place.
  if (auth.isLoggedIn()) {
    try {
      await auth.pds.putRecord(RUB, L3.rubricRkey, {
        $type: RUB, name: 'taste from the game', schemaVersion: 1, scorer: code, scorerHash,
        features: FEATURES8.slice(), weights: JSON.stringify(w.map(x => +x.toFixed(5))), bias: JSON.stringify(+b.toFixed(5)),
        trainingSize: total, accuracy: JSON.stringify(+acc.toFixed(3)),
        judgments: JSON.stringify([...H.map(f => [1, ...f]), ...N.map(f => [0, ...f])]).slice(0, 79000),
        rubricForest: ANCHOR, createdAt: L3.sessionStartedAt,
      });
    } catch {}
  }
}

function trainLogistic(F, y, iters = 300, lr = 0.25) {
  const n = F.length, d = F[0].length; let w = new Array(d).fill(0), b = 0;
  for (let it = 0; it < iters; it++) {
    const gw = new Array(d).fill(0); let gb = 0;
    for (let i = 0; i < n; i++) {
      let z = b; for (let j = 0; j < d; j++) z += w[j] * F[i][j];
      const e = 1 / (1 + Math.exp(-z)) - y[i];
      for (let j = 0; j < d; j++) gw[j] += e * F[i][j]; gb += e;
    }
    for (let j = 0; j < d; j++) w[j] -= lr * gw[j] / n; b -= lr * gb / n;
  }
  let c = 0; for (let i = 0; i < n; i++) { let z = b; for (let j = 0; j < d; j++) z += w[j] * F[i][j]; if ((z > 0 ? 1 : 0) === y[i]) c++; }
  return { w, b, acc: c / n };
}

// ── publishing (best-effort; never blocks play) ──────────────────────────────
async function publishOrganism(cfg) {
  if (!auth.isLoggedIn()) return;
  const now = Date.now();
  if (now - L3.lastOrgAt < ORG_MIN_MS || L3.orgCount >= ORG_CAP) return;
  const key = cfg.rule_seed.toFixed(6) + ':' + cfg.global_force_mult.toFixed(3);
  if (L3.saved.has(key)) return;
  L3.saved.add(key); L3.lastOrgAt = now; L3.orgCount++;
  try {
    await auth.pds.createRecord(ORG, {
      $type: ORG, name: 'from the game · ' + new Date().toLocaleDateString(),
      schemaVersion: 1, config: JSON.stringify(cfg), gallery: ANCHOR, createdAt: new Date().toISOString(),
    });
    toast('saved to your garden ✦');
  } catch { L3.orgCount--; }
}

let _flushed = false;
async function flushExpedition() {
  if (_flushed || !L3 || !auth.isLoggedIn() || L3.traj.length < 6) return;
  _flushed = true;
  const code = L3.scoreFn ? (localStorage.getItem('fluoddity_breed_custom_score') || 'default') : 'default';
  try {
    await auth.pds.createRecord(EXP, {
      $type: EXP, name: 'a game session', schemaVersion: 2,
      start: JSON.stringify(S.champion || {}), scorer: code, scorerHash: await sha12(code),
      trajectory: JSON.stringify(L3.traj).slice(0, 199000),
      knobs: JSON.stringify({ tau: 0.3, popSize: L3.pool.length, mutRate: 0.8 }),
      generations: L3.served, forest: ANCHOR, createdAt: L3.sessionStartedAt,
    });
  } catch {}
}

// ── swipe gestures on the big card ───────────────────────────────────────────
function bindSwipe() {
  const el = $('#big'); let x0 = null;
  el.addEventListener('pointerdown', (e) => { x0 = e.clientX; });
  el.addEventListener('pointerup', (e) => {
    if (x0 == null) return; const dx = e.clientX - x0; x0 = null;
    if (Math.abs(dx) > 50) swipe(dx > 0 ? 1 : 0);
  });
  el.addEventListener('click', (e) => { /* tap center = hot, edges handled by buttons */ });
}
function flashBig(label) { const f = $('#flash'); f.className = 'flash ' + (label ? 'hot' : 'not'); void f.offsetWidth; f.classList.add('go'); }

// ── small HUD helpers ────────────────────────────────────────────────────────
function prompt(html) { $('#prompt').innerHTML = html; }
function setLevelLabel(t) { const e = $('#lvl'); e.textContent = t; e.classList.toggle('show', !!t); }
function setBoilLabel(n) { prompt(`<b>${n}/16 boiling</b> — blend two calm ones to cool it (without letting it die)`); }
function setGauge() {
  const p = clamp01(S.T) * 84 + 8;
  $('#knob').style.left = p + '%'; $('#gtag').style.left = p + '%';
  $('#gtag').textContent = S.T < 0.3 ? 'cold' : S.T < 0.55 ? 'warming' : S.T < 0.78 ? 'alive' : 'boiling';
}
function setDock(btns) {
  const d = $('#dock'); d.innerHTML = '';
  for (const b of btns) { const el = document.createElement('button'); el.className = 'btn ' + b.cls; el.id = 'b-' + b.id; el.innerHTML = b.label; el.onclick = b.fn; d.appendChild(el); }
}
function overlay(kind, title, body, go) {
  const t = $('#ov-title'); t.textContent = title; t.className = kind;
  $('#ov-body').innerHTML = body; $('#ov-level').classList.add('show');
  $('#ov-go').onclick = () => { $('#ov-level').classList.remove('show'); go(); };
}

// ═══════════════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════════════
if (engine) {
  buildGridDom();
  // returning from the level-3 OAuth redirect? resume straight into breeding.
  if (location.hash === '#l3') { history.replaceState({}, '', location.pathname); const r = restore(); if (r) { S = { ...S, ...r }; HERO = hero(); } startLevel3(); }
  else {
    const r = restore();
    if (r && r.level === 2 && r.center != null) { HERO = hero(); S = { ...S, ...r }; startLevel2(); }
    else { startLevel1(false); }
  }
  document.addEventListener('visibilitychange', () => { /* engine loops are raf-driven; they pause when hidden */ });
}
</script>
