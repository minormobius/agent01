<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover, maximum-scale=1">
<title>Paint &mdash; minomobi</title>
<meta name="description" content="A pocket MS Paint for the open web. Pinch to zoom. Share to Bluesky.">
<meta name="theme-color" content="#1a1a1a">
<meta property="og:type" content="website">
<meta property="og:title" content="Paint &mdash; minomobi">
<meta property="og:description" content="A pocket MS Paint for the open web. Pinch to zoom. Share to Bluesky.">
<meta property="og:url" content="https://mino.mobi/paint">
<style>
:root {
  --bg: #faf9f6;
  --panel: #f1efe8;
  --panel-2: #e6e3d8;
  --text: #1a1a1a;
  --muted: #777;
  --rule: #b8b3a3;
  --accent: #8b0000;
  --accent-faint: rgba(139, 0, 0, 0.10);
  --good: #2a7a2a;
  --canvas-edge: #999;
  --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace;
  --rail: 56px;
  --topbar: 44px;
  --bottombar: 92px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --panel: #181818;
    --panel-2: #222;
    --text: #e6e1d6;
    --muted: #888;
    --rule: #2a2a2a;
    --accent: #c45;
    --accent-faint: rgba(204, 68, 85, 0.18);
    --good: #55b070;
    --canvas-edge: #444;
  }
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: var(--serif); cursor: pointer; }

/* === Top bar === */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar);
  background: var(--panel);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 4px;
  z-index: 5;
  padding-top: env(safe-area-inset-top, 0);
  height: calc(var(--topbar) + env(safe-area-inset-top, 0));
}
.crumb {
  font-size: 14px;
  margin-right: 6px;
  white-space: nowrap;
  flex: 0 0 auto;
}
.crumb a { color: inherit; text-decoration: none; }
.crumb .slash { color: var(--muted); }
.crumb .title { color: var(--accent); font-style: italic; }
.spacer { flex: 1 1 auto; min-width: 0; }
.action {
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  letter-spacing: 0.02em;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.action svg { width: 14px; height: 14px; flex: 0 0 auto; }
.action:hover { background: var(--accent-faint); border-color: var(--accent); color: var(--accent); }
.action:active { transform: translateY(1px); }
.action[disabled] { opacity: 0.4; cursor: not-allowed; }
.action.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.action.accent:hover { filter: brightness(1.08); background: var(--accent); color: #fff; }
.zoom-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  min-width: 42px;
  text-align: right;
  margin-left: 4px;
}

/* === Tool rail === */
.toolrail {
  position: fixed;
  top: calc(var(--topbar) + env(safe-area-inset-top, 0));
  left: 0;
  bottom: var(--bottombar);
  width: var(--rail);
  background: var(--panel);
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px 0;
  gap: 4px;
  z-index: 4;
  overflow-y: auto;
  scrollbar-width: none;
}
.toolrail::-webkit-scrollbar { display: none; }
.tool {
  width: 44px;
  height: 44px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  position: relative;
  flex: 0 0 auto;
}
.tool svg { width: 22px; height: 22px; }
.tool:hover { background: var(--accent-faint); border-color: var(--accent); color: var(--accent); }
.tool.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.tool-divider { width: 36px; height: 1px; background: var(--rule); margin: 4px 0; }
.tool-variant {
  position: absolute;
  bottom: 2px;
  right: 2px;
  font-size: 8px;
  font-family: var(--mono);
  font-weight: bold;
  color: inherit;
  letter-spacing: 0;
}

/* === Bottom rail === */
.bottombar {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  height: var(--bottombar);
  background: var(--panel);
  border-top: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  z-index: 4;
  padding-bottom: env(safe-area-inset-bottom, 0);
  height: calc(var(--bottombar) + env(safe-area-inset-bottom, 0));
}
.colors {
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  align-items: center;
  flex: 0 0 auto;
}
.colors::-webkit-scrollbar { display: none; }
.swatch {
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  border: 1px solid var(--rule);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  padding: 0;
}
.swatch.active::after {
  content: "";
  position: absolute;
  inset: -3px;
  border: 2px solid var(--accent);
  border-radius: 4px;
  pointer-events: none;
}
.swatch.transparent {
  background:
    linear-gradient(45deg, #ccc 25%, transparent 25%),
    linear-gradient(-45deg, #ccc 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #ccc 75%),
    linear-gradient(-45deg, transparent 75%, #ccc 75%);
  background-size: 8px 8px;
  background-position: 0 0, 0 4px, 4px -4px, -4px 0;
}
.color-picker-wrap {
  position: relative;
  width: 28px; height: 28px;
  flex: 0 0 auto;
  margin-left: 2px;
}
.color-picker-wrap input[type="color"] {
  position: absolute;
  inset: 0;
  width: 28px; height: 28px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: transparent;
  cursor: pointer;
  padding: 0;
}
.size-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 12px 6px;
  flex: 0 0 auto;
}
.size-row .label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  min-width: 42px;
}
.size-row input[type="range"] {
  flex: 1 1 auto;
  accent-color: var(--accent);
  min-width: 100px;
}
.size-row .size-readout {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  min-width: 28px;
  text-align: right;
}
.size-row .current-color {
  width: 24px; height: 24px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  flex: 0 0 auto;
}

/* === Canvas stage === */
.stage {
  position: fixed;
  top: calc(var(--topbar) + env(safe-area-inset-top, 0));
  left: var(--rail);
  right: 0;
  bottom: calc(var(--bottombar) + env(safe-area-inset-bottom, 0));
  background:
    linear-gradient(45deg, var(--panel-2) 25%, transparent 25%),
    linear-gradient(-45deg, var(--panel-2) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, var(--panel-2) 75%),
    linear-gradient(-45deg, transparent 75%, var(--panel-2) 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  background-color: var(--panel);
  overflow: hidden;
  touch-action: none;
  z-index: 1;
}
#view {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
.status-strip {
  position: absolute;
  bottom: 4px;
  left: 6px;
  background: rgba(20,20,20,0.55);
  color: #fff;
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 2px;
  pointer-events: none;
  opacity: 0.85;
  letter-spacing: 0.02em;
}
@media (prefers-color-scheme: dark) {
  .status-strip { background: rgba(0,0,0,0.55); }
}

/* === Hidden file input === */
.hidden { display: none !important; }

/* === Toast === */
.toast {
  position: fixed;
  bottom: calc(var(--bottombar) + env(safe-area-inset-bottom, 0) + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(20,20,20,0.92);
  color: #fff;
  padding: 8px 14px;
  border-radius: 3px;
  font-size: 13px;
  font-family: var(--serif);
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  max-width: calc(100vw - 40px);
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* === Menu (overflow) === */
.menu {
  position: fixed;
  top: calc(var(--topbar) + env(safe-area-inset-top, 0) + 6px);
  right: 8px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 6px 0;
  min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  z-index: 10;
  display: none;
  font-size: 14px;
}
.menu.open { display: block; }
.menu button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: transparent;
  border: none;
  padding: 8px 14px;
  color: var(--text);
  font-family: var(--serif);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
}
.menu button:hover { background: var(--accent-faint); color: var(--accent); }
.menu button svg { width: 16px; height: 16px; flex: 0 0 auto; }
.menu .sep { height: 1px; background: var(--rule); margin: 4px 0; }
.menu .item-key {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* === Small screen tweaks === */
@media (max-width: 480px) {
  :root { --rail: 48px; --bottombar: 88px; }
  .tool { width: 38px; height: 38px; }
  .tool svg { width: 18px; height: 18px; }
  .action { padding: 0 8px; font-size: 11px; }
  .action .label-text { display: none; }
  .crumb { font-size: 13px; }
}
</style>
</head>
<body>

<!-- === Top action bar === -->
<div class="topbar">
  <span class="crumb"><a href="/">mino.mobi</a><span class="slash"> / </span><span class="title">paint</span></span>

  <button class="action" id="undo-btn" disabled title="Undo (Cmd/Ctrl+Z)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
    <span class="label-text">Undo</span>
  </button>
  <button class="action" id="redo-btn" disabled title="Redo (Cmd/Ctrl+Shift+Z)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 15-6.7L21 13"/></svg>
    <span class="label-text">Redo</span>
  </button>

  <span class="spacer"></span>
  <span class="zoom-label" id="zoom-label">100%</span>

  <button class="action" id="zoom-out-btn" title="Zoom out">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="action" id="zoom-in-btn" title="Zoom in">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="action" id="fit-btn" title="Fit to screen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5h4M20 9V5h-4M4 15v4h4M20 15v4h-4"/></svg>
  </button>

  <button class="action accent" id="share-btn" title="Share to Bluesky">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    <span class="label-text">Share</span>
  </button>

  <button class="action" id="menu-btn" title="More">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
  </button>
</div>

<div class="menu" id="menu">
  <button id="menu-save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save PNG<span class="item-key">S</span></button>
  <button id="menu-paste"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>Paste image (file)<span class="item-key">V</span></button>
  <div class="sep"></div>
  <button id="menu-new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>New canvas (clear)</button>
  <button id="menu-bg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>Fill with current color</button>
  <div class="sep"></div>
  <button id="menu-help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Shortcuts</button>
</div>

<!-- === Tool rail === -->
<div class="toolrail" id="toolrail">
  <button class="tool" data-tool="brush" title="Brush (B)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3 3 0 0 0-3-3z"/></svg>
  </button>
  <button class="tool" data-tool="pencil" title="Pencil (P)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
  </button>
  <button class="tool" data-tool="eraser" title="Eraser (E)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l13-13 5 5L9 20"/><line x1="9" y1="20" x2="20" y2="20"/></svg>
  </button>
  <button class="tool" data-tool="fill" title="Fill (G)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11l-7-7-9 9 7 7z"/><path d="M5 2l5 5"/><path d="M2 22l4-4"/><path d="M22 14a3 3 0 1 1-6 0c0-2 3-5 3-5s3 3 3 5z"/></svg>
  </button>
  <div class="tool-divider"></div>
  <button class="tool" data-tool="line" title="Line (L)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
  </button>
  <button class="tool" data-tool="rect" title="Rectangle (R)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
    <span class="tool-variant" id="rect-variant">O</span>
  </button>
  <button class="tool" data-tool="ellipse" title="Ellipse (O)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="9" ry="9"/></svg>
    <span class="tool-variant" id="ellipse-variant">O</span>
  </button>
  <div class="tool-divider"></div>
  <button class="tool" data-tool="eyedropper" title="Eyedropper (I)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/><path d="M15 5l4 4"/></svg>
  </button>
</div>

<!-- === Bottom bar (colors + size) === -->
<div class="bottombar">
  <div class="colors" id="colors">
    <!-- Swatches injected by JS -->
    <div class="color-picker-wrap">
      <input type="color" id="custom-color" value="#000000" title="Custom color">
    </div>
  </div>
  <div class="size-row">
    <div class="current-color" id="current-color"></div>
    <span class="label">Size</span>
    <input type="range" id="size-slider" min="1" max="64" value="4">
    <span class="size-readout" id="size-readout">4</span>
  </div>
</div>

<!-- === Canvas stage === -->
<div class="stage" id="stage">
  <canvas id="view"></canvas>
  <div class="status-strip" id="status-strip">1280×1280 · 100%</div>
</div>

<!-- === Toast === -->
<div class="toast" id="toast"></div>

<!-- === Hidden file pickers === -->
<input type="file" id="paste-file" class="hidden" accept="image/*">

<script src="./app.js?v=1"></script>

</body>
