<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>the quarter — a walkable map of the Bluesky tools</title>
<meta name="description" content="Every Bluesky / ATProto tool at mino.mobi as a walkable pixel town. Districts by function, buildings by tool, the road east climbs the complexity tiers.">
<meta property="og:type" content="website">
<meta property="og:title" content="the quarter — a walkable map of the Bluesky tools">
<meta property="og:description" content="Walk the ATmosphere: districts by function, buildings by tool, complexity rising east.">
<meta property="og:url" content="https://b.mino.mobi/map/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07090c; --panel:#0d1116; --panel-2:#11161d; --line:#1c2530;
  --ink:#e2e8e4; --dim:#8a978f;
  --gold:#f4bf62; --gold-soft:#c79a45;
  --sky:#6ec1e4; --sky-dim:#3d7692;
  --green:#6fd0a0; --green-dim:#3f7a5c;
  --amber:#e0a84a; --red:#e07a6a;
  --mono:'JetBrains Mono', ui-monospace, Menlo, monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--ink); font-family:var(--mono);
  -webkit-font-smoothing:antialiased;
}
#world { position:fixed; inset:0; display:block; cursor:crosshair; }

/* chrome — translucent panels floating over the canvas */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:10;
  display:flex; align-items:center; gap:0.8rem; padding:0.55rem 0.9rem;
  background:rgba(7,9,12,.62); border-bottom:1px solid var(--line);
  backdrop-filter:blur(6px); pointer-events:none;
}
.topbar > * { pointer-events:auto; }
.crumb {
  font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--dim); text-decoration:none;
}
.crumb:hover { color:var(--sky); }
.brand { font-size:0.78rem; font-weight:700; letter-spacing:0.06em; color:var(--ink); }
.brand .fly { color:var(--sky); text-shadow:0 0 14px rgba(110,193,228,.5); }
.tagline { font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
.spacer { flex:1; }
.audit-link {
  font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim);
  text-decoration:none; border:1px solid var(--line); border-radius:999px; padding:0.28rem 0.7rem;
}
.audit-link:hover { color:var(--gold); border-color:var(--gold-soft); }

.hint {
  position:fixed; top:3.1rem; left:50%; transform:translateX(-50%); z-index:9;
  font-size:0.6rem; letter-spacing:0.08em; color:var(--dim);
  background:rgba(7,9,12,.7); border:1px solid var(--line); border-radius:999px;
  padding:0.3rem 0.85rem; backdrop-filter:blur(5px); white-space:nowrap;
  transition:opacity 0.6s ease;
}
.hint b { color:var(--gold); font-weight:600; }
.hint.faded { opacity:0; pointer-events:none; }

/* info rail — the tool card */
#card {
  position:fixed; right:0.9rem; bottom:0.9rem; z-index:10; width:296px; max-width:calc(100vw - 1.8rem);
  background:rgba(10,13,18,.82); border:1px solid var(--line); border-radius:10px;
  backdrop-filter:blur(7px); padding:0.9rem 1rem; display:none;
}
#card.open { display:block; }
#card .kicker {
  font-size:0.56rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim);
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.35rem;
}
#card .kicker .district {}
#card h2 {
  font-size:1.05rem; font-weight:700; letter-spacing:0.02em; color:var(--gold);
  text-shadow:0 0 14px rgba(244,191,98,.35); display:flex; align-items:baseline; gap:0.5rem;
}
#card h2 .glyph { font-size:1.2rem; }
#card .desc { font-size:0.68rem; line-height:1.55; color:var(--ink); margin:0.5rem 0 0.6rem; }
#card .chips { display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:0.6rem; }
#card .chip {
  font-size:0.54rem; letter-spacing:0.06em; text-transform:uppercase; color:var(--dim);
  border:1px solid var(--line); border-radius:999px; padding:0.14rem 0.45rem;
}
#card .chip.write { color:var(--sky); border-color:var(--sky-dim); }
#card .tier-row { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.55rem; }
#card .tier-label { font-size:0.56rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); }
#card .pips { display:flex; gap:3px; }
#card .pip { width:14px; height:5px; border-radius:2px; background:var(--line); }
#card .pip.on { background:var(--gold); box-shadow:0 0 8px rgba(244,191,98,.5); }
#card .status { display:flex; align-items:center; gap:0.4rem; font-size:0.56rem; color:var(--dim); margin-bottom:0.7rem; }
#card .dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(111,208,160,.7); }
#card .dot.warn { background:var(--amber); box-shadow:0 0 8px rgba(224,168,74,.7); }
#card .visit {
  display:inline-block; font-size:0.62rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--bg); background:var(--gold); border-radius:999px; padding:0.4rem 0.9rem; text-decoration:none;
}
#card .visit:hover { background:var(--ink); }
#card .visit-hint { font-size:0.54rem; color:var(--dim); margin-left:0.5rem; }

@media (max-width: 640px) {
  .hint { display:none; }
  .tagline { display:none; }
  #card { right:0.5rem; left:0.5rem; bottom:0.5rem; width:auto; }
}
</style>
</head>
<body>
<canvas id="world"></canvas>

<div class="topbar">
  <a class="crumb" href="/">← b.mino.mobi</a>
  <span class="brand">the quarter<span class="fly"> ✦</span></span>
  <span class="tagline">a walkable map of the bluesky tools — complexity rises east</span>
  <span class="spacer"></span>
  <a class="audit-link" href="https://github.com/minormobius/agent01/blob/main/docs/SOCIAL-STACK-AUDIT.md">stack audit</a>
</div>

<div class="hint" id="hint"><b>←↑↓→</b> / <b>WASD</b> walk · <b>click</b> to travel · step onto a building, <b>Enter</b> to visit</div>

<aside id="card" aria-live="polite"></aside>

<script type="module" src="./map.js"></script>
</body>
</html>
