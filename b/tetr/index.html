<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>tetr — stack Bluesky threads into a tower</title>
<meta name="description" content="Bluesky threads fall as pointy-top hex pieces shaped by their reply structure. Slide them, clear lines, and build.">
<meta property="og:title" content="tetr — stack Bluesky threads">
<meta property="og:url" content="https://b.mino.mobi/tetr/">
<style>
:root { --bg:#04060f; --fg:#dce8fb; --muted:#8ea6c8; --sky:#5aa9ff; --gold:#ffd86b; --line:rgba(120,160,220,0.16); --mono: ui-monospace, Menlo, monospace; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; height:100%; }
body { background: radial-gradient(120% 80% at 50% -10%, #0b1830 0%, #060d1c 50%, #04060f 100%); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100%; overflow:hidden; }
.top { width:100%; max-width:820px; display:flex; align-items:center; justify-content:space-between; padding:10px 14px 4px; flex-wrap:wrap; gap:6px; }
.top a.crumb { color:var(--muted); text-decoration:none; font-size:13px; }
.top a.crumb:hover { color:var(--sky); }
h1 { font-size:18px; margin:0; display:inline; } h1 .d { color:var(--gold); }
.hud { display:flex; gap:13px; font:600 12px var(--mono); }
.hud b { color:var(--gold); } .hud span { color:var(--muted); font-weight:500; }
.play { display:flex; gap:14px; align-items:flex-start; width:100%; max-width:820px; padding:0 12px; flex:1; min-height:0; }
.stage { position:relative; flex:0 0 auto; display:flex; justify-content:center; }
canvas { touch-action:none; }
#t-status { position:absolute; top:16px; left:50%; transform:translateX(-50%); background:rgba(6,12,24,0.92); border:1px solid var(--line); border-radius:8px; padding:7px 13px; font:600 12px var(--mono); color:var(--gold); display:none; text-align:center; white-space:nowrap; }
#t-panel { flex:1; min-width:0; background:rgba(8,16,30,0.6); border:1px solid var(--line); border-radius:12px; padding:12px; align-self:stretch; min-height:120px; max-height:calc(100vh - 210px); overflow-y:auto; }
#t-panel .t-empty { color:var(--muted); font:12px var(--mono); }
.t-thread { display:flex; flex-direction:column; gap:1px; }
.t-post { border-left:2px solid var(--line); padding:5px 0 5px 8px; }
.t-post.focus { border-left-color:var(--gold); background:rgba(255,216,107,0.07); border-radius:0 6px 6px 0; }
.t-ph { display:flex; align-items:center; gap:6px; font-size:13px; }
.t-ph b { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:45%; }
.t-ph span { color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-av { width:20px; height:20px; border-radius:50%; flex:0 0 auto; background:#0c1830; object-fit:cover; }
.t-pt { margin:3px 0; white-space:pre-wrap; word-break:break-word; font-size:13px; }
.t-imgs { display:flex; gap:4px; flex-wrap:wrap; margin:3px 0; }
.t-imgs img { max-width:104px; max-height:104px; border-radius:6px; object-fit:cover; }
.t-vid { position:relative; display:inline-block; margin:3px 0; }
.t-vid img { max-width:150px; border-radius:6px; display:block; }
.t-vid span { position:absolute; left:6px; bottom:6px; background:rgba(0,0,0,0.6); border-radius:4px; padding:1px 6px; font-size:11px; }
.t-ext { display:flex; gap:8px; align-items:center; border:1px solid var(--line); border-radius:8px; padding:6px; text-decoration:none; color:var(--fg); margin:4px 0; }
.t-ext img { width:42px; height:42px; border-radius:6px; object-fit:cover; flex:0 0 auto; }
.t-ext span { color:var(--sky); font-size:12px; }
.t-quote { border:1px solid var(--line); border-radius:8px; padding:6px 8px; margin:4px 0; background:rgba(120,160,220,0.05); }
.controls { display:flex; gap:8px; padding:8px 0 8px; flex-wrap:wrap; justify-content:center; }
.controls button { background:rgba(90,169,255,0.12); border:1px solid rgba(90,169,255,0.38); color:var(--sky); border-radius:10px; padding:10px 14px; font:600 14px var(--mono); cursor:pointer; min-width:44px; }
.controls button:active { background:rgba(90,169,255,0.28); }
.controls .drop { color:var(--gold); border-color:rgba(255,216,107,0.4); background:rgba(255,216,107,0.12); }
.hint { color:var(--muted); font:11px var(--mono); padding:0 14px 10px; text-align:center; max-width:600px; }
@media (max-width:680px){ .play { flex-direction:column; align-items:center; } #t-panel { width:100%; max-width:460px; align-self:auto; } }
</style>
</head>
<body>
  <div class="top">
    <div><a class="crumb" href="https://b.mino.mobi/">← atmosphere</a> &nbsp;<h1>tetr<span class="d">.</span></h1></div>
    <div class="hud"><span>score</span> <b id="t-score">0</b> <span>posts</span> <b id="t-placed">0</b> <span>lines</span> <b id="t-lines">0</b> <span>height</span> <b id="t-height">0</b></div>
  </div>

  <div class="play">
    <div class="stage"><canvas id="tetr"></canvas><div id="t-status"></div></div>
    <aside id="t-panel"><div class="t-empty">tap a settled hex to read its post →</div></aside>
  </div>

  <div class="controls">
    <button data-act="left" aria-label="left">◀</button>
    <button data-act="rot" aria-label="rotate">⟳</button>
    <button data-act="soft" aria-label="soft drop">▼</button>
    <button data-act="drop" class="drop" aria-label="hard drop">⤓ drop</button>
    <button data-act="right" aria-label="right">▶</button>
    <button data-act="restart" aria-label="restart">↺</button>
  </div>
  <div class="hint">Pointy-top threads fall by their reply shape — slide them, fill a row to clear it, build. ← → move · ⟳/↑ rotate · ▼ soft · space drop · R restart. Add <code>?list=&lt;bsky list url&gt;</code> for your own feed.</div>

<script src="./tetr.js"></script>
</body>
</html>
