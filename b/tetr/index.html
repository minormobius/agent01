<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>tetr — stack Bluesky threads into a tower</title>
<meta name="description" content="Bluesky threads fall as hex pieces shaped by their reply structure. Slide them as the structure descends and build a tower.">
<meta property="og:title" content="tetr — stack Bluesky threads">
<meta property="og:url" content="https://b.mino.mobi/tetr/">
<style>
:root { --bg:#04060f; --fg:#dce8fb; --muted:#8ea6c8; --sky:#5aa9ff; --gold:#ffd86b; --line:rgba(120,160,220,0.16); --mono: ui-monospace, Menlo, monospace; }
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; height:100%; }
body { background: radial-gradient(120% 80% at 50% -10%, #0b1830 0%, #060d1c 50%, #04060f 100%); color:var(--fg); font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; display:flex; flex-direction:column; align-items:center; overflow:hidden; }
.top { width:100%; max-width:600px; display:flex; align-items:center; justify-content:space-between; padding:10px 14px 6px; }
.top a.crumb { color:var(--muted); text-decoration:none; font-size:13px; }
.top a.crumb:hover { color:var(--sky); }
h1 { font-size:18px; margin:0; } h1 .d { color:var(--gold); }
.hud { display:flex; gap:14px; font:600 12px var(--mono); }
.hud b { color:var(--gold); } .hud span { color:var(--muted); font-weight:500; }
.stage { position:relative; flex:1; display:flex; align-items:flex-start; justify-content:center; width:100%; }
canvas { touch-action:none; }
#t-status { position:absolute; top:18px; left:50%; transform:translateX(-50%); background:rgba(6,12,24,0.9); border:1px solid var(--line); border-radius:8px; padding:8px 14px; font:600 12px var(--mono); color:var(--gold); display:none; text-align:center; }
.controls { display:flex; gap:8px; padding:8px 0 14px; flex-wrap:wrap; justify-content:center; }
.controls button { background:rgba(90,169,255,0.12); border:1px solid rgba(90,169,255,0.38); color:var(--sky); border-radius:10px; padding:10px 14px; font:600 14px var(--mono); cursor:pointer; min-width:44px; }
.controls button:active { background:rgba(90,169,255,0.28); }
.controls .drop { color:var(--gold); border-color:rgba(255,216,107,0.4); background:rgba(255,216,107,0.12); }
.hint { color:var(--muted); font:11px var(--mono); padding:0 14px 10px; text-align:center; max-width:560px; }
#t-panel { position:absolute; left:50%; bottom:10px; transform:translateX(-50%); width:min(92vw,360px); background:rgba(6,12,24,0.95); border:1px solid var(--line); border-radius:10px; padding:12px 14px; display:none; backdrop-filter:blur(6px); }
#t-panel button#t-panel-x { position:absolute; top:6px; right:8px; background:none; border:0; color:var(--muted); font-size:15px; cursor:pointer; }
.t-p-head { font-size:13px; margin-right:18px; } .t-p-head span { color:var(--muted); }
.t-p-text { margin:6px 0; white-space:pre-wrap; word-break:break-word; }
#t-panel a { color:var(--sky); font-size:12px; text-decoration:none; }
</style>
</head>
<body>
  <div class="top">
    <div><a class="crumb" href="https://b.mino.mobi/">← atmosphere</a> &nbsp;<h1 style="display:inline">tetr<span class="d">.</span></h1></div>
    <div class="hud"><span>score</span> <b id="t-score">0</b> <span>posts</span> <b id="t-placed">0</b> <span>height</span> <b id="t-height">0</b></div>
  </div>

  <div class="stage">
    <canvas id="tetr"></canvas>
    <div id="t-status"></div>
    <div id="t-panel"></div>
  </div>

  <div class="controls">
    <button data-act="left" aria-label="left">◀</button>
    <button data-act="rot" aria-label="rotate">⟳</button>
    <button data-act="soft" aria-label="soft drop">▼</button>
    <button data-act="drop" class="drop" aria-label="hard drop">⤓ drop</button>
    <button data-act="right" aria-label="right">▶</button>
    <button data-act="restart" aria-label="restart">↺</button>
  </div>
  <div class="hint">Threads fall shaped by their replies — slide them and stack a tower. ← → move · ⟳ / ↑ rotate · ▼ soft · space drop · R restart. Add <code>?list=&lt;bsky list url&gt;</code> to play your own feed.</div>

<script src="./tetr.js"></script>
</body>
</html>
