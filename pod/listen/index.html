<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Listen — pod</title>
  <style>
    :root { --bg:#0e0f13; --panel:#16181f; --ink:#e9eaee; --muted:#9aa0ad; --accent:#e0573e; --green:#3ec07a; --line:#262932; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); padding-bottom:108px; }
    .wrap { max-width:640px; margin:0 auto; padding:28px 16px 24px; }
    .crumb { color:var(--muted); font-size:13px; } .crumb a { color:var(--muted); text-decoration:none; }
    h1 { font-size:30px; letter-spacing:-0.02em; margin:6px 0 4px; } h1 .dot { color:var(--accent); }
    .sub { color:var(--muted); margin:0 0 18px; font-size:14px; }
    .subscribe { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:18px; }
    .subscribe .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
    .subscribe .urlrow { display:flex; gap:8px; align-items:center; }
    .subscribe code { flex:1; background:#0e0f13; border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    button { font:inherit; font-weight:600; padding:9px 14px; border-radius:8px; border:1px solid var(--line); background:#21242d; color:var(--ink); cursor:pointer; }
    button:active { transform:scale(.97); }
    .ep { display:flex; gap:12px; align-items:center; padding:14px 12px; background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; cursor:pointer; }
    .ep.playing { border-color:var(--accent); }
    .ep .play { flex:none; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; background:#21242d; border:1px solid var(--line); }
    .ep.playing .play { background:var(--accent); border-color:var(--accent); color:#1a0d0a; }
    .ep .meta { min-width:0; flex:1; }
    .ep .t { font-weight:600; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ep .d { color:var(--muted); font-size:13px; margin-top:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .ep .sub2 { color:var(--muted); font-size:12px; margin-top:4px; }
    .empty { color:var(--muted); padding:24px 4px; }
    .empty a { color:var(--accent); }
    /* sticky player */
    #player { position:fixed; left:0; right:0; bottom:0; background:#121419; border-top:1px solid var(--line); padding:10px 14px calc(10px + env(safe-area-inset-bottom)); transform:translateY(140%); transition:transform .22s ease; z-index:50; }
    #player.on { transform:none; }
    #pTitle { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:8px; }
    #audio { width:100%; height:38px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="/">pod</a> / <a href="/listen/" id="crumbListen">listen</a><span id="crumbWho"></span></div>
    <h1 id="title">Listen<span class="dot">.</span></h1>
    <p class="sub" id="pageSub">View a show. Every feed is owned by its publisher's PDS.</p>

    <div class="subscribe" id="subscribeBox" style="display:none">
      <div class="lbl" id="rssLbl">Subscribe to this show (RSS)</div>
      <div class="urlrow">
        <code id="rssUrl"></code>
        <button id="copyRss">Copy</button>
        <a id="rssOpen" href="#"><button>Open</button></a>
      </div>
    </div>

    <div class="subscribe" id="handleBox" style="display:none">
      <div class="lbl">View a show by handle</div>
      <div class="urlrow">
        <input type="text" id="handleInput" placeholder="alice.bsky.social" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"
          style="flex:1; min-width:0; background:#0e0f13; border:1px solid var(--line); border-radius:8px; padding:9px 11px; color:var(--ink); font-size:14px" />
        <button id="goHandle">View</button>
      </div>
    </div>

    <p class="sub" style="margin:0 0 16px"><a href="/app/" style="color:var(--accent)">Open the podcast app →</a></p>

    <div id="episodes"></div>
  </div>

  <div id="player">
    <div id="pTitle"></div>
    <audio id="audio" controls preload="none"></audio>
  </div>

  <script src="./listen.js"></script>
</body>
</html>
