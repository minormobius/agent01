name = "mino-feed"
main = "src/index.ts"
compatibility_date = "2026-02-20"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */6 * * *"]  # Recompute communities every 6 hours

[[routes]]
pattern = "feed.mino.mobi"
custom_domain = true

[vars]
FEED_URI = "at://did:plc:7zre4plmd5jllccww575j6sb/app.bsky.feed.generator/simcluster"
PUBLISHER_DID = "did:plc:7zre4plmd5jllccww575j6sb"
HOSTNAME = "feed.mino.mobi"
CONSTELLATION_RELAY = "https://constellation.us-east.host.bsky.network"
BLUESKY_SEED_LIST = "at://did:plc:7zre4plmd5jllccww575j6sb/app.bsky.graph.list/3mhrbb6iqxi2g"

[[d1_databases]]
binding = "DB"
database_name = "atpolls-db"
database_id = "fee2f25a-8b4a-4d46-b245-9d5da93c117d"
migrations_dir = "../../poll/apps/api/migrations"

[[kv_namespaces]]
binding = "STATE"
id = "67ce39f7715b47aab1187a5443f74e0e"
