name = "atpolls-api"
main = "src/index.ts"
compatibility_date = "2024-07-18"
compatibility_flags = ["nodejs_compat"]

# Static frontend assets (built by Vite to poll/dist/)
[assets]
directory = "../../dist"

# Handle WASM imports (resvg for OG image generation)
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false

# Handle font file imports (bundled as binary data for resvg)
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = false

[vars]
FRONTEND_URL = "https://polls.example.com"
ATPROTO_MOCK_MODE = "true"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "atpolls-db"
database_id = "fee2f25a-8b4a-4d46-b245-9d5da93c117d"
migrations_dir = "migrations"

# Durable Object bindings
[durable_objects]
bindings = [
  { name = "POLL_COORDINATOR", class_name = "PollCoordinator" },
  { name = "SURVEY_COORDINATOR", class_name = "SurveyCoordinator" }
]

[[migrations]]
tag = "v1"
new_classes = ["PollCoordinator"]

[[migrations]]
tag = "v2"
new_classes = ["SurveyCoordinator"]

# Environment-specific overrides
[env.production]
vars = { FRONTEND_URL = "https://polls.example.com", ATPROTO_MOCK_MODE = "false" }

[env.production.d1_databases]
binding = "DB"
database_name = "atpolls-db"
database_id = "fee2f25a-8b4a-4d46-b245-9d5da93c117d"
