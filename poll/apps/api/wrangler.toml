name = "atpolls-api"
main = "src/index.ts"
compatibility_date = "2024-07-18"
compatibility_flags = ["nodejs_compat"]

# Static frontend assets (built by Vite into poll/dist/)
[assets]
directory = "../../dist"

# Handle WASM imports (resvg for OG image generation)
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false

# Fonts are pre-encoded to .ts modules by scripts/encode-fonts.js
# (the [[rules]] type=Data approach doesn't work with `wrangler versions upload`)

[vars]
FRONTEND_URL = "https://poll.mino.mobi"
ATPROTO_MOCK_MODE = "true"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "atpolls-db"
database_id = "fee2f25a-8b4a-4d46-b245-9d5da93c117d"
migrations_dir = "migrations"

# Durable Object bindings
[durable_objects]
bindings = [
  { name = "POLL_COORDINATOR", class_name = "PollCoordinator" },
  { name = "SURVEY_COORDINATOR", class_name = "SurveyCoordinator" },
  { name = "MMO_CANVAS", class_name = "MmoCanvas" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PollCoordinator"]

[[migrations]]
tag = "v2"
new_classes = ["SurveyCoordinator"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["MmoCanvas"]

# Environment-specific overrides
[env.production]
vars = { FRONTEND_URL = "https://poll.mino.mobi", ATPROTO_MOCK_MODE = "false" }

[env.production.d1_databases]
binding = "DB"
database_name = "atpolls-db"
database_id = "fee2f25a-8b4a-4d46-b245-9d5da93c117d"

# MMO Paint isolated D1 — created by .github/workflows/create-mmo-db.yml
[[d1_databases]]
binding = "MMO_DB"
database_name = "mmopaint-db"
database_id = "6687b33c-c09c-4bb9-b216-0c84067dfb74"

[[env.production.d1_databases]]
binding = "MMO_DB"
database_name = "mmopaint-db"
database_id = "6687b33c-c09c-4bb9-b216-0c84067dfb74"
