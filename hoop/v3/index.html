<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<meta name="description" content="hoop v3 — the stitched solved world: the camera rides the @ through a continuous city; every adjacent region is gated on the deck, so you walk anywhere you can see; the seams are mathematically invisible." />
<title>hoop v3 · the stitched world</title>
<style>
  :root { --bg:#05060a; --ink:#dfe7e2; --dim:#8a978f; --line:#1c2530; --gold:#f4bf62; --teal:#7fd8d0; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); font: 13px/1.5 ui-monospace, "JetBrains Mono", monospace; overflow: hidden; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  #hud { position: fixed; top: 8px; left: 10px; max-width: 58vw; color: var(--dim); text-shadow: 0 1px 2px #000; pointer-events: none; }
  #hud b { color: var(--gold); }
  a.home { position: fixed; top: 8px; right: 10px; color: var(--teal); text-decoration: none; }
  #rail { position: fixed; bottom: 12px; left: 10px; max-width: 46vw; background: rgba(8,11,16,.8); border: 1px solid var(--line); border-radius: 10px; padding: 8px 11px; backdrop-filter: blur(6px); display: none; }
  #rail b { color: var(--gold); } #rail .w { color: var(--teal); }
  #busy { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(5,6,10,.85); color: var(--gold); font-size: 14px; z-index: 9; }
  #err { position: fixed; inset: auto 10px 10px 10px; background: #2a0e0e; color: #ffb3a7; border: 1px solid #5a2020; border-radius: 8px; padding: 8px 11px; display: none; white-space: pre-wrap; z-index: 10; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">◍ <b>hoop v3</b> — the stitched solved world<br><span id="info">…</span><br><span style="color:#667">click = walk the @ anywhere you can see — it threads the gold gates across every seam (rooms are ~15 m) · the world streams in at the edge of view · scroll = zoom</span></div>
<a class="home" href="/">← hoop</a>
<div id="rail"></div>
<div id="busy">waking the world…</div>
<div id="err"></div>

<script type="module">
import { walkRoute } from '../econ/deck.js';
import { ROLE_COLOR, M_PER_CELL } from '../econ/deck.js';

const $ = (id) => document.getElementById(id);
addEventListener('error', (e) => { $('err').style.display = 'block'; $('err').textContent = 'page: ' + e.message; });

const qs = new URLSearchParams(location.search);
const SEED = (parseInt(qs.get('seed'), 10) || 7) >>> 0;
const PX = 120;                                            // px per cell at zoom 1 (a 15 m room)
let R = 36;                                                // regionsPerRing (from the worker's ready)

// ── the world: regions stream from the worker; the camera rides the @ ──
const regions = new Map(), solving = new Set();            // key → view
let active = null;                                         // the region the @ stands in
// AT.plan: a multi-hop journey — regions[] is the ordered list of region keys still to cross
// (after the active one), room is the destination room in the LAST region. crossStage/crossTo
// drive the seamless one-cell threshold step across a single seam.
const AT = { room: -1, x: 0, y: 0, path: null, t: 0, dest: -1, plan: null, crossStage: null, crossTo: null };
const SPEED = 300;                                         // px/s ≈ 37 m/s of brisk station walking... a stride
let zoom = 0.85, dirty = true;

const worker = new Worker('./solver.js', { type: 'module' });
worker.onerror = (e) => { showErr('worker: ' + e.message); };
function showErr(m) { $('err').style.display = 'block'; $('err').textContent = m; $('busy').style.display = 'none'; }
const key = (az, ax) => (((az % R) + R) % R) + ',' + ax;
const parseKey = (k) => { const [az, ax] = k.split(',').map(Number); return { az, ax }; };
function requestRegion(az, ax) {
  const k = key(az, ax);
  if (regions.has(k) || solving.has(k)) return;
  solving.add(k);
  worker.postMessage({ type: 'solve', az, ax });
}
worker.onmessage = (e) => {
  const m = e.data;
  if (m.type === 'error') { showErr('solve: ' + m.message); return; }
  if (m.type === 'ready') {
    R = m.R;
    let az = parseInt(qs.get('az'), 10), ax = parseInt(qs.get('ax'), 10);
    if (!Number.isFinite(az)) { az = m.hubs[0].az; ax = m.hubs[0].ax; }
    requestRegion(az, ax);
    return;
  }
  if (m.type !== 'region') return;
  const v = m.view, k = key(v.az, v.ax);
  solving.delete(k);
  regions.set(k, v);
  if (!active) {                                           // first region: spawn the @
    setActive(v);
    let spawn = -1, bd = Infinity;
    v.owner.forEach((o, i) => { if (o !== -1) return; const p = v.seeds[i]; const d = (p.x - v.frame.W / 2) ** 2 + (p.y - v.frame.H / 2) ** 2; if (d < bd) { bd = d; spawn = i; } });
    if (spawn < 0) spawn = 0;
    AT.room = spawn; AT.x = v.seeds[spawn].x; AT.y = v.seeds[spawn].y;
    $('busy').style.display = 'none';
  }
  dirty = true;
};
function setActive(v) {
  active = v;
  history.replaceState(null, '', '?seed=' + SEED + '&az=' + v.az + '&ax=' + v.ax);
  const s = v.stats;
  $('info').innerHTML = 'region <b>(' + v.az + ', ' + v.ax + ')</b> · ' + s.rooms + ' rooms (~' + M_PER_CELL + ' m each) · ' +
    s.buildings + ' buildings · ' + v.links.length + ' gates · access ' + s.access.toFixed(2) + ' · loaded regions: ' + regions.size;
}

// region offset in the shared world frame, relative to the ACTIVE region (the ring wraps)
function offsetOf(v) {
  let dAz = ((v.az - active.az) % R + R) % R;
  if (dAz > R / 2) dAz -= R;
  return { x: dAz * active.frame.W, y: (v.ax - active.ax) * active.frame.H };
}

// ── render: every loaded region that intersects the view, in one continuous frame ──
const cv = $('cv'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() { DPR = Math.min(devicePixelRatio || 1, 2); W = innerWidth; H = innerHeight; cv.width = W * DPR; cv.height = H * DPR; dirty = true; }
addEventListener('resize', resize);
const ROAD = '#2c463c', DOOR = 'hsl(44 40% 30%)', WALLC = '#0a0e12', VOIDC = '#070a0d', FOG = '#0b0f12';

function paintRegion(v, off, ghostsAsFog) {
  ctx.save(); ctx.translate(off.x, off.y);
  for (const c of v.scene.paintCells) {
    if (c.poly.length < 3) continue;
    let col;
    if (c.wall) col = WALLC;
    else if (c.room == null) col = VOIDC;
    else if (c.room >= v.nReal) { if (!ghostsAsFog) continue; col = FOG; }
    else {
      const o = v.owner[c.room];
      col = o === -1 ? ROAD : o === -2 ? VOIDC : c.door ? DOOR : (ROLE_COLOR[v.role[c.room]] || '#3a4248');
    }
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.moveTo(c.poly[0][0], c.poly[0][1]);
    for (let i = 1; i < c.poly.length; i++) ctx.lineTo(c.poly[i][0], c.poly[i][1]);
    ctx.closePath(); ctx.fill();
  }
  // gates + glyphs
  ctx.fillStyle = 'rgba(244,191,98,0.95)';
  for (const i of v.isGate) { const p = v.seeds[i]; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI * 2); ctx.fill(); }
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = 'rgba(10,14,18,0.85)';
  for (const g of v.bill) { if (g.n < 3) continue; ctx.font = Math.min(44, 16 + g.n * 3) + 'px ui-monospace, monospace'; ctx.fillText(g.glyph, g.x, g.y); }
  ctx.restore();
}

function draw() {
  if (!active) return;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#05060a'; ctx.fillRect(0, 0, W, H);
  // camera: the @ at screen centre, always (THE recentre — chunking hidden)
  const z = zoom;
  ctx.setTransform(DPR * z, 0, 0, DPR * z, DPR * (W / 2 - AT.x * z), DPR * (H / 2 - AT.y * z));
  // active first (its ghost rim as fog), then neighbours over it (their reals replace the fog)
  paintRegion(active, { x: 0, y: 0 }, true);
  for (const [, v] of regions) {
    if (v === active) continue;
    const off = offsetOf(v);
    if (Math.abs(off.x + v.frame.W / 2 - AT.x) > W / z / 2 + v.frame.W && Math.abs(off.y + v.frame.H / 2 - AT.y) > H / z / 2 + v.frame.H) continue;
    paintRegion(v, off, false);
  }
  // the route remaining
  if (AT.path && AT.t < AT.path.total) {
    ctx.strokeStyle = 'rgba(244,191,98,0.55)'; ctx.lineWidth = 2.6 / z; ctx.setLineDash([8 / z, 7 / z]); ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(AT.x, AT.y);
    let acc = 0;
    for (let i = 1; i < AT.path.pts.length; i++) { acc += AT.path.seg[i - 1]; if (acc > AT.t) ctx.lineTo(AT.path.pts[i][0], AT.path.pts[i][1]); }
    ctx.stroke(); ctx.setLineDash([]);
  }
  // the @
  ctx.fillStyle = '#0b1014'; ctx.beginPath(); ctx.arc(AT.x, AT.y, 11 / Math.sqrt(z), 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#7fd8d0'; ctx.font = 'bold ' + (16 / Math.sqrt(z)) + 'px ui-monospace, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('@', AT.x, AT.y + 0.5);
}

// ── periphery streaming: when the view reaches into a neighbour's box, ask the worker for it ──
function streamPeriphery() {
  if (!active) return;
  const z = zoom, vw = W / z / 2, vh = H / z / 2, m = PX * 2;     // a 2-room look-ahead margin
  if (AT.x - vw < m) requestRegion(active.az - 1, active.ax);
  if (AT.x + vw > active.frame.W - m) requestRegion(active.az + 1, active.ax);
  if (AT.y - vh < m) requestRegion(active.az, active.ax - 1);
  if (AT.y + vh > active.frame.H - m) requestRegion(active.az, active.ax + 1);
}

// ── click-to-walk, across the WHOLE loaded world: BFS a region path active → target over the
//    loaded grid, then thread the gates seam by seam. Every adjacent region pair is gated on the
//    deck (the v3 stitching contract), so any room you can see is reachable. ──
cv.addEventListener('click', (e) => {
  if (!active || AT.room < 0) return;
  const z = zoom;
  const wx = (e.clientX - W / 2) / z + AT.x, wy = (e.clientY - H / 2) / z + AT.y;   // world → active-local
  // which region was clicked?
  let tgt = active, lx = wx, ly = wy;
  if (wx < 0 || wy < 0 || wx > active.frame.W || wy > active.frame.H) {
    tgt = null;
    for (const [, v] of regions) {
      if (v === active) continue;
      const off = offsetOf(v);
      if (wx >= off.x && wx <= off.x + v.frame.W && wy >= off.y && wy <= off.y + v.frame.H) { tgt = v; lx = wx - off.x; ly = wy - off.y; break; }
    }
    if (!tgt) return;                                       // unloaded fog — keep walking, it will stream in
  }
  let best = -1, bd = (60 / z) ** 2;
  for (let i = 0; i < tgt.nReal; i++) { const p = tgt.seeds[i]; const d = (p.x - lx) ** 2 + (p.y - ly) ** 2; if (d < bd) { bd = d; best = i; } }
  if (best < 0) return;
  if (tgt === active) { AT.plan = null; walkTo(best); }
  else {
    const route = regionPath(active, tgt);
    if (!route) { rail('<b>⊘ not connected</b> through the loaded world yet — walk closer'); return; }
    AT.plan = { regions: route, room: best };               // route = [firstHop … target], all loaded
    advancePlan();
  }
  inspect(tgt, best);
});

// BFS over the loaded region grid (4-neighbour, azimuth wraps) → ordered keys from the first hop
// to the target (excluding the active region). null if the target isn't reachable through loaded
// regions. Each consecutive pair shares a seam, and every seam carries a deck gate by construction.
function regionPath(from, to) {
  const start = key(from.az, from.ax), goal = key(to.az, to.ax);
  if (start === goal) return [];
  const prev = new Map([[start, null]]), q = [start];
  while (q.length) {
    const cur = q.shift(), { az, ax } = parseKey(cur);
    if (cur === goal) break;
    for (const nb of [{ az: az + 1, ax }, { az: az - 1, ax }, { az, ax: ax + 1 }, { az, ax: ax - 1 }]) {
      const k = key(nb.az, nb.ax);
      if (!regions.has(k) || prev.has(k)) continue;
      prev.set(k, cur); q.push(k);
    }
  }
  if (!prev.has(goal)) return null;
  const path = [];
  for (let k = goal; k && k !== start; k = prev.get(k)) path.push(k);
  return path.reverse();
}

// begin the seamless one-cell threshold step IF the @ is already standing on a gate toward nextKey
// and that neighbour is loaded. Returns true when a crossing is under way. Factored so both the
// planner (already-on-the-gate case) and the loop (arrived-at-the-gate case) share one path.
function beginCrossToward(nextKey) {
  const lk = active.links.find((l) => l.room === AT.room && key(l.to.az, l.to.ax) === nextKey);
  if (!lk) return false;
  const nv = regions.get(nextKey);
  const gi = nv ? active.ghostGid.indexOf(lk.partner) : -1;
  if (nv && gi >= 0) {
    const gp = active.seeds[active.nReal + gi], dl = Math.hypot(gp.x - AT.x, gp.y - AT.y) || 1;
    AT.path = { pts: [[AT.x, AT.y], [gp.x, gp.y]], seg: [dl], total: dl }; AT.t = 0;
    AT.crossStage = 'into'; AT.crossTo = { nv, partner: lk.partner }; dirty = true;
    return true;
  }
  if (!nv) requestRegion(lk.to.az, lk.to.ax);              // not loaded yet — re-plan on next click
  return false;
}

// drive the journey: cross now if we're on the right gate, else walk to the nearest gate toward the
// next planned region (the loop auto-crosses on arrival), or — once in the final region — walk the
// last leg to the destination room.
function advancePlan() {
  if (!AT.plan) return;
  if (!AT.plan.regions.length) { const r = AT.plan.room; AT.plan = null; walkTo(r); return; }
  const nextKey = AT.plan.regions[0], next = parseKey(nextKey);
  if (beginCrossToward(nextKey)) return;                   // already on the gate — no zero-length walk
  const leads = active.links.filter((l) => l.to.az === next.az && l.to.ax === next.ax && l.room !== AT.room);
  if (!leads.length) { rail('<b>⊘ no gate</b> toward (' + next.az + ', ' + next.ax + ') — the seam is walled here'); AT.plan = null; return; }
  let pick = null, pd = Infinity;
  for (const l of leads) { const p = active.seeds[l.room]; const d = (p.x - AT.x) ** 2 + (p.y - AT.y) ** 2; if (d < pd) { pd = d; pick = l; } }
  walkTo(pick.room);
}

function walkTo(room) {
  if (room === AT.room) return;                            // already there — never recurse the plan
  const r = walkRoute(active, AT.room, room);
  if (!r) { rail('<b>⊘ no path</b>'); AT.plan = null; return; }
  const seg = []; let total = 0;
  for (let i = 1; i < r.pts.length; i++) { const d = Math.hypot(r.pts[i][0] - r.pts[i - 1][0], r.pts[i][1] - r.pts[i - 1][1]); seg.push(d); total += d; }
  AT.path = { pts: r.pts, seg, total }; AT.t = 0; AT.dest = room;
  dirty = true;
}
function inspect(v, roomIdx) {
  const o = v.owner[roomIdx];
  let html;
  if (o === -1) html = '<b>⌁ the concourse</b>' + (v.isGate.includes(roomIdx) ? ' — a gate' : '');
  else if (o === -2) html = '<b>· unclaimed foam</b>';
  else html = v.inspect[o] || '<b>a building</b>';
  if (AT.path) html += '<br><span style="color:#8a978f">walk ~' + Math.round(AT.path.total / PX * M_PER_CELL) + ' m</span>';
  rail(html);
}
function rail(html) { $('rail').innerHTML = html; $('rail').style.display = 'block'; }

// ── the loop ──
let last = 0;
function tick(ts) {
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, (ts - last) / 1000); last = ts;
  if (AT.path) {
    AT.t += SPEED * dt;
    const { pts, seg, total } = AT.path;
    if (AT.t >= total) {
      AT.x = pts[pts.length - 1][0]; AT.y = pts[pts.length - 1][1];
      if (AT.crossStage === 'into') {
        // phase 2: the @ has walked into the ghost partner — its world point. Swap the active
        // region to the neighbour; the partner is the SAME world point, so the camera never moves.
        const ct = AT.crossTo; AT.crossStage = null; AT.crossTo = null; AT.path = null;
        const pr = ct.nv.bandGid.indexOf(ct.partner);
        if (pr >= 0) {
          setActive(ct.nv); AT.room = pr; AT.x = ct.nv.seeds[pr].x; AT.y = ct.nv.seeds[pr].y;
          if (AT.plan && AT.plan.regions[0] === key(ct.nv.az, ct.nv.ax)) AT.plan.regions.shift();
          advancePlan();                                    // continue to the next hop, or the final room
        } else { AT.plan = null; }
      } else {
        AT.room = AT.dest; AT.path = null;
        // arrived at the gate toward the NEXT planned region: walk one cell INTO its ghost (phase 1),
        // then swap at that point — the threshold step is animated, the seam never shows.
        if (AT.plan && AT.plan.regions.length && !beginCrossToward(AT.plan.regions[0])) AT.plan = null;
      }
    } else {
      let acc = 0, i = 1;
      while (i < pts.length && acc + seg[i - 1] < AT.t) { acc += seg[i - 1]; i++; }
      const f2 = (AT.t - acc) / seg[i - 1];
      AT.x = pts[i - 1][0] + (pts[i][0] - pts[i - 1][0]) * f2;
      AT.y = pts[i - 1][1] + (pts[i][1] - pts[i - 1][1]) * f2;
    }
    dirty = true;
  }
  streamPeriphery();
  if (dirty) { draw(); dirty = false; }
}
addEventListener('wheel', (e) => { zoom = Math.max(0.3, Math.min(2.5, zoom * (1 - Math.sign(e.deltaY) * 0.1))); dirty = true; }, { passive: true });

resize();
worker.postMessage({ type: 'init', seed: SEED });
requestAnimationFrame(tick);
</script>
</body>
</html>
