<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<meta name="description" content="hoop v3 — the stitched solved world: the camera rides the @ through a continuous city; every adjacent region is gated on the deck, so you walk anywhere you can see; the seams are mathematically invisible." />
<title>hoop v3 · the stitched world</title>
<style>
  :root { --bg:#05060a; --ink:#dfe7e2; --dim:#8a978f; --line:#1c2530; --gold:#f4bf62; --teal:#7fd8d0; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); font: 13px/1.5 ui-monospace, "JetBrains Mono", monospace; overflow: hidden; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  #hud { position: fixed; top: 8px; left: 10px; max-width: 58vw; color: var(--dim); text-shadow: 0 1px 2px #000; pointer-events: none; }
  #hud b { color: var(--gold); }
  a.home { position: fixed; top: 8px; right: 10px; color: var(--teal); text-decoration: none; }
  #rail { position: fixed; bottom: 12px; left: 10px; max-width: 46vw; background: rgba(8,11,16,.8); border: 1px solid var(--line); border-radius: 10px; padding: 8px 11px; backdrop-filter: blur(6px); display: none; }
  #rail b { color: var(--gold); } #rail .w { color: var(--teal); }
  #busy { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(5,6,10,.85); color: var(--gold); font-size: 14px; z-index: 9; }
  #err { position: fixed; inset: auto 10px 10px 10px; background: #2a0e0e; color: #ffb3a7; border: 1px solid #5a2020; border-radius: 8px; padding: 8px 11px; display: none; white-space: pre-wrap; z-index: 10; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">◍ <b>hoop v3</b> — the stitched solved world, lit<br><span id="info">…</span><br><span style="color:#667">click = walk the @ anywhere you can see — one taut path straight across the seams (tap again mid-stride to redirect) · buildings glow from within and spill light out their doors · scroll = zoom</span></div>
<a class="home" href="/">← hoop</a>
<div id="rail"></div>
<div id="busy">waking the world…</div>
<div id="err"></div>

<script type="module">
import { buildWalk, losSimplify, makeOccluder } from '../econ/deck.js';
import { ROLE_COLOR, M_PER_CELL } from '../econ/deck.js';

const $ = (id) => document.getElementById(id);
addEventListener('error', (e) => { $('err').style.display = 'block'; $('err').textContent = 'page: ' + e.message; });

const qs = new URLSearchParams(location.search);
const SEED = (parseInt(qs.get('seed'), 10) || 7) >>> 0;
const PX = 120;                                            // px per cell at zoom 1 (a 15 m room)
let R = 36;                                                // regionsPerRing (from the worker's ready)

// ── the world: regions stream from the worker; the camera rides the @ ──
const regions = new Map(), solving = new Set();            // key → view
let active = null;                                         // the region the @ stands in (camera anchor)
// The @ walks ONE continuous trajectory through a UNIFIED navmesh stitched across every loaded
// region at the gates — `path.pts` are in ACTIVE-LOCAL world coords, so crossing a seam is just a
// coordinate rebase (no gate-hop). Repathing always starts from the @'s LIVE position, so a tap
// mid-transit re-routes from where it actually is.
const AT = { room: -1, x: 0, y: 0, path: null, t: 0 };
const SPEED = 300;                                         // px/s ≈ 37 m/s of brisk station walking... a stride
let zoom = 0.85, dirty = true;

const worker = new Worker('./solver.js', { type: 'module' });
worker.onerror = (e) => { showErr('worker: ' + e.message); };
function showErr(m) { $('err').style.display = 'block'; $('err').textContent = m; $('busy').style.display = 'none'; }
const key = (az, ax) => (((az % R) + R) % R) + ',' + ax;
function requestRegion(az, ax) {
  const k = key(az, ax);
  if (regions.has(k) || solving.has(k)) return;
  solving.add(k);
  worker.postMessage({ type: 'solve', az, ax });
}
worker.onmessage = (e) => {
  const m = e.data;
  if (m.type === 'error') { showErr('solve: ' + m.message); return; }
  if (m.type === 'ready') {
    R = m.R;
    let az = parseInt(qs.get('az'), 10), ax = parseInt(qs.get('ax'), 10);
    if (!Number.isFinite(az)) { az = m.hubs[0].az; ax = m.hubs[0].ax; }
    requestRegion(az, ax);
    return;
  }
  if (m.type !== 'region') return;
  const v = m.view, k = key(v.az, v.ax);
  solving.delete(k);
  regions.set(k, v);
  if (!active) {                                           // first region: spawn the @
    setActive(v);
    let spawn = -1, bd = Infinity;
    v.owner.forEach((o, i) => { if (o !== -1) return; const p = v.seeds[i]; const d = (p.x - v.frame.W / 2) ** 2 + (p.y - v.frame.H / 2) ** 2; if (d < bd) { bd = d; spawn = i; } });
    if (spawn < 0) spawn = 0;
    AT.room = spawn; AT.x = v.seeds[spawn].x; AT.y = v.seeds[spawn].y;
    $('busy').style.display = 'none';
  }
  dirty = true;
};
function setActive(v) {
  active = v;
  history.replaceState(null, '', '?seed=' + SEED + '&az=' + v.az + '&ax=' + v.ax);
  const s = v.stats;
  $('info').innerHTML = 'region <b>(' + v.az + ', ' + v.ax + ')</b> · ' + s.rooms + ' rooms (~' + M_PER_CELL + ' m each) · ' +
    s.buildings + ' buildings · ' + v.links.length + ' gates · access ' + s.access.toFixed(2) + ' · loaded regions: ' + regions.size;
}

// region offset in the shared world frame, relative to the ACTIVE region (the ring wraps)
function offsetOf(v) {
  let dAz = ((v.az - active.az) % R + R) % R;
  if (dAz > R / 2) dAz -= R;
  return { x: dAz * active.frame.W, y: (v.ax - active.ax) * active.frame.H };
}

// ── render: every loaded region that intersects the view, in one continuous frame ──
const cv = $('cv'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() { DPR = Math.min(devicePixelRatio || 1, 2); W = innerWidth; H = innerHeight; cv.width = W * DPR; cv.height = H * DPR; dirty = true; }
addEventListener('resize', resize);
const ROAD = '#2c463c', DOOR = 'hsl(44 40% 30%)', WALLC = '#0a0e12', VOIDC = '#070a0d', FOG = '#0b0f12';
const ROAD_RGB = [44, 70, 60], DOOR_RGB = [120, 92, 50];
// every cell type is an albedo + a light-response gain — NOTHING renders pure-black: walls and void
// are dark stone that still catch a neighbour's glow, floors/roads/buildings take full light.
const WALL_RGB = [22, 28, 34], VOID_RGB = [12, 16, 20], FOG_RGB = [18, 24, 30];
const SEAM_INK = 'rgba(7,10,13,0.42)';                     // faint plate seam (the hand-inked look)

// ── LIGHTING (v3 art leg, phase 3: OCCLUDED light that respects the city's walls) ────────────────
// Function-matched emission: a building lights by what it IS — a forge flickers warm, an observatory
// is dim, a clinic a steady white — and the concourse carries cool street lamps. A warm ambient
// floor washes every cell; walls/void take a reduced gain so structure reads.
const ROLE_LIGHT = {                                       // [intensity, flicker, baseRadius·cells]
  dwell: [0.62, 0.18, 1.0], grow: [0.50, 0.05, 1.1], make: [1.05, 0.45, 1.1], mend: [0.80, 0.30, 1.0],
  trade: [0.90, 0.10, 1.1], serve: [0.95, 0.20, 1.0], play: [1.00, 0.25, 1.1], heal: [0.95, 0.04, 1.2],
  learn: [0.75, 0.05, 1.1], worship: [0.55, 0.08, 1.2], govern: [0.88, 0.06, 1.3], move: [0.45, 0.04, 0.9],
  store: [0.40, 0.03, 0.9], _default: [0.60, 0.10, 1.0],
};
const STREET_RGB = [156, 184, 210], STREET_I = 0.6, STREET_RAD = PX * 2.1;
const AMB = 0.16, GAIN = 235;                              // composite: albedo·AMB + light·gain
const WALL_GAIN = GAIN * 0.6, VOID_GAIN = GAIN * 0.45;     // dark mass still catches the glow
const AMBIENT_RGB = [0.105, 0.097, 0.085];                // warm base wash — EVERY cell gets light
const BUILD_MULT = 1.18;                                   // overall brighten on building emitters
const hexRGB = (h) => { const n = parseInt(h.slice(1), 16); return h.length >= 7 ? [n >> 16 & 255, n >> 8 & 255, n & 255] : [136, 136, 136]; };
const ROLE_RGB_CACHE = {};
const roleRGB = (role) => ROLE_RGB_CACHE[role] || (ROLE_RGB_CACHE[role] = hexRGB(ROLE_COLOR[role] || '#3a4248'));

// k well-spread cells of a building: nearest-to-centroid, then greedy farthest-point. An open hall
// is one big room — a single centroid light leaves the arms of a non-convex hall dark (and the
// centroid can fall outside the footprint), so a hall gets a few lights spread across its floor.
function spreadCells(cells, seeds, cx, cy, k) {
  let s = cells[0], bd = Infinity;
  for (const i of cells) { const p = seeds[i], dd = (p.x - cx) ** 2 + (p.y - cy) ** 2; if (dd < bd) { bd = dd; s = i; } }
  const picks = [s];
  while (picks.length < k && picks.length < cells.length) {
    let best = -1, bb = -1;
    for (const i of cells) { if (picks.indexOf(i) >= 0) continue; let md = Infinity; for (const pj of picks) { const p = seeds[i], q = seeds[pj], dd = (p.x - q.x) ** 2 + (p.y - q.y) ** 2; if (dd < md) md = dd; } if (md > bb) { bb = md; best = i; } }
    if (best < 0) break; picks.push(best);
  }
  return picks;
}
// per-region emitter list (static — cached on the view): each building lights its hall with a few
// role-tuned lamps (more for a bigger hall), plus cool street lamps sampled densely along the concourse.
function emittersOf(v) {
  if (v._emit) return v._emit;
  const build = [], street = [];
  const byB = new Map();
  for (let i = 0; i < v.nReal; i++) { const o = v.owner[i]; if (o >= 0) { let s = byB.get(o); if (!s) { s = []; byB.set(o, s); } s.push(i); } }
  for (const [, cells] of byB) {
    const role = v.role[cells[0]], lt = ROLE_LIGHT[role] || ROLE_LIGHT._default, rgb = roleRGB(role), n = cells.length;
    let cx = 0, cy = 0; for (const i of cells) { cx += v.seeds[i].x; cy += v.seeds[i].y; } cx /= n; cy /= n;
    const k = Math.min(4, 1 + Math.floor(n / 18)), I = lt[0] * BUILD_MULT * (k === 1 ? 1 : 1.3 / k), rad = PX * (lt[2] + 0.30 * Math.sqrt(n));
    for (const i of spreadCells(cells, v.seeds, cx, cy, k)) build.push({ x: v.seeds[i].x, y: v.seeds[i].y, rgb, I, fl: lt[1], rad });
  }
  let c = 0;
  for (let i = 0; i < v.nReal && street.length < 110; i++) { if (v.owner[i] !== -1) continue; if ((c++ % 3) !== 0) continue; const p = v.seeds[i]; street.push({ x: p.x, y: p.y }); }
  return (v._emit = { build, street });
}

// the regions that intersect the view (active first) — shared by the light build and the draw pass
function visibleRegions() {
  const z = zoom, out = [active];
  for (const [, v] of regions) {
    if (v === active) continue;
    const off = offsetOf(v);
    if (Math.abs(off.x + v.frame.W / 2 - AT.x) > W / z / 2 + v.frame.W && Math.abs(off.y + v.frame.H / 2 - AT.y) > H / z / 2 + v.frame.H) continue;
    out.push(v);
  }
  return out;
}

// OCCLUSION is STATIC (walls + emitters never move), so each region's occluded light field is
// precomputed ONCE; only flicker animates. A building lights its open hall and SPILLS OUT ITS ONE
// DOOR (a door/open membrane is not a wall) but not through its back wall; street lamps pool along
// the concourse. Per-emitter flicker survives cheaply via a sin/cos split: the steady part
// I·(1−fl/2) bakes into `steady`; the oscillating part I·fl/2·sin(ωt+φ) becomes A=Σ amp·cosφ and
// B=Σ amp·sinφ, so a frame is just  light = steady + sinωt·A + cosωt·B  (no per-frame raytracing).
const LS_LIGHT = 18, OMEGA = 0.0072;                       // light texel size · flicker angular rate
let SINT = 0, COST = 1;                                     // sin/cos(ωt), set once per frame
function precomputeLight(v) {
  const W = v.frame.W, H = v.frame.H, LS = LS_LIGHT;
  const bw = Math.ceil(W / LS) + 1, bh = Math.ceil(H / LS) + 1, N = bw * bh * 3;
  const steady = new Float32Array(N), A = new Float32Array(N), B = new Float32Array(N);
  for (let i = 0; i < N; i += 3) { steady[i] = AMBIENT_RGB[0]; steady[i + 1] = AMBIENT_RGB[1]; steady[i + 2] = AMBIENT_RGB[2]; }
  const occ = makeOccluder(v.walls, ((v.scene && v.scene.wallSpacing) || 8) * 4);
  const em = emittersOf(v);
  const splat = (ex, ey, rgb, I, fl, rad) => {
    const inv = 1 / rad, sI = I * (1 - fl / 2), aI = I * fl / 2, phi = ex * 0.013 + ey * 0.017, cphi = Math.cos(phi), sphi = Math.sin(phi);
    const bx0 = Math.max(0, Math.floor((ex - rad) / LS)), bx1 = Math.min(bw - 1, Math.ceil((ex + rad) / LS));
    const by0 = Math.max(0, Math.floor((ey - rad) / LS)), by1 = Math.min(bh - 1, Math.ceil((ey + rad) / LS));
    for (let by = by0; by <= by1; by++) { const sy = by * LS; for (let bx = bx0; bx <= bx1; bx++) {
      const sx = bx * LS, dx = sx - ex, dy = sy - ey, d = Math.sqrt(dx * dx + dy * dy); if (d > rad) continue;
      if (occ(ex, ey, sx, sy)) continue;                   // a wall casts the shadow
      const t = 1 - d * inv, f = t * t, bi = (by * bw + bx) * 3;
      for (let c = 0; c < 3; c++) { const base = rgb[c] / 255 * f; steady[bi + c] += base * sI; A[bi + c] += base * aI * cphi; B[bi + c] += base * aI * sphi; }
    } }
  };
  for (const e of em.build) splat(e.x, e.y, e.rgb, e.I, e.fl, e.rad);
  for (const e of em.street) splat(e.x, e.y, STREET_RGB, STREET_I, 0, STREET_RAD);
  return (v._lit = { LS, bw, bh, steady, A, B });
}
function sampleLit(v, x, y) {
  const lt = v._lit || precomputeLight(v);
  const bx = Math.max(0, Math.min(lt.bw - 1, x / lt.LS | 0)), by = Math.max(0, Math.min(lt.bh - 1, y / lt.LS | 0)), bi = (by * lt.bw + bx) * 3;
  return [lt.steady[bi] + SINT * lt.A[bi] + COST * lt.B[bi], lt.steady[bi + 1] + SINT * lt.A[bi + 1] + COST * lt.B[bi + 1], lt.steady[bi + 2] + SINT * lt.A[bi + 2] + COST * lt.B[bi + 2]];
}
const lit = (a, L, gain) => 'rgb(' + Math.min(255, a[0] * AMB + L[0] * gain | 0) + ',' + Math.min(255, a[1] * AMB + L[1] * gain | 0) + ',' + Math.min(255, a[2] * AMB + L[2] * gain | 0) + ')';

function paintRegion(v, off, ghostsAsFog, pulse) {
  ctx.save(); ctx.translate(off.x, off.y); ctx.lineJoin = 'round';
  for (const c of v.scene.paintCells) {
    if (c.poly.length < 3) continue;
    let base, gain, floorCell = false;
    if (c.wall) { base = WALL_RGB; gain = WALL_GAIN; }     // dark stone, catches the glow
    else if (c.room == null) { base = VOID_RGB; gain = VOID_GAIN; }
    else if (c.room >= v.nReal) { if (!ghostsAsFog) continue; base = FOG_RGB; gain = VOID_GAIN; }
    else {
      const o = v.owner[c.room];
      if (o === -2) { base = VOID_RGB; gain = VOID_GAIN; }
      else { base = o === -1 ? ROAD_RGB : c.door ? DOOR_RGB : roleRGB(v.role[c.room]); gain = GAIN; floorCell = true; }
    }
    ctx.fillStyle = lit(base, sampleLit(v, c.poly[0][0], c.poly[0][1]), gain);   // region-local occluded light
    ctx.beginPath(); ctx.moveTo(c.poly[0][0], c.poly[0][1]);
    for (let i = 1; i < c.poly.length; i++) ctx.lineTo(c.poly[i][0], c.poly[i][1]);
    ctx.closePath(); ctx.fill();
    if (floorCell) { ctx.strokeStyle = SEAM_INK; ctx.lineWidth = 0.6; ctx.stroke(); }   // plate seam
  }
  // gates — gold with a pulsing glow
  ctx.save();
  ctx.shadowColor = 'rgba(244,191,98,0.9)'; ctx.shadowBlur = 9 + pulse * 7;
  ctx.fillStyle = 'rgba(244,191,98,0.95)';
  for (const i of v.isGate) { const p = v.seeds[i]; ctx.beginPath(); ctx.arc(p.x, p.y, 7 + pulse * 1.6, 0, Math.PI * 2); ctx.fill(); }
  ctx.restore();
  // building glyphs
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = 'rgba(238,230,205,0.88)';
  for (const g of v.bill) { if (g.n < 3) continue; ctx.font = Math.min(44, 16 + g.n * 3) + 'px ui-monospace, monospace'; ctx.fillText(g.glyph, g.x, g.y); }
  ctx.restore();
}

function draw() {
  if (!active) return;
  const now = performance.now();
  SINT = Math.sin(now * OMEGA); COST = Math.cos(now * OMEGA);   // flicker phase for the precomputed light
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#05060a'; ctx.fillRect(0, 0, W, H);
  // camera: the @ at screen centre, always (THE recentre — chunking hidden)
  const z = zoom, pulse = 0.5 + 0.5 * Math.sin(now / 600);
  ctx.setTransform(DPR * z, 0, 0, DPR * z, DPR * (W / 2 - AT.x * z), DPR * (H / 2 - AT.y * z));
  // active first (its ghost rim as fog), then neighbours over it (their reals replace the fog)
  paintRegion(active, { x: 0, y: 0 }, true, pulse);
  for (const v of visibleRegions()) { if (v === active) continue; paintRegion(v, offsetOf(v), false, pulse); }
  // the route remaining
  if (AT.path && AT.t < AT.path.total) {
    ctx.strokeStyle = 'rgba(244,191,98,0.55)'; ctx.lineWidth = 2.6 / z; ctx.setLineDash([8 / z, 7 / z]); ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(AT.x, AT.y);
    let acc = 0;
    for (let i = 1; i < AT.path.pts.length; i++) { acc += AT.path.seg[i - 1]; if (acc > AT.t) ctx.lineTo(AT.path.pts[i][0], AT.path.pts[i][1]); }
    ctx.stroke(); ctx.setLineDash([]);
  }
  // the @ — gold with a soft pulsing glow so it reads against the dark ship
  ctx.save();
  ctx.shadowColor = 'rgba(255,206,120,0.9)'; ctx.shadowBlur = (12 + pulse * 8) / z;
  ctx.fillStyle = '#0b1014'; ctx.beginPath(); ctx.arc(AT.x, AT.y, 11 / Math.sqrt(z), 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffce78'; ctx.font = 'bold ' + (16 / Math.sqrt(z)) + 'px ui-monospace, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('@', AT.x, AT.y + 0.5);
  ctx.restore();
  // scanline overlay — the CRT/print finish (screen space)
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
}

// ── periphery streaming: when the view reaches into a neighbour's box, ask the worker for it ──
function streamPeriphery() {
  if (!active) return;
  const z = zoom, vw = W / z / 2, vh = H / z / 2, m = PX * 2;     // a 2-room look-ahead margin
  if (AT.x - vw < m) requestRegion(active.az - 1, active.ax);
  if (AT.x + vw > active.frame.W - m) requestRegion(active.az + 1, active.ax);
  if (AT.y - vh < m) requestRegion(active.az, active.ax - 1);
  if (AT.y + vh > active.frame.H - m) requestRegion(active.az, active.ax + 1);
}

// the @'s live cell: the nearest real seed to its position IS the Voronoi cell it stands in
function currentRoom() {
  let best = -1, bd = Infinity;
  for (let i = 0; i < active.nReal; i++) { const p = active.seeds[i]; const d = (p.x - AT.x) ** 2 + (p.y - AT.y) ** 2; if (d < bd) { bd = d; best = i; } }
  return best;
}
// hand the camera to a loaded neighbour the @ has walked into: rebase the @ AND the remaining
// trajectory into that region's local frame (the seam is just a coordinate shift — nothing teleports)
function setActiveRebase(nv) {
  const off = offsetOf(nv);                                 // nv's origin in the CURRENT active-local frame
  AT.x -= off.x; AT.y -= off.y;
  if (AT.path) for (const p of AT.path.pts) { p[0] -= off.x; p[1] -= off.y; }
  setActive(nv);
  AT.room = currentRoom();
}

// ── THE UNIFIED NAVMESH: one walkable graph stitched across every loaded region at the gates, plus
//    every region's wall segments — all in active-local world coords. Dijkstra from the @'s LIVE
//    position to the target cell, then ONE line-of-sight string-pull over the combined walls: a
//    single taut trajectory that flows straight through the seams. No gate-hop, no per-region legs. ──
function minHeap() {
  const a = [];
  return { size: () => a.length,
    push(d, n) { a.push([d, n]); let k = a.length - 1; while (k > 0) { const p = (k - 1) >> 1; if (a[p][0] <= a[k][0]) break; [a[p], a[k]] = [a[k], a[p]]; k = p; } },
    pop() { const t = a[0], l = a.pop(); if (a.length) { a[0] = l; let k = 0; for (;;) { const L = 2 * k + 1, R = L + 1; let m = k; if (L < a.length && a[L][0] < a[m][0]) m = L; if (R < a.length && a[R][0] < a[m][0]) m = R; if (m === k) break; [a[m], a[k]] = [a[k], a[m]]; k = m; } } return t; } };
}
function unifiedRoute(sx, sy, startV, startCell, tgtV, tgtCell) {
  const id = new Map(), nodes = [], adj = [], walls = [];
  const nid = (v, i) => {
    const k = key(v.az, v.ax) + ':' + i; let n = id.get(k);
    if (n == null) { const off = offsetOf(v); n = nodes.length; id.set(k, n); nodes.push([v.seeds[i].x + off.x, v.seeds[i].y + off.y]); adj.push([]); }
    return n;
  };
  for (const [, v] of regions) {
    const off = offsetOf(v);
    const walk = v._walk || (v._walk = buildWalk(v));
    for (let i = 0; i < v.nReal; i++) for (const e of walk[i]) if (e.to > i) {
      const a = nid(v, i), b = nid(v, e.to), w = Math.hypot(nodes[a][0] - nodes[b][0], nodes[a][1] - nodes[b][1]), m = [e.m[0] + off.x, e.m[1] + off.y];
      adj[a].push({ to: b, w, m }); adj[b].push({ to: a, w, m });
    }
    for (const lk of v.links) {                            // stitch across the gate into a loaded neighbour
      const nv = regions.get(key(lk.to.az, lk.to.ax)); if (!nv) continue;
      const pr = nv.bandGid.indexOf(lk.partner); if (pr < 0) continue;
      const a = nid(v, lk.room), b = nid(nv, pr), m = [(nodes[a][0] + nodes[b][0]) / 2, (nodes[a][1] + nodes[b][1]) / 2];
      const w = Math.hypot(nodes[a][0] - nodes[b][0], nodes[a][1] - nodes[b][1]) + 1;
      adj[a].push({ to: b, w, m }); adj[b].push({ to: a, w, m });
    }
    if (v.walls) for (const s of v.walls) walls.push([s[0] + off.x, s[1] + off.y, s[2] + off.x, s[3] + off.y]);
  }
  const S = nid(startV, startCell), T = nid(tgtV, tgtCell), n = nodes.length;
  const dist = new Float64Array(n).fill(Infinity), prev = new Int32Array(n).fill(-1), pm = new Array(n).fill(null), done = new Uint8Array(n);
  dist[S] = 0; const heap = minHeap(); heap.push(0, S);
  while (heap.size()) { const [du, u] = heap.pop(); if (done[u]) continue; done[u] = 1; if (u === T) break;
    for (const e of adj[u]) { const nd = du + e.w; if (nd < dist[e.to]) { dist[e.to] = nd; prev[e.to] = u; pm[e.to] = e.m; heap.push(nd, e.to); } } }
  if (!isFinite(dist[T])) return null;
  const seq = []; for (let u = T; u !== -1; u = prev[u]) seq.push(u); seq.reverse();
  const dense = [[sx, sy]];                                 // start at the @'s LIVE position
  for (let k = 1; k < seq.length; k++) { dense.push(pm[seq[k]]); dense.push(nodes[seq[k]]); }
  const ws = ((active.scene && active.scene.wallSpacing) || 8) * 4;
  return losSimplify(dense, walls, ws);                     // straight where open, cornering only at walls
}

// ── click-to-walk anywhere you can see — interruptible, always from the @'s LIVE position ──
cv.addEventListener('click', (e) => {
  if (!active || AT.room < 0) return;
  const z = zoom;
  const wx = (e.clientX - W / 2) / z + AT.x, wy = (e.clientY - H / 2) / z + AT.y;   // world → active-local
  let tgt = active, lx = wx, ly = wy;
  if (wx < 0 || wy < 0 || wx > active.frame.W || wy > active.frame.H) {
    tgt = null;
    for (const [, v] of regions) {
      if (v === active) continue;
      const off = offsetOf(v);
      if (wx >= off.x && wx <= off.x + v.frame.W && wy >= off.y && wy <= off.y + v.frame.H) { tgt = v; lx = wx - off.x; ly = wy - off.y; break; }
    }
    if (!tgt) return;                                       // unloaded fog — keep walking, it will stream in
  }
  let best = -1, bd = (60 / z) ** 2;
  for (let i = 0; i < tgt.nReal; i++) { const p = tgt.seeds[i]; const d = (p.x - lx) ** 2 + (p.y - ly) ** 2; if (d < bd) { bd = d; best = i; } }
  if (best < 0) return;
  const pts = unifiedRoute(AT.x, AT.y, active, currentRoom(), tgt, best);   // from where the @ IS right now
  if (!pts || pts.length < 2) { rail('<b>⊘ no path</b> through the loaded world yet — walk closer'); return; }
  const seg = []; let total = 0;
  for (let i = 1; i < pts.length; i++) { const d = Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]); seg.push(d); total += d; }
  AT.path = { pts, seg, total }; AT.t = 0; dirty = true;    // replaces any path in flight — interruptible
  inspect(tgt, best);
});

function inspect(v, roomIdx) {
  const o = v.owner[roomIdx];
  let html;
  if (o === -1) html = '<b>⌁ the concourse</b>' + (v.isGate.includes(roomIdx) ? ' — a gate' : '');
  else if (o === -2) html = '<b>· unclaimed foam</b>';
  else html = v.inspect[o] || '<b>a building</b>';
  if (AT.path) html += '<br><span style="color:#8a978f">walk ~' + Math.round(AT.path.total / PX * M_PER_CELL) + ' m</span>';
  rail(html);
}
function rail(html) { $('rail').innerHTML = html; $('rail').style.display = 'block'; }

// ── the loop ──
let last = 0;
function tick(ts) {
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, (ts - last) / 1000); last = ts;
  if (AT.path) {
    AT.t += SPEED * dt;
    const { pts, seg, total } = AT.path;
    if (AT.t >= total) {
      AT.x = pts[pts.length - 1][0]; AT.y = pts[pts.length - 1][1]; AT.path = null; AT.room = currentRoom();
    } else {
      let acc = 0, i = 1;
      while (i < pts.length && acc + seg[i - 1] < AT.t) { acc += seg[i - 1]; i++; }
      const f2 = (AT.t - acc) / seg[i - 1];
      AT.x = pts[i - 1][0] + (pts[i][0] - pts[i - 1][0]) * f2;
      AT.y = pts[i - 1][1] + (pts[i][1] - pts[i - 1][1]) * f2;
    }
    // crossed into a loaded neighbour's frame? hand off the camera (the trajectory is rebased, not cut)
    if (AT.x < 0 || AT.y < 0 || AT.x > active.frame.W || AT.y > active.frame.H) {
      for (const [, v] of regions) {
        if (v === active) continue;
        const off = offsetOf(v);
        if (AT.x >= off.x && AT.x <= off.x + v.frame.W && AT.y >= off.y && AT.y <= off.y + v.frame.H) { setActiveRebase(v); break; }
      }
    }
    dirty = true;
  }
  streamPeriphery();
  if (dirty) { draw(); dirty = false; }
}
addEventListener('wheel', (e) => { zoom = Math.max(0.3, Math.min(2.5, zoom * (1 - Math.sign(e.deltaY) * 0.1))); dirty = true; }, { passive: true });

resize();
worker.postMessage({ type: 'init', seed: SEED });
setInterval(() => { dirty = true; }, 110);                 // keep the hearth/forge flicker alive while idle
requestAnimationFrame(tick);
</script>
</body>
