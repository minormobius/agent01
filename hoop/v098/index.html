    function componentAt(wx, wy) {

    }
    function renderTerminalPanel(panel) {

    // ── the ARCADE: a play-role component is a forge cabinet (the second live fixture). Click → approach

      for (let q = p; q < p + 8; q++) { const g = newArcadeGame(arcadeLawIndex, q); if (g) { arcadeGame = g; arcadeGame.q = q; return; } }
      arcadeGame = null;

    function closeArcade() { arcadeOpen = false; $('arc').classList.remove('on'); }

      const winBar = g.won
        ? `<div class="awin">◈ solved in ${g.moves} — par ${g.par}. <span data-arc="next" style="color:#7fd8d0;cursor:pointer;text-decoration:underline">claim ◈${reward} &amp; next ›</span></div>`

        `<div class="arule">${esc(arcadeRules(g.lawIndex))}<br><span style="color:#9aa8a0">goal: ${esc(GOAL_BLURB[g.goal] || g.goal)}</span></div>` +

    function drawArcadeBoard() {
      const cv2 = document.getElementById('arcboard'); if (!cv2 || !arcadeGame) return;
      const b = arcadeBoard(arcadeGame), CW = Math.min(440, (window.innerWidth || 480) * 0.9), cell = Math.max(14, Math.floor(CW / b.W)), pad = 1;
      const w = cell * b.W, h = cell * b.H, dpr2 = Math.min(window.devicePixelRatio || 1, 2);

      const g = cv2.getContext('2d'); g.setTransform(dpr2, 0, 0, dpr2, 0, 0); g.clearRect(0, 0, w, h);

        else if (c.dyn) fill = '#6a3344';                       // hardened-behind (leave→wall) — there's no going back
        else if (c.mark) fill = '#4a3d77';                      // inked (solid — you cannot enter)

      if (term) { walkThenInteract(term.cp.cx, term.cp.cy, () => openTerminal(term.cp, term.ch)); return; }
      const arc = arcadeAt(wx, wy);
      if (arc) { walkThenInteract(arc.cp.cx, arc.cp.cy, () => openArcade(arc.cp, arc.ch)); return; }
      const caf = cafeAt(wx, wy);
      if (caf) { walkThenInteract(caf.cp.cx, caf.cp.cy, () => openCafe(caf.cp, caf.ch)); return; }
      const grd = gardenAt(wx, wy);
      if (grd) { walkThenInteract(grd.cp.cx, grd.cp.cy, () => openGarden(grd.cp, grd.ch)); return; }
      const trd = tradeAt(wx, wy);
      if (trd) { walkThenInteract(trd.cp.cx, trd.cp.cy, () => openTrade(trd.cp, trd.ch)); return; }
      const cre = creepAt(wx, wy);
      if (cre) { walkThenInteract(cre.cp.cx, cre.cp.cy, () => openBattle(cre.cp, cre.ch)); return; }
      const mnd = mendAt(wx, wy);
      if (mnd) { walkThenInteract(mnd.cp.cx, mnd.cp.cy, () => openLapidary(mnd.cp, mnd.ch)); return; }
      const lf = livingFixtureAt(wx, wy);
      if (lf) { walkThenInteract(lf.x, lf.y, () => { if (lf.action === 'bed') useBed(); else openKitchen(lf.gid); }); return; }
      if (story.active) { story.active = null; renderStory(); }
      walkTo(wx, wy);
    });

    // is a fullscreen overlay/modal covering the world? then the animation loop need not render behind it.
    function worldCovered() {
      if (arcadeOpen || gardenOpen || tradeOpen || kitchenOpen || battleOpen || lapidaryOpen || loaderOpen) return true;
      if (minimap.open || equip.open || (creator && creator.open)) return true;
      if (document.querySelector('.himodal')) return true;                          // the sign-in handle box
      return ['story', 'enc', 'arc', 'garden', 'trade', 'kitchen', 'lapidary', 'battle'].some((id) => { const el = $(id); return el && el.classList.contains('on'); });
    }
    // the animation loop — step the residents' commute, then render. PERF: render ONLY when there is motion
    // to show (residents animating). Player movement redraws via walkTo's own 24ms tick; map-changing actions
    // call draw() themselves; an idle empty scene or a covered world needs no redraw. This stops the constant
    // full-scene repaint (incl. the fog blur) from chugging — most visibly behind the sign-in modal.
    // ONE render loop — movement, residents, and draw all ride the RAF (no more setTimeout walk loop that
    // double-painted and janked). Targets 60fps; movement is dt-interpolated so it's smooth at any rate.
    function frame(ts) {
      requestAnimationFrame(frame);
      if (ts - lastTs < 15) return;   // ~60fps target (draw is cheap); dt clamps the rest
      const dt = Math.min(50, lastTs ? ts - lastTs : 16); lastTs = ts;   // clamp so a backgrounded tab doesn't teleport
      _fps = _fps ? _fps * 0.9 + (1000 / dt) * 0.1 : 1000 / dt;
      _maxDt = Math.max(_maxDt * 0.95, dt);   // worst recent frame interval — captures the stutter the EMA fps hides
      if (ts - _statusT > 600) { _statusT = ts; if (world) status(); }   // refresh the readout ~1.6×/s
      if (worldCovered()) return;     // an overlay is up — don't paint the hidden world (the big login-screen win)
      const t0 = performance.now();   // time the FULL main-thread frame work (movement + residents + draw)
      const moving = walkPath ? advanceWalk(dt) : false;
      if (world && walk && (nearResidents.length || moving)) {
        if (nearResidents.length) stepResidents(nearResidents, walk, dt, { cx: px(), cy: py(), radius: chunkSpan * 0.85, sep: SKIN.playerW * 0.95, sepMax: SKIN.playerW * 0.55 });
        draw();
        _drawMs = _drawMs ? _drawMs * 0.85 + (performance.now() - t0) * 0.15 : (performance.now() - t0);
      }
    }

    function resize() {
      W = Math.max(160, Math.floor(window.innerWidth)); H = Math.max(160, Math.floor(window.innerHeight));
      // DRAWING-BUFFER CAP: the world is a soft, baked raster, so a WIDE / hi-dpi DESKTOP paying full dpr is pure
      // fill-rate waste (a 2560-wide screen at dpr 2 is a 5120px buffer — 4× the pixels of a phone). Clamp the
      // longest device-px edge; phones (small W·H) stay under the cap and keep full dpr, so they don't soften.
      let d = Math.min(window.devicePixelRatio || 1, 2);
      const MAX_EDGE = 2400, longest = Math.max(W, H) * d;
      if (longest > MAX_EDGE) d = Math.max(1, MAX_EDGE / Math.max(W, H));
      dpr = d;
      cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
      if (gpu) gpu.resize(cv.width, cv.height);
      if (world) { setScale(); followCam(); draw(); maybeStream(); }
    }
    let deb = null; window.addEventListener('resize', () => { clearTimeout(deb); deb = setTimeout(resize, 150); });
    addEventListener('keydown', (e) => { if ((e.key === 'r' || e.key === 'R') && !typing() && !arcadeOpen && !gardenOpen && !tradeOpen && !kitchenOpen && !battleOpen && !lapidaryOpen && !loaderOpen) { seed = (seed * 1664525 + 1013904223) >>> 0 || 1; newWorld(); } });   // R = new world (your durable pack carries across)

    // ── the player's character (saved from creation) drives the sprite, the kit, and the HUD ──
    let playerChar = loadCharacter(), playerGenome = null, pdir = 'S', pphase = 0;
    function adoptCharacter(c, persist = true) {
      playerChar = c;
      try { playerGenome = crewSprite(c.sprite.seed, c.vocation, { arch: c.sprite.arch, size: c.sprite.size }); } catch (e) { playerGenome = null; }
      renderWho();   // pack is durable now → adopting a character does NOT touch it (see freshCharacter / foldCharacterFromSave)
      // FOLD THE CHARACTER INTO THE SAVE: store it as a fact so it rides story.save to your PDS (cross-device).
      // persist=false when we're adopting FROM a restored save (avoid echoing it straight back).
      if (persist && story.ready) { story.store.setFact(story.playerId, 'character', c); saveStorySnapshot(); }
    }
    // a BRAND-NEW character from the creator: adopt it AND reset to a fresh starting pack (coins + gems are
    // account-level, so they carry; gear does not).
    function freshCharacter(c) { adoptCharacter(c, true); pack.setPack(packForCharacter(c, 9)); persistPack(); }
    // adopt the character carried in a (just-restored) save, if any; else seed the save from the local one.
    // Then restore the durable pack the save carries (gear, socketed gems and all).
    function foldCharacterFromSave() {
      if (!story.ready) return;
      const savedChar = story.store.getFact(story.playerId, 'character');
      if (savedChar) adoptCharacter(savedChar, false);
      else if (playerChar) { story.store.setFact(story.playerId, 'character', playerChar); saveStorySnapshot(); }
      const sv = getJSONFact('pack.items', null);
      if (sv && Array.isArray(sv) && sv.length) pack.setPack(sv);
    }
    function renderWho() {
      if (!playerChar) { $('who').innerHTML = ''; return; }
      const cm = deriveCombat(playerChar);
      $('who').innerHTML = `<b>${esc(playerChar.name)}</b> · ${esc(playerChar.cast.label)} ${esc(playerChar.vocTag)}<br><span style="color:#6b7872">✚${cm.hp} ⚔${cm.atk} ⛨${cm.def} ✣${cm.fluxPool}</span>`;
    }

    // ── the pack: a Voronoi-cylinder inventory of genomed items ──
    const pack = new Inventory({ pack: (playerChar ? packForCharacter(playerChar, 9) : startingPack(seed, 9)), title: 'pack' });
    // the pack is now DURABLE — bought wares, combat loot, and socketed gems persist. Restore it on load
    // (the snapshot's item array), and re-save it on every mutation via persistPack().
    const persistPack = () => { if (story.ready) story.store.setFact(story.playerId, 'pack.items', JSON.stringify(pack.pack)); };
    { const saved = getJSONFact('pack.items', null); if (saved && Array.isArray(saved) && saved.length) pack.setPack(saved); }
    const togglePack = () => pack.toggle();
    $('pack').addEventListener('click', togglePack);
    addEventListener('keydown', (e) => { if ((e.key === 'i' || e.key === 'I') && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); togglePack(); } });

    // ── character creation ──
    const creator = new CharacterCreator({ seed: (seed ^ 0x5a17) >>> 0, onEmbark: freshCharacter });
    // FORCE character creation when: (a) the loader just started a brand-new world (sessionStorage flag), or
    // (b) this is a truly first-ever run with no character committed anywhere. Resuming a world never forces it.
    function needsForcedCreate() {
      try { if (sessionStorage.getItem('hoop:forceCreate')) { sessionStorage.removeItem('hoop:forceCreate'); return true; } } catch (e) {}
      const committed = story.ready && story.store.getFact(story.playerId, 'character');
      return !committed && !loadCharacter();
    }
    $('charbtn').addEventListener('click', () => creator.toggle());
    addEventListener('keydown', (e) => { if ((e.key === 'c' || e.key === 'C') && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); creator.toggle(); } });

    // ── the equipped page: stained-glass figure with the pack auto-fitted onto a body plan ──
    const equip = new EquippedView({ getCharacter: () => playerChar, getPack: () => pack.pack });
    $('equipbtn').addEventListener('click', () => equip.toggle());
    addEventListener('keydown', (e) => { if ((e.key === 'e' || e.key === 'E') && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); equip.toggle(); } });

    // ── the minimap + waypoint ── a high-level map you drop a waypoint on; the main map then carries a
    // persistent DIRECTION indicator to it (an edge arrow while it's off-screen → the marker itself once
    // it rolls into the viewport). The waypoint persists across reloads. ──
    let waypoint = (() => { try { const s = localStorage.getItem('mega:v093:waypoint'); const w = s ? JSON.parse(s) : null; return (w && Number.isFinite(w.x) && Number.isFinite(w.y)) ? w : null; } catch (e) { return null; } })();
    function setWaypoint(wp) {
      waypoint = (wp && Number.isFinite(wp.x) && Number.isFinite(wp.y)) ? { x: wp.x, y: wp.y } : null;
      try { waypoint ? localStorage.setItem('mega:v093:waypoint', JSON.stringify(waypoint)) : localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
    }
    const minimap = new MiniMap({
      getState: () => ({ world, walk, seen, society, px: px(), py: py(), waypoint }),
      onWaypoint: setWaypoint,
    });
    $('mapbtn').addEventListener('click', () => minimap.toggle());
    addEventListener('keydown', (e) => { if ((e.key === 'm' || e.key === 'M') && !typing() && !e.metaKey && !e.ctrlKey && !loaderOpen) { e.preventDefault(); minimap.toggle(); } });
    $('journalbtn').addEventListener('click', toggleJournal);
    // the ⋯ overflow menu (story status + worlds): toggle on the button, close on any item or a tap-out
    $('morebtn').addEventListener('click', (e) => { e.stopPropagation(); $('moremenu').classList.toggle('on'); });
    $('moremenu').addEventListener('click', () => $('moremenu').classList.remove('on'));
    addEventListener('click', (e) => { const mm = $('moremenu'); if (mm.classList.contains('on') && !mm.contains(e.target) && e.target !== $('morebtn') && !$('morebtn').contains(e.target)) mm.classList.remove('on'); });
    $('dbgbtn').addEventListener('click', () => toggleDbg());
    addEventListener('keydown', (e) => { if (e.key === '`' && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); toggleDbg(); } });   // ` = story-status panel
    addEventListener('keydown', (e) => { if ((e.key === 'j' || e.key === 'J') && !typing() && !e.metaKey && !e.ctrlKey && !arcadeOpen && !gardenOpen && !tradeOpen && !kitchenOpen && !battleOpen && !lapidaryOpen && !loaderOpen) { e.preventDefault(); toggleJournal(); } });   // j = side-quest journal

    if (playerChar) adoptCharacter(playerChar);   // restore the saved sprite/kit/HUD on load

    // ── THE WORLD LOADER / SAVE-PROFILE PICKER ──────────────────────────────────────────────────────────
    //    Each ship seed is a profile (a com.minomobi.hoop.story.save record keyed by seed, in YOUR repo —
    //    plus a local buffer). Saves are durable + user-owned, so you can keep as many as you like. This
    //    screen lists them (cloud ☁ + local ◍, merged by seed), resumes/deletes them, and starts fresh
    //    worlds. Switching a profile is a navigation (?seed=N + reload) so loadStory re-restores cleanly. ──
    let loaderOpen = false;
    // pull a one-line summary out of a serialized MemoryStore snapshot WITHOUT instantiating a store
    function summarizeState(st) {
      if (!st) return null;
      try {
        const players = new Map(st.players || []), p = players.get('local') || {};
        const fe = (st.facts || []).find((e) => e[0] === 'local'), f = new Map(fe ? fe[1] : []);
        let name = null; const cj = f.get('character'); if (cj) { try { name = JSON.parse(cj).name; } catch (e) {} }
        const pl = (st.placements || []).find((e) => e[0] === 'local');
        return { name, nar: p.narrative_tier || 1, rev: p.revelation_tier || 1, pow: p.power_tier || 1, xp: p.xp | 0, placed: pl ? pl[1].length : 0, coins: +(f.get('coins') || 0) };
      } catch (e) { return null; }
    }
    const safeParse = (s) => { try { return s ? JSON.parse(s) : null; } catch (e) { return null; } };
    // every per-world local buffer (hoop:v098:story:<seed>) + the legacy global (→ seed 7 if not shadowed)
    function localProfiles() {
      const out = [], pre = LOCAL_PREFIX + ':';
      try {
        let hasLegacy = false, has7 = false;
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(pre)) { const s = k.slice(pre.length); if (/^\d+$/.test(s)) { out.push({ world: s, state: safeParse(localStorage.getItem(k)) }); if (s === '7') has7 = true; } }
          else if (k === LOCAL_PREFIX) hasLegacy = true;
        }
        if (hasLegacy && !has7) out.push({ world: '7', state: safeParse(localStorage.getItem(LOCAL_PREFIX)) });
      } catch (e) {}
      return out;
    }
    // merge local + (if signed in) cloud saves into one profile list, keyed by world seed
    async function gatherProfiles() {
      const map = new Map();
      for (const p of localProfiles()) map.set(p.world, { world: p.world, local: true, cloud: false, state: p.state, updatedAt: null });
      if (storyUser) {
        try {
          for (const r of await listOwnSaves(auth.pds)) {
            const ex = map.get(r.world) || { world: r.world, local: false, state: null, updatedAt: null };
            ex.cloud = true; if (r.updatedAt) ex.updatedAt = r.updatedAt;
            if (!ex.state && r.stateJson) ex.state = safeParse(r.stateJson);
            map.set(r.world, ex);
          }
        } catch (e) { /* cloud list is best-effort */ }
      }
      return [...map.values()].sort((a, b) => {
        if (a.world === worldKey()) return -1; if (b.world === worldKey()) return 1;   // current world floats to top
        return String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')) || (+a.world - +b.world);
      });
    }
    // navigate to a world (reload re-inits seed from ?seed → loadStory restores that profile)
    function switchToWorld(s) { rememberSeedTo(s); const u = new URL(location.href); u.searchParams.set('seed', String(s)); location.href = u.toString(); }
    const rememberSeedTo = (s) => { try { localStorage.setItem('hoop:v098:lastseed', String(s)); } catch (e) {} };
    // a brand-new game: a fresh random seed with no save → clean character-creation start. Clears the
    // (global) waypoint so you don't aim at the old world. This is the "fully new game".
    function newRandomWorld() {
      const s = ((Date.now() ^ (Math.random() * 0xffffffff)) >>> 0) || 1;
      try { localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
      try { sessionStorage.setItem('hoop:forceCreate', '1'); } catch (e) {}   // the fresh world opens straight into (named) character creation
      switchToWorld(s);
    }
    async function deleteProfile(s) {
      if (!confirm(`Delete the save for world ${s}? This removes it from ${storyUser ? 'your PDS and ' : ''}this device. Can't be undone.`)) return;
      localDel(s);
      if (storyUser) { try { await deleteOwnSave(auth.pds, String(s)); } catch (e) {} }
      if (String(s) === worldKey()) { try { localStorage.removeItem('hoop:v098:lastseed'); } catch (e) {} location.href = location.pathname; return; }   // deleted the current world → boot back to default
      renderLoader();
    }
    // restart THIS world from scratch (the old #newgame behaviour) — wipe its story progress, keep the seed
    function restartCurrentWorld() {
      if (!confirm('Restart this world? Wipes its story progress — facts, lore, inventory, tiers — and respawns you. The world geometry and your character stay.')) return;
      localDel(); try { localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
      if (storyUser) { try { auth.pds.deleteRecord(SAVE_NSID, worldKey()).catch(() => {}); } catch (e) {} }
      location.reload();
    }
    function openLoader() { loaderOpen = true; $('loader').classList.add('on'); renderLoader(); }
    function closeLoader() { loaderOpen = false; $('loader').classList.remove('on'); }
    async function renderLoader() {
      const el = $('loader'); if (!el) return;
      el.innerHTML = `<div class="lwrap"><button class="lclose" data-lclose>✕ close</button>
        <div class="lhead">your worlds</div>
        <div class="lsub">Each ship is a separate save — kept on ${storyUser ? `your PDS (@${esc(storyUser.handle)})` : 'this device'}, so you can run as many as you like. Resume one, start fresh, or clear one out.</div>
        <div class="lacts">
          <button class="lbtn prim" data-new>✦ new world</button>
          <button class="lbtn" data-restart>↻ restart this world</button>
          ${storyUser ? '' : '<button class="lbtn" data-signin>sign in to sync across devices</button>'}
        </div>
        <div class="plist" id="plist"><div class="empty">reading saves…</div></div></div>`;
      el.querySelector('[data-lclose]').onclick = closeLoader;
      el.querySelector('[data-new]').onclick = newRandomWorld;
      el.querySelector('[data-restart]').onclick = restartCurrentWorld;
      const si = el.querySelector('[data-signin]'); if (si) si.onclick = () => { closeLoader(); signIn(); };
      let profiles = [];
      try { profiles = await gatherProfiles(); } catch (e) {}
      if (!loaderOpen) return;   // closed while awaiting
      const list = el.querySelector('#plist'); if (!list) return;
      if (!profiles.length) { list.innerHTML = `<div class="empty">No saves yet — you're playing world ${esc(worldKey())}. It'll appear here once it saves.</div>`; return; }
      list.innerHTML = profiles.map((p) => {
        const cur = p.world === worldKey(), s = summarizeState(p.state);
        const deck = s ? deckForTier(s.nar) : null;
        const title = s && s.name ? esc(s.name) : 'unnamed traveller';
        const src = [p.cloud ? '<span class="cloud">☁ cloud</span>' : '', p.local ? '<span class="local">◍ local</span>' : ''].filter(Boolean).join(' · ');
        const meta = s ? `deck ${s.nar}/${DECK_COUNT}${deck ? ' · ' + esc(deck.name) : ''} · rev ${s.rev} · pow ${s.pow} · ◈${s.coins} · ${s.placed} lore` : '<span class="src">empty / unreadable save</span>';
        const when = p.updatedAt ? ` · <span class="src">saved ${esc(new Date(p.updatedAt).toLocaleString())}</span>` : '';
        return `<div class="pcard${cur ? ' cur' : ''}">
          <div class="pmain">
            <div class="pname">${title}${cur ? '<span class="cur-tag">playing now</span>' : ''}</div>
            <div class="pmeta">world ${esc(p.world)} · ${src}<br>${meta}${when}</div>
          </div>
          <div class="pbtns">
            ${cur ? '<button class="lbtn" data-resume disabled style="opacity:.4;cursor:default">current</button>' : `<button class="lbtn prim" data-resume="${esc(p.world)}">resume</button>`}
            <button class="lbtn danger" data-del="${esc(p.world)}">delete</button>
          </div></div>`;
      }).join('');
      list.querySelectorAll('[data-resume]').forEach((b) => { const w = b.getAttribute('data-resume'); if (w) b.onclick = () => switchToWorld(w); });
      list.querySelectorAll('[data-del]').forEach((b) => { b.onclick = () => deleteProfile(b.getAttribute('data-del')); });
    }
    $('loader').addEventListener('click', (e) => { if (e.target === $('loader')) closeLoader(); });   // click the backdrop to dismiss
    $('newgame').addEventListener('click', openLoader);
    addEventListener('keydown', (e) => { if (e.key === 'Escape' && loaderOpen) { e.preventDefault(); closeLoader(); } });
    loadStory(); resize(); newWorld(); requestAnimationFrame(frame);
    // bring up the WebGPU cell renderer (crisp vector fills). Async + fully guarded: if it never resolves
    // or WebGPU is missing, the game stays on the baked-raster path with zero change.
    initGpuMap($('mapgl')).then((g) => {
      if (!g) return;
      gpu = g; gpuActive = true; gpu.resize(W * dpr, H * dpr);
      if (world) for (const ch of world.chunks) ch._raster = null;   // re-bake detail-only now that the GPU owns the cells
      draw();
    }).catch(() => { gpu = null; gpuActive = false; });
  </script>
</body>
</html>
