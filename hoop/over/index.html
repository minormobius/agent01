<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#13241a" />
<title>hoop · level zero — the overworld</title>
<style>
  :root { --ink:#eaf6f2; --dim:#9fbdb6; --gold:#ffd98a; --teal:#7fe8d8; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: #0e1d14; color: var(--ink); font: 13px/1.5 ui-monospace, "JetBrains Mono", monospace; overflow: hidden; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  #hud { position: fixed; top: 8px; left: 10px; max-width: 60vw; color: var(--dim); text-shadow: 0 1px 3px #000; pointer-events: none; }
  #hud b { color: var(--gold); }
  a.home { position: fixed; top: 8px; right: 10px; color: var(--teal); text-decoration: none; text-shadow: 0 1px 3px #000; }
  #info { position: fixed; bottom: 12px; left: 10px; color: var(--dim); background: rgba(10,28,18,.6); border: 1px solid #1d3a28; border-radius: 9px; padding: 7px 11px; backdrop-filter: blur(5px); }
  #info b { color: var(--teal); }
  #err { position: fixed; inset: auto 10px 10px 10px; background: #2a0e0e; color: #ffb3a7; border: 1px solid #5a2020; border-radius: 8px; padding: 8px 11px; display: none; white-space: pre-wrap; z-index: 10; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">❀ <b>level zero</b> — the living floor: groves, mega-lakes, the streams that feed them<br><span style="color:#7da890">click = walk · scroll = zoom · cross water at the ⌇ bridges · weave between the trees</span></div>
<a class="home" href="/v3/">↧ the decks</a>
<div id="info">…</div>
<div id="err"></div>
<script type="module">
import { makeEden } from './eden.js';
import { buildGenome, frameRects, DIR8 } from '../v3/sprite-core.js';

const $ = (id) => document.getElementById(id);
addEventListener('error', (e) => { $('err').style.display = 'block'; $('err').textContent = 'page: ' + e.message; });
const qs = new URLSearchParams(location.search);
const SEED = (parseInt(qs.get('seed'), 10) || 7) >>> 0;
const E = makeEden(SEED), TILE = E.TILE;
const sp = E.spawn();
const AT = { gx: sp.gx, gy: sp.gy };                        // global world coords
let target = null, zoom = 0.7;
const SPEED = 240;

const cv = $('cv'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() { DPR = Math.min(devicePixelRatio || 1, 2); W = innerWidth; H = innerHeight; cv.width = W * DPR; cv.height = H * DPR; }
addEventListener('resize', resize); resize();
const tileOf = (g) => Math.floor(g / TILE);

// ── render ──
const GROUND = '#15301d', MEADOW = [70, 116, 64], GROVE = [34, 78, 46], WATER = '#2f6f8c', DEEP = '#1f5273', SHORE = 'rgba(160,220,210,.35)', BRIDGE = '#8a6a44';
function lerpC(a, b, t) { return [a[0] + (b[0] - a[0]) * t | 0, a[1] + (b[1] - a[1]) * t | 0, a[2] + (b[2] - a[2]) * t | 0]; }
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = GROUND; ctx.fillRect(0, 0, W, H);
  const z = zoom, viewR = Math.max(W, H) / z;
  // ground: coarse wetness tint (grove vs meadow) in screen space, cheap
  const G = 46;
  for (let sy = 0; sy < H; sy += G) for (let sx = 0; sx < W; sx += G) { const gx = (sx + G / 2 - W / 2) / z + AT.gx, gy = (sy + G / 2 - H / 2) / z + AT.gy; const w = E.wetness(gx, gy); const c = lerpC(MEADOW, GROVE, Math.min(1, w * 1.1)); ctx.fillStyle = 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; ctx.fillRect(sx, sy, G + 1, G + 1); }

  ctx.setTransform(DPR * z, 0, 0, DPR * z, DPR * (W / 2 - AT.gx * z), DPR * (H / 2 - AT.gy * z));
  // water: lakes (controlled surfaces) + the streams that feed them
  const lakes = E.lakesNear(AT.gx, AT.gy, viewR + TILE * 1.7);
  for (const l of lakes) { const ring = E.lakeRing(l, 54); ctx.beginPath(); ctx.moveTo(ring[0][0], ring[0][1]); for (let i = 1; i < ring.length; i++) ctx.lineTo(ring[i][0], ring[i][1]); ctx.closePath(); const g = ctx.createRadialGradient(l.cx, l.cy, l.r * 0.2, l.cx, l.cy, l.r); g.addColorStop(0, DEEP); g.addColorStop(1, WATER); ctx.fillStyle = g; ctx.fill(); ctx.strokeStyle = SHORE; ctx.lineWidth = 3 / z; ctx.stroke(); }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const streams = [];
  for (const l of lakes) for (const st of E.lakeStreams(l)) streams.push(st);
  for (const st of streams) { const P = st.pts; ctx.strokeStyle = WATER; ctx.lineWidth = st.width * 2; ctx.beginPath(); ctx.moveTo(P[0][0], P[0][1]); for (let i = 1; i < P.length; i++) ctx.lineTo(P[i][0], P[i][1]); ctx.stroke(); ctx.strokeStyle = 'rgba(150,210,225,.4)'; ctx.lineWidth = Math.max(0.6, st.width * 0.7); ctx.stroke(); }
  // bridges over the streams
  for (const st of streams) { const P = st.pts; for (let i = 16; i < P.length - 8; i += 24) { const x = P[i][0], y = P[i][1], a = Math.atan2(P[i][1] - P[i - 1][1], P[i][0] - P[i - 1][0]) + Math.PI / 2, len = st.width * 2.4 + 8; ctx.save(); ctx.translate(x, y); ctx.rotate(a); ctx.fillStyle = BRIDGE; ctx.fillRect(-len, -3, len * 2, 6); ctx.strokeStyle = 'rgba(40,26,14,.6)'; ctx.lineWidth = 0.8; for (let k = -3; k <= 3; k++) { ctx.beginPath(); ctx.moveTo(k / 3 * len, -3); ctx.lineTo(k / 3 * len, 3); ctx.stroke(); } ctx.restore(); } }

  // trees — the forest as a density field; cull to the viewport
  const x0 = AT.gx - viewR / 2 - 60, x1 = AT.gx + viewR / 2 + 60, y0 = AT.gy - viewR / 2 - 60, y1 = AT.gy + viewR / 2 + 60;
  for (let az = tileOf(x0); az <= tileOf(x1); az++) for (let ax = tileOf(y0); ax <= tileOf(y1); ax++) {
    for (const t of E.tileTrees(az, ax)) {
      if (t[0] < x0 || t[0] > x1 || t[1] < y0 || t[1] > y1) continue;
      ctx.fillStyle = 'rgba(8,20,12,.5)'; ctx.beginPath(); ctx.arc(t[0] + t[2] * 0.3, t[1] + t[2] * 0.5, t[2] * 0.9, 0, 7); ctx.fill();   // shadow
      ctx.fillStyle = (Math.floor(t[0] + t[1]) & 3) ? '#2f6e3a' : '#367c42'; ctx.beginPath(); ctx.arc(t[0], t[1], t[2], 0, 7); ctx.fill();   // canopy
      ctx.fillStyle = '#1d4527'; ctx.beginPath(); ctx.arc(t[0] - t[2] * 0.3, t[1] - t[2] * 0.3, t[2] * 0.45, 0, 7); ctx.fill();             // shade
    }
  }
  drawCritters(x0, x1, y0, y1);
  // route hint + you
  if (target) { ctx.strokeStyle = 'rgba(255,217,138,.4)'; ctx.lineWidth = 2 / z; ctx.setLineDash([6 / z, 6 / z]); ctx.beginPath(); ctx.moveTo(AT.gx, AT.gy); ctx.lineTo(target.gx, target.gy); ctx.stroke(); ctx.setLineDash([]); }
  ctx.fillStyle = '#ffe9a8'; ctx.shadowColor = 'rgba(255,217,138,.9)'; ctx.shadowBlur = 12; ctx.font = 'bold 17px ui-monospace, monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('@', AT.gx, AT.gy); ctx.shadowBlur = 0;
}

// ── critters — a few per tile, drifting on land (placeholder fauna; biome species later) ──
const ROLES = ['grow', 'heal', 'play', 'move', 'serve', 'learn'];
const critterCache = new Map(), spriteCache = new Map();
function crittersOf(az, ax) {
  const tk = az + ',' + ax; if (critterCache.has(tk)) return critterCache.get(tk);
  const ox = az * TILE, oy = ax * TILE, out = [];
  for (let k = 0; k < 9; k++) {
    let gx, gy, ok = false; for (let t = 0; t < 24 && !ok; t++) { gx = ox + (0.1 + 0.8 * h2(az, ax, k * 7 + t)) * TILE; gy = oy + (0.1 + 0.8 * h2(ax, az, k * 11 + t + 99)) * TILE; ok = E.passable(gx, gy); }
    if (!ok) continue;
    out.push({ gx, gy, hx: gx, hy: gy, role: ROLES[(h2(az, ax, k) * ROLES.length) | 0], seed: 'crit:' + az + ':' + ax + ':' + k, ph: Math.random() * 6, ang: Math.random() * 6.28 });
  }
  return (critterCache.set(tk, out), out);
}
function h2(x, y, k) { let n = Math.imul((x | 0) ^ 0x9e37, 0x2c1b3c6d) ^ Math.imul((y | 0) ^ 0x85eb, 0x27d4eb2f) ^ Math.imul(k | 0, 0x165667b1) ^ SEED; n = Math.imul(n ^ (n >>> 15), 0x2c1b3c6d); n ^= n >>> 13; return (n >>> 0) / 4294967296; }
function critterSprite(seed, role, phase) {
  const fk = seed + '|' + (phase % 4); let c = spriteCache.get(fk); if (c) return c;
  c = document.createElement('canvas'); c.width = c.height = 24; const x = c.getContext('2d'); const g = buildGenome(seed, { size: 12, role, frames: 4 }, null);
  for (const r of frameRects(g, DIR8[2], phase % 4)) { x.fillStyle = r.c; x.fillRect(r.x * 2, r.y * 2, 2, 2); }
  if (spriteCache.size > 600) spriteCache.delete(spriteCache.keys().next().value); spriteCache.set(fk, c); return c;
}
function drawCritters(x0, x1, y0, y1) {
  const sm = ctx.imageSmoothingEnabled; ctx.imageSmoothingEnabled = false;
  for (let az = tileOf(x0); az <= tileOf(x1); az++) for (let ax = tileOf(y0); ax <= tileOf(y1); ax++) for (const n of crittersOf(az, ax)) { if (n.gx < x0 || n.gx > x1 || n.gy < y0 || n.gy > y1) continue; ctx.drawImage(critterSprite(n.seed, n.role, n.ph | 0), n.gx - 8, n.gy - 11, 16, 16); }
  ctx.imageSmoothingEnabled = sm;
}
function driftCritters(dt, x0, x1, y0, y1) {
  for (let az = tileOf(x0); az <= tileOf(x1); az++) for (let ax = tileOf(y0); ax <= tileOf(y1); ax++) for (const n of crittersOf(az, ax)) { n.ph += dt * 3; n.ang += (Math.random() - 0.5) * dt * 2; const tx = n.hx + Math.cos(n.ang) * 30, ty = n.hy + Math.sin(n.ang) * 30; if (E.passable(tx, ty)) { n.gx += (tx - n.gx) * Math.min(1, dt * 0.5); n.gy += (ty - n.gy) * Math.min(1, dt * 0.5); } }
}

// ── input + open movement (free; blocked only by water/trees; slide along edges) ──
cv.addEventListener('click', (e) => { target = { gx: (e.clientX - W / 2) / zoom + AT.gx, gy: (e.clientY - H / 2) / zoom + AT.gy }; });
addEventListener('wheel', (e) => { e.preventDefault(); zoom = Math.max(0.25, Math.min(2.4, zoom * (e.deltaY < 0 ? 1.1 : 0.9))); }, { passive: false });
function step(dt) {
  if (!target) return;
  const dx = target.gx - AT.gx, dy = target.gy - AT.gy, d = Math.hypot(dx, dy);
  if (d < 5) { target = null; return; }
  const s = Math.min(d, SPEED * dt), ux = dx / d, uy = dy / d;
  if (E.passable(AT.gx + ux * s, AT.gy + uy * s)) { AT.gx += ux * s; AT.gy += uy * s; }
  else if (E.passable(AT.gx + ux * s, AT.gy)) AT.gx += ux * s;        // slide along the edge (shore / treeline)
  else if (E.passable(AT.gx, AT.gy + uy * s)) AT.gy += uy * s;
  else target = null;
}

// ── prefetch tiles ahead so the 60ms forest-gen never lands mid-frame ──
const warmed = new Set();
let warmQ = [];
function queueWarm() { const a = tileOf(AT.gx), b = tileOf(AT.gy); for (let i = -1; i <= 1; i++) for (let j = -1; j <= 1; j++) { const k = (a + i) + ',' + (b + j); if (!warmed.has(k)) { warmed.add(k); warmQ.push([a + i, b + j]); } } }
let last = 0, warmT = 0, infoT = 0;
function tick(ts) {
  const dt = Math.min(0.05, (ts - last) / 1000 || 0); last = ts;
  step(dt);
  const viewR = Math.max(W, H) / zoom, x0 = AT.gx - viewR / 2 - 60, x1 = AT.gx + viewR / 2 + 60, y0 = AT.gy - viewR / 2 - 60, y1 = AT.gy + viewR / 2 + 60;
  driftCritters(dt, x0, x1, y0, y1);
  draw();
  if (ts - warmT > 120) { warmT = ts; queueWarm(); if (warmQ.length) { const [a, b] = warmQ.shift(); E.tileTrees(a, b); } }   // one tile per ~120ms
  if (ts - infoT > 500) { infoT = ts; const a = tileOf(AT.gx), b = tileOf(AT.gy); $('info').innerHTML = 'sector <b>(' + a + ', ' + b + ')</b> · ' + E.lakesNear(AT.gx, AT.gy, TILE).length + ' lakes near · ' + (E.passable(AT.gx, AT.gy) ? 'on open ground' : 'at the water’s edge'); }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
