<body>

  <script type="module">
    import { solveChunk } from './v8/chunkgen.js';
    import { createWorld, addChunk, neighbourSpec, edgeFree, buildWalk, pathFind, nearestNode, globalOf, sightBall } from './v8/manager.js';
    import { nearestConcourse, attachShaft, markRindDeck, playerDeckOf } from './descent.js';   // chutes: a deck link is a port
    import { STAMINA_MAX, clampStamina, drainStamina, fixtureAction, chestDeposit, chestWithdraw, chestOf } from './sim.js';   // stamina + fixture-action registry + chest
    import { bakeFog } from './v8/bake.js';
    import { paintChunk, SKIN_DEFAULTS } from './skin.js';
    import { drawDevice } from './v5/deco.js';
    import { drawWallLight } from './v5/lights.js';
    import { drawWallFixture } from './consoles.js';
    import { TRAFFIC_FOOTPRINT, GRAND_ROLES, GRAND_MIN, MIN_ROOM, MAX_FIXTURE_AREA } from './rooms.js';
    import { buildSociety, buildResidents, stepResidents } from './npc.js';
    import { frameRects, DIR_OF, DIR8, genomeFromParams, buildGenome } from './v3/sprite-core.js';
    import { flattenPool, MemoryStore, interact, talk, choose, take, loadGateState } from './story/engine.js';
    import { checkAdvance } from './story/advance.js';   // deterministic milestone tier-advancement (the inference-free 'long rest')
    import { computeBoard, questLog, activeMarkers } from './story/board.js';   // the storyboard kernel → the quest log + waypoint (same source as /storyboard/)
    import { pickChatter, factionOf } from './story/chatter.js';   // deterministic faction×phase ambient lines for the crowd (no hand-authored copy)
    import { Inventory } from './inventory.js';
    import { startingPack, packForCharacter, itemFromGrant, addToPack } from './pack.js';
    import { CharacterCreator, loadCharacter } from './character.js';
    import { deriveCombat, TRIAD, TRIAD_ORDER } from './stats.js';
    import { crewSprite, crewStats } from './crew.js';
    import { EquippedView } from './equipped.js';
    import { MiniMap, onScreen, edgePoint } from './minimap.js';
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d'), $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
    // read a tile's baked colour back into a 0..~1.2 luminance — used to light the voronoi-grown fixtures
    const lumOfColor = (col) => { const m = /rgb\((\d+),(\d+),(\d+)\)/.exec(col || ''); return m ? (0.3 * +m[1] + 0.6 * +m[2] + 0.1 * +m[3]) / 190 : 0.6; };

    const OPTS = { shape: 'hex', cellSize: 16, oxygenReach: 3, concourseWidth: 2, roomSize: 16, sight: 9 };
    const SKIN = { ...SKIN_DEFAULTS, fixtureArea: MAX_FIXTURE_AREA };
    const TERMINAL_ROLES = new Set(['learn', 'govern', 'worship']);   // reading-room / record-hall consoles are Tabard terminals (Continuant rooms). Marked teal ▤; click to read Luna's mythograph. A chunk-0 fallback (_terminal) guarantees at least one.
    const isTerminal = (cp) => cp._terminal || TERMINAL_ROLES.has(cp.role);
    const VFOV = 0.5;              // vertical field of view = this fraction of a chunk-span of world, DEVICE-INDEPENDENT:
                                   // desktop sees the same world-HEIGHT the phone does (just wider), not a screen-size zoom
    let seed = 7, W = 0, H = 0, dpr = 1, busyN = 0;
    let world = null, walk = null, cam = { scale: 1, ox: 0, oy: 0 }, chunkSpan = 552;
    let player = -1, seen = new Set(), inView = new Set(), route = [], routePts = [], walkTimer = null, society = null;
    let residents = [], lastTs = 0;
    const story = { store: null, ready: false, playerId: 'local', active: null };
    let storyWp = null;                 // story-driven waypoint {x,y} resolved from the active beat's marker
    const storyBigKeys = new Set();     // resident featureKeys an active beat marks → embiggen (storyboard-relevant only)
    const spriteCache = new Map();
    const pp = { x: 0, y: 0 };   // the player's CONTINUOUS position (glides; not snapped to a cell centre)
    const SX = (x) => (x - cam.ox) * cam.scale, SY = (y) => (y - cam.oy) * cam.scale;
    const WX = (sx) => sx / cam.scale + cam.ox, WY = (sy) => sy / cam.scale + cam.oy;
    const busy = (on) => { busyN += on ? 1 : -1; $('busy').classList.toggle('on', busyN > 0); };
    const px = () => pp.x, py = () => pp.y;

    // off-thread generation + paint (worker) with a synchronous fallback — identical contract either way
    let worker = null, genId = 0;
    try { worker = new Worker(new URL('./worker.js', import.meta.url), { type: 'module' }); } catch (e) { worker = null; }
    function generate(opts) {
      return new Promise((res) => {
        if (!worker) { const rec = solveChunk(opts); rec.seed = opts.seed >>> 0; return res({ rec, painted: paintChunk(rec, SKIN) }); }
        const id = ++genId, h = (e) => {
          if (!e.data || e.data.id !== id) return; worker.removeEventListener('message', h);
          if (e.data.error) { const rec = solveChunk(opts); rec.seed = opts.seed >>> 0; res({ rec, painted: paintChunk(rec, SKIN) }); }
          else res({ rec: e.data.rec, painted: e.data.painted });
        };
        worker.addEventListener('message', h); worker.postMessage({ id, opts });
      });
    }

    function bboxOf(poly) { let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9; for (const v of poly) { x0 = Math.min(x0, v.x); y0 = Math.min(y0, v.y); x1 = Math.max(x1, v.x); y1 = Math.max(y1, v.y); } return { x0, y0, x1, y1 }; }
    function centroidOf(poly) { let x = 0, y = 0; for (const v of poly) { x += v.x; y += v.y; } return { x: x / poly.length, y: y / poly.length }; }
    // a chunk's seed is derived from its POSITION (centroid), not the load order — so a chunk is the
    // same wherever you approach it from, and preloading several at once can't collide on a seed.
    const hash2 = (a, b) => { let h = (Math.imul(a | 0, 374761393) + Math.imul(b | 0, 668265263) + 0x9e3779b1) | 0; h = Math.imul(h ^ (h >>> 13), 1274126177); return (h ^ (h >>> 16)) >>> 0; };
    const chunkSeedFor = (poly) => { const c = centroidOf(poly); return (hash2(Math.round(c.x), Math.round(c.y)) ^ seed) >>> 0; };
    const opts = (extra) => ({ seed: extra.seed, shape: OPTS.shape, cellSize: OPTS.cellSize, oxygenReach: OPTS.oxygenReach, concourseWidth: OPTS.concourseWidth, roomSize: OPTS.roomSize, footprint: TRAFFIC_FOOTPRINT, grand: GRAND_ROLES, grandMin: GRAND_MIN, minRoom: MIN_ROOM, skin: SKIN, ...extra });

    function followCam() { if (player < 0) return; cam.ox = px() - W / (2 * cam.scale); cam.oy = py() - H / (2 * cam.scale); checkDeckEnter(); }
    function setScale() { cam.scale = H / (chunkSpan * VFOV); }   // pin the VERTICAL world span; width follows the aspect (mobile look retained on desktop)

    // rebuild the walk graph + the social web, then re-cast residents — but PRESERVE the sim state of
    // residents we already have (global node ids are stable as chunks append), so commuters don't reset
    // every time a chunk streams in.
    function restitch() {
      walk = buildWalk(world, blockedOf); society = buildSociety(world, walk);
      const fresh = buildResidents(world, walk, society), prev = new Map(residents.map((a) => [a.id, a]));
      residents = fresh.map((a) => prev.get(a.id) || a);
    }
    // IMPASSABLE fixtures (v091): the bones cells under a room's floor fixture + its central component
    // are non-navigable. Computed once per chunk from its painted result (the nearest bones cell to each
    // claimed fixture tile / the component centre), skipping the concourse + the room's door cells.
    function computeBlocked(ch) {
      const set = new Set(), P = ch.painted, bones = ch.cells; if (!P || !bones) return set;
      const doorSet = new Set(); for (const r of ch.rooms) { if (r.door >= 0) doorSet.add(r.door); if (r.doorRoad >= 0) doorSet.add(r.doorRoad); }
      // blocker points = the fixture eruption tiles + component centres; a bones cell is impassable only
      // if its CENTRE actually sits under one (within ~0.55·cellSize), so we don't over-block a bones cell
      // the fixture merely grazes.
      const pts = [];
      for (const F of (P.fixtures || [])) for (const cl of F.cells) { if (cl.base) continue; const c = P.paintCells[cl.idx]; if (c) pts.push(c); }
      for (const cp of (P.comps || [])) pts.push({ x: cp.cx, y: cp.cy });
      if (!pts.length) return set;
      const thr2 = ((ch.cellSize || 16) * 0.55) ** 2;
      for (let i = 0; i < bones.length; i++) { if (doorSet.has(i) || ch.road[i]) continue; const bx = bones[i].x, by = bones[i].y; for (const p of pts) if ((p.x - bx) ** 2 + (p.y - by) ** 2 < thr2) { set.add(i); break; } }
      return set;
    }
    const blockedOf = (chunkId, local) => { const ch = world.chunks[chunkId]; if (!ch) return false; if (!ch._blocked) ch._blocked = computeBlocked(ch); return ch._blocked.has(local); };
    function rebakeFog() { if (!walk) return; for (const ch of world.chunks) { const b = walk.base[ch.id]; ch.fog = bakeFog(ch, (i) => seen.has(b + i), (i) => inView.has(b + i)); } }
    function reveal() { if (player < 0) return; for (const g of sightBall(walk, player, OPTS.sight)) seen.add(g); inView = sightBall(walk, player, OPTS.sight); rebakeFog(); }

    // ── DECKS (chutes & ladders): the rind is a lower deck linked to the concourse by a shaft PORT. The
    // render draws only the player's current deck; crossing the shaft (same x,y) flips the deck seamlessly.
    const playerDeck = () => playerDeckOf(world, walk, player);
    let shaftXY = null, rindBuilt = false, shaftNodes = null;
    // nearest walkable node ON THE CURRENT DECK (decks overlap in (x,y), so a click must not jump decks)
    function nearestDeckNode(x, y) {
      const pd = playerDeck(); let best = -1, bd = Infinity;
      for (let i = 0; i < walk.N; i++) {
        if (walk.blocked && walk.blocked.has(i)) continue;
        if (((world.chunks[walk.nodeChunk[i]] || {}).deck || 0) !== pd) continue;
        const d = (walk.pos[2 * i] - x) ** 2 + (walk.pos[2 * i + 1] - y) ** 2; if (d < bd) { bd = d; best = i; }
      }
      return best;
    }
    // use the chute: step onto the linked shaft cell on the other deck (a ladder). Only when near the shaft.
    function crossShaft() {
      if (!shaftNodes || player < 0) return false;
      const to = shaftNodes[playerDeck() === 1 ? 0 : 1]; if (to == null || to < 0) return false;
      player = to; pp.x = walk.pos[2 * to]; pp.y = walk.pos[2 * to + 1]; route = []; routePts = [];
      if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; }
      followCam(); reveal(); draw(); maybeStream();
      return true;
    }
    async function maybeBuildRind() {
      if (rindBuilt || !world || !walk || !story.ready) return;
      if (story.store.getFact(story.playerId, 'flag.sevin_believes') !== true) return;   // unsealed only
      rindBuilt = true;
      try {
        const c0 = world.chunks[0];
        const sevin = anchors.find((a) => a.key === 'anchor:sevin');
        const sc = nearestConcourse(c0, sevin ? sevin.x : px(), sevin ? sevin.y : py());
        if (!sc) { rindBuilt = false; return; }
        shaftXY = { x: sc.x, y: sc.y };
        attachShaft(c0, sc.x, sc.y, sc.cell);                       // sink the shaft on the concourse
        const rseed = (seed ^ 0x9e3779b9) >>> 0;
        const { rec, painted } = await generate(opts({ seed: rseed, poly: c0.poly, inherit: [{ x: sc.x, y: sc.y }] }));
        rec.painted = painted; markRindDeck(rec, 1, shaftXY);        // lower deck, links ONLY at the shaft
        addChunk(world, rec); restitch();
        shaftNodes = { 0: globalOf(walk, 0, sc.cell), 1: globalOf(walk, rec.id, (rec.ports[0] || {}).cell) };   // the two ends of the chute
        reveal(); draw();
      } catch (e) { rindBuilt = false; /* leave the world intact if generation fails */ }
    }
    function checkDeckEnter() {
      if (!story.ready || playerDeck() !== 1) return;
      if (story.store.getFact(story.playerId, 'flag.entered_rind') === true) return;
      story.store.setFact(story.playerId, 'flag.entered_rind', true); saveStory();   // completes b4-descent
    }

    // ── stamina (drains walking, restored by a bed) + chests (per-chamber persistent storage) ──
    const getStam = () => clampStamina(story.ready ? story.store.getFact(story.playerId, 'sim.stamina') : STAMINA_MAX);
    const setStam = (v) => { if (story.ready) story.store.setFact(story.playerId, 'sim.stamina', clampStamina(v)); };
    const getChests = () => (story.ready && story.store.getFact(story.playerId, 'chests')) || {};
    const setChests = (c) => { if (story.ready) story.store.setFact(story.playerId, 'chests', c); };

    // a living-quarters fixture under a click: the central component is a BED, the grown wall fixture a CHEST
    function livingFixtureAt(wx, wy) {
      if (!world) return null; const pd = playerDeck();
      for (const ch of world.chunks) { const P = ch.painted; if (!P || (ch.deck || 0) !== pd) continue;
        for (const cp of (P.comps || [])) { if (fixtureAction(cp.role, 'component') !== 'bed') continue;
          if ((cp.cx - wx) ** 2 + (cp.cy - wy) ** 2 < (cp.r * 2.0) ** 2) return { action: 'bed', x: cp.cx, y: cp.cy }; }
        for (const F of (P.fixtures || [])) { const role = (ch.rooms[F.room] || {}).role; if (fixtureAction(role, 'wall') !== 'chest' || !F.tip) continue;
          if ((F.tip.x - wx) ** 2 + (F.tip.y - wy) ** 2 < (SKIN.playerW * 2.4) ** 2) return { action: 'chest', x: F.tip.x, y: F.tip.y, gid: 'ch' + ch.id + ':r' + F.room }; }
      }
      return null;
    }
    function useBed() {
      setStam(STAMINA_MAX); saveStory(); whereAmI();
      $('busy').textContent = '✚ rested — stamina restored'; $('busy').classList.add('on');
      clearTimeout(_flashT); _flashT = setTimeout(() => { $('busy').classList.remove('on'); $('busy').textContent = 'generating…'; }, 2400);
    }
    let chestGid = null;
    function openChest(gid) { chestGid = gid; story.active = { chest: true }; renderChest(); }
    function renderChest() {
      const panel = $('story'), items = chestOf(getChests(), chestGid);
      let h = '<button class="cl" data-close="1">close ⏎</button><div class="nm">a storage chest</div><div class="rl">▣ living quarters · ' + esc(chestGid) + '</div>';
      h += '<div class="nmh">in the chest</div>';
      h += items.length ? items.map((it, i) => '<div class="choice" data-withdraw="' + i + '">› ' + esc(it.name || 'a thing') + ' — take</div>').join('') : '<div class="end">empty</div>';
      h += '<div class="nmh" style="margin-top:8px">your pack</div>';
      h += pack.pack.length ? pack.pack.map((it, i) => '<div class="choice" data-deposit="' + i + '">› ' + esc(it.name || 'a thing') + ' — store</div>').join('') : '<div class="end">pack is empty</div>';
      panel.innerHTML = h; panel.classList.add('on');
    }

    // ── streaming: PRELOAD the frontier — generate any free chunk edge within ~one chunk of the player ──
    // (so from the central chunk the whole 6-neighbour ring loads ahead of you, and the frontier stays a
    // chunk ahead as you explore). Serial by design: each neighbour inherits its predecessors' ports, so
    // the seams stay shared — but a chunk takes ~3s to cross and ~0.5s to make, so one worker keeps ahead.
    async function maybeStream() {
      if (!world || busyN > 0) return;
      if (!introSolved()) return;   // the first chunk is sealed until the opening mystery is solved
      const LOOK = chunkSpan * 1.0;                 // start a full chunk early — "less than one chunk away"
      let best = null, bd = Infinity;
      for (const ch of world.chunks) for (let ei = 0; ei < ch.poly.length; ei++) {
        if (!edgeFree(world, ch, ei)) continue;
        const a = ch.poly[ei], b = ch.poly[(ei + 1) % ch.poly.length], mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        const d = Math.hypot(mx - px(), my - py());
        if (d > LOOK) continue;
        if (d < bd) { bd = d; best = { ch, ei }; }
      }
      if (!best) return;
      busy(true);
      const spec = neighbourSpec(world, best.ch.id, best.ei);
      const nseed = chunkSeedFor(spec.poly);
      const { rec, painted } = await generate(opts({ seed: nseed, poly: spec.poly, inherit: spec.inherit }));
      rec.painted = painted; addChunk(world, rec); restitch(); reveal();
      busy(false); status(); draw();
      maybeStream();   // chain for any other neighbours the view already reaches
    }

    async function newWorld() {
      busy(true); world = createWorld(); walk = null; player = -1; seen = new Set(); inView = new Set(); route = []; if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; }
      const { rec, painted } = await generate(opts({ seed })); rec.painted = painted; addChunk(world, rec); restitch();

    function setWaypoint(wp) {
      waypoint = (wp && Number.isFinite(wp.x) && Number.isFinite(wp.y)) ? { x: wp.x, y: wp.y } : null;
      try { waypoint ? localStorage.setItem('mega:v093:waypoint', JSON.stringify(waypoint)) : localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
    }
    const minimap = new MiniMap({
      getState: () => ({ world, walk, seen, society, px: px(), py: py(), waypoint }),
      onWaypoint: setWaypoint,
    });
    $('mapbtn').addEventListener('click', () => minimap.toggle());
    addEventListener('keydown', (e) => { if ((e.key === 'm' || e.key === 'M') && !e.metaKey && !e.ctrlKey) { e.preventDefault(); minimap.toggle(); } });

    if (playerChar) adoptCharacter(playerChar);   // restore the saved sprite/kit/HUD on load
    $('newgame').addEventListener('click', () => {
      if (!confirm('Start a new game? This wipes your story progress — facts, lore, inventory, tiers — and respawns you. The world (and your character) stay.')) return;
      try { localStorage.removeItem('hoop:v095:story'); localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
      location.reload();
    });
    loadStory(); resize(); newWorld(); requestAnimationFrame(frame);
  </script>
</body>
</html>
