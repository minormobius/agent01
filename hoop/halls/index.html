<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<meta name="description" content="hoop v5 prototype — the halls-first sandbox: grow a capillary concourse, hang big single-door rooms off it, furnish each room with the full /sprite/fixture set (wall-grown lights + tile-grabbing console + central component, ray-traced floor), and route with a tiny two-tier nav. The static map is baked once; only the @ and the crowd redraw." />
<title>hoop v5 · halls sandbox</title>
<style>
  :root { --bg:#05060a; --ink:#dfe7e2; --dim:#8a978f; --line:#1c2530; --gold:#f4bf62; --teal:#7fd8d0; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--ink); font: 12px/1.5 ui-monospace, "JetBrains Mono", monospace; overflow: hidden; }
  canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; cursor: crosshair; }
  #hud { position: fixed; top: 8px; left: 10px; max-width: 64vw; color: var(--dim); text-shadow: 0 1px 2px #000; pointer-events: none; }
  #hud b { color: var(--gold); }
  a.home { position: fixed; top: 8px; right: 12px; color: var(--teal); text-decoration: none; }
  #panel { position: fixed; bottom: 10px; left: 10px; background: rgba(8,11,16,.82); border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; backdrop-filter: blur(6px); display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; max-width: 96vw; }
  #panel label { color: var(--dim); display: inline-flex; align-items: center; gap: 5px; }
  #panel input[type=range] { width: 92px; accent-color: var(--teal); }
  #panel input[type=number] { width: 64px; background: #0f141a; border: 1px solid var(--line); color: var(--ink); border-radius: 6px; padding: 3px 5px; font: inherit; }
  #panel button { background: #0f141a; color: var(--ink); border: 1px solid var(--line); border-radius: 7px; padding: 5px 10px; cursor: pointer; font: inherit; }
  #panel button:hover { border-color: var(--teal); }
  #panel .on { color: var(--gold); border-color: var(--gold); }
  #stat { color: var(--teal); }
  #err { position: fixed; inset: auto 10px 70px 10px; background: #2a0e0e; color: #ffb3a7; border: 1px solid #5a2020; border-radius: 8px; padding: 8px 11px; display: none; white-space: pre-wrap; z-index: 10; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">◈ <b>hoop v5</b> — halls-first sandbox · <span id="info">…</span><br>
  <span style="color:#667">click = walk the @ there (two-tier route) · drag = pan · scroll = zoom · the crowd ambles room→room on the hall net</span></div>
<a class="home" href="/v4/">← v4</a>
<div id="panel">
  <label>seed <input id="seed" type="number" value="7"></label>
  <label>density <input id="density" type="range" min="0.5" max="1.8" step="0.1" value="1"></label>
  <label>hall seg <input id="hallSeg" type="range" min="120" max="240" step="10" value="175"></label>
  <label>lights/room <input id="lights" type="range" min="2" max="6" step="1" value="4"></label>
  <label>foam <input id="rs" type="range" min="34" max="64" step="2" value="46"></label>
  <button id="roll">🎲 roll</button>
  <button id="skel">hall net</button>
  <span id="stat"></span>
</div>
<div id="err"></div>

<script type="module">
import { genLayout, roomAt, mulberry32 } from './gen.js';
import { route, buildNavGraph } from './nav.js';
import { buildSceneCustom } from '../paint/voronoi.js';
import { placeWallLights, tintLights, occlusionGrid, bakeFloorRGB, lightAtRGB, drawWallLight, hslToRgb } from '../v4/fixture/lights.js';
import { growWallFixtures, drawWallFixture, ROLE_CONSOLE } from '../v4/fixture/consoles.js';
import { deviceGenome, drawDevice } from '../v4/fixture/deco.js';

const $ = (id) => document.getElementById(id);
addEventListener('error', (e) => { $('err').style.display = 'block'; $('err').textContent = e.message; });
const ROLE = { dwell: '#d9b24a', grow: '#5aa845', make: '#e0772f', mend: '#9b6b3a', trade: '#cf3b3b', serve: '#c853a0', play: '#3bb0c9', heal: '#9fb4c2', learn: '#5570d8', worship: '#b39bd8', govern: '#33408f', move: '#6b7a82', store: '#566066' };
const hexHue = (hex) => { const c = hex.replace('#', ''); const r = parseInt(c.slice(0, 2), 16) / 255, g = parseInt(c.slice(2, 4), 16) / 255, b = parseInt(c.slice(4, 6), 16) / 255; const mx = Math.max(r, g, b), mn = Math.min(r, g, b); let h = 0; if (mx !== mn) { const d = mx - mn; h = mx === r ? (g - b) / d + (g < b ? 6 : 0) : mx === g ? (b - r) / d + 2 : (r - g) / d + 4; h *= 60; } return h; };
const tone = (v, e) => 1 - Math.exp(-v * e);

const cv = $('cv'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() { DPR = Math.min(devicePixelRatio || 1, 2); W = innerWidth; H = innerHeight; cv.width = W * DPR; cv.height = H * DPR; draw(); }
addEventListener('resize', resize);

const state = { layout: null, baked: null, cam: { x: 0, y: 0, z: 0.5 }, showSkel: false };
const params = () => ({ seed: +$('seed').value >>> 0, density: +$('density').value, hallSeg: +$('hallSeg').value, lights: +$('lights').value, rs: +$('rs').value });

// ── build the whole furnished region as ONE scene, then BAKE it to an offscreen canvas ─────────────
// One buildSceneCustom over (rooms ∪ corridor seeds): rooms bound each other (proper walls), corridors
// are zero-wall OPEN concourse, and each room opens to its corridor (door). The /sprite/fixture set —
// wall-grown lights + the TILE-GRABBING console + a central component, ray-traced floor — runs over the
// ROOM cells; cool street-lights line the halls. Static → rasterised ONCE and blitted each frame (the
// perf fix); only the @ and the crowd redraw live.
const REG_OPTS = { ambient: 0.05, strength: 1, reach: 2.6 };
function buildRegion(P) {
  const L = state.layout, hallBase = L.rooms.length;
  const seeds = []; L.rooms.forEach((r) => seeds.push({ x: r.x, y: r.y })); L.nodes.forEach((n) => seeds.push({ x: n.x, y: n.y }));
  const isHall = (i) => i >= hallBase;
  const roleOf = (room) => (room != null && room < hallBase) ? L.rooms[room].role : 'move';
  const accentOf = (room) => ROLE[roleOf(room)] || '#566066';
  const edgeKind = (a, b) => (isHall(a) && isHall(b)) ? 'open' : (!isHall(a) && !isHall(b)) ? 'wall' : 'door';
  const scene = buildSceneCustom({ W: L.W, H: L.H, wallSpacing: 13, roomSpacing: P.rs, seeds, edgeKind, seed: L.seed >>> 0 });
  // ROOM lights (role-hued) + cool STREET lights every other corridor node (so the halls aren't dank)
  let lights = placeWallLights(scene, mulberry32((L.seed ^ 0x9e37) >>> 0), { perRoom: P.lights }).filter((l) => l.room < hallBase);
  tintLights(lights, (room) => hexHue(accentOf(room)));
  L.nodes.forEach((n, i) => { if (i % 2) return; const g = { kind: 'crystal', len: 0.8, depth: 3, spread: 0.6, shards: 3, seed: (i * 2654435761) >>> 0 }; lights.push({ x: n.x, y: n.y, nx: 0, ny: -1, len: P.rs * 1.15, model: g, room: hallBase, hue: 205, rgb: hslToRgb(205, 0.5, 0.62), tip: { x: n.x, y: n.y } }); });
  const occ = occlusionGrid(scene);
  const baked = bakeFloorRGB(scene, lights, occ, REG_OPTS);
  // consoles + components, ROOM cells only
  const tips = {}; for (const l of lights) (tips[l.room] = tips[l.room] || []).push(l.tip);
  const consoles = growWallFixtures(scene, mulberry32((L.seed * 7 + 13) >>> 0), { avoid: tips, kindOf: (room) => ROLE_CONSOLE[roleOf(room)] || 'storage' }).filter((c) => c.room < hallBase);
  const occBy = {}; for (const l of lights) (occBy[l.room] = occBy[l.room] || []).push(l.tip); for (const c of consoles) (occBy[c.room] = occBy[c.room] || []).push(c.tip, c.anchor);
  const byRoom = new Map(); for (const cell of scene.paintCells) { if (cell.wall || cell.room == null || cell.room >= hallBase) continue; let a = byRoom.get(cell.room); if (!a) byRoom.set(cell.room, a = []); a.push(cell); }
  const comps = [];
  for (const [room, cells] of byRoom) {
    let bp = null, best = -1; for (const cell of cells) { let fd = Infinity; for (const p of (occBy[room] || [])) fd = Math.min(fd, Math.hypot(p.x - cell.x, p.y - cell.y)); if (fd > best) { best = fd; bp = cell; } }
    if (bp) comps.push({ cx: bp.x, cy: bp.y, r: Math.min(best * 0.7, P.rs * 1.6), g: deviceGenome(mulberry32((room * 733 + 5 + L.seed) >>> 0), { sharp: true }), accent: accentOf(room), hue: hexHue(accentOf(room)) });
  }
  return { scene, lights, occ, baked, consoles, comps, hallBase, accentOf };
}
function bake() {
  const L = state.layout, P = params(), R = buildRegion(P);
  const oc = document.createElement('canvas'); oc.width = L.W; oc.height = L.H;
  const c = oc.getContext('2d'); c.fillStyle = '#05060a'; c.fillRect(0, 0, L.W, L.H); c.lineJoin = 'round';
  const sat = 0.78;
  for (let i = 0; i < R.scene.paintCells.length; i++) {
    const cell = R.scene.paintCells[i]; if (cell.poly.length < 3) continue;
    if (cell.wall) c.fillStyle = '#0a0e12';
    else if (cell.room >= R.hallBase) c.fillStyle = '#16241f';          // the concourse floor
    else if (R.baked[i]) { let r = tone(R.baked[i][0], 1.15) * 255, g = tone(R.baked[i][1], 1.15) * 255, b = tone(R.baked[i][2], 1.15) * 255; const lum = 0.3 * r + 0.6 * g + 0.1 * b; r = lum + (r - lum) * sat; g = lum + (g - lum) * sat; b = lum + (b - lum) * sat; c.fillStyle = `rgb(${r | 0},${g | 0},${b | 0})`; }
    else c.fillStyle = '#06080c';
    c.beginPath(); c.moveTo(cell.poly[0][0], cell.poly[0][1]); for (let k = 1; k < cell.poly.length; k++) c.lineTo(cell.poly[k][0], cell.poly[k][1]); c.closePath(); c.fill();
  }
  const litLum = (x, y) => { const rgb = lightAtRGB(R.lights, R.occ, x, y, REG_OPTS); return 0.3 * rgb[0] + 0.6 * rgb[1] + 0.1 * rgb[2]; };
  for (const C of R.consoles) drawWallFixture(c, R.scene, C, { accent: R.accentOf(C.room), hue: hexHue(R.accentOf(C.room)), litAt: litLum });
  for (const cp of R.comps) { const lum = litLum(cp.cx, cp.cy); drawDevice(c, cp.cx, cp.cy, cp.r, cp.g, { lit: Math.max(0.4, Math.min(1.2, lum * 1.25 + 0.2)), accent: cp.accent }); }
  for (const Lt of R.lights) { const lum = litLum(Lt.tip.x, Lt.tip.y); drawWallLight(c, Lt, { hue: Lt.hue, lit: Math.max(0.7, Math.min(1.15, lum + 0.5)) }); }
  state.baked = oc;
  $('stat').textContent = `${L.rooms.length} rooms · ${L.nodes.length} hall nodes · ${R.lights.length} lights · ${R.consoles.length} consoles · ${R.comps.length} components · ${R.scene.paintCells.length} cells, baked once`;
}

// ── the @ + the crowd (the only live layer) ───────────────────────────────────────────────────────
const AT = { x: 0, y: 0, path: null, t: 0, speed: 360 };
const NPCS = [];
function spawn() {
  AT.x = state.layout.rooms[0].x; AT.y = state.layout.rooms[0].y; AT.path = null;
  NPCS.length = 0;
  for (let i = 0; i < 14; i++) { const r = state.layout.rooms[i % state.layout.rooms.length]; NPCS.push({ x: r.x, y: r.y, path: null, t: 0, speed: 70 + Math.random() * 70, dwell: Math.random() * 4, hue: hexHue(ROLE[r.role] || '#888') }); }
}
function pathTo(from, to) { const r = route(state.layout, from, to); if (!r) return null; const seg = []; let total = 0; for (let i = 1; i < r.pts.length; i++) { const d = Math.hypot(r.pts[i][0] - r.pts[i - 1][0], r.pts[i][1] - r.pts[i - 1][1]); seg.push(d); total += d; } return { pts: r.pts, seg, total }; }
function advance(o, dt) {
  if (!o.path) return false;
  o.t += o.speed * dt; const { pts, seg, total } = o.path;
  if (o.t >= total) { o.x = pts[pts.length - 1][0]; o.y = pts[pts.length - 1][1]; o.path = null; return true; }
  let acc = 0, i = 1; while (i < pts.length && acc + seg[i - 1] < o.t) { acc += seg[i - 1]; i++; }
  const fr = (o.t - acc) / seg[i - 1]; o.x = pts[i - 1][0] + (pts[i][0] - pts[i - 1][0]) * fr; o.y = pts[i - 1][1] + (pts[i][1] - pts[i - 1][1]) * fr; return true;
}

// ── camera + draw ──
function fit() { const L = state.layout; state.cam.z = Math.min(W / L.W, H / L.H) * 0.96; state.cam.x = L.W / 2; state.cam.y = L.H / 2; }
function draw() {
  if (!state.baked) return;
  const z = state.cam.z;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); ctx.fillStyle = '#05060a'; ctx.fillRect(0, 0, W, H);
  ctx.setTransform(DPR * z, 0, 0, DPR * z, DPR * (W / 2 - state.cam.x * z), DPR * (H / 2 - state.cam.y * z));
  ctx.drawImage(state.baked, 0, 0);                          // the whole static map — one blit
  if (state.showSkel) { ctx.strokeStyle = 'rgba(127,216,208,0.5)'; ctx.lineWidth = 1.5 / z; for (const [u, v] of state.layout.edges) { ctx.beginPath(); ctx.moveTo(state.layout.nodes[u].x, state.layout.nodes[u].y); ctx.lineTo(state.layout.nodes[v].x, state.layout.nodes[v].y); ctx.stroke(); } ctx.fillStyle = 'rgba(244,191,98,0.7)'; for (const r of state.layout.rooms) { ctx.beginPath(); ctx.arc(r.doorPt.x, r.doorPt.y, 4 / z, 0, 7); ctx.fill(); } }
  // the route remaining
  if (AT.path) { ctx.strokeStyle = 'rgba(244,191,98,0.5)'; ctx.lineWidth = 2.4 / z; ctx.setLineDash([8 / z, 7 / z]); ctx.beginPath(); ctx.moveTo(AT.x, AT.y); let acc = 0; for (let i = 1; i < AT.path.pts.length; i++) { acc += AT.path.seg[i - 1]; if (acc > AT.t) ctx.lineTo(AT.path.pts[i][0], AT.path.pts[i][1]); } ctx.stroke(); ctx.setLineDash([]); }
  // the crowd
  for (const n of NPCS) { ctx.fillStyle = `hsl(${n.hue} 45% 62%)`; ctx.beginPath(); ctx.arc(n.x, n.y, 7 / z, 0, 7); ctx.fill(); }
  // the @
  ctx.save(); ctx.shadowColor = 'rgba(255,206,120,0.9)'; ctx.shadowBlur = 12 / z; ctx.fillStyle = '#0b1014'; ctx.beginPath(); ctx.arc(AT.x, AT.y, 12 / z, 0, 7); ctx.fill(); ctx.fillStyle = '#ffce78'; ctx.font = 'bold ' + (18 / z) + 'px ui-monospace, monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('@', AT.x, AT.y + 0.5); ctx.restore();
}
let last = 0;
function tick(ts) {
  requestAnimationFrame(tick);
  const dt = Math.min(0.05, (ts - last) / 1000); last = ts;
  let live = false;
  if (advance(AT, dt)) live = true;
  for (const n of NPCS) { if (n.path) { if (advance(n, dt)) live = true; } else { n.dwell -= dt; if (n.dwell <= 0) { const dst = state.layout.rooms[(Math.random() * state.layout.rooms.length) | 0]; n.path = pathTo({ x: n.x, y: n.y }, { x: dst.x + (Math.random() - 0.5) * dst.hw, y: dst.y + (Math.random() - 0.5) * dst.hh }); n.t = 0; n.dwell = 2 + Math.random() * 5; live = true; } } }
  if (live) draw();
}

// ── input ──
const toWorld = (sx, sy) => ({ x: (sx - W / 2) / state.cam.z + state.cam.x, y: (sy - H / 2) / state.cam.z + state.cam.y });
let dragging = false, dragged = false, lx = 0, ly = 0;
cv.addEventListener('pointerdown', (e) => { dragging = true; dragged = false; lx = e.clientX; ly = e.clientY; });
cv.addEventListener('pointermove', (e) => { if (!dragging) return; const dx = e.clientX - lx, dy = e.clientY - ly; if (Math.abs(dx) + Math.abs(dy) > 3) dragged = true; state.cam.x -= dx / state.cam.z; state.cam.y -= dy / state.cam.z; lx = e.clientX; ly = e.clientY; draw(); });
cv.addEventListener('pointerup', (e) => { dragging = false; if (dragged) return; const w = toWorld(e.clientX, e.clientY); AT.path = pathTo({ x: AT.x, y: AT.y }, w); AT.t = 0; const rm = roomAt(state.layout, w.x, w.y); $('info').textContent = AT.path ? ('walking · ' + AT.path.pts.length + ' waypoints' + (rm ? ' → ' + rm.role : '')) : 'no route there'; });
addEventListener('wheel', (e) => { const f = 1 - Math.sign(e.deltaY) * 0.12; state.cam.z = Math.max(0.12, Math.min(2, state.cam.z * f)); draw(); }, { passive: true });
$('skel').addEventListener('click', () => { state.showSkel = !state.showSkel; $('skel').classList.toggle('on', state.showSkel); draw(); });

function rebuild() {
  const P = params();
  state.layout = genLayout({ W: 2600, H: 1500, seed: P.seed, density: P.density, hallSeg: P.hallSeg });
  buildNavGraph(state.layout); bake(); fit(); spawn(); draw();
  $('info').textContent = state.layout.rooms.length + ' rooms · click to walk';
}
$('roll').addEventListener('click', () => { $('seed').value = (Math.random() * 1e6) | 0; rebuild(); });
for (const id of ['seed', 'density', 'hallSeg', 'lights', 'rs']) $(id).addEventListener('change', rebuild);
resize(); rebuild(); requestAnimationFrame(tick);
</script>
</body>
</html>
