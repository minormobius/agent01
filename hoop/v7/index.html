<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="description" content="hoop v7 — the chunking demo. A planar cut through a 3D Voronoi foam, clipped to a chunk, perfused, then grown into a capillary concourse by hypoxia, with rooms painted on the oxygenated surface — one door each. One tap per computational layer." />
  <title>hoop v7 — chunking demo</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0a0c10; --ink:#dfe7e2; --dim:#7d8a84; --line:#1a2128; --gold:#d9b24a; --teal:#3bb0c9; --orange:#e0772f; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background: var(--bg); color: var(--ink); font-family: "JetBrains Mono", ui-monospace, monospace; display: flex; overflow: hidden; }
    #rail { width: 274px; flex-shrink: 0; border-right: 1px solid var(--line); padding: 12px 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 11px; }
    #stage { flex: 1; min-width: 0; position: relative; }
    canvas { width: 100%; height: 100%; display: block; }
    @media (max-width: 720px) { body { flex-direction: column; } #rail { width: auto; height: 46vh; border-right: 0; border-bottom: 1px solid var(--line); } }
    .top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .logo { color: var(--orange); font-weight: 600; font-size: 15px; }
    .tag { color: var(--dim); font-size: 11px; }
    a.back { margin-left: auto; color: var(--teal); text-decoration: none; font-size: 11px; border: 1px solid var(--line); padding: 2px 7px; }
    label.fld { display: block; font-size: 12px; }
    label.fld .v { float: right; color: var(--gold); }
    input[type=range] { width: 100%; accent-color: #5aa845; }
    .steps { display: flex; flex-direction: column; gap: 3px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 9px 0; }
    .step { font-size: 12px; color: var(--dim); display: flex; gap: 7px; align-items: baseline; padding: 1px 0; }
    .step .mk { width: 14px; display: inline-block; text-align: center; color: #3a4650; }
    .step.done { color: var(--ink); } .step.done .mk { color: #5aa845; }
    .step.next { color: var(--gold); } .step.next .mk { color: var(--gold); }
    .step .sub { color: #5a6a64; font-size: 10.5px; }
    button { width: 100%; background: #11161c; color: var(--ink); border: 1px solid var(--line); padding: 9px; font: inherit; font-size: 12px; cursor: pointer; }
    button:hover { border-color: var(--orange); color: var(--orange); }
    button.go { background: linear-gradient(180deg,#2a2410,#191407); border-color:#5a431f; color: var(--gold); font-weight: 600; }
    button:disabled { opacity: .4; cursor: default; border-color: var(--line); color: var(--dim); }
    .row { display: flex; gap: 6px; }
    .read { font-size: 11.5px; color: var(--dim); }
    .read b { color: var(--ink); } .read .hl { color: var(--gold); }
    .legend { border-top: 1px solid var(--line); padding-top: 9px; display: grid; grid-template-columns: 1fr 1fr; gap: 3px 8px; font-size: 11px; }
    .legend .sw { display: inline-block; width: 10px; height: 10px; margin-right: 5px; vertical-align: -1px; }
    .legend .n { color: var(--dim); }
    #busy { position: absolute; top: 8px; left: 10px; font-size: 11px; color: var(--gold); background: rgba(10,12,16,.7); padding: 2px 7px; opacity: 0; transition: opacity .12s; }
    #busy.on { opacity: 1; }
    .toggles { display: flex; gap: 10px; font-size: 11px; color: var(--dim); flex-wrap: wrap; }
    .toggles label { cursor: pointer; } .toggles input { accent-color: var(--teal); vertical-align: -1px; }
  </style>
</head>
<body>
  <div id="rail">
    <div class="top"><span class="logo">⬡ hoop v7</span><span class="tag">chunking demo</span><a class="back" href="/">◍ hoop</a></div>
    <div class="read">A chunk, grown one layer at a time. Each tap runs <b>one computational step</b>. <span class="hl">Reseed</span> rolls a fresh chunk.</div>

    <label class="fld">cell size <span class="v" id="v-cell">26</span><input type="range" id="cell" min="14" max="46" step="2" value="26"></label>
    <label class="fld">size variance (slab depth) <span class="v" id="v-depth">2.4</span><input type="range" id="depth" min="1.2" max="4" step="0.2" value="2.4"></label>
    <label class="fld">oxygen reach (diffusion depth) <span class="v" id="v-oxy">3</span><input type="range" id="oxy" min="1" max="7" step="1" value="3"></label>
    <label class="fld">concourse width (cells) <span class="v" id="v-conc">2</span><input type="range" id="conc" min="1" max="4" step="1" value="2"></label>
    <label class="fld">room size (cells/room) <span class="v" id="v-room">10</span><input type="range" id="room" min="2" max="40" step="1" value="10"></label>

    <div class="steps" id="steps"></div>

    <button class="go" id="go">▸ run step 1 · base foam</button>
    <div class="row">
      <button id="reseed" style="flex:1">⟲ reseed</button>
      <button id="auto" style="flex:1">⏩ run all</button>
    </div>
    <div class="toggles" id="toggles">
      <label><input type="checkbox" id="t-cells" checked> cells</label>
      <label><input type="checkbox" id="t-ghost" checked> ghost</label>
      <label><input type="checkbox" id="t-heat" checked> oxygenation</label>
      <label><input type="checkbox" id="t-glyph" checked> glyphs</label>
    </div>

    <div class="read" id="readout">seed — · step 0/6</div>
    <div class="read" id="inspect" style="border-top:1px solid var(--line);padding-top:9px">tap to begin · then click a room (step 6)</div>
    <div class="legend" id="legend"></div>
  </div>
  <div id="stage"><canvas id="cv"></canvas><div id="busy">solving…</div></div>

  <script type="module">
    import { baseFoam, defineChunk, perfuse, seize, paintRooms, castCharacter } from './foam.js';
    import { ROLES } from '../econ/econ.js';
    const cv = document.getElementById('cv'), ctx = cv.getContext('2d'), $ = (id) => document.getElementById(id);

    const STEPS = [
      { name: 'base foam', sub: 'planar cut through a 3D Voronoi foam' },
      { name: 'chunk', sub: 'square / equilateral · ghost perimeter · ports' },
      { name: 'perfuse', sub: 'connect ports, measure oxygenation' },
      { name: 'seize', sub: 'grow concourse by hypoxia (capillaries)' },
      { name: 'rooms', sub: 'paint pockets on the oxygenated surface · one door' },
      { name: 'character', sub: 'roles + NPCs onto the rooms' },
    ];
    let seed = 7, step = 0, W = 0, H = 0, dpr = 1;
    let foam = null, chunk = null, per = null, sol = null, rm = null, cast = null;
    let anim = null, revealK = 0;

    const hueOf = (i) => ((i * 2654435761) >>> 0) % 360;
    function poly(p) { if (p.length < 3) return; ctx.beginPath(); ctx.moveTo(p[0].x, p[0].y); for (let i = 1; i < p.length; i++) ctx.lineTo(p[i].x, p[i].y); ctx.closePath(); }

    // oxygenation heatmap: concourse (dist 0) teal-grey · served (1..reach) green→yellow · hypoxic red
    function heat(dist, reach, isRoad) {
      if (isRoad) return '#2e5d5a';
      if (dist < 0) return '#0c0f13';
      if (dist <= reach) { const t = dist / Math.max(1, reach); return `hsl(${(140 - t * 95).toFixed(0)} 55% ${(30 - t * 6).toFixed(0)}%)`; }
      const t = Math.min(1, (dist - reach) / (reach + 2)); return `hsl(${(20 - t * 20).toFixed(0)} ${(60 + t * 20).toFixed(0)}% ${(28 + t * 10).toFixed(0)}%)`;
    }

    function draw() {
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = '#0a0c10'; ctx.fillRect(0, 0, W, H);
      if (!foam) return;
      const showCells = $('t-cells').checked, showGhost = $('t-ghost').checked, showHeat = $('t-heat').checked;
      const animRoad = anim ? shownRoad() : null;

      if (showCells) {
        for (const c of foam.cells) {
          if (c.poly.length < 3) continue;
          if (chunk && chunk.ghost[c.id]) { if (!showGhost) continue; ctx.fillStyle = '#0c0f13'; poly(c.poly); ctx.fill(); continue; }
          ctx.fillStyle = cellFill(c, animRoad); poly(c.poly); ctx.fill();
        }
        ctx.lineWidth = 0.35; ctx.strokeStyle = 'rgba(10,12,16,0.55)';
        for (const c of foam.cells) { if (c.poly.length < 3) continue; if (chunk && chunk.ghost[c.id] && !showGhost) continue; poly(c.poly); ctx.stroke(); }
      }

      // chunk boundary + ports (step ≥ 2)
      if (chunk) {
        ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(123,176,201,0.85)'; poly(chunk.poly); ctx.stroke();
        for (const p of chunk.ports) { ctx.fillStyle = '#e0772f'; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill(); const c = foam.cells[p.cell]; ctx.strokeStyle = 'rgba(224,119,47,0.6)'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(c.x, c.y); ctx.stroke(); }
      }

      // walls + doors + glyphs (step ≥ 5)
      if (step >= 5 && rm) drawRooms();
      void showHeat;
    }

    function cellFill(c, animRoad) {
      const showHeat = $('t-heat').checked;
      if (step >= 5 && rm) {
        if (sol.road[c.id]) return '#39433d';                          // concourse (open floor)
        const rid = rm.roomOf[c.id]; if (rid < 0) return '#0e1216';     // unreached sliver
        if (step === 6 && cast) { const r = cast.rooms[rid]; return r ? r.color : '#222'; }
        return `hsl(${hueOf(rid)} 30% ${24 + (c.area % 8)}%)`;
      }
      if (anim && animRoad) { if (animRoad[c.id]) return '#2e5d5a'; return showHeat ? '#171c1a' : foamShade(c); }
      if (step === 4 && sol && showHeat) return heat(sol.dist[c.id], sol.oxygenReach, sol.road[c.id]);
      if (step === 3 && per && showHeat) return heat(per.dist[c.id], per.oxygenReach, per.road[c.id]);
      return foamShade(c);
    }
    function foamShade(c) { const t = Math.min(1, c.area / (foam.cellSize * foam.cellSize * 2.2)); return `hsl(${(205 - t * 60).toFixed(0)} ${(16 + t * 22).toFixed(0)}% ${(12 + t * 24).toFixed(0)}%)`; }

    function sharedEdge(cell, nbrSrc) { const v = cell.poly, want = foam.cells[nbrSrc] ? foam.cells[nbrSrc].src : -1; for (let i = 0; i < v.length; i++) if (v[i].s === want) return [v[i], v[(i + 1) % v.length]]; return null; }
    function drawRooms() {
      ctx.lineWidth = 1.1; ctx.strokeStyle = 'rgba(18,24,30,0.95)'; ctx.beginPath();
      for (const e of foam.edges) {
        if (chunk.ghost[e.a] && chunk.ghost[e.b]) continue;
        const ra = sol.road[e.a] ? -2 : rm.roomOf[e.a], rb = sol.road[e.b] ? -2 : rm.roomOf[e.b];
        if (ra === rb) continue; if (ra === -2 && rb === -2) continue;   // same room, or both concourse → open
        const seg = sharedEdge(foam.cells[e.a], e.b); if (seg) { ctx.moveTo(seg[0].x, seg[0].y); ctx.lineTo(seg[1].x, seg[1].y); }
      }
      ctx.stroke();
      ctx.fillStyle = '#d9b24a';
      for (const r of rm.rooms) { if (r.door < 0 || r.doorRoad < 0) continue; const a = foam.cells[r.door], b = foam.cells[r.doorRoad]; ctx.beginPath(); ctx.arc((a.x + b.x) / 2, (a.y + b.y) / 2, 2.4, 0, 7); ctx.fill(); }
      if (step === 6 && cast && $('t-glyph').checked) {
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (const r of cast.rooms) { const sz = Math.min(20, Math.max(8, Math.sqrt(r.cells.length) * foam.cellSize * 0.34)); if (sz < 9) continue; ctx.font = Math.floor(sz) + 'px "JetBrains Mono", monospace'; ctx.fillStyle = 'rgba(10,12,16,0.85)'; ctx.fillText(r.glyph || '', r.x, r.y); }
      }
    }

    // animation of the seize: skeleton + the first `revealK` sprouted cells shown as concourse
    function shownRoad() { const sr = per.road.slice(); for (let k = 0; k < revealK && k < sol.addOrder.length; k++) sr[sol.addOrder[k]] = 1; return sr; }
    function animateSeize() {
      revealK = 0; anim = true; const per100 = Math.max(1, Math.ceil(sol.addOrder.length / 40));
      const tick = () => { revealK += per100; draw(); if (revealK < sol.addOrder.length) anim = setTimeout(tick, 35); else { anim = null; draw(); readout(); } };
      anim = setTimeout(tick, 30);
    }
    function stopAnim() { if (anim && anim !== true) clearTimeout(anim); anim = null; }

    function runStep() {
      stopAnim(); $('busy').classList.add('on');
      requestAnimationFrame(() => {
        const cell = +$('cell').value, depth = +$('depth').value, oxy = +$('oxy').value, conc = +$('conc').value, roomSize = +$('room').value;
        if (step === 0) { foam = baseFoam({ W, H, cellSize: cell, depth, seed }); chunk = per = sol = rm = cast = null; }
        else if (step === 1) chunk = defineChunk(foam, { seed });
        else if (step === 2) per = perfuse(foam, chunk, { oxygenReach: oxy });
        else if (step === 3) sol = seize(foam, chunk, { oxygenReach: oxy, concourseWidth: conc, seed });
        else if (step === 4) rm = paintRooms(foam, chunk, sol, { roomSize, seed });
        else if (step === 5) cast = castCharacter(rm.rooms, { seed });
        if (step < 6) step++;
        renderSteps(); readout(); renderLegend();
        if (step === 4) animateSeize(); else draw();   // step 4 just ran the seize → animate it
        $('busy').classList.remove('on');
      });
    }
    function refresh() { stopAnim(); renderSteps(); draw(); readout(); renderLegend(); }

    function renderSteps() {
      $('steps').innerHTML = STEPS.map((s, i) => { const cls = i < step ? 'done' : i === step ? 'next' : ''; const mk = i < step ? '✓' : i === step ? '▸' : (i + 1); return `<div class="step ${cls}"><span class="mk">${mk}</span><span>${s.name} <span class="sub">— ${s.sub}</span></span></div>`; }).join('');
      const go = $('go'); if (step >= 6) { go.disabled = true; go.textContent = '✓ chunk complete'; } else { go.disabled = false; go.textContent = `▸ run step ${step + 1} · ${STEPS[step].name}`; }
    }
    function readout() {
      let s = `seed <b>${seed}</b> · step <b>${step}/6</b>`;
      if (foam) s += `<br>foam <b>${foam.cells.length}</b> cells · <span class="hl">${foam.nucleiCount}</span> 3D nuclei sliced`;
      if (chunk && step >= 2) s += `<br>chunk <b>${chunk.shape}</b> · <b>${chunk.ports.length}</b> ports · ${chunk.interiorCount} interior cells`;
      if (per && step === 3) s += `<br>perfuse · bare skeleton serves <span class="hl">${(per.servedFrac * 100) | 0}%</span> · ${per.stats.hypoxic} cells hypoxic · ⌀ depth ${per.stats.avgDepth.toFixed(1)}`;
      if (sol && step >= 4) s += `<br>seize · <span class="hl">${(sol.servedFrac * 100) | 0}%</span> oxygenated · ${sol.sprouts} capillaries · concourse <b>${sol.stats.roadCells}</b> cells (${(sol.stats.roadFrac * 100) | 0}% of floor)`;
      if (rm && step >= 5) s += `<br>rooms <b>${rm.stats.rooms}</b> · ⌀ <span class="hl">${rm.stats.avgCells.toFixed(1)}</span> cells/room · ${rm.stats.doored} doored`;
      $('readout').innerHTML = s;
    }
    function renderLegend() { if (step < 6 || !cast) { $('legend').innerHTML = ''; return; } $('legend').innerHTML = Object.keys(ROLES).filter((r) => cast.counts[r]).map((r) => `<span><span class="sw" style="background:${ROLES[r].color}"></span>${ROLES[r].glyph} ${r} <span class="n">${cast.counts[r]}</span></span>`).join(''); }

    cv.addEventListener('click', (e) => {
      if (step < 6 || !cast) return;
      const r = cv.getBoundingClientRect(), x = e.clientX - r.left, y = e.clientY - r.top;
      let best = null, bd = Infinity; for (const rmm of cast.rooms) { const d = (rmm.x - x) ** 2 + (rmm.y - y) ** 2; if (d < bd) { bd = d; best = rmm; } }
      if (!best) return;
      const head = `${best.glyph} ${best.role}${best.domain ? '·' + best.domain : ''} — ${best.cells.length} cells`;
      $('inspect').innerHTML = `<b>${head}</b>${best.people && best.people.length ? '<br>' + best.people.join(', ') : '<br>a quiet place'}`;
    });

    function reset() { stopAnim(); step = 0; foam = chunk = per = sol = rm = cast = null; refresh(); }
    function reseed() { seed = (seed * 1664525 + 1013904223) >>> 0 || 1; reset(); }
    $('go').addEventListener('click', runStep);
    $('reseed').addEventListener('click', reseed);
    $('auto').addEventListener('click', () => { reseed(); const tick = () => { if (step < 6) { runStep(); setTimeout(tick, step === 4 ? 1700 : 110); } }; setTimeout(tick, 60); });
    for (const id of ['cell', 'depth', 'oxy', 'conc', 'room']) $(id).addEventListener('input', () => { $('v-' + id).textContent = $(id).value; reset(); });
    for (const id of ['t-cells', 't-ghost', 't-heat', 't-glyph']) $(id).addEventListener('change', draw);

    function resize() { dpr = Math.min(window.devicePixelRatio || 1, 2); const r = cv.parentElement.getBoundingClientRect(); W = Math.max(160, Math.floor(r.width)); H = Math.max(160, Math.floor(r.height)); cv.width = W * dpr; cv.height = H * dpr; reset(); }
    let deb = null; window.addEventListener('resize', () => { clearTimeout(deb); deb = setTimeout(resize, 150); });
    resize();
  </script>
</body>
</html>
