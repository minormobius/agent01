<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07090c" />
  <meta name="description" content="hoop — a collaborative design space for the infinite game. A glyph-grid world where every place is a forum thread, all exposed to ATProto." />
  <title>hoop — designing the infinite game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="logo">◍ hoop</span>
      <span class="tagline">designing the infinite game</span>
    </div>
    <div class="top-right">
      <span id="mode-pill" class="pill preview">Local · preview</span>
      <div id="identity" class="identity"></div>
    </div>
  </header>

  <main id="stage">
    <section id="canvas-pane">
      <canvas id="world"></canvas>
      <div id="hint" class="hint">
        <b>WASD / arrows</b> walk · <b>click</b> a node to open its thread · <b>N</b> drop a node here
      </div>
      <div id="place-strip">
        <div class="strip-label">places</div>
        <div id="place-list"></div>
      </div>
    </section>

    <aside id="thread-pane">
      <div id="thread-head">
        <span id="thread-glyph" class="t-glyph">◆</span>
        <div class="t-titles">
          <h2 id="thread-title">—</h2>
          <div id="thread-meta" class="t-meta"></div>
        </div>
      </div>
      <p id="thread-summary" class="t-summary"></p>
      <div id="thread-body" class="thread-body"></div>
      <div id="composer" class="composer"></div>
    </aside>
  </main>

  <footer id="statusbar">
    <div class="left">
      <button id="drop-btn" class="btn small">✚ drop node (N)</button>
      <button id="recenter-btn" class="btn ghost small">⊚ recenter</button>
      <span id="persona-wrap" class="persona-wrap"><span class="lbl">as</span></span>
      <button id="crew-btn" class="btn ghost small">crew…</button>
    </div>
    <div id="status" class="status">Walk the @ to a glowing node, or drop your own. Every place is a thread; every thread lives on ATProto.</div>
  </footer>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
