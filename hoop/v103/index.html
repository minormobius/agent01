    // so the spine matches a story arc as THICK as the place. Falls back to the light profile if not ready.
    function profileHere(agent) {
      try {
        const ci = walk.nodeChunk[player], chunk = world.chunks[ci], rooms = (chunk && chunk.rooms) || [];
        const residentRoles = {}; for (const a of nearResidents) if (a.role) residentRoles[a.role] = (residentRoles[a.role] || 0) + 1;
        if (agent && agent.role) residentRoles[agent.role] = (residentRoles[agent.role] || 0) + 1;
        // v103 UNIFIED NAVE CIVIC WEB (tide/goss): when the player stands in the nave, read the WHOLE floor as
        // one civ web — every loaded nave chunk + the cross-ward commute edges — instead of the sealed focal
        // ward. `?civ=sealed` keeps the engine-truth per-chunk read (parity with goss's ?mode=sealed).
        const inNave = !!(world && world._nave && chunk && (chunk.deck || 0) === 0);
        if (inNave) {
          const naveChunks = world.chunks.filter((c) => (c.deck || 0) === 0);
          const focal = naveChunks.filter((c) => c.id === ci);   // focal ward first, so 'sealed' mode reads THIS chunk
          const chunks = focal.concat(naveChunks.filter((c) => c.id !== ci));
          const edges = (society && society.edges) || [];
          const p = profileFromNave({ chunks, residentRoles, edges, mode: naveWebMode() });
          if (p.roles && Object.keys(p.roles).length) return p;
        }
        const edges = (society && society.edges) ? society.edges.filter((e) => (e.a && e.a.ch === ci) || (e.b && e.b.ch === ci)) : [];
        const p = profileFromChunk({ rooms, residentRoles, edges });

    }
    // the nave civic-web reading mode (v103): 'floor' = unified (default, healthier), 'sealed' = engine-truth
    // per-chunk. `?civ=sealed` in the URL is the escape hatch, mirroring goss's ?mode=sealed permalink.
    function naveWebMode() { try { return new URLSearchParams(location.search).get('civ') === 'sealed' ? 'sealed' : 'floor'; } catch (e) { return 'floor'; } }
    async function weaveHere(agent) {
      if (!storyApi.enabled || !story.ready || story.weaving) return;
      story.weaving = true;
      const el = $('busy'); el.textContent = '✨ weaving a thread…'; el.classList.add('on');
      const done = (msg, ms = 2800) => { el.classList.remove('on'); el.textContent = 'generating…'; notify(msg, { ms }); story.weaving = false; };
      try {

        const existing = poolFilter([...story.store.content.values()], { lane: 'spine' }).slice(0, 40);

    }
    // the QUEST LOG — derived from the storyboard (board.js), the same source the /storyboard/ board reads.
    // Four lines of deliberate handholding: (1) OBJECTIVE — what you're working toward + progress; (2) STEP —
    // the hand-authored concrete next move (the active storyboard beat's log); (3) WHERE — the waypoint target
    // in words; (4) HOW — the verb to use when you're new. Lines 2-4 appear only when they add something.
    let questGuidance = null;   // the computed objective/step/where/how, rendered inside the JOURNAL now (not a HUD block)
    let journalOpen = false;    // the journal reuses the #enc overlay; this distinguishes it from an encounter card
    // WHERE a content NPC currently stands (a pinned anchor, a living keeper resident, or a persisted
    // discovery) → {x,y,deck}, or null if it isn't placed in the loaded world yet.
    function locateNpc(cid) {
      if (!cid) return null;

      const r = residents.find((rr) => rr.keeper && rr.keeper.content_id === cid); if (r) return { x: r.x, y: r.y, deck: residentDeck(r) };

    function questWpToward(loc) {

      const tr = trackedSeek();

    // the guidance block (objective → step → where → how), rendered at the TOP of the journal
    function guidanceHTML() {

    const saveStorySnapshot = () => { if (story.ready) { try { localSet(JSON.stringify(story.store.snapshot())); } catch (e) {} scheduleRepoSave(); } };

    // ── THE SAVE LANE: sign in → your game syncs to YOUR OWN repo (com.minomobi.hoop.story.save), durable
    //    + cross-device + user-owned ($0 to us). localStorage stays the hot buffer; the repo write is
    //    BATCHED (debounced ~4s + on unload) — never a record per footstep. A faithful port of v3/v4. ──
    const auth = new AuthClient();

    async function reloadPool() {

      story.store = new MemoryStore(content, { features: [...story.store.features.values()] }).restore(snap);
      try { story.sb = deriveStoryboard(content) || story.sb; } catch (e) {}

    }

    // ── THE COLD OPEN (Bay 14): a scripted intro the first time you wake. The bible's open — you're an android,
    //    rebuilt in a reconstruction bay no manifest lists, and Olo (the Drift broker who found you) sets you on
    //    the way. Fires ONCE per save (flag.intro_seen), only at the very start (tier 1, before the seal lifts).
    let _opening = false, _openingCards = [], _openingIdx = 0, _openingDone = null, _afterOlo = null;
    // The cold open is now a SINGLE scene card (the wake) that hands straight into a MANDATORY CHAT WITH
    // OLO — his real dialogue tree (anchors.js tier-1 anchor), not a paraphrase. His greet IS the mandate
    // ("Walk the Commons…"); closing it drops you into Bay 14 to play. (hoopy: "open in Bay 14 with a
    // mandatory chat with Olo".)
    const OPENING_CARDS = [
      { kicker: 'Bay 14 · the reconstruction bay', title: 'you wake', foot: '⏎ / click — and then?',
        body: 'Cold light, and a cradle in the deep of the Nave — Bay 14, a bay no manifest still lists. You are not the body you remember. You have been rebuilt, and something in the rebuild was changed: there is a translator behind your eyes now, new, and you do not yet know what it is for.\n\nYou sit up. You are not alone — a figure leans against the column, patient as aeons.' },
    ];
    // open an NPC's dialogue by content id, regardless of where it's placed in the world (used for the

    // figure so its name/portrait read true. Returns false if the figure isn't in the pool.
    function openStoryNpc(contentId, meta) {

      const agent = meta || { name, role: ci.verb || ROLE_FOR_FACTION[faction] || 'trade', glyph: '☻', genome: npcSpriteGenome(contentId, faction) };

    // the mandatory opening chat: drop into Olo's real dialogue; when the player closes it, proceed to `then`.
    function openOloMandatory(then) {

    function runOpeningThen(next) {

      story.store.setFact(story.playerId, 'flag.intro_seen', true); saveStorySnapshot();

    // a generic centre-screen page (deck arrival, the hoopybot level-up) — same overlay, custom layout.

        `<div class="ed">${esc(body)}</div>` +
        `<div class="ex">${esc(foot || '⏎ / click to continue')}</div>`;
      journalOpen = false;   // a generic page (deck arrival / level-up); renderJournal re-sets the flag after it calls this
      $('enc').classList.add('on');
    }

    // ── HOOPYBOT + THE DECK SPINE: narrative_tier is the climb through five hand-written decks (decks.js).
    //    hoopybot (hoopy.js) watches what you've learned on your current deck; when you've learned enough of
    //    the right things it PAGES you (a custom message) to return to your guide, who advances you and gives
    //    the next deck's guidance. Each deck shows its hand-written character on arrival. ──
    let openingCast = [];   // his Arrival NPCs (set in placeAnchors) — the guides you report back to
    const narTier = () => (story.ready ? (story.store.getPlayerState(story.playerId).narrative_tier || 1) : 1);
    const currentDeck = () => deckForTier(narTier());
    // ── HOOPY'S ANCHOR-TURN-IN ADVANCEMENT (anchors.js): the level-up is a FLAG, not a code path. Each
    //    anchor's gated turn-in dialogue sets flag.deck.<deck>.cleared; that flag advances narrative_tier to
    //    the anchor's tier+1. CHOSEN FACTION is the narrow flag.chose.<faction> (Sevin's turn-in) — fall back
    //    to the legacy flag.chosen_faction for old saves so a mid-flight game isn't stranded. ──
    const cf = (facts) => chosenFactionFlag(facts) || chosenFaction(facts);   // the v100 chosen faction (flag.chose.*) ∪ legacy
    // After a dialogue choice (or on load): if an anchor turn-in cleared a deck, bump the tier, re-floor the
    // world (which sinks the next shaft), and direct the player to the next anchor. Idempotent — only fires
    // on a genuine increase.
    function checkAdvancement() {
      if (!story.ready || !story.anchors || !story.anchors.length) return;
      const facts = story.store.getFacts(story.playerId);
      const cur = narTier(), target = tierFromClears(story.anchors, facts, cur, DECK_COUNT);
      if (target <= cur) return;
      story.store.setPlayerTier(story.playerId, 'narrative_tier', target);
      saveStory();   // persists + re-floors (maybeBuildRind at 3 / maybeBuildLowerRind at 4) + re-renders the quest
      const cleared = anchorForTier(story.anchors, cur);   // the anchor we just turned in to
      const next = cleared && cleared.next;
      if (next) notify(`${cleared.name} sets you on — seek ${next.name} in the ${zoneWord(next.zone)}`, { kind: 'story', ms: 5200 });
      whereAmI();
    }
    const ZONE_WORDS = { commons: 'Commons', wards: 'wards', upper_rind: 'Upper Rind', lower_rind: 'Lower Rind' };
    const zoneWord = (z) => ZONE_WORDS[z] || z || 'deep';
    const guideName = (g) => (g && (g.content || {}).name) || 'your guide';
    function showDeckCard(deck, withHook) {
      if (!deck) return;
      const body = withHook ? `${deck.character}\n\n— ${deck.hook}` : deck.character;
      showPage(`deck ${deck.tier} of ${DECK_COUNT} · ${deck.ladder} · ${deck.rev}`, deck.name, body);
    }
    // arrival: show a deck's character the first time the player is on that tier.
    function maybeArriveDeck() {
      if (!story.ready) return;

      if (zoneDeckForTier(d.tier) !== playerDeck()) return;   // don't announce a zone before you've set foot on its deck (the tier can run ahead of the feet)
      story.store.setFact(story.playerId, k, true); saveStorySnapshot();
      showDeckCard(d, true);
    }
    // hoopybot's verdict — page the player when they've learned enough of the current deck (once per tier).
    function checkHoopy() {
      if (!story.ready) return;
      // The RIND tiers (3 Upper Rind · 4 Lower Rind · 5 Signal Chamber) are NOT driven by the learn-count
      // deck-climb — tier 3→4 is the witness-then-CHOOSE threshold (factionchoice.js) and 4→5 is the
      // chamber-lore/Luna close (conclusion.js). Paging "<zone> — understood / return to your guide" off the
      // learn-count there told the player they understood the Upper Rind before they'd descended, and sent
      // them back to Sevin who then said "not yet". Cap the deck-climb paging at the Nave (tiers 1–2).
      if (narTier() >= 3) return;
      const d = currentDeck(), a = assess(story.store, story.playerId, d);
      const pk = 'hoopy.paged.' + d.tier;

        story.store.setFact(story.playerId, pk, true); saveStorySnapshot();
        const guide = guideFor(openingCast, d.tier);
        $('enc').classList.contains('on') || showPage('hoopybot · you have leveled', d.name + ' — understood', levelMessage(d, guideName(guide)), '⏎ / click — then find your guide');

    // the GRANT: returning to your guide while paged advances the narrative tier and gives next guidance.
    function isGuide(contentId) { const g = guideFor(openingCast, narTier()); return !!(g && contentId && g.id === contentId); }
    function grantLevelAtGuide() {
      const tier = narTier(), d = currentDeck();
      // TIER 3 → 4 is the upper-rind THRESHOLD: you don't just level up, you CHOOSE a faction (bible). Sevin
      // (the tier-3 guide) offers the choice once all three are witnessed ×3; until then, she sends you back.
      if (tier === 3 && !chosenFaction(story.store.getFacts(story.playerId))) {
        if (allWitnessed(story.store.getFacts(story.playerId))) showFactionChoice();
        else showPage('the upper-rind threshold · Sevin', 'not yet', '“You have not witnessed all three at scale. Walk the Seven’s domains until each nave faction has shown you its true size — three times over — then return and choose.”', '⏎ / click to continue');

      if (nd) story.store.setFact(story.playerId, 'hoopy.arrived.' + nd.tier, true);   // the guidance below IS the arrival
      saveStory();   // re-floors, re-renders quest, lifts the opening seal at narrative 2
      const guide = guideFor(openingCast, tier);

    }

    // ── SIDE QUESTS (deterministic, story/quests.js): the people you meet tip you to rumors that share

    //    (sq.on.<seed> / sq.done.<seed>); no inference, ~80 threads in the bank. ──
    let questBank = new Map();

          setCoins(getCoins() + q.reward); resolved.push(q);

        }
      }
      if (resolved.length) { saveStorySnapshot(); const q = resolved[0]; flashToast(`✒ thread resolved — “${q.title}” +◈${q.reward}${resolved.length > 1 ? ` (+${resolved.length - 1} more)` : ''}`, 3600); whereAmI(); }
    }
    // Reading ANY terminal SATISFIES EVERY open thread that points you at a terminal (fungible). The player's

    // every open thread whose navigable marker IS a terminal, regardless of which console you actually used.
    function creditTerminalThreads() {

      }

    }
    function flashToast(text, ms = 2600) { return notify(text, { ms }); }
    // the JOURNAL: open threads (progress) + resolved ones. Toggle with j / the ✒ button.
    function renderJournal() {
      if (!story.ready) { showPage('journal', 'your journal', 'No threads yet. Talk to the people of the deck — someone will mention something worth chasing.'); journalOpen = true; return; }
      const facts = story.store.getFacts(story.playerId), names = npcNameMap();
      const open = [], done = [];
      for (const k of Object.keys(facts)) { if (!k.startsWith('sq.on.')) continue; const id = k.slice(6); const q = questBank.get(id); if (!q) continue; (facts['sq.done.' + id] ? done : open).push(q); }
      // the MAIN quest guidance (objective/step/where/how) leads the journal, then the side-quest threads
      const guide = guidanceHTML();
      let body = guide ? `<div style="margin:0 0 16px;padding-bottom:13px;border-bottom:1px solid #1b2530">${guide}</div>` : '';
      const ob = obHTML();   // the onboarding gimme card (one at a time) sits between the main quest and the side threads

      if (open.length || done.length) body += `<div style="color:#7fd8d0;font-size:11px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:9px">side threads</div>`;

      const trackedId = story.store.getFact(story.playerId, 'sq.track');
      for (const q of open) {
        const pr = questProgress(story.store, story.playerId, q), mk = questMarker(q, names);

        const seek = questSeekTarget(q);
        const tracked = trackedId === q.seedId;
        const seekLine = seek ? `⌖ seek <b style="color:#e0c48a">${esc(seek.name)}</b> — they know this thread`
          : (mk && mk.hint ? `⌖ ${esc(mk.hint)}` : '');

          + `<div style="color:#f4bf62;font-size:13.5px">${esc(q.title)}</div>`
          + `<div style="color:#cfd8d2;font-size:12px;line-height:1.5;margin:3px 0">${esc((q.hook || '').slice(0, 200))}${q.hook.length > 200 ? '…' : ''}</div>`
          + `<div style="color:#9aa8a0;font-size:11px">look into: ${esc(q.themes.join(', '))}${seekLine ? ` · ${seekLine}` : ''} · ${trackBtn}</div>`
          + `<div style="margin-top:4px;height:5px;background:#10161d;border-radius:3px;overflow:hidden"><span style="display:block;height:100%;width:${Math.round(pr.progress * 100)}%;background:${tracked ? '#7fd8d0' : '#b48a6a'}"></span></div>`
          + `<div style="color:#6b7872;font-size:10.5px;margin-top:2px">${pr.learned}/${pr.needed} · reward ◈${q.reward}</div></div>`;
      }
      // RESOLVED threads keep their TEXT (feedback: "I see rumor names — is there text?"). The deck-climb
      // resolves threads fast, so the rumor's hook + its revelation now persist on the closed thread, not just

      for (const q of done) body += `<div style="margin:0 0 11px;border-left:2px solid #2e6b5e;padding-left:10px">`

        + (q.hook ? `<div style="color:#9aa8a0;font-size:11.5px;line-height:1.5;margin:3px 0">${esc(q.hook.slice(0, 220))}${q.hook.length > 220 ? '…' : ''}</div>` : '')

      ed.innerHTML = body;   // rich list (showPage escapes; we want markup)
      // ⌖ track toggle — pin/release the map ◇ on a thread's person of interest.
      for (const el of ed.querySelectorAll('[data-sqtrack]')) el.onclick = (e) => {
        e.stopPropagation();

        const cur = story.store.getFact(story.playerId, 'sq.track');
        story.store.setFact(story.playerId, 'sq.track', cur === id ? null : id);
        _sqSeek = null; _sqSeekT = 0;   // re-resolve the seek target immediately
        saveStorySnapshot(); renderJournal();
      };
      journalOpen = true;   // set AFTER showPage (which clears it) so a live renderQuest refresh keeps the journal
    }
    const toggleJournal = () => { if (journalOpen) hideEncounter(); else renderJournal(); };

    function residentAt(wx, wy) { let best = null, bd = (SKIN.playerW * 2.6) ** 2; for (const a of nearResidents) { const d = (a.x - wx) ** 2 + (a.y - wy) ** 2; if (d < bd) { bd = d; best = a; } } return best; }
    // CROWD = AMBIENCE. A little guy is NEVER a named story figure — clicking them is faction-flavoured
    // chatter, not a crystallized identity. Named NPCs are reserved for the discover→promote flow (so a
    // major name can never land on a random resident). The crowd keeps its own procedural name; no content
    // binds, no XP. They can still DELIVER a pending story beat ("the next person you talk to…").
    const _crowdTalk = new Map();   // per-resident talk count → cycles their chatter instead of repeating
    function crowdChatter(faction, seed, bump) {
      if (!story.ready || !story.chatter) return null;
      const p = story.store.getPlayerState(story.playerId);
      const state = { facts: story.store.getFacts(story.playerId), narrative_tier: p.narrative_tier, revelation_tier: p.revelation_tier, items: loadGateState(story.store, story.playerId).items };
      return pickChatter(story.chatter, faction, state, seed, bump);
    }
    function openStory(a) {
      if (!story.ready) return;
      const faction = factionForRole(a.role) || factionOf(a.tags) || '_default';
      const seed = a.featureKey || a.id || a.name;
      const bump = _crowdTalk.get(seed) || 0; _crowdTalk.set(seed, bump + 1);
      story.active = { agent: a, crowd: true, faction, seed, bump, npcId: null, intro: null, wanderer: wandererFor(seed, faction) };
      story.active.informed = deliverInformed();   // the "next person you talk to" delivers any XP-unlocked beat
      saveStory(); renderStory();
    }
    // deliver a pending informed beat (an active beat carrying `informed` text, not yet delivered): mark it
    // delivered, set its completes_when facts (so it closes → checkAdvance bumps the tier), return the line.
    function deliverInformed() {
      if (!story.ready || !story.sb) return null;
      for (const b of computeBoard(story.sb, story.store, story.playerId)) {
        if (b.status !== 'active' || !b.informed || story.store.getFact(story.playerId, 'delivered.' + b.id)) continue;
        story.store.setFact(story.playerId, 'delivered.' + b.id, true);
        for (const [k, v] of Object.entries((b.completes_when || {}).facts || {})) story.store.setFact(story.playerId, k, v);
        return b.informed;
      }
      return null;
    }
    // every soul gets a cheap, deterministic FLESH·CHASSIS·ANIMA stat block (crewStats is O(1))
    const npcStats = new Map();
    function statBlockFor(agent) {
      const k = (agent.genome && agent.genome.seed) || agent.id || agent.name;
      let sb = npcStats.get(k); if (!sb) { sb = crewStats(k, agent.role); npcStats.set(k, sb); }
      return sb;
    }
    function npcStatLine(agent) {
      const c = statBlockFor(agent), cm = deriveCombat(c);
      const tri = TRIAD_ORDER.map((d) => `<span style="color:${TRIAD[d].accent}">${TRIAD[d].glyph}${Math.round(c.triad[d] * 100)}</span>`).join(' ');
      return `<div style="font-size:10.5px;color:#9aa8a0;margin:-6px 0 12px"><b style="color:#cfd8d2">${esc(c.cast.label)}</b> · ${tri} · <span title="combat">✚${cm.hp} ⚔${cm.atk} ⛨${cm.def}</span></div>`;
    }
    // an ambient NPC's line: faction (from its tags) × the active story phase, stable per NPC (no LLM)
    function chatterFor(npcId, agent) {
      if (!story.ready || !story.chatter) return null;
      const ci = story.store.contentById(npcId); if (!ci) return null;
      const p = story.store.getPlayerState(story.playerId);

    let benchOpen = false, benchGid = null, benchSel = [], benchPrep = 'draught';
    const reagentNameFor = (id) => { const c = cropById(gardenArk, id); return c ? (c.sciName || c.common) : id; };
    const reagentFor = (id) => { const c = cropById(gardenArk, id); return c && (findReagent(c.sciName) || findReagent(c.common)); };
    // the alchemically-live entries of the pantry: { id, count, reagent, name }
    function pantryReagents() {
      return Object.entries(getPantry()).filter(([, n]) => n > 0)
        .map(([id, n]) => { const r = reagentFor(id); return r ? { id, count: n, reagent: r, name: cropName(id) } : null; })

    }
    async function openBench(cp, ch) {
      if (!story.ready) return;

    function closeBench() { benchOpen = false; $('bench').classList.remove('on'); }

      const slugToId = {}; for (const h of have) if (slugToId[h.reagent.slug] == null) slugToId[h.reagent.slug] = h.id;

        ? have.map((h) => { const on = benchSel.includes(h.id), full = benchSel.length >= 3 && !on;
            return `<span class="rchip ${on ? 'on' : ''} ${full ? 'dim' : ''}" data-reagent="${esc(h.id)}">${h.reagent.glyph || '🜁'} ${esc(h.name)} <span class="n">×${h.count}${h.reagent.planet ? ' · ' + h.reagent.planet[0] : ''}</span></span>`; }).join('')
        : `<div class="ameta" style="color:#8a7fb0">no reagents in your pantry. Grow the <b>Physic Garden</b> herbs (pull their seeds at a trade desk, plant &amp; harvest in a garden) — harvested herbs become reagents here.</div>`;
      // vessel chips
      const vesselRow = VESSELS.map((v) => `<span class="vchip ${benchPrep === v ? 'on' : ''}" data-vessel="${v}">${esc(PREPARATIONS[v].vessel)} <span style="opacity:.6">(${PREPARATIONS[v].deliver})</span></span>`).join('');
      // preview
      const pv = benchSel.length ? benchPreview() : null;
      const previewHtml = !benchSel.length
        ? `<div class="ameta">select 1–3 reagents to see the brew</div>`
        : pv.ok
          ? `<div class="pg">${pv.glyphs || '⚗'}</div><div><span class="grade g${pv.grade}">${pv.grade}</span> <b style="color:#e6d8ff">${esc(pv.label)} ${esc(pv.vessel)}</b></div><div class="pe">${esc(describeEffect(pv))}</div><div class="pgr">coherence ${(pv.coherence * 100) | 0}% · potency ${pv.potency}</div>`

      // KNOWN recipes (mastery) are one-tap fills (dim if you lack the reagents); UNKNOWN recipes are a
      // mystery — you see the effect family but not the herbs, and discover them by experiment (or the
      // /alch cookbook). Mastery is story-seeded and grows as you brew.
      const known = discoveredSet(), all = deriveRecipes();
      const recipes = all.map((r) => {
        const isKnown = known.has(recipeKey(r));
        const slugs = r.reagents.map((n) => { const rr = findReagent(n); return rr ? rr.slug : null; });
        const holdAll = slugs.every((s) => s && heldSlugs.has(s));
        const ids = slugs.map((s) => slugToId[s]).filter((x) => x != null);

      });

      const recipeRow = recipes.map(({ r, isKnown, holdAll, ids }) =>
        isKnown
          ? `<span class="rec ${holdAll ? '' : 'dim'}" ${holdAll ? `data-recipe="${esc(ids.join(','))}" data-vessel2="${esc(r.preparation)}"` : ''}>✦ ${r.glyph} <b>${esc(r.vessel)}</b> · ${esc(r.key)}<span class="re">${esc(r.reagents.join(' + '))} → ${esc(r.effect)}</span></span>`
          : `<span class="rec dim" title="experiment with reagents to discover this — or consult the cookbook">🔒 <b>a ${esc(r.family)} ${esc(r.vessel)}</b><span class="re">${esc(r.effect)} · undiscovered — brew it to learn it</span></span>`).join('');
      card.innerHTML =
        `<button class="aclose" data-bclose="1">close ⏎</button>` +
        `<div class="ahead">⚗ THE ALCHEMY BENCH</div>` +
        `<div class="alaw">brew a preparation</div>` +
        `<div class="ameta">combine reagents from your pantry · the vessel sets the reach · <a href="/alch" target="_blank" style="color:#c6b0f0">the cookbook ↗</a></div>` +
        `<div class="bhead2">reagents (from your pantry — pick up to 3)</div><div class="bgrid">${reagentRow}</div>` +
        `<div class="bhead2">vessel</div><div class="bgrid">${vesselRow}</div>` +
        `<div class="preview">${previewHtml}</div>` +
        `<button class="brew" data-brew="1" ${pv && pv.ok ? '' : 'disabled'}>⚗ brew${pv && pv.ok ? ` — ${pv.grade} ${esc(pv.vessel)}` : ''}</button>` +

    }
    $('bench').addEventListener('click', (e) => {

      if (rg) { const id = rg.dataset.reagent; if (benchSel.includes(id)) benchSel = benchSel.filter((x) => x !== id); else if (benchSel.length < 3) benchSel = [...benchSel, id]; renderBench(); return; }
      if (vs) { benchPrep = vs.dataset.vessel; renderBench(); return; }

    // a prepared brew → a pack item (shared by the bench and the apothecary shelf).
    function prepToItem(pv) {

    // ── RECIPE MASTERY — which cookbook recipes you KNOW. Baseline is story-driven (your narrative tier

    //    A known recipe is a one-tap fill at the bench; an unknown one is a mystery you discover by

    const recipeKey = (r) => `${r.family}:${r.axis}`;

      if (!sel.length) return null;
      for (const r of deriveRecipes()) {
        if (r.preparation !== benchPrep) continue;
        const rs = r.reagents.map((n) => { const rr = findReagent(n); return rr ? rr.slug : null; }).filter(Boolean).sort();

    }

    // ── USING PREPARATIONS — the consume verb, self, in & out of combat. A preparation carries

    // ── GIFTING preparations to NPCs for STANDING — the social payoff of the alchemy vertical. Giving a

    // ── THE SMITHY (make-role WALL fixture ⚒) — the make verb for EQUIPMENT. Forge a genome item from the

    // quality slider (event delegation won't catch input; bind on render)

    function doForge() {

      setCommods(smithSpend(wallet, cost));
      setJSONFact('craft.forged', ((getJSONFact('craft.forged', 0) | 0) + 1));   // bump the individual-item seed

    // ── COMBAT IN-WORLD — hazard-room CREEPS. A store/move room's component is a foe (rolled crew, armed

      const gb = sumBonus([].concat(eq.mainhand && eq.mainhand.gems || [], eq.body && eq.body.gems || [], eq.offhand && eq.offhand.gems || []));
      combat.hp += gb.hp; combat.atk += gb.atk; combat.def += gb.def; combat.fluxPool += gb.flux;   // socketed-gem crystallography

      // in the TRAINER gauntlet the hero fights with their tech-tree BUILD. The tree is ADDITIVE over the
      // universal kit (so a fresh run is never weaker than a baseline fighter — it just lacks the tree's

      const { foes, seed, deck } = stageFoes(trainerRun, player, { packFor: creepPack, certify: certifyPack });
      trainerBattleCtx = { stage: trainerRun.stage, deck };

    addEventListener('keydown', (e) => { if ((e.key === 'c' || e.key === 'C') && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); creator.toggle(); } });

    // ── the equipped page: stained-glass figure with the pack auto-fitted onto a body plan ──
    const equip = new EquippedView({ getCharacter: () => playerChar, getPack: () => pack.pack, getEquipped: () => effectiveEquip(), onUnequip: (slot) => unequipSlot(slot) });
    $('equipbtn').addEventListener('click', () => equip.toggle());
    addEventListener('keydown', (e) => { if ((e.key === 'e' || e.key === 'E') && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); equip.toggle(); } });

    // ── the minimap + waypoint ── a high-level map you drop a waypoint on; the main map then carries a
    // persistent DIRECTION indicator to it (an edge arrow while it's off-screen → the marker itself once
    // it rolls into the viewport). The waypoint persists across reloads. ──
    let waypoint = (() => { try { const s = localStorage.getItem('mega:v093:waypoint'); const w = s ? JSON.parse(s) : null; return (w && Number.isFinite(w.x) && Number.isFinite(w.y)) ? w : null; } catch (e) { return null; } })();
    function setWaypoint(wp) {
      waypoint = (wp && Number.isFinite(wp.x) && Number.isFinite(wp.y)) ? { x: wp.x, y: wp.y } : null;
      try { waypoint ? localStorage.setItem('mega:v093:waypoint', JSON.stringify(waypoint)) : localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
    }
    const stripTags = (s) => String(s == null ? '' : s).replace(/<[^>]*>/g, '');
    const inDeckBBox = (x, y, deck) => { if (!world) return false; for (const ch of world.chunks) { if ((ch.deck || 0) !== deck) continue; const bb = ch.bb || (ch.bb = bboxOf(ch.poly)); if (x >= bb.x0 && x <= bb.x1 && y >= bb.y0 && y <= bb.y1) return true; } return false; };
    // OBLIGATION + QUEST marks the minimap draws as glyphs (no other glyphs on the map). Current deck only.
    //   chest holding items · garden with plants · the bed you last slept in · the active quest (lesser waypoint).
    function miniMarks() {
      const out = []; if (!story.ready || !world) return out;
      const pd = playerDeck(), chests = getChests();
      for (const ch of world.chunks) {
        const P = ch.painted; if (!P || (ch.deck || 0) !== pd) continue;
        for (const F of (P.fixtures || [])) {
          const role = (ch.rooms[F.room] || {}).role;
          if (fixtureAction(role, 'wall') !== 'chest' || !F.tip) continue;
          const items = chestOf(chests, 'ch' + ch.id + ':r' + F.room);
          if (items && items.length) out.push({ x: F.tip.x, y: F.tip.y, kind: 'chest', glyph: '▣', color: '#e0c98a', label: 'storage chest', sub: items.length + ' item' + (items.length === 1 ? '' : 's') + ' stored' });
        }
        for (const cp of (P.comps || [])) {
          if (isTerminal(cp) || fixtureAction(cp.role, 'component') !== 'garden') continue;
          const bed = getJSONFact('garden.bed.' + gardenKeyOf(cp, ch), null), planted = (bed && bed.plants) ? bed.plants.length : 0;
          out.push({ x: cp.cx, y: cp.cy, kind: 'garden', glyph: '❀', color: '#8fe07a', label: 'garden', sub: planted ? planted + ' plants' : 'a bed' });
        }
      }
      const home = getJSONFact('combat.home', null);
      if (home && Number.isFinite(home.x) && inDeckBBox(home.x, home.y, pd)) out.push({ x: home.x, y: home.y, kind: 'bed', glyph: '✚', color: '#9ee6df', label: 'your bed', sub: 'where you last slept' });
      const mwp = liveWp();   // follow a moving keeper on the minimap too
      if (mwp && Number.isFinite(mwp.x)) {
        const q = questGuidance || {}, obj = stripTags(q.objective).replace(/\s+/g, ' ').trim();
        out.push({ x: mwp.x, y: mwp.y, kind: 'quest', color: '#f4bf62', label: (obj || 'your quest').slice(0, 64), sub: stripTags(q.stepText || q.whereWord || 'follow the marker').slice(0, 130) });
      }
      return out;
    }
    // hover context for a world point: the nearest room's VERB + MATTER, and any STORY figure living there.
    function miniRoomInfo(wx, wy) {
      if (!story.ready || !society) return null;
      const pd = playerDeck();
      let best = null, bd = Infinity;
      for (const r of society.rooms) { const ch = world.chunks[r.ch]; if (!ch || (ch.deck || 0) !== pd) continue; const d = (r.x - wx) ** 2 + (r.y - wy) ** 2; if (d < bd) { bd = d; best = r; } }
      if (!best || bd > 150 * 150) return null;                       // pointing at bare extent → nothing
      const info = { verb: best.role, matter: best.domain || null, story: null };
      const R2 = 95 * 95;
      for (const a of (anchors || [])) { if ((a.deck || 0) !== pd) continue; if ((a.x - best.x) ** 2 + (a.y - best.y) ** 2 < R2) { info.story = a.name; break; } }
      if (!info.story) for (const rr of residents) { if (rr.keeper && residentDeck(rr) === pd && (rr.x - best.x) ** 2 + (rr.y - best.y) ** 2 < R2) { info.story = rr.keeper.name; break; } }
      return info;
    }
    const minimap = new MiniMap({
      getState: () => ({ world, walk, seen, society, deck: playerDeck(), px: px(), py: py(), waypoint, marks: miniMarks(), roomAt: miniRoomInfo }),
      onWaypoint: setWaypoint,
    });
    $('mapbtn').addEventListener('click', () => minimap.toggle());
    addEventListener('keydown', (e) => { if ((e.key === 'm' || e.key === 'M') && !typing() && !e.metaKey && !e.ctrlKey && !loaderOpen) { e.preventDefault(); minimap.toggle(); } });
    $('journalbtn').addEventListener('click', toggleJournal);
    // the ⋯ overflow menu (story status + worlds): toggle on the button, close on any item or a tap-out
    $('morebtn').addEventListener('click', (e) => { e.stopPropagation(); $('moremenu').classList.toggle('on'); });
    $('moremenu').addEventListener('click', () => $('moremenu').classList.remove('on'));
    addEventListener('click', (e) => { const mm = $('moremenu'); if (mm.classList.contains('on') && !mm.contains(e.target) && e.target !== $('morebtn') && !$('morebtn').contains(e.target)) mm.classList.remove('on'); });
    $('dbgbtn').addEventListener('click', () => toggleDbg());
    addEventListener('keydown', (e) => { if (e.key === '`' && !typing() && !e.metaKey && !e.ctrlKey) { e.preventDefault(); toggleDbg(); } });   // ` = story-status panel
    addEventListener('keydown', (e) => { if ((e.key === 'j' || e.key === 'J') && !typing() && !e.metaKey && !e.ctrlKey && !arcadeOpen && !gardenOpen && !tradeOpen && !kitchenOpen && !battleOpen && !lapidaryOpen && !loaderOpen && !oracleOpen() && !geomancyOpen() && !inkblotOpen()) { e.preventDefault(); toggleJournal(); } });   // j = side-quest journal

    if (playerChar) adoptCharacter(playerChar);   // restore the saved sprite/kit/HUD on load

    // ── THE WORLD LOADER / SAVE-PROFILE PICKER ──────────────────────────────────────────────────────────
    //    Each ship seed is a profile (a com.minomobi.hoop.story.save record keyed by seed, in YOUR repo —
    //    plus a local buffer). Saves are durable + user-owned, so you can keep as many as you like. This
    //    screen lists them (cloud ☁ + local ◍, merged by seed), resumes/deletes them, and starts fresh
    //    worlds. Switching a profile is a navigation (?seed=N + reload) so loadStory re-restores cleanly. ──
    let loaderOpen = false;
    // pull a one-line summary out of a serialized MemoryStore snapshot WITHOUT instantiating a store
    function summarizeState(st) {
      if (!st) return null;
      try {
        const players = new Map(st.players || []), p = players.get('local') || {};
        const fe = (st.facts || []).find((e) => e[0] === 'local'), f = new Map(fe ? fe[1] : []);
        // name: prefer the plain `name` fact; fall back to the `character` fact, which in the snapshot is a
        // nested OBJECT (older saves) — NOT a JSON string, so read it directly (the old JSON.parse always threw).
        let name = null;
        const nm = f.get('name'); if (typeof nm === 'string' && nm.trim()) name = nm.trim();
        if (!name) { const cj = f.get('character'); if (cj) { try { const c = typeof cj === 'string' ? JSON.parse(cj) : cj; name = (c && c.name) || null; } catch (e) {} } }
        const pl = (st.placements || []).find((e) => e[0] === 'local');
        return { name, nar: p.narrative_tier || 1, rev: p.revelation_tier || 1, pow: p.power_tier || 1, xp: p.xp | 0, placed: pl ? pl[1].length : 0, coins: +(f.get('coins') || 0) };
      } catch (e) { return null; }
    }
    const safeParse = (s) => { try { return s ? JSON.parse(s) : null; } catch (e) { return null; } };
    // every per-world local buffer (hoop:v103:story:<seed>) + the legacy global (→ seed 7 if not shadowed)
    function localProfiles() {
      const out = [], pre = LOCAL_PREFIX + ':';
      try {
        let hasLegacy = false, has7 = false;
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(pre)) { const s = k.slice(pre.length); if (/^\d+$/.test(s)) { out.push({ world: s, state: safeParse(localStorage.getItem(k)) }); if (s === '7') has7 = true; } }
          else if (k === LOCAL_PREFIX) hasLegacy = true;
        }
        if (hasLegacy && !has7) out.push({ world: '7', state: safeParse(localStorage.getItem(LOCAL_PREFIX)) });
      } catch (e) {}
      return out;
    }
    // merge local + (if signed in) cloud saves into one profile list, keyed by world seed
    async function gatherProfiles() {
      const map = new Map();
      for (const p of localProfiles()) map.set(p.world, { world: p.world, local: true, cloud: false, state: p.state, updatedAt: null });
      if (storyUser) {
        try {
          for (const r of await listOwnSaves(auth.pds)) {
            const ex = map.get(r.world) || { world: r.world, local: false, state: null, updatedAt: null };
            ex.cloud = true; if (r.updatedAt) ex.updatedAt = r.updatedAt;
            if (!ex.state && r.stateJson) ex.state = safeParse(r.stateJson);
            map.set(r.world, ex);
          }
        } catch (e) { /* cloud list is best-effort */ }
      }
      return [...map.values()].sort((a, b) => {
        if (a.world === worldKey()) return -1; if (b.world === worldKey()) return 1;   // current world floats to top
        return String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')) || (+a.world - +b.world);
      });
    }
    // navigate to a world (reload re-inits seed from ?seed → loadStory restores that profile)
    function switchToWorld(s) { rememberSeedTo(s); const u = new URL(location.href); u.searchParams.set('seed', String(s)); location.href = u.toString(); }
    const rememberSeedTo = (s) => { try { localStorage.setItem('hoop:v103:lastseed', String(s)); } catch (e) {} };
    // a brand-new game: a fresh random seed with no save → clean character-creation start. Clears the
    // (global) waypoint so you don't aim at the old world. This is the "fully new game".
    function newRandomWorld() {
      const s = ((Date.now() ^ (Math.random() * 0xffffffff)) >>> 0) || 1;
      try { localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
      try { sessionStorage.setItem('hoop:forceCreate', '1'); } catch (e) {}   // the fresh world opens straight into (named) character creation
      switchToWorld(s);
    }
    async function deleteProfile(s) {
      if (!confirm(`Delete the save for world ${s}? This removes it from ${storyUser ? 'your PDS and ' : ''}this device. Can't be undone.`)) return;
      localDel(s);
      if (storyUser) { try { await deleteOwnSave(auth.pds, String(s)); } catch (e) {} }
      if (String(s) === worldKey()) { try { localStorage.removeItem('hoop:v103:lastseed'); } catch (e) {} location.href = location.pathname; return; }   // deleted the current world → boot back to default
      renderLoader();
    }
    // restart THIS world from scratch (the old #newgame behaviour) — wipe its story progress, keep the seed
    function restartCurrentWorld() {
      if (!confirm('Restart this world? Wipes its story progress — facts, lore, inventory, tiers — and respawns you. The world geometry and your character stay.')) return;
      localDel(); try { localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
      if (storyUser) { try { auth.pds.deleteRecord(SAVE_NSID, worldKey()).catch(() => {}); } catch (e) {} }
      location.reload();
    }
    // ── THE ENTRY PORTAL (home screen) — the only auth location. Sequences auth (settled here) → New Game
    //    (a fresh seed, character creation while the world builds behind it) or Load Game, so auth + creation +
    //    population no longer race at boot. World ENTRY reloads with ?play=1 (reuses the battle-tested per-seed
    //    boot path); returning to the portal drops the flag. ──
    let _homeStop = null, _homeView = 'menu';
    function showHome() {
      const el = $('home'); if (!el) return; el.classList.add('on'); _homeView = 'menu';
      if (!_homeStop) { try { _homeStop = startHome($('homebg'), $('hometitle')); } catch (e) {} }
      renderHome();
    }
    function hideHome() { const el = $('home'); if (el) el.classList.remove('on'); if (_homeStop) { try { _homeStop(); } catch (e) {} _homeStop = null; } }
    function enterNewGame() {
      const s = ((Date.now() ^ (Math.random() * 0xffffffff)) >>> 0) || 1;
      try { localStorage.removeItem('mega:v093:waypoint'); } catch (e) {}
      try { sessionStorage.setItem('hoop:forceCreate', '1'); } catch (e) {}   // the fresh world opens straight into (named) character creation
      rememberSeedTo(s);
      const u = new URL(location.href); u.searchParams.set('seed', String(s)); u.searchParams.set('play', '1'); location.href = u.toString();
    }
    function enterSavedGame(s) {
      try { sessionStorage.removeItem('hoop:forceCreate'); } catch (e) {}
      rememberSeedTo(s);
      const u = new URL(location.href); u.searchParams.set('seed', String(s)); u.searchParams.set('play', '1'); location.href = u.toString();
    }
    function returnHome() {   // in-world ⌂ — flush, then boot back to the portal (the only auth location)
      try { flushRepo(true); } catch (e) {}
      const u = new URL(location.href); u.searchParams.delete('play'); location.href = u.toString();
    }
    async function homeDelete(s) {
      if (!confirm(`Delete the save for world ${s}? Removes it from ${storyUser ? 'your PDS and ' : ''}this device. Can't be undone.`)) return;
      localDel(s);
      if (storyUser) { try { await deleteOwnSave(auth.pds, String(s)); } catch (e) {} }
      renderHome();
    }
    function renderHome() {
      const menu = $('homemenu'); if (!menu) return;
      if (_homeView === 'load') { renderHomeLoad(menu); return; }
      const authRow = storyUser
        ? `<div class="hmauth">signed in as <span class="who">@${esc(storyUser.handle)}</span> · <span class="act" data-ho-out>sign out</span></div>`
        : `<div class="hmauth"><span class="act" data-ho-in>Sign in with Bluesky</span> to save to your own repo.<div class="hmwarn">⚠ Play without signing in and your game saves only to THIS browser — it won’t follow you to another device, and you can’t spread rumors. This is the only place to sign in.</div></div>`;
      menu.innerHTML = authRow
        + `<button class="hmbtn prim" data-ho-new>▶ New Game</button>`
        + `<button class="hmbtn" data-ho-load>↺ Load Game</button>`;
      menu.querySelector('[data-ho-new]').onclick = enterNewGame;
      menu.querySelector('[data-ho-load]').onclick = () => { _homeView = 'load'; renderHome(); };
      const si = menu.querySelector('[data-ho-in]'); if (si) si.onclick = signIn;
      const so = menu.querySelector('[data-ho-out]'); if (so) so.onclick = signOut;
    }
    async function renderHomeLoad(menu) {
      menu.innerHTML = `<button class="hmback" data-ho-back>← back</button><div class="hmlist" id="hmlist"><div class="hmempty">reading saves…</div></div>`;
      menu.querySelector('[data-ho-back]').onclick = () => { _homeView = 'menu'; renderHome(); };
      let profiles = []; try { profiles = await gatherProfiles(); } catch (e) {}
      if (!$('home').classList.contains('on') || _homeView !== 'load') return;   // navigated away while awaiting
      const list = $('hmlist'); if (!list) return;
      if (!profiles.length) { list.innerHTML = `<div class="hmempty">No saved games yet — start a New Game.</div>`; return; }
      list.innerHTML = profiles.map((p) => {
        const s = summarizeState(p.state), deck = s ? deckForTier(s.nar) : null;
        const title = s && s.name ? esc(s.name) : 'unnamed traveller';
        const src = [p.cloud ? '☁' : '', p.local ? '◍' : ''].filter(Boolean).join(' ');
        const meta = s ? `${esc(deck ? deck.name : 'the Nave')} · deck ${s.nar}/${DECK_COUNT} · ◈${s.coins} · world ${esc(p.world)} ${src}` : `empty save · world ${esc(p.world)} ${src}`;
        return `<div class="hmrow"><div><div class="nm">${title}</div><div class="mt">${meta}</div></div>`
          + `<div class="rb"><button class="prim" data-ho-go="${esc(p.world)}">play</button><button class="danger" data-ho-del="${esc(p.world)}">✕</button></div></div>`;
      }).join('');
      list.querySelectorAll('[data-ho-go]').forEach((b) => { b.onclick = () => enterSavedGame(b.getAttribute('data-ho-go')); });
      list.querySelectorAll('[data-ho-del]').forEach((b) => { b.onclick = () => homeDelete(b.getAttribute('data-ho-del')); });
    }
    function openLoader() { loaderOpen = true; $('loader').classList.add('on'); renderLoader(); }
    function closeLoader() { loaderOpen = false; $('loader').classList.remove('on'); }
    async function renderLoader() {
      const el = $('loader'); if (!el) return;
      el.innerHTML = `<div class="lwrap"><button class="lclose" data-lclose>✕ close</button>
        <div class="lhead">your worlds</div>
        <div class="lsub">Each ship is a separate save — kept on ${storyUser ? `your PDS (@${esc(storyUser.handle)})` : 'this device'}, so you can run as many as you like. Resume one, start fresh, or clear one out.</div>
        <div class="lacts">
          <button class="lbtn prim" data-new>✦ new world</button>
          <button class="lbtn" data-restart>↻ restart this world</button>
          ${storyUser ? '' : '<button class="lbtn" data-signin>sign in to sync across devices</button>'}
        </div>
        <div class="plist" id="plist"><div class="empty">reading saves…</div></div></div>`;
      el.querySelector('[data-lclose]').onclick = closeLoader;
      el.querySelector('[data-new]').onclick = newRandomWorld;
      el.querySelector('[data-restart]').onclick = restartCurrentWorld;
      const si = el.querySelector('[data-signin]'); if (si) si.onclick = () => { closeLoader(); signIn(); };
      let profiles = [];
      try { profiles = await gatherProfiles(); } catch (e) {}
      if (!loaderOpen) return;   // closed while awaiting
      const list = el.querySelector('#plist'); if (!list) return;
      if (!profiles.length) { list.innerHTML = `<div class="empty">No saves yet — you're playing world ${esc(worldKey())}. It'll appear here once it saves.</div>`; return; }
      list.innerHTML = profiles.map((p) => {
        const cur = p.world === worldKey(), s = summarizeState(p.state);
        const deck = s ? deckForTier(s.nar) : null;
        const title = s && s.name ? esc(s.name) : 'unnamed traveller';
        const src = [p.cloud ? '<span class="cloud">☁ cloud</span>' : '', p.local ? '<span class="local">◍ local</span>' : ''].filter(Boolean).join(' · ');
        const meta = s ? `deck ${s.nar}/${DECK_COUNT}${deck ? ' · ' + esc(deck.name) : ''} · rev ${s.rev} · pow ${s.pow} · ◈${s.coins} · ${s.placed} lore` : '<span class="src">empty / unreadable save</span>';
        const when = p.updatedAt ? ` · <span class="src">saved ${esc(new Date(p.updatedAt).toLocaleString())}</span>` : '';
        return `<div class="pcard${cur ? ' cur' : ''}">
          <div class="pmain">
            <div class="pname">${title}${cur ? '<span class="cur-tag">playing now</span>' : ''}</div>
            <div class="pmeta">world ${esc(p.world)} · ${src}<br>${meta}${when}</div>
          </div>
          <div class="pbtns">
            ${cur ? '<button class="lbtn" data-resume disabled style="opacity:.4;cursor:default">current</button>' : `<button class="lbtn prim" data-resume="${esc(p.world)}">resume</button>`}
            <button class="lbtn danger" data-del="${esc(p.world)}">delete</button>
          </div></div>`;
      }).join('');
      list.querySelectorAll('[data-resume]').forEach((b) => { const w = b.getAttribute('data-resume'); if (w) b.onclick = () => switchToWorld(w); });
      list.querySelectorAll('[data-del]').forEach((b) => { b.onclick = () => deleteProfile(b.getAttribute('data-del')); });
    }
    $('newgame').addEventListener('click', returnHome);   // in-world: ⌂ return to the portal (no in-world worlds loader)
    // BOOT: the portal gates entry. ?play=1 means "enter a world" (set by the portal's New/Load buttons) →
    // the existing per-seed boot path (loadStory restores this seed, newWorld builds, forceCreate on new).
    // Anything else shows the portal first, so auth settles before any world/save activity (no boot race).
    resize(); requestAnimationFrame(frame);
    try { const dq = new URLSearchParams(location.search).get('dev'); if (dq === '1') localStorage.setItem('hoop:v103:dev', '1'); else if (dq === '0') localStorage.removeItem('hoop:v103:dev'); } catch (e) {}   // ?dev=1 once → the #dbg panel gains a "fast-forward to the Lower Rind" test button (persists; ?dev=0 clears)
    const ENTER = (() => { try { return new URLSearchParams(location.search).get('play') === '1'; } catch (e) { return false; } })();
    if (ENTER) { loadStory(); newWorld(); }
    else { showHome(); }
    // bring up the WebGPU cell renderer (crisp vector fills). Async + fully guarded: if it never resolves
    // or WebGPU is missing, the game stays on the baked-raster path with zero change.
    initGpuMap($('mapgl')).then((g) => {
      if (!g) return;
      gpu = g; gpuActive = true; gpu.resize(W * dpr, H * dpr);
      if (world) for (const ch of world.chunks) ch._raster = null;   // re-bake detail-only now that the GPU owns the cells
      draw();
    }).catch(() => { gpu = null; gpuActive = false; });
  </script>
</body>
