<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bisk — The SimCluster Daily</title>
<meta name="description" content="A daily deterministic digest of a Bluesky SimCluster neighborhood: top posts, deepest threads, and a sentiment weather report.">
<meta property="og:title" content="Bisk — The SimCluster Daily">
<meta property="og:description" content="Top chickens, delvers, and the neighborhood weather report — computed fresh each day from public Bluesky data.">
<meta property="og:type" content="website">
<style>
:root {
  --bg: #f7f4ec;
  --paper: #fffdf7;
  --ink: #1c1a16;
  --muted: #7a7568;
  --rule: #d8d2c4;
  --accent: #a8324a;
  --accent-faint: rgba(168, 50, 74, 0.08);
  --gold: #b8902a;
  --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
  --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14130f; --paper: #1a1814; --ink: #e7e2d6; --muted: #8a8474;
    --rule: #34302a; --accent: #e06a82; --accent-faint: rgba(224,106,130,0.10); --gold: #d4b454;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--serif); -webkit-font-smoothing: antialiased; }
body { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.2rem 4rem; line-height: 1.5; }

/* Masthead */
.masthead { text-align: center; border-bottom: 3px double var(--ink); padding-bottom: 0.8rem; margin-bottom: 0.4rem; }
.masthead .date { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.masthead h1 { margin: 0.2rem 0 0; font-size: 3.6rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.masthead h1 a { color: inherit; text-decoration: none; }
.masthead .tagline { font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 0.45rem; }
.edition { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-align: center; margin: 0.4rem 0 1.4rem; }
.edition a { color: var(--accent); text-decoration: none; }

/* Weather banner */
.weather {
  display: flex; flex-direction: column; background: var(--paper);
  border: 1px solid var(--rule); border-radius: 4px; padding: 0.8rem 1rem; margin-bottom: 1.6rem;
}
.weather-top { display: flex; align-items: center; gap: 1rem; }
.weather .glyph { font-size: 2.4rem; line-height: 1; }
.weather .wmain { flex: 1; min-width: 0; }
.weather .wlabel { font-size: 1.15rem; font-weight: 700; }
.weather .wsub { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); letter-spacing: 0.04em; margin-top: 0.15rem; }
.weather .bar { height: 6px; border-radius: 3px; margin-top: 0.5rem; background: linear-gradient(90deg, #4a72b8, #c9c2b0 50%, var(--gold)); position: relative; }
.weather .bar .needle { position: absolute; top: -3px; width: 2px; height: 12px; background: var(--ink); }
#radar { flex: 0 0 auto; }
.distinctive { margin-top: 0.75rem; padding-top: 0.6rem; border-top: 1px dashed var(--rule); font-family: var(--mono); font-size: 0.72rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.distinctive .lab { color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.58rem; }
.distinctive .chip { background: var(--accent-faint); color: var(--accent); padding: 0.2rem 0.55rem; border-radius: 11px; }
.distinctive .chip small { color: var(--muted); }

/* Section headers */
.section { margin-bottom: 2.4rem; }
.section > h2 {
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--accent); border-bottom: 1px solid var(--rule); padding-bottom: 0.4rem; margin: 0 0 1rem;
  display: flex; justify-content: space-between; align-items: baseline;
}
.section > h2 .note { color: var(--muted); font-size: 0.62rem; letter-spacing: 0.08em; }

/* Chickens */
.chicken { display: flex; gap: 0.9rem; padding: 0.9rem 0; border-bottom: 1px solid var(--rule); }
.chicken:last-child { border-bottom: none; }
.chicken .rank { font-family: var(--mono); font-size: 1.6rem; font-weight: 800; color: var(--accent); min-width: 1.4em; text-align: center; line-height: 1.2; }
.chicken .body { flex: 1; min-width: 0; }
.chicken .who { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
.chicken .who img { width: 26px; height: 26px; border-radius: 50%; background: var(--rule); object-fit: cover; }
.chicken .who .name { font-weight: 700; }
.chicken .who .handle { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); }
.chicken .text { font-size: 1.02rem; white-space: pre-wrap; word-wrap: break-word; }
.chicken .meta { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); margin-top: 0.45rem; letter-spacing: 0.03em; }
.chicken .meta a { color: var(--accent); text-decoration: none; }
.chicken .meta a:hover { text-decoration: underline; }

/* Delver */
.delver .who { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
.delver .who img { width: 30px; height: 30px; border-radius: 50%; background: var(--rule); object-fit: cover; }
.delver .who .name { font-weight: 700; }
.delver .who .handle { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); }
.delver .text { font-size: 1.05rem; white-space: pre-wrap; word-wrap: break-word; margin-bottom: 0.6rem; }
.delver .stats { display: flex; gap: 1.2rem; font-family: var(--mono); font-size: 0.68rem; color: var(--muted); margin-bottom: 0.8rem; }
.delver .stats b { color: var(--accent); font-size: 1.5rem; display: block; }
.beastframe { width: 100%; height: 420px; border: 1px solid var(--rule); border-radius: 4px; background: #000; }
.delver .openlink { font-family: var(--mono); font-size: 0.66rem; margin-top: 0.5rem; }
.delver .openlink a { color: var(--accent); text-decoration: none; }

.empty { font-style: italic; color: var(--muted); padding: 0.6rem 0; }

/* Archive */
.archive { font-family: var(--mono); font-size: 0.7rem; }
.archive a { color: var(--accent); text-decoration: none; margin-right: 0.9rem; display: inline-block; margin-bottom: 0.3rem; }
.archive a.current { color: var(--ink); font-weight: 700; text-decoration: underline; }

footer { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--rule); display: flex; gap: 1.1rem; flex-wrap: wrap; }
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="masthead">
  <div class="date" id="m-date">—</div>
  <h1><a href="#" id="m-title">Bisk</a></h1>
  <div class="tagline" id="m-tagline">The SimCluster Daily</div>
</div>
<div class="edition" id="m-edition"></div>

<div class="weather" id="weather" style="display:none">
  <div class="weather-top">
    <div class="glyph" id="w-glyph">☁</div>
    <div class="wmain">
      <div class="wlabel" id="w-label">—</div>
      <div class="wsub" id="w-sub"></div>
      <div class="bar"><div class="needle" id="w-needle" style="left:50%"></div></div>
    </div>
    <canvas id="radar" width="170" height="170"></canvas>
  </div>
  <div class="distinctive" id="distinctive" style="display:none"></div>
</div>

<div class="section" id="sec-chickens">
  <h2>Top Chickens <span class="note">most-liked, last 24h</span></h2>
  <div id="chickens"></div>
</div>

<div class="section" id="sec-delver">
  <h2>Delvers <span class="note">deepest thread of the day</span></h2>
  <div class="delver" id="delver"></div>
</div>

<div class="section">
  <h2>Archive <span class="note">past editions</span></h2>
  <div class="archive" id="archive"></div>
</div>

<footer>
  <a href="https://mino.mobi/">mino.mobi</a>
  <a href="https://mino.mobi/time/">the mino times</a>
  <a href="https://mino.mobi/weft/">weft</a>
  <a href="https://zoom.mino.mobi/">simcluster</a>
  <a id="f-list" href="#">the list</a>
</footer>

<script>
'use strict';
const $ = id => document.getElementById(id);
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00Z');
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
}

async function loadConfig() {
  try { const r = await fetch('./config.json'); if (r.ok) return await r.json(); } catch {}
  return { title: 'Bisk', tagline: 'The SimCluster Daily' };
}

function renderWeather(w) {
  if (!w) { $('weather').style.display = 'none'; return; }
  $('weather').style.display = 'flex';
  $('w-glyph').textContent = w.glyph || '☁';
  $('w-label').textContent = w.label || '—';
  const corpus = w.corpusPosts ? ` · ${w.corpusPosts} posts (incl. deep replies)` : '';
  $('w-sub').textContent = `mood: ${w.mood} · ${w.verbosity} words/post · sentiment ${w.index >= 0 ? '+' : ''}${w.index}${corpus}`;
  $('w-needle').style.left = (((w.index ?? 0) + 1) / 2 * 100).toFixed(1) + '%';
  renderRadar(w.emotions);
  const dist = $('distinctive');
  if (w.distinctive && w.distinctive.length) {
    dist.style.display = 'flex';
    dist.innerHTML = '<span class="lab">talking about</span>' +
      w.distinctive.map(d => `<span class="chip">${esc(d.word)} <small>×${d.count}</small></span>`).join('');
  } else { dist.style.display = 'none'; }
}

function renderRadar(emotions) {
  const c = $('radar'); if (!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height, cx = W / 2, cy = H / 2, R = Math.min(W, H) / 2 - 24;
  ctx.clearRect(0, 0, W, H);
  const order = ['anger', 'anticipation', 'disgust', 'fear', 'joy', 'sadness', 'surprise', 'trust'];
  const ab = { anger: 'ang', anticipation: 'ant', disgust: 'dis', fear: 'fear', joy: 'joy', sadness: 'sad', surprise: 'sur', trust: 'tru' };
  const vals = order.map(k => (emotions && emotions[k]) || 0);
  const max = Math.max(1, ...vals);
  const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  const accent = css('--accent') || '#a8324a', muted = css('--muted') || '#888', rule = css('--rule') || '#ccc';
  const ang = i => -Math.PI / 2 + i * Math.PI / 4;
  ctx.strokeStyle = rule; ctx.lineWidth = 1;
  for (const f of [0.5, 1]) {
    ctx.beginPath();
    for (let i = 0; i < 8; i++) { const x = cx + Math.cos(ang(i)) * R * f, y = cy + Math.sin(ang(i)) * R * f; i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }
    ctx.closePath(); ctx.stroke();
  }
  ctx.fillStyle = muted; ctx.font = '9px ui-monospace, monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < 8; i++) {
    const a = ang(i);
    ctx.strokeStyle = rule; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R); ctx.stroke();
    ctx.fillText(ab[order[i]], cx + Math.cos(a) * (R + 13), cy + Math.sin(a) * (R + 13));
  }
  ctx.beginPath();
  for (let i = 0; i < 8; i++) { const r = R * (vals[i] / max); const x = cx + Math.cos(ang(i)) * r, y = cy + Math.sin(ang(i)) * r; i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }
  ctx.closePath();
  ctx.fillStyle = accent + '33'; ctx.fill();
  ctx.strokeStyle = accent; ctx.lineWidth = 1.6; ctx.stroke();
  for (let i = 0; i < 8; i++) { const r = R * (vals[i] / max); ctx.beginPath(); ctx.arc(cx + Math.cos(ang(i)) * r, cy + Math.sin(ang(i)) * r, 2, 0, Math.PI * 2); ctx.fillStyle = accent; ctx.fill(); }
}

function renderChickens(list) {
  const el = $('chickens');
  if (!list || !list.length) { el.innerHTML = '<div class="empty">No posts in the window yet — check back after the next edition.</div>'; return; }
  el.innerHTML = list.map((c, i) => `
    <div class="chicken">
      <div class="rank">${i + 1}</div>
      <div class="body">
        <div class="who">
          ${c.avatar ? `<img src="${esc(c.avatar)}" alt="">` : '<img alt="">'}
          <span class="name">${esc(c.displayName || c.handle)}</span>
          <span class="handle">@${esc(c.handle)}</span>
        </div>
        <div class="text">${esc(c.text)}</div>
        <div class="meta">♥ ${c.likeCount} &nbsp; ↺ ${c.repostCount} &nbsp; 💬 ${c.replyCount} &nbsp; · &nbsp; <a href="${esc(c.url)}" target="_blank" rel="noopener">open on bluesky →</a></div>
      </div>
    </div>`).join('');
}

function renderDelver(d) {
  const el = $('delver');
  if (!d) { el.innerHTML = '<div class="empty">No threads ran deep enough today.</div>'; return; }
  const beast = 'https://mino.mobi/weft/?uri=' + encodeURIComponent(d.atUri);
  el.innerHTML = `
    <div class="who">
      ${d.avatar ? `<img src="${esc(d.avatar)}" alt="">` : '<img alt="">'}
      <span class="name">${esc(d.displayName || d.handle)}</span>
      <span class="handle">@${esc(d.handle)}</span>
    </div>
    <div class="text">${esc(d.text)}</div>
    <div class="stats">
      <span><b>${d.maxDepth}</b>levels deep</span>
      <span><b>${d.replyCount}</b>replies</span>
      <span><b>${d.interactorCount}</b>voices</span>
    </div>
    <iframe class="beastframe" src="${beast}" loading="lazy" title="threadbeast"></iframe>
    <div class="openlink"><a href="${esc(d.url)}" target="_blank" rel="noopener">open thread on bluesky →</a> &nbsp;·&nbsp; <a href="${beast}" target="_blank" rel="noopener">full threadbeast →</a></div>`;
}

async function renderArchive(currentDate) {
  let idx = [];
  try { const r = await fetch('./data/index.json'); if (r.ok) idx = await r.json(); } catch {}
  const el = $('archive');
  if (!idx.length) { el.innerHTML = '<span class="empty">No back issues yet.</span>'; return; }
  el.innerHTML = idx.map(e => `<a href="#${e.date}" class="${e.date === currentDate ? 'current' : ''}">${e.date}</a>`).join('');
}

async function load() {
  const cfg = await loadConfig();
  $('m-title').textContent = cfg.title || 'Bisk';
  $('m-tagline').textContent = cfg.tagline || '';
  if (cfg.listUrl) $('f-list').href = cfg.listUrl;

  const hash = (location.hash || '').replace('#', '').trim();
  const isDate = /^\d{4}-\d{2}-\d{2}$/.test(hash);
  const url = isDate ? `./data/${hash}.json` : './data/latest.json';
  let digest = null;
  try { const r = await fetch(url); if (r.ok) digest = await r.json(); } catch {}
  if (!digest && isDate) { try { const r = await fetch('./data/latest.json'); if (r.ok) digest = await r.json(); } catch {} }

  if (!digest) {
    $('m-date').textContent = 'no edition yet';
    $('chickens').innerHTML = '<div class="empty">The first edition is still being composed.</div>';
    $('delver').innerHTML = '';
    return;
  }

  $('m-date').textContent = fmtDate(digest.date);
  $('m-edition').innerHTML = `${digest.memberCount} residents · ${digest.postCount} posts surveyed · <a href="${esc(digest.listUrl || '#')}" target="_blank" rel="noopener">the list</a>`;
  renderWeather(digest.weather);
  renderChickens(digest.chickens);
  renderDelver(digest.delver);
  renderArchive(digest.date);
}

window.addEventListener('hashchange', load);
load();
</script>
</body>
</html>
