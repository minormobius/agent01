name = "os-mino-api"
main = "src/index.js"
compatibility_date = "2026-02-20"
compatibility_flags = ["nodejs_compat", "containers"]

# GOLDEN RULE: this worker must own the live domain via a custom_domain route,
# or a green deploy lands on a stray workers.dev and the endpoint never changes.
routes = [
  { pattern = "os-api.minomobi.com", custom_domain = true }
]

[vars]
SYNC_URL = "https://os-api.minomobi.com"

# ─── Agent model profiles ────────────────────────────────────────────
# The container runs Claude Code CLI as the agent harness for ANY model that
# speaks the Anthropic Messages API. The worker injects an AGENT_PROFILES JSON
# (see envVars in src/index.js) mapping profile name → {base, model, key}; the
# in-container `agent <profile>` launcher exports ANTHROPIC_BASE_URL /
# ANTHROPIC_AUTH_TOKEN / ANTHROPIC_MODEL and execs `claude`. Adding another open
# model = another *_BASE_URL/*_MODEL var + key secret + one line in envVars.
#
# kimi3 — Moonshot's Anthropic-compatible endpoint. Check the current model id
# at platform.moonshot.ai and update KIMI_MODEL (mainland endpoint is
# api.moonshot.cn/anthropic). Key: `wrangler secret put MOONSHOT_API_KEY`.
KIMI_BASE_URL = "https://api.moonshot.ai/anthropic"
KIMI_MODEL = "kimi-k3"
# Comma-separated allowlist of DIDs permitted to open a container shell.
# FAIL-CLOSED: if this is empty, the /ws endpoint refuses every connection.
# The shell is handed shared GITHUB_TOKEN / CLOUDFLARE_API_TOKEN, so only put
# DIDs you fully trust here. For a personal tool this is just your own DID, e.g.
#   ALLOWED_DIDS = "did:plc:xxxxxxxxxxxxxxxxxxxxxxxx"
# (A DID is public, not a secret, so it's fine to commit. Can also be set via
#  `wrangler secret put ALLOWED_DIDS` if you prefer to keep it out of git.)
ALLOWED_DIDS = ""

# TENANCY SWITCH. When "true", the SHARED account credentials GITHUB_TOKEN +
# CLOUDFLARE_API_TOKEN are injected into the shell (convenient for single-tenant
# / personal use — you trust yourself with your own tokens). MUST be "false" for
# any config where a DID other than yours is on ALLOWED_DIDS — otherwise that
# user gets your whole GitHub + Cloudflare account.
# Set to "true" HERE because this deployment is OWNER-ONLY BY DESIGN: with
# ALLOWED_DIDS empty the /ws gate is fail-closed (nobody connects), and the
# runbook (os/RUNBOOK.md) puts exactly ONE did — the owner's — on the list.
# HARD RULE: flip this back to "false" before ever adding a second DID.
# See SECURITY.md for the multi-tenant model (per-user broker-held creds).
INJECT_SHARED_CREDS = "true"

# R2 bucket for persistent workspace storage
[[r2_buckets]]
binding = "WORKSPACE"
bucket_name = "os-workspace"

# Container definition — Docker image for PTY shell + Claude Code
[[containers]]
class_name = "ContainerShell"
image = "./container/Dockerfile"
# Owner-only deployment: one container per DID, so 3 = the owner + headroom.
# Raise deliberately if ALLOWED_DIDS ever grows (and see the tenancy rules).
max_instances = 3

# Durable Object bindings
[[durable_objects.bindings]]
name = "CONTAINER_SHELL"
class_name = "ContainerShell"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ContainerShell"]

# Secrets (set via `wrangler secret put`):
#   CAP_SIGNING_KEY       — HMAC key the worker uses to sign per-instance
#                           capability tokens. NEVER enters the container.
#                           Generate once: `openssl rand -hex 32`.
#   MOONSHOT_API_KEY      — Moonshot platform key for the kimi3 profile. Injected
#                           into the container via AGENT_PROFILES — single-tenant
#                           only, same rule as the shared creds below.
#   GITHUB_TOKEN          — only used when INJECT_SHARED_CREDS=true (single-tenant)
#   CLOUDFLARE_API_TOKEN  — only used when INJECT_SHARED_CREDS=true (single-tenant)
#   CLOUDFLARE_ACCOUNT_ID — only used when INJECT_SHARED_CREDS=true (single-tenant)
#
# SECURITY: GITHUB_TOKEN and CLOUDFLARE_API_TOKEN are SHARED account credentials.
# When injected (INJECT_SHARED_CREDS=true) they are readable from the shell and
# are protected ONLY by the ALLOWED_DIDS gate — safe for a single trusted user
# (you), never for a second. Even single-tenant, scope them down as defense in
# depth: GITHUB_TOKEN → a fine-grained PAT limited to minormobius/agent01;
# CLOUDFLARE_API_TOKEN → scoped to just the os Workers/Pages/R2 resources.
# The container↔worker sync no longer uses a shared secret — it uses the
# per-instance CAP_TOKEN, signed by CAP_SIGNING_KEY. See SECURITY.md for the
# full multi-tenant model (per-user broker-held creds, PDS/git proxies).
