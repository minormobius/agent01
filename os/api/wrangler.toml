name = "os-mino-api"
main = "src/index.js"
compatibility_date = "2026-02-20"
compatibility_flags = ["nodejs_compat", "containers"]

[vars]
SYNC_URL = "https://os-api.minomobi.com"

# R2 bucket for persistent workspace storage
[[r2_buckets]]
binding = "WORKSPACE"
bucket_name = "os-workspace"

# Container definition — Docker image for PTY shell + Claude Code
[[containers]]
class_name = "ContainerShell"
image = "./container/Dockerfile"
max_instances = 10

# Durable Object bindings
[[durable_objects.bindings]]
name = "CONTAINER_SHELL"
class_name = "ContainerShell"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ContainerShell"]

# Secrets (set via `wrangler secret put`):
#   SYNC_TOKEN            — shared secret for container ↔ worker sync
#   GITHUB_TOKEN          — GitHub PAT for MCP server + git push
#   CLOUDFLARE_API_TOKEN  — for wrangler commands inside container
#   CLOUDFLARE_ACCOUNT_ID — for wrangler commands inside container
