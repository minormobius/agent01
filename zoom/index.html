<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>simcluster — zoom.mino.mobi</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: monospace; }
  canvas { display: block; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 8px 12px; background: rgba(10,10,10,.9);
    color: #666; font: 12px monospace; z-index: 10;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #1a1a1a;
    user-select: none;
  }
  #hud span.title { color: #777; }
  #status { color: #555; }
  #hover-info {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 6px 12px; background: rgba(10,10,10,.92);
    color: #888; font: 12px monospace; z-index: 10;
    border-top: 1px solid #1a1a1a;
    opacity: 0; transition: opacity .15s;
    user-select: none;
  }
  #hover-info.visible { opacity: 1; }
  #info-panel {
    position: fixed; top: 30px; right: 0; bottom: 0;
    width: 0; overflow: hidden; transition: width .2s;
    border-left: 1px solid #222; background: rgba(10,10,10,.96);
    z-index: 20; font: 13px/1.6 monospace; color: #ccc;
  }
  #info-panel.open { width: 320px; }
  #info-inner {
    width: 320px; padding: 1em; overflow-y: auto; height: 100%;
  }
  #info-panel h2 { font-size: 1em; color: #ddd; margin-bottom: .2em; font-weight: normal; }
  #info-panel .meta { color: #666; font-size: .85em; margin-bottom: .6em; }
  #info-panel .member-list { list-style: none; padding: 0; }
  #info-panel .member-list li { padding: 2px 0; border-bottom: 1px solid #1a1a1a; color: #999; }
  #info-panel .member-list li .shell-tag { color: #555; font-size: .8em; }
  #info-panel .member-list li .handle { color: #8bf; }
  #info-panel .info-close { cursor: pointer; color: #555; float: right; font-size: 1.2em; }
  #info-panel .info-close:hover { color: #fff; }
  #info-panel .bridge-tag { color: #f92; font-size: .8em; }
</style>
</head>
<body>
<div id="hud">
  <span class="title">simcluster</span>
  <span id="status">loading&hellip;</span>
</div>
<div id="hover-info"></div>
<div id="info-panel"><div id="info-inner"></div></div>
<canvas id="c"></canvas>
<script>
// ── Config ───────────────────────────────────────────────────────────
const API_BASE = location.hostname === "localhost" || location.hostname === "127.0.0.1"
  ? `${location.protocol}//${location.host}`
  : "https://feed.mino.mobi";

// ── Canvas + Camera (from phylo) ─────────────────────────────────────
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  scheduleDraw();
}
window.addEventListener("resize", resize);

const cam = { x: 0, y: 0, scale: 1 };
function w2s(wx, wy) { return [(wx - cam.x) * cam.scale + W/2, (wy - cam.y) * cam.scale + H/2]; }
function s2w(sx, sy) { return [(sx - W/2) / cam.scale + cam.x, (sy - H/2) / cam.scale + cam.y]; }

// ── Data ─────────────────────────────────────────────────────────────
let communities = [];  // from API
let bridges = [];
let activityData = {}; // community id → { postCount, totalScore }
let activityPosts = []; // scored posts with community attribution
let flat = [];         // laid-out nodes for hit testing
let selectedNode = null;
let hoveredNode = null;
let heatMax = 1;       // max totalScore across communities (for normalization)
let pulsePhase = 0;    // animation phase for activity glow
let animating = false;

// ── Hex PFP Overlay ─────────────────────────────────────────────────
const HEX_PFP_SIZE = 28;         // pfp diameter in pixels (constant across zoom)
const HEX_SPACING = HEX_PFP_SIZE + 2; // gap between hex centers
const avatarImages = new Map();   // did → HTMLImageElement (loaded)
const avatarLoading = new Set();  // dids currently being fetched
let hexCells = [];                // computed each frame: [{sx, sy, node}]

// Batch-fetch avatar URLs from Bluesky public API
async function fetchAvatars(dids) {
  const BATCH = 25;
  const unresolved = dids.filter(d => !avatarImages.has(d) && !avatarLoading.has(d));
  if (unresolved.length === 0) return;

  for (let i = 0; i < unresolved.length; i += BATCH) {
    const batch = unresolved.slice(i, i + BATCH);
    batch.forEach(d => avatarLoading.add(d));
    try {
      const params = batch.map(d => `actors=${encodeURIComponent(d)}`).join("&");
      const res = await fetch(`https://public.api.bsky.app/xrpc/app.bsky.actor.getProfiles?${params}`);
      if (!res.ok) continue;
      const data = await res.json();
      for (const profile of (data.profiles || [])) {
        if (profile.avatar) {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.src = profile.avatar;
          img.onload = () => { avatarImages.set(profile.did, img); scheduleDraw(); };
          img.onerror = () => { avatarImages.set(profile.did, null); }; // mark as failed
        } else {
          avatarImages.set(profile.did, null);
        }
        avatarLoading.delete(profile.did);
      }
      // Mark any DIDs not in response as no-avatar
      for (const d of batch) {
        if (!avatarImages.has(d)) { avatarImages.set(d, null); avatarLoading.delete(d); }
      }
    } catch(e) {
      batch.forEach(d => avatarLoading.delete(d));
    }
  }
}

// Compute hex overlay — place every member at its screen position (allow overlaps)
function computeHexOverlay() {
  hexCells = [];
  const memberNodes = flat.filter(n => n._type === "member");
  if (memberNodes.length === 0) return;

  for (const n of memberNodes) {
    const [sx, sy] = w2s(n._x, n._y);
    // Cull off-screen (with margin for hex size)
    if (sx < -HEX_PFP_SIZE || sx > W + HEX_PFP_SIZE) continue;
    if (sy < -HEX_PFP_SIZE || sy > H + HEX_PFP_SIZE) continue;
    hexCells.push({ sx, sy, node: n });
  }
}

// Draw a hexagon path (flat-top) centered at (cx, cy) with given radius
function hexPath(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 6 + i * Math.PI / 3;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

// Community hue palette — spread evenly around HSL wheel
function communityHue(idx, total) {
  return (idx / Math.max(total, 1)) * 360;
}

// Heat color: cold (deep blue) → warm (orange/white) based on 0–1 intensity
function heatColor(t) {
  // 0 = cool dark blue, 0.5 = warm orange, 1.0 = hot white-yellow
  if (t < 0.25) return { h: 220, s: 60, l: 12 + t * 40 };
  if (t < 0.5)  return { h: 220 - (t - 0.25) * 800, s: 60 + (t - 0.25) * 80, l: 22 + (t - 0.25) * 60 };
  if (t < 0.75) return { h: 20, s: 75 + (t - 0.5) * 40, l: 37 + (t - 0.5) * 40 };
  return { h: 30 + (t - 0.75) * 40, s: 90, l: 47 + (t - 0.75) * 60 };
}

function startPulseAnimation() {
  if (animating) return;
  animating = true;
  function pulse() {
    pulsePhase = (performance.now() / 2000) % (Math.PI * 2);
    scheduleDraw();
    if (animating) requestAnimationFrame(pulse);
  }
  requestAnimationFrame(pulse);
}

// ── Layout: communities as radial sectors, members within ────────────
function layoutCommunities() {
  flat.length = 0;
  if (communities.length === 0) return;

  const totalMembers = communities.reduce((n, c) => n + c.totalSize, 0);

  // Each community gets an angular sector proportional to its size
  let angle = 0;
  const TWO_PI = Math.PI * 2;

  for (let ci = 0; ci < communities.length; ci++) {
    const c = communities[ci];
    const frac = c.totalSize / totalMembers;
    const sweep = TWO_PI * frac;
    const midAngle = angle + sweep / 2;
    const hue = communityHue(ci, communities.length);

    // Community center node
    const dist = 0.35;
    const cx = dist * Math.cos(midAngle);
    const cy = dist * Math.sin(midAngle);
    const cRadius = Math.max(0.08, Math.sqrt(frac) * 0.4);

    const cNode = {
      _x: cx, _y: cy, _r: cRadius,
      _type: "community", _community: c, _ci: ci,
      _hue: hue,
      _name: c.label,
      _label: `${c.label} (${c.totalSize})`,
      children: []
    };
    flat.push(cNode);

    // Lay out members within the community circle
    // Core at center, shells radiating outward
    const members = c.members || [];
    const shells = new Map(); // shell → members[]
    for (const m of members) {
      if (!shells.has(m.shell)) shells.set(m.shell, []);
      shells.get(m.shell).push(m);
    }
    const shellKeys = [...shells.keys()].sort((a, b) => a - b);

    for (let si = 0; si < shellKeys.length; si++) {
      const shellMembers = shells.get(shellKeys[si]);
      const shellFrac = (si + 1) / (shellKeys.length + 1);
      const shellDist = cRadius * shellFrac * 0.85;

      for (let mi = 0; mi < shellMembers.length; mi++) {
        const m = shellMembers[mi];
        const mAngle = midAngle - sweep/3 + (sweep * 2/3) * (mi / Math.max(shellMembers.length - 1, 1));
        const jitter = (Math.sin(mi * 7.3 + si * 13.1) * 0.15 + 1) * shellDist;
        const mx = cx + jitter * Math.cos(mAngle);
        const my = cy + jitter * Math.sin(mAngle);
        const mRadius = cRadius * 0.025;

        const mNode = {
          _x: mx, _y: my, _r: mRadius,
          _type: "member", _member: m, _ci: ci,
          _hue: hue,
          _shell: m.shell,
          _name: m.handle || m.did.slice(0, 20),
          _label: m.handle || m.did,
          _isBridge: bridges.some(b => b.did === m.did),
          _parent: cNode
        };
        flat.push(mNode);
        cNode.children.push(mNode);
      }
    }

    angle += sweep;
  }
}

// ── Rendering ────────────────────────────────────────────────────────
let drawId = 0;
function scheduleDraw() {
  cancelAnimationFrame(drawId);
  drawId = requestAnimationFrame(draw);
}

function draw() {
  ctx.fillStyle = "#0a0a0a";
  ctx.fillRect(0, 0, W, H);
  if (flat.length === 0) return;

  // Draw bridge arcs first (behind everything)
  for (const b of bridges) {
    if (b.communityIds.length < 2) continue;
    const nodes = b.communityIds
      .map(cid => flat.find(n => n._type === "community" && n._community.id === cid))
      .filter(Boolean);
    if (nodes.length < 2) continue;

    for (let i = 0; i < nodes.length - 1; i++) {
      const [sx1, sy1] = w2s(nodes[i]._x, nodes[i]._y);
      const [sx2, sy2] = w2s(nodes[i+1]._x, nodes[i+1]._y);
      const sr1 = nodes[i]._r * cam.scale;
      const sr2 = nodes[i+1]._r * cam.scale;
      if (sr1 < 2 && sr2 < 2) continue;

      ctx.beginPath();
      ctx.moveTo(sx1, sy1);
      const mx = (sx1 + sx2) / 2, my = (sy1 + sy2) / 2;
      const perpX = -(sy2 - sy1) * 0.15, perpY = (sx2 - sx1) * 0.15;
      ctx.quadraticCurveTo(mx + perpX, my + perpY, sx2, sy2);
      ctx.strokeStyle = "rgba(255,153,34,.12)";
      ctx.lineWidth = Math.max(0.5, Math.min(2, cam.scale * 0.003));
      ctx.stroke();
    }
  }

  // Draw community blobs (behind hex overlay)
  for (const node of flat) {
    if (node._type !== "community") continue;
    const [sx, sy] = w2s(node._x, node._y);
    const sr = node._r * cam.scale;

    if (sx + sr < -20 || sx - sr > W + 20) continue;
    if (sy + sr < -20 || sy - sr > H + 20) continue;
    if (sr < 2) continue;

    const activity = activityData[node._community.id];
    const heat = activity ? Math.min(1, activity.totalScore / Math.max(heatMax, 0.01)) : 0;
    const hc = heatColor(heat);
    const pulse = heat > 0.1 ? 0.5 + 0.5 * Math.sin(pulsePhase + node._ci) : 0;
    const glowAlpha = heat * 0.3 * pulse;

    // Outer glow for active communities
    if (heat > 0.1 && sr > 8) {
      const grad = ctx.createRadialGradient(sx, sy, sr * 0.6, sx, sy, sr * 1.5);
      grad.addColorStop(0, `hsla(${hc.h}, ${hc.s}%, ${hc.l}%, ${glowAlpha})`);
      grad.addColorStop(1, `hsla(${hc.h}, ${hc.s}%, ${hc.l}%, 0)`);
      ctx.beginPath();
      ctx.arc(sx, sy, sr * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Main blob fill
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    const fillL = 15 + heat * 15;
    const fillS = 30 + heat * 30;
    const fillH = heat > 0.2 ? hc.h : node._hue;
    ctx.fillStyle = `hsla(${fillH}, ${fillS}%, ${fillL}%, ${0.4 + heat * 0.3})`;
    ctx.fill();
    ctx.strokeStyle = `hsla(${fillH}, ${fillS + 10}%, ${fillL + 15}%, ${0.5 + heat * 0.3})`;
    ctx.lineWidth = Math.max(0.5, sr * 0.01);
    ctx.stroke();

    // Label
    if (sr > 40) {
      const fontSize = Math.max(9, Math.min(sr * 0.08, 14));
      ctx.font = `${fontSize}px monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const labelL = 55 + heat * 20;
      ctx.fillStyle = `hsla(${fillH}, ${Math.min(60, fillS + 5)}%, ${labelL}%, .9)`;
      const postTag = activity ? ` · ${activity.postCount}p` : "";
      ctx.fillText(node._label + postTag, sx, sy);
    }

    // Highlight
    if (node === selectedNode) {
      ctx.strokeStyle = `hsla(${fillH}, 60%, 60%, .8)`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, sr + 4, 0, Math.PI * 2); ctx.stroke();
    }
    if (node === hoveredNode && node !== selectedNode) {
      ctx.strokeStyle = `hsla(${fillH}, 50%, 50%, .5)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sx, sy, sr + 3, 0, Math.PI * 2); ctx.stroke();
    }
  }

  // ── Hex PFP overlay ──────────────────────────────────────────────
  // Recompute hex cell assignments based on current camera
  computeHexOverlay();

  const hexR = HEX_PFP_SIZE / 2; // radius of hex cell

  for (const cell of hexCells) {
    const { sx, sy, node } = cell;
    const did = node._member.did;
    const img = avatarImages.get(did);

    // Draw hexagon
    ctx.save();
    hexPath(sx, sy, hexR);

    if (img) {
      // Clip to hexagon and draw avatar
      ctx.clip();
      ctx.drawImage(img, sx - hexR, sy - hexR, HEX_PFP_SIZE, HEX_PFP_SIZE);
      ctx.restore();

      // Hex border
      hexPath(sx, sy, hexR);
      ctx.strokeStyle = node._isBridge
        ? "rgba(255,153,34,.7)"
        : `hsla(${node._hue}, 25%, 30%, .6)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      // Fallback: colored hex with initial
      const lum = node._shell === 0 ? 30 : 20;
      const sat = node._isBridge ? 60 : 25;
      ctx.fillStyle = node._isBridge
        ? "hsla(30, 60%, 28%, .9)"
        : `hsla(${node._hue}, ${sat}%, ${lum}%, .85)`;
      ctx.fill();
      ctx.strokeStyle = `hsla(${node._hue}, 20%, 40%, .5)`;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      // Initial letter
      const initial = (node._name || "?")[0].toUpperCase();
      ctx.font = `bold ${Math.round(hexR * 0.8)}px monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillStyle = `hsla(${node._hue}, 30%, 60%, .9)`;
      ctx.fillText(initial, sx, sy);
    }

    // Selection / hover ring on hex
    if (node === selectedNode) {
      hexPath(sx, sy, hexR + 3);
      ctx.strokeStyle = "#f92"; ctx.lineWidth = 2;
      ctx.stroke();
    } else if (node === hoveredNode) {
      hexPath(sx, sy, hexR + 2);
      ctx.strokeStyle = "#8bf"; ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Handle label at deep zoom
    const sr = node._r * cam.scale;
    if (sr > 3 && node._name) {
      const fontSize = Math.max(8, Math.min(11, sr * 0.6));
      ctx.font = `${fontSize}px monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.fillStyle = `hsla(0, 0%, 65%, ${Math.min(1, (sr - 3) / 4)})`;
      ctx.fillText(node._name, sx, sy + hexR + 2);
    }
  }
}

// ── Interaction (from phylo) ─────────────────────────────────────────
let dragging = false, dragStart = null, dragCamStart = null, dragMoved = false;

canvas.addEventListener("mousedown", e => {
  dragging = true; dragMoved = false;
  dragStart = { x: e.clientX, y: e.clientY };
  dragCamStart = { x: cam.x, y: cam.y };
  canvas.classList.add("dragging");
});

window.addEventListener("mousemove", e => {
  if (dragging) {
    const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    cam.x = dragCamStart.x - dx / cam.scale;
    cam.y = dragCamStart.y - dy / cam.scale;
    scheduleDraw();
  } else {
    updateHover(e.clientX, e.clientY);
  }
});

window.addEventListener("mouseup", e => {
  if (!dragMoved) {
    const hit = hitTest(e.clientX, e.clientY);
    selectNode(hit);
  }
  dragging = false;
  canvas.classList.remove("dragging");
});

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 1.08 : 1 / 1.08;
  const [wx, wy] = s2w(e.clientX, e.clientY);
  cam.scale /= zoomFactor;
  cam.x = wx - (e.clientX - W/2) / cam.scale;
  cam.y = wy - (e.clientY - H/2) / cam.scale;
  scheduleDraw();
}, { passive: false });

canvas.addEventListener("dblclick", e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) flyTo(hit);
});

// Touch
let lastTouchDist = 0, touchMoved = false;
canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    dragging = true; touchMoved = false;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    dragCamStart = { x: cam.x, y: cam.y };
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchMoved = true;
    cam.x = dragCamStart.x - dx / cam.scale;
    cam.y = dragCamStart.y - dy / cam.scale;
    scheduleDraw();
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mid = { x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2 };
    if (lastTouchDist > 0) {
      const [wx, wy] = s2w(mid.x, mid.y);
      cam.scale /= lastTouchDist / dist;
      cam.x = wx - (mid.x - W/2) / cam.scale;
      cam.y = wy - (mid.y - H/2) / cam.scale;
      scheduleDraw();
    }
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", e => {
  if (!touchMoved && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    selectNode(hitTest(t.clientX, t.clientY));
  }
  dragging = false; touchMoved = false; lastTouchDist = 0;
});

// ── Hit testing ──────────────────────────────────────────────────────
function hitTest(sx, sy) {
  // First check hex cells (member pfps in screen space)
  const hexR = HEX_PFP_SIZE / 2;
  let bestHex = null, bestHexDist = Infinity;
  for (const cell of hexCells) {
    const dx = sx - cell.sx, dy = sy - cell.sy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < hexR && d < bestHexDist) {
      bestHexDist = d;
      bestHex = cell.node;
    }
  }
  if (bestHex) return bestHex;

  // Fall back to community blobs (world space)
  const [wx, wy] = s2w(sx, sy);
  let best = null, bestR = Infinity;
  for (const n of flat) {
    if (n._type !== "community") continue;
    if (n._r * cam.scale < 2) continue;
    const dx = wx - n._x, dy = wy - n._y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < n._r * 0.9 && n._r < bestR) { bestR = n._r; best = n; }
  }
  return best;
}

function updateHover(sx, sy) {
  const hit = hitTest(sx, sy);
  if (hit !== hoveredNode) { hoveredNode = hit; scheduleDraw(); }
  const el = document.getElementById("hover-info");
  if (hit) {
    el.classList.add("visible");
    if (hit._type === "community") {
      const a = activityData[hit._community.id];
      const activityTag = a ? ` · ${a.postCount} posts · score ${a.totalScore.toFixed(1)}` : " · no recent posts";
      el.textContent = `${hit._community.label} · ${hit._community.coreSize} core · ${hit._community.totalSize} total${activityTag}`;
    } else {
      const bTag = hit._isBridge ? " · bridge" : "";
      el.textContent = `${hit._label} · shell ${hit._shell}${bTag}`;
    }
  } else {
    el.classList.remove("visible");
  }
}

// ── Selection / info panel ───────────────────────────────────────────
function selectNode(node) {
  const panel = document.getElementById("info-panel");
  const inner = document.getElementById("info-inner");
  if (!node) { selectedNode = null; panel.classList.remove("open"); scheduleDraw(); return; }

  selectedNode = node;
  panel.classList.add("open");
  scheduleDraw();

  if (node._type === "community") {
    const c = node._community;
    let html = `<span class="info-close">&times;</span>`;
    html += `<h2>${c.label}</h2>`;
    const a = activityData[c.id];
    const activityMeta = a ? ` · ${a.postCount} posts · activity ${a.totalScore.toFixed(1)}` : "";
    html += `<div class="meta">${c.coreSize} core · ${c.totalSize} total members${activityMeta}</div>`;

    // Top posts for this community
    const cPosts = activityPosts.filter(p => p.communityIds.includes(c.id)).slice(0, 5);
    if (cPosts.length > 0) {
      html += `<div class="meta" style="margin-top:.4em">top posts</div>`;
      html += `<ul class="member-list">`;
      for (const p of cPosts) {
        const rkey = p.uri.split("/").pop();
        const authorDid = p.uri.split("/")[2];
        const shortUri = rkey.slice(0, 12);
        html += `<li><a href="https://bsky.app/profile/${authorDid}/post/${rkey}" target="_blank" rel="noopener" style="color:#8bf;text-decoration:none">${shortUri}…</a> <span class="shell-tag">score ${p.score.toFixed(2)}</span></li>`;
      }
      html += `</ul>`;
    }

    // List members grouped by shell
    const byShell = new Map();
    for (const m of c.members || []) {
      if (!byShell.has(m.shell)) byShell.set(m.shell, []);
      byShell.get(m.shell).push(m);
    }
    for (const [shell, members] of [...byShell.entries()].sort((a,b) => a[0] - b[0])) {
      html += `<div class="meta">${shell === 0 ? "core" : "shell " + shell} (${members.length})</div>`;
      html += `<ul class="member-list">`;
      for (const m of members.slice(0, 20)) {
        const isBridge = bridges.some(b => b.did === m.did);
        const bTag = isBridge ? ` <span class="bridge-tag">bridge</span>` : "";
        const display = m.handle
          ? `<span class="handle">@${m.handle}</span>`
          : `<span>${m.did.slice(0, 24)}…</span>`;
        html += `<li>${display} <span class="shell-tag">×${m.mutualCount}</span>${bTag}</li>`;
      }
      if (members.length > 20) html += `<li class="meta">+${members.length - 20} more</li>`;
      html += `</ul>`;
    }
    inner.innerHTML = html;
  } else {
    const m = node._member;
    let html = `<span class="info-close">&times;</span>`;
    html += `<h2>${m.handle ? "@" + m.handle : m.did}</h2>`;
    html += `<div class="meta">shell ${m.shell} · ${m.mutualCount} mutual</div>`;
    if (node._isBridge) {
      const b = bridges.find(b => b.did === m.did);
      if (b) html += `<div class="meta bridge-tag">bridge across communities: ${b.communityIds.join(", ")}</div>`;
    }
    if (m.handle) {
      html += `<div style="margin-top:.6em"><a href="https://bsky.app/profile/${m.handle}" target="_blank" rel="noopener" style="color:#8bf;text-decoration:none">↗ Bluesky profile</a></div>`;
    }
    inner.innerHTML = html;
  }

  inner.querySelector(".info-close").onclick = () => {
    panel.classList.remove("open"); selectedNode = null; scheduleDraw();
  };
}

// Dismiss info panel on click/tap anywhere on the canvas (already works via selectNode(null))
// Also dismiss when tapping the panel background (not links)
document.getElementById("info-inner").addEventListener("click", e => {
  if (e.target.tagName === 'A') return; // let links work
  document.getElementById("info-panel").classList.remove("open");
  selectedNode = null; scheduleDraw();
});

// ── Animation ────────────────────────────────────────────────────────
function flyTo(node, duration) {
  duration = duration || 500;
  const targetScale = Math.min(W, H) / (node._r * 2.8);
  const sx = cam.x, sy = cam.y, ss = cam.scale;
  const tx = node._x, ty = node._y, ts = targetScale;
  const t0 = performance.now();
  function step(now) {
    let t = Math.min(1, (now - t0) / duration);
    t = 1 - Math.pow(1 - t, 3);
    cam.x = sx + (tx - sx) * t;
    cam.y = sy + (ty - sy) * t;
    cam.scale = ss * Math.pow(ts / ss, t);
    scheduleDraw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Init ─────────────────────────────────────────────────────────────
(async () => {
  const status = document.getElementById("status");
  resize();

  try {
    status.textContent = "fetching communities…";
    const [comRes, actRes] = await Promise.all([
      fetch(`${API_BASE}/xrpc/com.minomobi.feed.getCommunities`),
      fetch(`${API_BASE}/xrpc/com.minomobi.feed.getCommunityActivity`).catch(() => null),
    ]);
    if (!comRes.ok) throw new Error(`HTTP ${comRes.status}`);
    const data = await comRes.json();

    communities = data.communities || [];
    bridges = data.bridges || [];

    // Load activity heatmap data
    if (actRes && actRes.ok) {
      const actData = await actRes.json();
      activityData = actData.communities || {};
      activityPosts = actData.posts || [];
      // Find max score for normalization
      heatMax = 0;
      for (const cid in activityData) {
        if (activityData[cid].totalScore > heatMax) heatMax = activityData[cid].totalScore;
      }
    }

    if (communities.length === 0) {
      status.textContent = "no communities yet — waiting for cron";
      return;
    }

    status.textContent = "laying out…";
    layoutCommunities();

    cam.x = 0; cam.y = 0;
    cam.scale = Math.min(W, H) * 0.9;

    const totalMembers = communities.reduce((n, c) => n + c.totalSize, 0);
    const postCount = activityPosts.length;
    status.textContent = `${communities.length} communities · ${totalMembers} members · ${bridges.length} bridges · ${postCount} posts · scroll to zoom`;
    scheduleDraw();

    // Fetch avatars for all members (non-blocking)
    const allDids = flat.filter(n => n._type === "member").map(n => n._member.did);
    fetchAvatars(allDids);

    // Start pulse animation if there's activity data
    if (heatMax > 0) startPulseAnimation();
  } catch (e) {
    status.textContent = `error: ${e.message}`;
    console.error(e);
  }
})();
</script>
