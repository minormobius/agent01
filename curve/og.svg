<text x="64" y="412" font-family="Georgia, serif" font-size="27" fill="#444">Three scores: fewer segments, straighter strokes,</text>
<text x="64" y="450" font-family="Georgia, serif" font-size="27" fill="#444">tighter fit.</text>
