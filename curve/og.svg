<text x="64" y="270" font-family="DejaVu Sans Mono, monospace" font-size="20" letter-spacing="2" fill="#1a4a8a">factor a target into 2&#8211;5 hand-drawn lines</text>
<text x="64" y="336" font-family="Georgia, serif" font-size="27" fill="#444">A target curve is the secret product of a few</text>
